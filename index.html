    function saveStateDebounced() { if(saveStateTimer) clearTimeout(saveStateTimer); saveStateTimer = setTimeout(() => { try { localStorage.setItem('bloomberg_fusion_v72', JSON.stringify({ xau: state.xau, btc: state.btc, version: '7.2' })); } catch(e){} saveStateTimer = null; }, 500); }
    function loadState() { try { const saved = localStorage.getItem('bloomberg_fusion_v72'); if(saved) { const p = JSON.parse(saved); state.xau = p.xau || createFreshState(); state.btc = p.btc || createFreshState(); } else resetStates(); } catch(e) { resetStates(); } activePairId = localStorage.getItem('bloomberg_active_pair_v72') || CONFIG.defaultPair; }
    function resetStates() { state.xau = createFreshState(); state.btc = createFreshState(); }
    
    // ==================== HTF ENGINE - ENHANCED ====================
    function buildOHLCCandle(id, price) {
        const data = htfData[id];
        if (!data) return;
        data.tickCounter++;
        
        if (!data.currentCandle || data.tickCounter >= CONFIG.htf.ticksPerCandle) {
            if (data.currentCandle && !data.currentCandle.closed) {
                data.currentCandle.closed = true;
                data.ohlcCandles.push(data.currentCandle);
                if (data.ohlcCandles.length > 120) data.ohlcCandles.shift();
            }
            data.tickCounter = 0;
            data.currentCandle = { open: price, high: price, low: price, close: price, closed: false };
        } else {
            data.currentCandle.high = Math.max(data.currentCandle.high, price);
            data.currentCandle.low = Math.min(data.currentCandle.low, price);
            data.currentCandle.close = price;
        }
        
        data.currentCandle.range = data.currentCandle.high - data.currentCandle.low;
        data.currentCandle.body = Math.abs(data.currentCandle.close - data.currentCandle.open);
        data.currentCandle.isBullish = data.currentCandle.close >= data.currentCandle.open;
        
        const maxOC = Math.max(data.currentCandle.open, data.currentCandle.close);
        const minOC = Math.min(data.currentCandle.open, data.currentCandle.close);
        data.currentCandle.upperWick = Math.max(0, data.currentCandle.high - maxOC);
        data.currentCandle.lowerWick = Math.max(0, minOC - data.currentCandle.low);
        
        data.lastUpdate = Date.now();
    }
    
    function calculateATR_EMA(id){
        const data = htfData[id];
        const candles = data.ohlcCandles.filter(c=>c.closed);
        if(candles.length < 5) { 
            data.atr = id === 'xau' ? 0.15 : 150;
            data.atrEMA = data.atr;
            return;
        }
        
        let total = 0;
        const period = Math.min(14, candles.length - 1);
        for(let i = 1; i <= period; i++) {
            total += Math.max(
                candles[i].high - candles[i].low,
                Math.abs(candles[i].high - candles[i-1].close),
                Math.abs(candles[i].low - candles[i-1].close)
            );
        }
        const rawATR = total / period;
        const safeRaw = Math.min(rawATR, (data.atrEMA || rawATR) * 3.0);
        
        if(!data.atrEMA) data.atrEMA = safeRaw;
        data.atrEMA = data.atrEMA * 0.8 + safeRaw * 0.2;
        data.atr = Math.max(0.01, data.atrEMA);
        
        if(!isValidPrice(data.atr) || data.atr <= 0) {
            data.atr = id === 'xau' ? 0.15 : 150;
            data.atrEMA = data.atr;
        }
    }
    
    function detectPivotsIncremental(id){
        const data = htfData[id];
        const candles = data.ohlcCandles.filter(c=>c.closed);
        if(candles.length < CONFIG.htf.minCandlesForStructure) return;
        
        const lookback = CONFIG.htf.pivotLookback;
        let startIdx = Math.max(0, data.lastPivotUpdateIdx - lookback);
        
        function isDuplicatePivotHigh(price, idx) {
            return data.pivotHighs.some(p => Math.abs(p.price - price) < 0.001 && Math.abs(p.index - idx) <= 1);
        }
        function isDuplicatePivotLow(price, idx) {
            return data.pivotLows.some(p => Math.abs(p.price - price) < 0.001 && Math.abs(p.index - idx) <= 1);
        }
        
        for(let i = startIdx; i < candles.length - lookback; i++){
            if(i < lookback) continue;
            let isHigh = true, isLow = true;
            for(let j = 1; j <= lookback; j++){
                if(candles[i-j].high >= candles[i].high || candles[i+j].high >= candles[i].high) isHigh = false;
                if(candles[i-j].low <= candles[i].low || candles[i+j].low <= candles[i].low) isLow = false;
            }
            
            if(isHigh && !isDuplicatePivotHigh(candles[i].high, i)) {
                data.pivotHighs.push({index: i, price: candles[i].high});
            }
            if(isLow && !isDuplicatePivotLow(candles[i].low, i)) {
                data.pivotLows.push({index: i, price: candles[i].low});
            }
        }
        
        if(data.pivotHighs.length > 50) data.pivotHighs = data.pivotHighs.slice(-50);
        if(data.pivotLows.length > 50) data.pivotLows = data.pivotLows.slice(-50);
        
        data.lastPivotUpdateIdx = candles.length - 1;
        
        const all = [...data.pivotHighs.map(p=>({...p,type:'H'})), ...data.pivotLows.map(p=>({...p,type:'L'}))];
        all.sort((a,b)=>a.index - b.index);
        data.swings = [];
        let lastType = null;
        all.forEach(p=>{ if(p.type !== lastType) { data.swings.push({val:p.price, type:p.type}); lastType = p.type; } });
        detectStructure(id);
    }
    
    function detectStructure(id){
        const data = htfData[id]; const swings = data.swings;
        if(swings.length<4) return;
        const recent=swings.slice(-4); const highs=recent.filter(s=>s.type==='H').map(s=>s.val); const lows=recent.filter(s=>s.type==='L').map(s=>s.val);
        if(highs.length>=2 && lows.length>=2){
            const hh = highs[highs.length-1] > highs[highs.length-2]; const hl = lows[lows.length-1] > lows[lows.length-2];
            const lh = highs[highs.length-1] < highs[highs.length-2]; const ll = lows[lows.length-1] < lows[lows.length-2];
            if(hh && hl) data.structure='BULLISH';
            else if(lh && ll) data.structure='BEARISH';
            else data.structure='RANGE';
        } else data.structure='TRANSITIONAL';
    }
    
    function detectMomentum(id){
        const data = htfData[id]; const candles = data.ohlcCandles.filter(c=>c.closed);

        const safeATR = Math.max(0.01, data.atr);
        const recent = candles.slice(-CONFIG.htf.momentumLookback);
        let bullish=0, bearish=0;
        recent.forEach(c=>{ if(c.isBullish && c.range>safeATR*0.6 && c.body/c.range>0.55) bullish++; else if(!c.isBullish && c.range>safeATR*0.6 && c.body/c.range>0.55) bearish++; });
        if(bullish>=3) { data.momentum='IMPULSIVE_UP'; data.momentumStrength='STRONG'; }
        else if(bearish>=3) { data.momentum='IMPULSIVE_DOWN'; data.momentumStrength='STRONG'; }
        else if(bullish>=1) { data.momentum='BULLISH'; data.momentumStrength='WEAK'; }
        else if(bearish>=1) { data.momentum='BEARISH'; data.momentumStrength='WEAK'; }
        else { data.momentum='STABLE'; data.momentumStrength='NONE'; }
    }

        if(candles.length<CONFIG.htf.rangeLookback) return;
        const safeATR = Math.max(0.01, data.atr); let expansion=0, overlap=0;
        for(let i=1;i<candles.length && i<CONFIG.htf.rangeLookback;i++){
            if(candles[i].range > safeATR*1.2) expansion++;
            if(Math.abs((candles[i].high+candles[i].low)/2 - (candles[i-1].high+candles[i-1].low)/2) < safeATR*0.4) overlap++;
        }
        if(expansion>=3) data.phase = 'EXPANSION';
        else if(overlap>=6) data.phase = 'LOW_VOLATILITY';
        else if(data.structure==='BULLISH'||data.structure==='BEARISH') data.phase = 'TRENDING';
        else data.phase='RANGE';
    }
    
    function calculateHTFConfidence(id){
        const d = htfData[id]; let c = 0;
        if(d.structure==='BULLISH'||d.structure==='BEARISH') c+=40; else if(d.structure==='TRANSITIONAL') c+=15;
        if(d.momentumStrength==='STRONG') c+=35; else if(d.momentumStrength==='WEAK') c+=10;
        if(d.phase==='TRENDING') c+=25; else if(d.phase==='EXPANSION') c+=15;
        d.confidence = clamp(c,0,100);
        d.confidenceStatus = d.confidence>=70?'HIGH':(d.confidence>=45?'MEDIUM':(d.confidence>=30?'LOW':'INVALID'));
    }
    
    function updateHTFEngine(id, price){
        if(!htfData[id]) initHTFData(id);
        buildOHLCCandle(id, price);
        calculateATR_EMA(id);
        detectPivotsIncremental(id);
        detectMomentum(id);
        detectMarketPhase(id);
        calculateHTFConfidence(id);
        const now = Date.now();
        if(now - htfRenderThrottle[id] > 250) { htfRenderThrottle[id] = now; renderHTFContext(id); }
    }
    
    // ==================== SIGNAL VALIDATION ====================
    function validateSignalWithHTF(id, direction, price){
        const htf = htfData[id];
        if(!htf || htf.confidenceStatus==='INVALID') return { valid: true, reason: 'HTF_INIT', confidence: 35, priority: 'LOW', sizeMult: 0.5 };
        if(htf.confidence < CONFIG.htf.confidenceThreshold.minToAllow) return { valid: false, reason: `LOW_HTF (${Math.round(htf.confidence)}%)`, confidence: htf.confidence };
        const structMatch = (direction==='buy' && htf.structure==='BULLISH') || (direction==='sell' && htf.structure==='BEARISH');
        const momMatch = (direction==='buy' && (htf.momentum==='IMPULSIVE_UP'||htf.momentum==='BULLISH')) || (direction==='sell' && (htf.momentum==='IMPULSIVE_DOWN'||htf.momentum==='BEARISH'));
        if(structMatch && momMatch) return { valid: true, reason: 'FULL_ALIGN', confidence: htf.confidence, priority: 'HIGH', sizeMult: 1.0 };
        if(structMatch) return { valid: true, reason: 'STRUCT_ALIGN', confidence: htf.confidence*0.9, priority: 'MEDIUM', sizeMult: 0.85 };
        if(htf.confidence>=55 && htf.momentumStrength!=='NONE') return { valid: true, reason: 'MOM_ONLY', confidence: htf.confidence*0.8, priority: 'LOW', sizeMult: 0.55 };
        return { valid: false, reason: `${htf.structure} vs ${direction}`, confidence: htf.confidence };
    }
    
    function lockSignalWithHTF(id, marketPrice, direction){
        const s = state[id], p = CONFIG.pairs[id];
        const val = validateSignalWithHTF(id, direction, marketPrice);
        if(!val.valid) { if(dom.rejectEl[id]) dom.rejectEl[id].textContent = `⛔ ${val.reason}`; setTimeout(()=>{ if(dom.rejectEl[id]) dom.rejectEl[id].textContent=''; },2000); resetSignal(id); return false; }
        let entry = direction==='buy' ? marketPrice - p.limitSpread : marketPrice + p.limitSpread;
        let sl = direction==='buy' ? entry - p.risk : entry + p.risk;
        let tp = direction==='buy' ? entry + (p.risk * p.rr) : entry - (p.risk * p.rr);
        if(val.sizeMult){ const adjRisk = p.risk * val.sizeMult; sl = direction==='buy' ? entry - adjRisk : entry + adjRisk; tp = direction==='buy' ? entry + (adjRisk * p.rr) : entry - (adjRisk * p.rr); }
        const bias = p.biasOffset; const entryDisplay = entry + (direction==='buy' ? bias.buy : bias.sell);
        s.l3=true; s.confirmed=true; s.type=direction; s.entryOriginal=entry; s.entryDisplay=entryDisplay; s.sl=sl; s.tp=tp; s.signalTimestamp=Date.now(); s.orderExpiry=Date.now()+CONFIG.signal.orderTimeoutMs; s.htfConfidence=val.confidence; s.htfReason=val.reason;
        saveStateDebounced(); renderUIThrottled(id); return true;
    }
    
    function resetSignal(id){
        const oldPrice = state[id]?.lastPrice || 0;
        state[id] = createFreshState(); state[id].lastPrice = oldPrice; state[id].prevPrice = oldPrice;
        persistenceCounter[id]=0;
        saveStateDebounced(); renderUIThrottled(id);
    }
    
    function updateSignalLogic(id, price){
        const s = state[id], p = CONFIG.pairs[id];
        if(!s) return;
        if(s.confirmed && s.orderExpiry && Date.now() > s.orderExpiry) { resetSignal(id); return; }
        if(s.confirmed){
            if((s.type==='buy' && (price>=s.tp || price<=s.sl)) || (s.type==='sell' && (price<=s.tp || price>=s.sl))) { lastSignalResetTime[id]=Date.now(); resetSignal(id); }
            return;
        }
        if(!s.l1 && Date.now()-lastSignalResetTime[id] > CONFIG.signal.resetCooldownMs && s.prevPrice!==0){
            if(Math.abs(price - s.prevPrice) < p.threshold * 0.6){ persistenceCounter[id]++; if(persistenceCounter[id]>=CONFIG.signal.minPersistenceCandles) resetSignal(id); return; }
            else persistenceCounter[id]=0;
        }
        const diff = price - s.prevPrice;
        if(s.prevPrice!==0 && diff!==0) s.trendScore += diff * 0.5;
        const thresh = p.threshold * (s.l1?0.85:1.0);
        if(!s.confirmed && s.prevPrice!==0 && Math.abs(diff) > thresh){
            const direction = diff>0 ? 'buy':'sell';
            if(!s.l1){ s.l1=true; s.type=direction; saveStateDebounced(); }
            else if(!s.l2 && s.type===direction){ s.l2=true; saveStateDebounced(); }
            else if(!s.l3 && s.l2 && s.type===direction){ lockSignalWithHTF(id, price, direction); }
            else if(s.type!==direction){ resetSignal(id); }
        }
        renderUIThrottled(id);
    }
    
    // ==================== SPIKE PROTECTION ====================
    function isSpike(id, price){
        const htf = htfData[id]; if(!htf || htf.atr<=0) return false;
        const last = lastValidPrice[id]; if(last===0) return false;
        const change = Math.abs(price - last);
        const maxAllowed = htf.atr * CONFIG.signal.spikeATRMult;
        if(change > maxAllowed && maxAllowed>0){ return true; }
        return false;
    }
    
    // ==================== UPDATE DISPLAY ====================
    function updateDisplay(id, price){
        if(!isValidPrice(price) || isSpike(id, price)) return;
        
        lastFeedTimestamp[id] = Date.now();
        if(staleFeedWarning[id]) {
            staleFeedWarning[id] = false;
            updateWSStatus(id);
        }
        
        lastValidPrice[id] = price;
        const s = state[id]; if(!s) return;
        priceHistory[id].push(price); if(priceHistory[id].length>CONFIG.ws.maxPriceHistory) priceHistory[id].shift();
        s.prevPrice = s.lastPrice; s.lastPrice = price;
        updateHTFEngine(id, price);
        if(dom.priceEl[id]) { dom.priceEl[id].textContent = formatPrice(price,id); if(s.prevPrice!==0) dom.priceEl[id].style.color = price>=s.prevPrice ? 'var(--terminal-green)' : 'var(--terminal-red)'; }
        if(dom.changeEl[id] && s.prevPrice!==0) { const diff=price-s.prevPrice; dom.changeEl[id].textContent = `${diff>=0?'+':''}${diff.toFixed(id==='xau'?2:1)}`; dom.changeEl[id].style.color = diff>=0 ? 'var(--terminal-green)' : 'var(--terminal-red)'; }
        updateSignalLogic(id, price);
        renderUIThrottled(id);
    }
    
    // ==================== RENDER ENGINE ====================
    function renderUIThrottled(id){
        if(renderFrameRequest[id]) return;
        renderFrameRequest[id] = true;
        if(document.hidden) {
            setTimeout(()=>{ renderUI(id); renderFrameRequest[id]=false; }, 0);
        } else {
            requestAnimationFrame(()=>{ renderUI(id); renderFrameRequest[id]=false; });
        }
    }
    
    function renderUI(id){
        const s = state[id]; if(!s) return;
        const isBuy = s.type==='buy';
        for(let i=0;i<3;i++){ const dot = dom.fusionDots[`${id}_${i}`]; if(dot){ dot.className='fusion-dot'; if(s[`l${i+1}`] && s.confirmed) dot.classList.add(isBuy?'active-buy':'active-sell','pulse'); else if(s[`l${i+1}`]) dot.classList.add(isBuy?'active-buy':'active-sell'); } }
        if(dom.signalText[id]) dom.signalText[id].textContent = s.confirmed ? s.type.toUpperCase() : (s.l3?'FVG':(s.l2?'CHoCH':(s.l1?'SWEEP':'IDLE')));
        for(let i=0;i<3;i++) if(dom.logicDots[`${id}_${i}`]) dom.logicDots[`${id}_${i}`].className = s[`l${i+1}`] ? 'mini-dot on' : 'mini-dot off';
        if(dom.entryEl[id]) dom.entryEl[id].textContent = s.confirmed ? formatPrice(s.entryDisplay,id) : '--';
        if(dom.tpEl[id]) dom.tpEl[id].textContent = s.confirmed ? formatPrice(s.tp,id) : '--';
        if(dom.slEl[id]) dom.slEl[id].textContent = s.confirmed ? formatPrice(s.sl,id) : '--';
    }
    
    function renderHTFContext(id){
        const d = htfData[id];
        if(!d) return;
        
        if(dom.trendEl[id]){
            let txt='', cls='';
            if(d.structure==='BULLISH'){ txt='▲ BULLISH'; cls='htf-struct-bull'; }

            else if(d.momentum==='IMPULSIVE_DOWN'){ mtxt='▼ STRONG'; mcolor='var(--htf-bearish)'; }
            else if(d.momentum==='BULLISH'){ mtxt='▲ WEAK'; mcolor='var(--htf-weak)'; }
            else if(d.momentum==='BEARISH'){ mtxt='▼ WEAK'; mcolor='var(--htf-weak)'; }

            dom.momEl[id].innerHTML = mtxt;
            dom.momEl[id].style.color = mcolor;

                cache.phaseSpan = phaseSpan;

                cache.atrSpan = atrSpan;

                confBar.className = 'confidence-bar-inline';
                const confFill = document.createElement('div');
                confFill.className = 'confidence-fill-inline';
                confBar.appendChild(confFill);
                cache.confBar = confBar;
                cache.confFill = confFill;
                dom.rangeEl[id].appendChild(confBar);
                
                const confTxt = document.createElement('div');
                confTxt.style.cssText = 'font-size:6px;color:var(--text-dim);margin-top:2px';
                cache.confTxt = confTxt;

            }

            else if(d.phase === 'EXPANSION'){ phaseClass = 'phase-expansion'; phaseText = 'EXPANSION'; }
            else if(d.phase === 'LOW_VOLATILITY'){ phaseClass = 'phase-lowvol'; phaseText = 'LOW VOL'; }
            cache.phaseSpan.className = `price-action-phase ${phaseClass}`;
            cache.phaseSpan.textContent = phaseText;
            
            cache.atrSpan.textContent = `ATR ${d.atr.toFixed(id === 'xau' ? 2 : 0)}`;
            
            const confPercent = Math.min(100, Math.max(0, d.confidence));
            cache.confFill.style.width = `${confPercent}%`;
            cache.confFill.style.backgroundColor = d.confidence >= 65 ? 'var(--htf-bullish)' : (d.confidence >= 40 ? 'var(--htf-weak)' : 'var(--htf-bearish)');
            
            cache.confTxt.textContent = `CONF ${Math.round(d.confidence)}% | ${d.confidenceStatus}`;
        }
    }
    
    // ==================== WEBSOCKET + POLLING ====================
    function stopHeartbeat(id){ if(wsHeartbeatInterval[id]){ clearInterval(wsHeartbeatInterval[id]); wsHeartbeatInterval[id]=null; } }
    function startHeartbeat(id, ws){ stopHeartbeat(id); if(!pageVisible) return; wsHeartbeatInterval[id]=setInterval(()=>{ if(ws && ws.readyState===WebSocket.OPEN) try{ ws.send(JSON.stringify({type:'ping'})); }catch(e){} }, CONFIG.ws.heartbeatIntervalMs); }
    function clearReconnectTimer(id){ if(wsReconnectTimers[id]){ clearTimeout(wsReconnectTimers[id]); wsReconnectTimers[id]=null; } }
    
    function connectWebSocket(id){
        if(!pageVisible) return;
        clearReconnectTimer(id);
        
        const currentToken = ++wsConnectionTokens[id];
        
        if(wsConnections[id]) { 
            try{ wsConnections[id].close(); } catch(e){} 
            wsConnections[id] = null; 
        }
        
        const p = CONFIG.pairs[id];
        if(!p) return;
        
        const ws = new WebSocket(p.wsUrl);
        wsConnections[id] = ws;
        ws._connectionToken = currentToken;
        
        ws.onopen = () => {
            if(wsConnections[id] !== ws || ws._connectionToken !== wsConnectionTokens[id]) return;
            wsStatus[id] = true;
            wsRetries[id] = 0;
            wsLastUpdate[id] = Date.now();
            dataSource[id] = 'WS';
            updateWSStatus(id);
            updateGlobalPulse();
            startHeartbeat(id, ws);
        };
        
        ws.onclose = () => {
            if(wsConnections[id] !== ws || ws._connectionToken !== wsConnectionTokens[id]) return;
            wsStatus[id] = false;
            updateWSStatus(id);
            updateGlobalPulse();
            stopHeartbeat(id);
            if(!pageVisible) return;
            const delay = Math.min(CONFIG.ws.reconnectBaseDelayMs * Math.pow(1.5, wsRetries[id]), CONFIG.ws.maxReconnectDelayMs);
            wsReconnectTimers[id] = setTimeout(() => { connectWebSocket(id); }, delay);
            wsRetries[id]++;
        };
        
        ws.onerror = () => {
            if(wsConnections[id] !== ws || ws._connectionToken !== wsConnectionTokens[id]) return;
            wsStatus[id] = false;
            updateWSStatus(id);
            updateGlobalPulse();
        };
        
        ws.onmessage = (e) => {
            if(wsConnections[id] !== ws || ws._connectionToken !== wsConnectionTokens[id]) return;
            try{
                const data = JSON.parse(e.data);
                if(data.type === 'pong') return;
                let price = null;
                if(data.c) price = parseFloat(data.c);
                else if(data.p) price = parseFloat(data.p);
                if(isValidPrice(price)){
                    price += p.offset;
                    wsLastUpdate[id] = Date.now();
                    if(!wsStatus[id]){
                        wsStatus[id] = true;
                        updateWSStatus(id);
                        updateGlobalPulse();
                    }
                    if(dataSource[id] !== 'WS'){
                        dataSource[id] = 'WS';
                        updateWSStatus(id);
                        updateGlobalPulse();
                    }
                    updateDisplay(id, price);
                }
            } catch(err){}
        };
    }
    
    async function fetchPriceRest(id){ const p=CONFIG.pairs[id]; if(!p) return null; try{ const res=await fetch(p.restUrl); const data=await res.json(); let price=parseFloat(data.price); if(isValidPrice(price)) return price+p.offset; }catch(e){} return null; }
    
    function startPollingIfNeeded(id){ 
        if(pollingTimers[id]) { clearInterval(pollingTimers[id]); pollingTimers[id]=null; }
        pollingTimers[id]=setInterval(async()=>{ 
            if(!pageVisible) return; 
            const wsDead = !wsStatus[id] || (Date.now()-wsLastUpdate[id] > CONFIG.polling.wsDeadThresholdMs); 
            if(wsDead){ 
                if(dataSource[id]!=='POLLING'){ 
                    dataSource[id]='POLLING'; 
                    updateWSStatus(id); 
                    updateGlobalPulse(); 
                } 
                const price=await fetchPriceRest(id); 
                if(isValidPrice(price)) updateDisplay(id, price); 
            } else if(dataSource[id]!=='WS'){ 
                dataSource[id]='WS'; 
                updateWSStatus(id); 
                updateGlobalPulse(); 
            } 
        }, CONFIG.polling.intervalMs); 
    }
    
    function updateWSStatus(id){
        if(dom.wsStatusEl[id]){ 
            if(staleFeedWarning[id]){ 
                dom.wsStatusEl[id].textContent='⚠️ STALE'; 
                dom.wsStatusEl[id].className='ws-status stale'; 
            } else if(dataSource[id]==='POLLING'){ 
                dom.wsStatusEl[id].textContent='● POLLING 1s'; 
                dom.wsStatusEl[id].className='ws-status polling'; 
            } else if(wsStatus[id]){ 
                dom.wsStatusEl[id].textContent='● CONNECTED'; 
                dom.wsStatusEl[id].className='ws-status connected'; 
            } else { 
                dom.wsStatusEl[id].textContent='● RECONNECT'; 
                dom.wsStatusEl[id].className='ws-status disconnected'; 
            } 
        }
        if(dom.sourceEl[id]) dom.sourceEl[id].textContent = dataSource[id]==='WS' ? '⚡ WS' : '📡 POLL';
    }
    
    function updateGlobalPulse(){ if(dom.livePulse){ if(dataSource.xau==='POLLING'||dataSource.btc==='POLLING') dom.livePulse.className='live-pulse polling'; else if(wsStatus.xau||wsStatus.btc) dom.livePulse.className='live-pulse connected'; else dom.livePulse.className='live-pulse'; } }
    
    // ==================== PERIODIC CLEANUP & STALE FEED ====================
    function startPeriodicCleanup(){
        if(periodicCleanupTimer) clearInterval(periodicCleanupTimer);
        periodicCleanupTimer = setInterval(() => {
            Object.keys(CONFIG.pairs).forEach(id => {
                if(priceHistory[id] && priceHistory[id].length > CONFIG.ws.maxPriceHistory) {
                    priceHistory[id] = priceHistory[id].slice(-CONFIG.ws.maxPriceHistory);
                }
                if(htfData[id] && htfData[id].ohlcCandles && htfData[id].ohlcCandles.length > 150) {
                    htfData[id].ohlcCandles = htfData[id].ohlcCandles.slice(-120);
                }
                if(htfData[id] && htfData[id].pivotHighs && htfData[id].pivotHighs.length > 60) {
                    htfData[id].pivotHighs = htfData[id].pivotHighs.slice(-50);
                    htfData[id].pivotLows = htfData[id].pivotLows.slice(-50);
                }
            });
        }, 10 * 60 * 1000);
    }
    
    function startStaleFeedChecker(){
        if(staleFeedChecker) clearInterval(staleFeedChecker);
        staleFeedChecker = setInterval(() => {
            Object.keys(CONFIG.pairs).forEach(id => {
                const timeSinceLastFeed = Date.now() - lastFeedTimestamp[id];
                const isStale = timeSinceLastFeed > 3000 && wsStatus[id];
                
                if(isStale && !staleFeedWarning[id]) {
                    staleFeedWarning[id] = true;
                    updateWSStatus(id);
                    setTimeout(() => {
                        if(staleFeedWarning[id] === true && (Date.now() - lastFeedTimestamp[id] <= 3000)) {
                            staleFeedWarning[id] = false;
                            updateWSStatus(id);
                        }
                    }, 2000);
                } else if(!isStale && staleFeedWarning[id]) {
                    staleFeedWarning[id] = false;
                    updateWSStatus(id);
                }
            });
        }, 1000);
    }
    
    // ==================== VISIBILITY API ====================
    function handleVisibilityChange(){
        pageVisible = !document.hidden;
        if(pageVisible){ 
            Object.keys(CONFIG.pairs).forEach(id=>{ 
                if(!wsStatus[id] && !wsConnections[id]) connectWebSocket(id); 
                if(CONFIG.polling.enabled) startPollingIfNeeded(id); 
                startHeartbeat(id, wsConnections[id]); 
                renderUIThrottled(id);
                renderHTFContext(id);
            }); 
        } else { 
            Object.keys(CONFIG.pairs).forEach(id=>{ 
                stopHeartbeat(id); 
                if(pollingTimers[id]) { clearInterval(pollingTimers[id]); pollingTimers[id]=null; }
            }); 
        }
    }
    
    // ==================== CLEANUP ====================
    function cleanupAll(){
        Object.keys(CONFIG.pairs).forEach(id=>{ 
            stopHeartbeat(id); 
            clearReconnectTimer(id); 
            if(pollingTimers[id]) { clearInterval(pollingTimers[id]); pollingTimers[id]=null; }
            if(wsConnections[id]) try{ wsConnections[id].close(); }catch(e){} 
        });
        if(saveStateTimer) clearTimeout(saveStateTimer);
        if(periodicCleanupTimer) clearInterval(periodicCleanupTimer);
        if(staleFeedChecker) clearInterval(staleFeedChecker);
    }
    window.addEventListener('beforeunload', cleanupAll);
    document.addEventListener('visibilitychange', handleVisibilityChange);
    
    // ==================== TRIPLE TAP RESET ====================
    let tapCount=0, tapTimer=null;
    function setupTripleTapReset(){ const header=document.getElementById('mainHeader'); if(header) header.addEventListener('click',()=>{ tapCount++; if(tapTimer) clearTimeout(tapTimer); if(tapCount===3){ resetAllData(); tapCount=0; } else tapTimer=setTimeout(()=>{ tapCount=0; },500); }); }
    function resetAllData(){ Object.keys(CONFIG.pairs).forEach(id=>{ const price=state[id]?.lastPrice||0; state[id]=createFreshState(); state[id].lastPrice=price; state[id].prevPrice=price; initHTFData(id); priceHistory[id]=[]; lastSignalResetTime[id]=Date.now(); persistenceCounter[id]=0; lastFeedTimestamp[id]=Date.now(); staleFeedWarning[id]=false; renderUIThrottled(id); renderHTFContext(id); }); saveStateDebounced(); const toast=document.getElementById('toastMsg'); toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),2000); if(navigator.vibrate) navigator.vibrate(50); }
    
    // ==================== DOM CACHE & INIT ====================
    function buildCardHTML(id){ return `<div class="card"><div class="price-header"><div class="pair-info"><span class="pair-name">${CONFIG.pairs[id].symbol}</span><span id="ws-status-${id}" class="ws-status disconnected">● RECONNECT</span><span id="source-${id}" class="data-source-badge">⚡ WS</span></div><div class="price-display"><div class="price-value" id="price-${id}">0.00</div><div class="price-change" id="change-${id}">--</div></div></div><div class="signal-fusion-bar"><span class="signal-label">Signal</span><div class="signal-fusion-center"><div class="fusion-dot" id="fd1-${id}"></div><div class="fusion-line"></div><div class="fusion-dot" id="fd2-${id}"></div><div class="fusion-line"></div><div class="fusion-dot" id="fd3-${id}"></div></div><span class="signal-status-text" id="signal-text-${id}">IDLE</span></div><div class="levels-fusion"><div class="level-box entry" onclick="window.copyValue('${id}','entry')"><div class="lbl">Entry (Limit)</div><div class="val" id="entry-${id}">--</div></div><div class="level-box target" onclick="window.copyValue('${id}','tp')"><div class="lbl">Target</div><div class="val" id="tp-${id}">--</div></div><div class="level-box stop" onclick="window.copyValue('${id}','sl')"><div class="lbl">Stop</div><div class="val" id="sl-${id}">--</div></div></div><div class="analysis-row"><div class="analysis-panel"><div class="panel-title">Logic Engine</div><div class="metric-row"><span class="metric-label"><span class="mini-dot" id="ml1-${id}"></span>SWEEP</span><span class="metric-value"></span></div><div class="metric-row"><span class="metric-label"><span class="mini-dot" id="ml2-${id}"></span>CHoCH</span><span class="metric-value"></span></div><div class="metric-row"><span class="metric-label"><span class="mini-dot" id="ml3-${id}"></span>FVG</span><span class="metric-value"></span></div></div><div class="analysis-panel"><div class="panel-title">H1 Direction (4-6H Bias)</div><div class="metric-row"><span class="metric-label">STRUCTURE</span><span class="metric-value" id="trend-${id}">◆ NEUTRAL</span></div><div class="metric-row"><span class="metric-label">MOMENTUM</span><span class="metric-value" id="mom-${id}">◆ FLAT</span></div><div class="metric-row" style="flex-direction: column; align-items: flex-start; gap: 2px;"><span class="metric-label">CONTEXT</span><span class="metric-value" id="range-${id}" style="display: flex; flex-direction: column; gap: 2px; width: 100%;">--</span></div></div></div><div id="reject-${id}" class="reject-reason" style="padding:4px 8px; font-size:6px; color:var(--terminal-red);"></div></div>`; }
    
    function initDOM(){
        dom.terminals = document.getElementById('terminals');
        dom.livePulse = document.getElementById('livePulse');
        dom.switchBtn = document.getElementById('switchPairBtn');
        dom.switchLabel = document.getElementById('switchLabel');
        const html = `<div class="pair-card ${activePairId==='xau'?'active':''}" id="card-xau">${buildCardHTML('xau')}</div><div class="pair-card ${activePairId==='btc'?'active':''}" id="card-btc">${buildCardHTML('btc')}</div>`;
        dom.terminals.innerHTML = html;
        
        for(let id of ['xau','btc']){
            htfCache[id] = { initialized: false };
            dom.priceEl[id] = document.getElementById(`price-${id}`);
            dom.changeEl[id] = document.getElementById(`change-${id}`);
            dom.wsStatusEl[id] = document.getElementById(`ws-status-${id}`);
            dom.sourceEl[id] = document.getElementById(`source-${id}`);
            dom.signalText[id] = document.getElementById(`signal-text-${id}`);
            dom.entryEl[id] = document.getElementById(`entry-${id}`);
            dom.tpEl[id] = document.getElementById(`tp-${id}`);
            dom.slEl[id] = document.getElementById(`sl-${id}`);
            dom.rejectEl[id] = document.getElementById(`reject-${id}`);
            dom.trendEl[id] = document.getElementById(`trend-${id}`);
            dom.momEl[id] = document.getElementById(`mom-${id}`);
            dom.rangeEl[id] = document.getElementById(`range-${id}`);
            for(let i=0;i<3;i++) dom.fusionDots[`${id}_${i}`] = document.getElementById(`fd${i+1}-${id}`);
            for(let i=0;i<3;i++) dom.logicDots[`${id}_${i}`] = document.getElementById(`ml${i+1}-${id}`);
        }
        
        dom.switchBtn.onclick = () => { 
            const keys = Object.keys(CONFIG.pairs); 
            let idx = keys.indexOf(activePairId); 
            activePairId = keys[(idx+1)%keys.length]; 
            localStorage.setItem('bloomberg_active_pair_v72', activePairId); 
            dom.switchLabel.innerText = CONFIG.pairs[activePairId].symbol; 
            document.querySelectorAll('.pair-card').forEach(c=>c.classList.remove('active')); 
            document.getElementById(`card-${activePairId}`).classList.add('active'); 
        };
        dom.switchLabel.innerText = CONFIG.pairs[activePairId].symbol;
    }
    
    function init(){
        loadState(); 
        for(let id of ['xau','btc']){ 
            if(!state[id]) state[id]=createFreshState(); 
            initHTFData(id); 
            priceHistory[id]=[]; 
            persistenceCounter[id]=0; 
            lastValidPrice[id]=0;
            lastFeedTimestamp[id]=Date.now();
        }
        initDOM(); 
        for(let id of ['xau','btc']){ 
            connectWebSocket(id); 
            if(CONFIG.polling.enabled) startPollingIfNeeded(id); 
            renderUIThrottled(id); 
            renderHTFContext(id); 
        }
        setupTripleTapReset(); 
        updateGlobalPulse(); 
        handleVisibilityChange();
        startPeriodicCleanup();
        startStaleFeedChecker();
    }
    
    window.copyValue = async (id, type) => {
        let val = '--'; const s = state[id];
        if(type==='entry' && s?.confirmed) val = formatPrice(s.entryDisplay, id);
        else if(type==='tp' && s?.confirmed) val = formatPrice(s.tp, id);
        else if(type==='sl' && s?.confirmed) val = formatPrice(s.sl, id);
        else { const el = document.getElementById(`${type}-${id}`); if(el) val = el.textContent.split(' ')[0]; }
        if(val !== '--' && navigator.clipboard) { try{ await navigator.clipboard.writeText(val); if(navigator.vibrate) navigator.vibrate(30); }catch(e){} }
    };
    init();
})();
</script>
</body>
</html>

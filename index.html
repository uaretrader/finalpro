<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>PRECISION TERMINAL v4.4.5</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;600;800&display=swap');

        :root {
            --bg: #1a1d21; 
            --text: #e6e8ea;
            --text-dim: #707a8a;
            --accent: #f0b90b;
            --success: #00FFFF; 
            --danger: #FF5252; 
            --feed-lightning: #FFEA00;
            --buy-deep: #1b5e20; 
            --maroon-faded: #802d2d;
            --border: rgba(255, 255, 255, 0.1);
            --phase-trending: #00FF88;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            padding: 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { max-width: 450px; width: 100%; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .brand h1 { font-size: 1rem; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
        .sys-status { font-family: 'JetBrains Mono', monospace; font-size: 0.5rem; text-align: right; color: var(--text-dim); }
        
        .pulse { 
            display: inline-block; 
            width: 7px; 
            height: 7px; 
            background: var(--feed-lightning); 
            border-radius: 50%; 
            margin-right: 5px; 
            animation: blink 1.5s infinite; 
        }
        .pulse.connected {
            background: var(--success);
            box-shadow: 0 0 5px var(--success);
        }
        .pulse.disconnected {
            background: var(--danger);
            animation: blink 0.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .ws-status {
            font-size: 0.5rem;
            padding: 2px 6px;
            border-radius: 3px;
            margin-top: 2px;
            display: inline-block;
        }
        .ws-status.connected { color: var(--phase-trending); }
        .ws-status.disconnected { color: var(--danger); animation: blink 1s infinite; }

        .switch-pair-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255,255,255,0.03);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: 10px;
        }
        .switch-pair-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .pair-card { display: none; }
        .pair-card.active { display: block; }

        .card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* 1. Card Pair Label */
        .card-top { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            margin-bottom: 8px; 
        }
        .pair-info {
            display: flex;
            flex-direction: column;
        }
        .pair { font-weight: 800; font-size: 1.1rem; letter-spacing: 1px; color: var(--text); }
        .price { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 1.2rem; 
            font-weight: 700; 
            background: transparent;
            padding: 4px 0;
            text-align: right;
        }

        /* 2. Signal Bar */
        .signal-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .signal-dot-group { display: flex; gap: 12px; align-items: center; }
        .dot { width: 8px; height: 8px; border-radius: 2px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .dot.active { background: var(--success); }
        .dot.active-down { background: var(--danger); }

        /* 3. Card Level Grid - POSISINYA DIATAS (NO MARGIN TOP) */
        .card-level-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 10px;
            margin-top: 0;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 4px;
        }
        .level-item { display: flex; flex-direction: column; cursor: pointer; }
        .level-item:nth-child(1) { align-items: flex-start; text-align: left; }
        .level-item:nth-child(2) { align-items: center; text-align: center; }
        .level-item:nth-child(3) { align-items: flex-end; text-align: right; }
        .level-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
        .level-value { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; font-weight: 700; transition: all 0.2s; }
        .level-item:active .level-value { opacity: 0.5; }

        /* Analysis Grid - Logic Engine HIDDEN */
        .analysis-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 8px; 
            margin-top: 0;
        }
        
        .box-logic { 
            display: none;
        }
        
        .box-pa { 
            background: transparent; 
            border: 1px solid var(--border); 
            padding: 10px; 
            border-radius: 4px; 
            display: flex; 
            flex-direction: column; 
        }
        
        .label-sm { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; display: block; border-bottom: 1px solid var(--border); padding-bottom: 4px; letter-spacing: 1px; }
        .stat { display: flex; justify-content: space-between; align-items: center; font-size: 0.7rem; font-family: 'JetBrains Mono', monospace; margin-bottom: 4px; }
        
        /* Momentum HORIZONTAL (no wrap) */
        .mom-value { 
            text-align: right; 
            line-height: 1.2; 
            font-weight: 700; 
            font-size: 0.65rem; 
            white-space: nowrap;
        }

        footer { text-align: center; font-size: 0.55rem; color: var(--text-dim); margin-top: 10px; font-family: 'JetBrains Mono', monospace; opacity: 0.6; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="brand">
            <h1>uradvisor</h1>
            <p style="font-size: 0.5rem; color: var(--text-dim)">CYAN & LIGHTNING FLAT UI</p>
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <div class="sys-status">
                <div><span class="pulse" id="globalPulse"></span>LIVE</div>
                <div id="clock">00:00:00 UTC</div>
            </div>
            <button id="switchPairBtn" class="switch-pair-btn">
                <span id="switchLabel">XAUUSD</span>
            </button>
        </div>
    </header>

    <div id="terminals"></div>

    <footer>
        [ SYSTEM_LOG ]: FLAT_CYAN_RE-ROUTE_COMPLETE | PERSISTENCE_ENABLED<br>
        [ THEME ]: LIGHTNING_BOLT_V3
    </footer>
</div>

<script>
    const pairs = [
        { id: 'xau', name: 'XAUUSD', wsUrl: 'wss://stream.binance.com:9443/ws/paxgusdt@ticker', offset: 3 },
        { id: 'btc', name: 'BTCUSD', wsUrl: 'wss://stream.binance.com:9443/ws/btcusdt@ticker', offset: 0 }
    ];

    let state = {};
    let wsStatus = { xau: false, btc: false };
    let wsRetries = { xau: 0, btc: 0 };
    let activePairId = localStorage.getItem('ura_elv_active_pair') || 'xau';
    let wsConnections = {};
    let priceHistory = { xau: [], btc: [] };
    let lastHeartbeat = { xau: Date.now(), btc: Date.now() };

    // ==================== CREATE FRESH STATE ====================
    function createFreshState() {
        return { 
            lastPrice: 0, 
            trendScore: 0, 
            l1: false, 
            l2: false, 
            l3: false, 
            confirmed: false, 
            type: 'none', 
            entry: 0, 
            sl: 0, 
            tp: 0 
        };
    }

    // ==================== PERSISTENCE (LOCALSTORAGE) ====================
    function loadState(id) {
        const saved = localStorage.getItem(`ura_elv_state_${id}`);
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                return parsed;
            } catch(e) {
                console.error(`Failed to parse state for ${id}:`, e);
                return createFreshState();
            }
        }
        return createFreshState();
    }

    function saveState(id) {
        const toSave = {
            lastPrice: state[id].lastPrice,
            trendScore: state[id].trendScore,
            l1: state[id].l1,
            l2: state[id].l2,
            l3: state[id].l3,
            confirmed: state[id].confirmed,
            type: state[id].type,
            entry: state[id].entry,
            sl: state[id].sl,
            tp: state[id].tp
        };
        localStorage.setItem(`ura_elv_state_${id}`, JSON.stringify(toSave));
    }

    function resetAllStates() {
        pairs.forEach(p => {
            state[p.id] = createFreshState();
            saveState(p.id);
        });
    }

    // ==================== GLOBAL PULSE UPDATE ====================
    function updateGlobalPulse() {
        const pulseEl = document.getElementById('globalPulse');
        if (!pulseEl) return;
        
        const anyConnected = wsStatus.xau || wsStatus.btc;
        if (anyConnected) {
            pulseEl.className = 'pulse connected';
        } else {
            pulseEl.className = 'pulse disconnected';
        }
    }

    // ==================== HEARTBEAT CHECK ====================
    function checkHeartbeat() {
        setInterval(() => {
            pairs.forEach(p => {
                if (wsStatus[p.id] && Date.now() - lastHeartbeat[p.id] > 10000) {
                    console.log(`Heartbeat timeout for ${p.id}, reconnecting...`);
                    wsStatus[p.id] = false;
                    updateGlobalPulse();
                    if (wsConnections[p.id]) {
                        try { wsConnections[p.id].close(); } catch(e) {}
                        wsConnections[p.id] = connectWebSocket(p.id);
                    }
                }
            });
        }, 5000);
    }

    // ==================== INITIALIZATION WITH PERSISTENCE ====================
    function init() {
        // Load states from localStorage
        pairs.forEach(p => {
            state[p.id] = loadState(p.id);
            priceHistory[p.id] = [];
        });
        
        const container = document.getElementById('terminals');
        container.innerHTML = '';
        
        pairs.forEach(p => {
            container.innerHTML += `
                <div class="pair-card ${p.id === activePairId ? 'active' : ''}" id="card-${p.id}">
                    <div class="card">
                        <!-- 1. Card Pair Label dengan Status Koneksi -->
                        <div class="card-top">
                            <div class="pair-info">
                                <span class="pair">${p.name}</span>
                                <span id="ws-status-${p.id}" class="ws-status disconnected">○ RECONNECTING...</span>
                            </div>
                            <span class="price" id="price-${p.id}">0.00</span>
                        </div>
                        
                        <!-- 2. Signal Bar -->
                        <div class="signal-bar">
                            <span>SIGNAL</span>
                            <div class="signal-dot-group">
                                <div class="dot" id="l1-${p.id}"></div>
                                <div class="dot" id="l2-${p.id}"></div>
                                <div class="dot" id="l3-${p.id}"></div>
                            </div>
                            <span id="signal-text-${p.id}">WAITING</span>
                        </div>
                        
                        <!-- 3. Card Level Grid - Grid Layout di Posisi Atas -->
                        <div class="card-level-grid">
                            <div class="level-item" onclick="copyValue('${p.id}','entry')">
                                <span class="level-label">Entry</span>
                                <span class="level-value" id="entry-${p.id}">--</span>
                            </div>
                            <div class="level-item" onclick="copyValue('${p.id}','tp')">
                                <span class="level-label">Target</span>
                                <span class="level-value" id="tp-${p.id}" style="color:var(--success)">--</span>
                            </div>
                            <div class="level-item" onclick="copyValue('${p.id}','sl')">
                                <span class="level-label">S-Loss</span>
                                <span class="level-value" id="sl-${p.id}" style="color:var(--danger)">--</span>
                            </div>
                        </div>
                        
                        <!-- Analysis Grid - Only Price Action, Logic Engine Removed -->
                        <div class="analysis-grid">
                            <div class="box-pa">
                                <span class="label-sm">Price Action (M15)</span>
                                <div class="stat"><span>TREND</span><span id="trend-${p.id}" style="font-weight:700">SCANNING</span></div>
                                <div class="stat" style="align-items: center;">
                                    <span>MOMENTUM</span>
                                    <div class="mom-value" id="mom-${p.id}">--</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Render UI dari state yang sudah dimuat
            renderUI(p.id);
            
            // Connect WebSocket
            wsConnections[p.id] = connectWebSocket(p.id);
        });

        // Switch button
        document.getElementById('switchLabel').innerText = activePairId === 'xau' ? 'XAUUSD' : 'BTCUSD';
        document.getElementById('switchPairBtn').onclick = () => {
            activePairId = activePairId === 'xau' ? 'btc' : 'xau';
            localStorage.setItem('ura_elv_active_pair', activePairId);
            document.getElementById('switchLabel').innerText = activePairId === 'xau' ? 'XAUUSD' : 'BTCUSD';
            document.querySelectorAll('.pair-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`card-${activePairId}`).classList.add('active');
        };
        
        // Initialize pulse
        updateGlobalPulse();
        
        // Start heartbeat checker
        checkHeartbeat();
        
        // Periodic pulse update
        setInterval(() => updateGlobalPulse(), 1000);
    }

    function connectWebSocket(id) {
        const p = pairs.find(pair => pair.id === id);
        if (!p) return;
        
        // Close existing connection if any
        if (wsConnections[id]) {
            try { wsConnections[id].close(); } catch(e) {}
        }
        
        try {
            const ws = new WebSocket(p.wsUrl);
            
            ws.onopen = () => {
                console.log(`✅ Connected to ${id}`);
                wsStatus[id] = true;
                wsRetries[id] = 0;
                lastHeartbeat[id] = Date.now();
                updateWSStatus(id);
                updateGlobalPulse();
            };
            
            ws.onclose = () => {
                console.log(`❌ Connection lost for ${id}, retrying...`);
                wsStatus[id] = false;
                updateWSStatus(id);
                updateGlobalPulse();
                const delay = Math.min(1000 * Math.pow(2, wsRetries[id]), 30000);
                wsRetries[id]++;
                setTimeout(() => {
                    wsConnections[id] = connectWebSocket(id);
                }, delay);
            };
            
            ws.onerror = (error) => {
                console.error(`WebSocket error for ${id}:`, error);
                wsStatus[id] = false;
                updateWSStatus(id);
                updateGlobalPulse();
            };
            
            ws.onmessage = (e) => {
                try {
                    const currentPrice = parseFloat(JSON.parse(e.data).c) + p.offset;
                    if (currentPrice > 0) {
                        // Update heartbeat
                        lastHeartbeat[id] = Date.now();
                        
                        // Update status if was disconnected
                        if (!wsStatus[id]) {
                            wsStatus[id] = true;
                            updateWSStatus(id);
                            updateGlobalPulse();
                        }
                        
                        const priceEl = document.getElementById(`price-${id}`);
                        if (priceEl) {
                            const oldPrice = state[id].lastPrice;
                            if (oldPrice !== 0) {
                                priceEl.style.color = currentPrice >= oldPrice ? "var(--success)" : "var(--danger)";
                            }
                            priceEl.innerText = currentPrice.toFixed(2);
                        }
                        updatePriceAction(id, currentPrice);
                    }
                } catch(err) {
                    console.error(`Parse error for ${id}:`, err);
                }
            };
            
            return ws;
        } catch(err) {
            console.error(`Connection error for ${id}:`, err);
            wsStatus[id] = false;
            updateWSStatus(id);
            updateGlobalPulse();
            setTimeout(() => {
                wsConnections[id] = connectWebSocket(id);
            }, 5000);
            return null;
        }
    }

    function updateWSStatus(id) {
        const statusEl = document.getElementById(`ws-status-${id}`);
        if (statusEl) {
            statusEl.textContent = wsStatus[id] ? '● CONNECTED' : '○ RECONNECTING...';
            statusEl.className = `ws-status ${wsStatus[id] ? 'connected' : 'disconnected'}`;
        }
    }

    function updatePriceAction(id, price) {
        const s = state[id];
        
        // Ignore price updates if disconnected
        if (!wsStatus[id] && price === s.lastPrice) return;
        
        if (s.confirmed) {
            if (s.type === 'buy' && (price >= s.tp || price <= s.sl)) resetSignal(id);
            else if (s.type === 'sell' && (price <= s.tp || price >= s.sl)) resetSignal(id);
            s.lastPrice = price; 
            saveState(id);
            renderUI(id);
            return; 
        }
        
        const diff = price - s.lastPrice;
        if (s.lastPrice !== 0 && diff !== 0) {
            s.trendScore += diff;
            
            // Update trend display via renderUI
        }
        
        if (!s.confirmed && s.lastPrice !== 0 && Math.abs(diff) > (id === 'xau' ? 0.05 : 6)) {
            const direction = diff > 0 ? 'buy' : 'sell';
            if (!s.l1) { 
                s.l1 = true; 
                s.type = direction; 
                saveState(id);
            } 
            else if (!s.l2) { 
                s.l2 = true; 
                saveState(id);
            } 
            else { 
                lockSignal(id, price, direction); 
            }
        }
        
        s.lastPrice = price; 
        saveState(id);
        renderUI(id);
    }

    function lockSignal(id, entry, type) {
        const s = state[id]; 
        s.l3 = true; 
        s.confirmed = true; 
        s.type = type; 
        s.entry = entry;
        const risk = id === 'xau' ? 7 : entry * 0.0020;
        s.sl = type === 'buy' ? entry - risk : entry + risk;
        s.tp = type === 'buy' ? entry + (risk * 1.5) : entry - (risk * 1.5);
        saveState(id);
        renderUI(id);
    }

    function resetSignal(id) {
        const s = state[id];
        s.l1 = false; 
        s.l2 = false; 
        s.l3 = false; 
        s.confirmed = false; 
        s.type = 'none';
        s.entry = 0; 
        s.sl = 0; 
        s.tp = 0;
        s.trendScore = 0;
        saveState(id);
        renderUI(id);
    }

    function renderUI(id) {
        const s = state[id];
        
        // Price display update if element exists
        const priceEl = document.getElementById(`price-${id}`);
        if (priceEl && s.lastPrice !== 0) {
            priceEl.innerText = s.lastPrice.toFixed(2);
        }
        
        // Signal dots in signal bar
        const l1Dot = document.getElementById(`l1-${id}`);
        if (l1Dot) {
            if (s.l1) {
                l1Dot.className = s.type === 'sell' ? "dot active-down" : "dot active";
            } else {
                l1Dot.className = "dot";
            }
        }
        
        const l2Dot = document.getElementById(`l2-${id}`);
        if (l2Dot) {
            if (s.l2) {
                l2Dot.className = s.type === 'sell' ? "dot active-down" : "dot active";
            } else {
                l2Dot.className = "dot";
            }
        }
        
        const l3Dot = document.getElementById(`l3-${id}`);
        if (l3Dot) {
            if (s.l3) {
                l3Dot.className = s.type === 'sell' ? "dot active-down" : "dot active";
            } else {
                l3Dot.className = "dot";
            }
        }
        
        // Signal text
        const signalText = document.getElementById(`signal-text-${id}`);
        if (signalText) {
            if (!wsStatus[id]) {
                signalText.innerText = 'NO FEED';
                signalText.style.color = 'var(--danger)';
            } else if (s.confirmed) {
                signalText.innerText = s.type.toUpperCase();
                signalText.style.color = s.type === 'buy' ? 'var(--success)' : 'var(--danger)';
            } else if (s.l3) {
                signalText.innerText = 'FVG';
                signalText.style.color = 'var(--accent)';
            } else if (s.l2) {
                signalText.innerText = 'CHoCH';
                signalText.style.color = 'var(--accent)';
            } else if (s.l1) {
                signalText.innerText = 'SWEEP';
                signalText.style.color = 'var(--feed-lightning)';
            } else {
                signalText.innerText = 'IDLE';
                signalText.style.color = 'var(--text-dim)';
            }
        }
        
        // Card levels
        const entryEl = document.getElementById(`entry-${id}`);
        if (entryEl) entryEl.innerText = s.confirmed ? s.entry.toFixed(2) : '--';
        
        const tpEl = document.getElementById(`tp-${id}`);
        if (tpEl) tpEl.innerText = s.confirmed ? s.tp.toFixed(2) : '--';
        
        const slEl = document.getElementById(`sl-${id}`);
        if (slEl) slEl.innerText = s.confirmed ? s.sl.toFixed(2) : '--';
        
        // Trend & Momentum display
        const trendEl = document.getElementById(`trend-${id}`);
        const momEl = document.getElementById(`mom-${id}`);
        
        if (trendEl) {
            if (s.trendScore > (id === 'xau' ? 0.8 : 50)) { 
                trendEl.innerText = "BULLISH"; 
                trendEl.style.color = "var(--success)"; 
            } else if (s.trendScore < (id === 'xau' ? -0.8 : -50)) { 
                trendEl.innerText = "BEARISH"; 
                trendEl.style.color = "var(--danger)"; 
            } else {
                trendEl.innerText = "NEUTRAL";
                trendEl.style.color = "var(--text-dim)";
            }
        }
        
        if (momEl && s.lastPrice !== 0 && s.lastPrice !== s.trendScore) {
            // Get last diff from stored data or calculate reasonable display
            const lastPrice = s.lastPrice;
            const prevPrice = state[id].lastPrice !== lastPrice ? state[id].lastPrice : lastPrice - 0.01;
            const diff = lastPrice - prevPrice;
            const absDiff = Math.abs(diff);
            const threshold = id === 'xau' ? 0.12 : 15;
            const direction = diff > 0 ? "UPWARD" : "DOWNWARD";
            const strength = absDiff > threshold ? "STRONG " : "";
            momEl.innerHTML = strength + direction;
            momEl.style.color = diff > 0 ? "var(--success)" : "var(--danger)";
        }
    }

    window.copyValue = (id, type) => {
        const val = document.getElementById(`${type}-${id}`).innerText;
        if (val !== '--') {
            navigator.clipboard.writeText(val);
            if (navigator.vibrate) navigator.vibrate(50);
        }
    };

    setInterval(() => { 
        const clk = document.getElementById('clock');
        if (clk) clk.innerText = new Date().toISOString().split('T')[1].split('.')[0] + " UTC"; 
    }, 1000);
    
    init();
</script>
</body>
</html>

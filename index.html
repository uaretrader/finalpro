<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover, shrink-to-fit=yes">
  <title>BLOOMBERG STYLE | PRECISION TERMINAL v5.0.0</title>
  <style>
    /* ========== DARK SILVER BLOOMBERG THEME ========== */
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --bg-deep: #0C0E12;
      --bg-panel: #14171C;
      --bg-elevated: #1A1E24;
      --bg-card: #1B2028;
      --border-silver: rgba(255, 255, 255, 0.08);
      --border-silver-light: rgba(255, 255, 255, 0.12);
      --text-primary: #E8EDF2;
      --text-secondary: #9CA3AF;
      --text-muted: #6B7280;
      --accent-bloomberg: #6B7280;
      --accent-blue: #6B7280;
      --success-bloom: #00D68F;
      --danger-bloom: #FF4961;
      --warning-bloom: #FFAA00;
      --trend-bull: #00D68F;
      --trend-bear: #FF4961;
      --trend-neutral: #9CA3AF;
      --phase-expand: #FF6B6B;
      --phase-lowvol: #4ECDC4;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      padding: 12px 10px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      letter-spacing: -0.2px;
    }

    /* CONTAINER UTAMA: fleksibel untuk split screen */
    .container {
      max-width: 520px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* HEADER ala Bloomberg */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--accent-bloomberg);
    }

    .brand h1 {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 1px;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #FFD700 0%, #FFB347 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 8px rgba(255, 215, 0, 0.2);
    }

    .brand p {
      font-size: 0.45rem;
      color: var(--text-secondary);
      letter-spacing: 0.5px;
      font-weight: 500;
    }

    .sys-status {
      text-align: right;
      font-family: 'JetBrains Mono', monospace;
    }

    .sys-status div:first-child {
      font-size: 0.5rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success-bloom);
      box-shadow: 0 0 6px var(--success-bloom);
      animation: pulseBloom 1.2s infinite;
    }

    @keyframes pulseBloom {
      0% { opacity: 0.4; transform: scale(0.8);}
      100% { opacity: 1; transform: scale(1.2);}
    }

    #clock {
      font-size: 0.45rem;
      color: var(--text-muted);
      margin-top: 2px;
      font-weight: 500;
    }

    .switch-pair-btn {
      background: var(--bg-elevated);
      border: 1px solid var(--border-silver-light);
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
      margin-left: 8px;
      white-space: nowrap;
    }

    .switch-pair-btn:hover {
      border-color: var(--accent-bloomberg);
      color: var(--accent-bloomberg);
      background: rgba(255, 215, 0, 0.08);
    }

    /* CARD PANEL - Grid responsif untuk split screen */
    #terminals {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-silver);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(2px);
      display: flex;
      flex-direction: column;
      gap: 12px;
      height: fit-content;
    }

    .pair-card {
      display: none;
      width: 100%;
    }

    .pair-card.active {
      display: block;
      animation: fadeSlide 0.25s ease;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(6px);}
      to { opacity: 1; transform: translateY(0);}
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .pair-info .pair {
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #E8EDF2 0%, #B0C4DE 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .ws-status {
      font-size: 0.5rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(0, 163, 255, 0.1);
      color: var(--accent-blue);
      font-family: 'JetBrains Mono', monospace;
    }

    .ws-status.connected {
      color: var(--success-bloom);
      background: rgba(0, 214, 143, 0.12);
    }

    .ws-status.disconnected {
      color: var(--danger-bloom);
      background: rgba(255, 73, 97, 0.1);
      animation: blinkSoft 1s infinite;
    }

    @keyframes blinkSoft {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .price {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0;
      transition: color 0.08s linear;
    }

    .signal-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(20, 23, 28, 0.7);
      border: 1px solid var(--border-silver);
      border-radius: 40px;
      padding: 6px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .signal-dot-group {
      display: flex;
      gap: 12px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-silver);
      transition: all 0.1s;
    }

    .dot.active {
      background: var(--success-bloom);
      box-shadow: 0 0 6px var(--success-bloom);
      border-color: var(--success-bloom);
    }

    .dot.active-down {
      background: var(--danger-bloom);
      box-shadow: 0 0 6px var(--danger-bloom);
      border-color: var(--danger-bloom);
    }

    /* LEVEL GRID */
    .card-level-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      background: rgba(10, 12, 16, 0.4);
      border-radius: 20px;
      padding: 8px 6px;
    }

    .level-item {
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: all 0.1s;
      border-radius: 12px;
      padding: 4px 2px;
    }

    .level-item:hover {
      background: rgba(255, 215, 0, 0.05);
    }

    .level-label {
      font-size: 0.5rem;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .level-value {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 0.8rem;
    }

    .box-htf-full {
      background: rgba(12, 14, 18, 0.6);
      border: 1px solid var(--border-silver);
      border-radius: 14px;
      padding: 12px 10px;
      width: 100%;
    }

    .label-sm {
      font-size: 0.55rem;
      font-weight: 700;
      color: var(--accent-blue);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      border-left: 3px solid var(--accent-bloomberg);
      padding-left: 8px;
    }

    .htf-grid-full {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
    }

    .htf-block {
      flex: 1;
      min-width: 80px;
    }

    .htf-label {
      font-size: 0.5rem;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .htf-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .trend-up { color: var(--trend-bull); }
    .trend-down { color: var(--trend-bear); }
    .trend-neutral { color: var(--trend-neutral); }
    .trend-weak { color: var(--warning-bloom); }
    .momentum-up { color: var(--trend-bull); }
    .momentum-down { color: var(--trend-bear); }

    .phase-tag {
      font-size: 0.55rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 700;
      display: inline-block;
      margin-bottom: 4px;
    }

    .phase-trending-tag { background: rgba(0, 214, 143, 0.15); color: var(--trend-bull); border: 0.5px solid rgba(0,214,143,0.3);}
    .phase-ranging-tag { background: rgba(255, 170, 0, 0.12); color: var(--warning-bloom);}
    .phase-expansion-tag { background: rgba(255, 107, 107, 0.12); color: var(--phase-expand);}
    .phase-lowvol-tag { background: rgba(78, 205, 196, 0.12); color: var(--phase-lowvol);}

    .context-bar {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      margin: 8px 0 4px;
      overflow: hidden;
    }

    .context-fill {
      height: 100%;
      transition: width 0.3s;
    }

    .confidence-text {
      font-size: 0.5rem;
      text-align: right;
      color: var(--text-secondary);
      font-weight: 500;
    }

    footer {
      text-align: center;
      font-size: 0.45rem;
      color: var(--text-muted);
      margin-top: 8px;
      border-top: 1px solid var(--border-silver);
      padding-top: 10px;
      letter-spacing: 0.3px;
    }

    /* Penyesuaian untuk layar sangat kecil / split vertikal */
    @media (max-width: 400px) {
      body {
        padding: 8px 6px;
      }
      .card {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="brand">
      <h1>URA • TERMINAL</h1>
      <p>HTF PRECISION v5.0.0</p>
    </div>
    <div style="display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: flex-end;">
      <div class="sys-status">
        <div><span class="pulse" id="globalPulse"></span>LIVE</div>
        <div id="clock">--:--:-- UTC</div>
      </div>
      <button id="switchPairBtn" class="switch-pair-btn">
        <span id="switchLabel">XAUUSD</span>
      </button>
    </div>
  </header>

  <div id="terminals"></div>

  <footer>
    [ BLOOMBERG SILVER ENGINE ]: OHLC H2-H4 + PIVOT FRACTAL + DISPLACEMENT + ADAPTIVE ATR<br>
    [ METHOD ]: SWEEP + CHoCH + FVG + HTF_CONTEXT_FILTER
  </footer>
</div>

<script>
  // ==================== CONFIGURATION ====================
  const btcConfig = {
    id: 'btc', name: 'BTCUSD', wsUrl: 'wss://stream.binance.com:9443/ws/btcusdt@aggTrade',
    offset: 0, threshold: 8, isTicker: false
  };

  let state = { xau: null, btc: null };
  let wsStatus = { xau: true, btc: false };
  let wsRetries = { xau: 0, btc: 0 };
  let activePairId = localStorage.getItem('ura_active_pair') || 'xau';
  let wsConnections = {};
  let lastHeartbeat = { xau: Date.now(), btc: Date.now() };

  // ==================== HTF ENGINE v5.0.0 ====================
  const HTF_TICK_PER_CANDLE = 120;
  const HTF_PIVOT_LOOKBACK = 2;
  const HTF_MOMENTUM_LOOKBACK = 4;
  const HTF_RANGE_LOOKBACK = 10;

  let htfData = {
    xau: { ohlcCandles: [], currentCandle: null, tickCounter: 0, swings: [], pivotHighs: [], pivotLows: [], structure: 'NEUTRAL', momentum: 'STABLE', momentumStrength: 'NONE', phase: 'RANGE', atr: 0, confidence: 0 },
    btc: { ohlcCandles: [], currentCandle: null, tickCounter: 0, swings: [], pivotHighs: [], pivotLows: [], structure: 'NEUTRAL', momentum: 'STABLE', momentumStrength: 'NONE', phase: 'RANGE', atr: 0, confidence: 0 }
  };

  function seedHTFData(id, basePrice) {
    const data = htfData[id];
    const volatility = id === 'xau' ? 2.0 : 400;
    for (let i = 0; i < 20; i++) {
      const open = basePrice + (Math.random() - 0.5) * volatility * 2;
      const close = basePrice + (Math.random() - 0.5) * volatility * 2;
      const high = Math.max(open, close) + Math.random() * volatility;
      const low = Math.min(open, close) - Math.random() * volatility;
      data.ohlcCandles.push({ open, high, low, close, closed: true, body: Math.abs(close - open), range: high - low, isBullish: close >= open, upperWick: close >= open ? high - close : high - open, lowerWick: close >= open ? open - low : close - low });
    }
  }

  function buildOHLCCandle(id, price) {
    const data = htfData[id];
    data.tickCounter++;
    if (!data.currentCandle || data.tickCounter >= HTF_TICK_PER_CANDLE) {
      if (data.currentCandle) { data.currentCandle.closed = true; data.ohlcCandles.push(data.currentCandle); if (data.ohlcCandles.length > 100) data.ohlcCandles.shift(); }
      data.tickCounter = 0;
      data.currentCandle = { open: price, high: price, low: price, close: price, closed: false, body: 0, range: 0, isBullish: true, upperWick: 0, lowerWick: 0 };
    } else {
      data.currentCandle.high = Math.max(data.currentCandle.high, price);
      data.currentCandle.low = Math.min(data.currentCandle.low, price);
      data.currentCandle.close = price;
      data.currentCandle.range = data.currentCandle.high - data.currentCandle.low;
      data.currentCandle.body = Math.abs(data.currentCandle.close - data.currentCandle.open);
      data.currentCandle.isBullish = data.currentCandle.close >= data.currentCandle.open;
      data.currentCandle.upperWick = data.currentCandle.isBullish ? data.currentCandle.high - data.currentCandle.close : data.currentCandle.high - data.currentCandle.open;
      data.currentCandle.lowerWick = data.currentCandle.isBullish ? data.currentCandle.open - data.currentCandle.low : data.currentCandle.close - data.currentCandle.low;
    }
  }

  function detectPivotFractals(id) {
    const data = htfData[id];
    const candles = data.ohlcCandles.filter(c => c.closed);
    if (candles.length < HTF_PIVOT_LOOKBACK * 2 + 1) return;
    data.pivotHighs = []; data.pivotLows = [];
    for (let i = HTF_PIVOT_LOOKBACK; i < candles.length - HTF_PIVOT_LOOKBACK; i++) {
      let isPivotHigh = true, isPivotLow = true;
      for (let j = 1; j <= HTF_PIVOT_LOOKBACK; j++) {
        if (candles[i - j].high >= candles[i].high) isPivotHigh = false;
        if (candles[i + j].high >= candles[i].high) isPivotHigh = false;
        if (candles[i - j].low <= candles[i].low) isPivotLow = false;
        if (candles[i + j].low <= candles[i].low) isPivotLow = false;
      }
      if (isPivotHigh) data.pivotHighs.push({ index: i, price: candles[i].high, candle: candles[i] });
      if (isPivotLow) data.pivotLows.push({ index: i, price: candles[i].low, candle: candles[i] });
    }
    const allPivots = [...data.pivotHighs.map(p => ({ ...p, type: 'H' })), ...data.pivotLows.map(p => ({ ...p, type: 'L' }))];
    allPivots.sort((a, b) => a.index - b.index);
    data.swings = []; let lastType = null;
    allPivots.forEach(pivot => { if (pivot.type !== lastType) { data.swings.push({ val: pivot.price, type: pivot.type, index: pivot.index }); lastType = pivot.type; } });
    const swings = data.swings;
    if (swings.length >= 4) {
      const recent = swings.slice(-4);
      const highs = recent.filter(s => s.type === 'H').map(s => s.val);
      const lows = recent.filter(s => s.type === 'L').map(s => s.val);
      if (highs.length >= 2 && lows.length >= 2) {
        const isHH = highs[1] > highs[0], isHL = lows[1] > lows[0], isLH = highs[1] < highs[0], isLL = lows[1] < lows[0];
        if (isHH && isHL) data.structure = 'BULLISH';
        else if (isLH && isLL) data.structure = 'BEARISH';
        else data.structure = 'RANGE';
      } else data.structure = 'RANGE';
    }
  }

  function calculateATR(id) {
    const data = htfData[id];
    const candles = data.ohlcCandles.filter(c => c.closed);
    if (candles.length < 14) return;
    const trueRanges = [];
    for (let i = 1; i < candles.length; i++) {
      const tr1 = candles[i].high - candles[i].low;
      const tr2 = Math.abs(candles[i].high - candles[i-1].close);
      const tr3 = Math.abs(candles[i].low - candles[i-1].close);
      trueRanges.push(Math.max(tr1, tr2, tr3));
    }
    const recent = trueRanges.slice(-14);
    data.atr = recent.reduce((a,b)=>a+b,0)/recent.length;
  }

  function detectMomentum(id) {
    const data = htfData[id];
    const candles = data.ohlcCandles.filter(c => c.closed);
    if (candles.length < HTF_MOMENTUM_LOOKBACK) return;
    const recent = candles.slice(-HTF_MOMENTUM_LOOKBACK);
    let bullish = 0, bearish = 0;
    recent.forEach(c => {
      const bodyRatio = c.body / (c.range || 0.0001);
      const isDisp = c.range > (data.atr * 1.0);
      if (c.isBullish && bodyRatio > 0.55 && isDisp && (c.upperWick / (c.range||1) < 0.15)) bullish++;
      if (!c.isBullish && bodyRatio > 0.55 && isDisp && (c.lowerWick / (c.range||1) < 0.15)) bearish++;
    });
    if (bullish >= 3) { data.momentum = 'IMPULSIVE_UP'; data.momentumStrength = 'STRONG'; }
    else if (bearish >= 3) { data.momentum = 'IMPULSIVE_DOWN'; data.momentumStrength = 'STRONG'; }
    else if (bullish >= 1) { data.momentum = 'BULLISH'; data.momentumStrength = 'WEAK'; }
    else if (bearish >= 1) { data.momentum = 'BEARISH'; data.momentumStrength = 'WEAK'; }
    else { data.momentum = 'STABLE'; data.momentumStrength = 'NONE'; }
  }

  function detectMarketPhase(id) {
    const data = htfData[id];
    const candles = data.ohlcCandles.filter(c => c.closed);
    if (candles.length < HTF_RANGE_LOOKBACK) return;
    let overlap = 0, expansion = 0;
    for (let i = 1; i < candles.length; i++) {
      const prev = candles[i-1], curr = candles[i];
      const midDist = Math.abs(((prev.high+prev.low)/2) - ((curr.high+curr.low)/2));
      if (midDist < (data.atr * 0.4)) overlap++;
      if (curr.range > (data.atr * 1.2)) expansion++;
    }
    const trending = data.structure === 'BULLISH' || data.structure === 'BEARISH';
    const hasMom = data.momentumStrength === 'STRONG' || data.momentumStrength === 'MODERATE';
    if (trending && hasMom && expansion >= 2) data.phase = 'TRENDING';
    else if (expansion >= 3) data.phase = 'EXPANSION';
    else if (overlap >= 6) data.phase = 'LOW_VOLATILITY';
    else data.phase = 'RANGE';
  }

  function calculateHTFConfidence(id) {
    const data = htfData[id];
    let conf = 0;
    if (data.structure === 'BULLISH' || data.structure === 'BEARISH') conf += 40;
    if (data.momentumStrength === 'STRONG') conf += 35;
    else if (data.momentumStrength === 'MODERATE') conf += 25;
    if (data.phase === 'TRENDING') conf += 25;
    data.confidence = Math.min(100, conf);
  }

  function updateHTFEngine(id, price) {
    buildOHLCCandle(id, price);
    calculateATR(id);
    detectPivotFractals(id);
    detectMomentum(id);
    detectMarketPhase(id);
    calculateHTFConfidence(id);
    updateHTFUI(id);
  }

  function updateHTFUI(id) {
    const data = htfData[id];
    const trendEl = document.getElementById(`htf-trend-${id}`);
    if (trendEl) {
      let txt = '', cls = '';
      if (data.structure === 'BULLISH') { txt = '▲ BULLISH'; cls = 'trend-up'; }
      else if (data.structure === 'BEARISH') { txt = '▼ BEARISH'; cls = 'trend-down'; }
      else if (data.structure === 'RANGE') { txt = '◆ RANGE'; cls = 'trend-neutral'; }
      else { txt = '◆ NEUTRAL'; cls = 'trend-neutral'; }
      trendEl.className = `htf-value ${cls}`; trendEl.innerText = txt;
    }
    const momEl = document.getElementById(`htf-momentum-${id}`);
    if (momEl) {
      let txt = '', cls = '';
      if (data.momentum === 'IMPULSIVE_UP') { txt = '▲ STRONG MOM'; cls = 'momentum-up'; }
      else if (data.momentum === 'IMPULSIVE_DOWN') { txt = '▼ STRONG MOM'; cls = 'momentum-down'; }
      else if (data.momentum === 'BULLISH') { txt = '▲ WEAK MOM'; cls = 'trend-weak'; }
      else if (data.momentum === 'BEARISH') { txt = '▼ WEAK MOM'; cls = 'trend-weak'; }
      else { txt = '◆ FLAT'; cls = 'trend-neutral'; }
      momEl.className = `htf-value ${cls}`; momEl.innerText = txt;
    }
    const phaseEl = document.getElementById(`htf-phase-${id}`);
    if (phaseEl) {
      let phaseClass = '';
      if (data.phase === 'TRENDING') phaseClass = 'phase-trending-tag';
      else if (data.phase === 'EXPANSION') phaseClass = 'phase-expansion-tag';
      else if (data.phase === 'LOW_VOLATILITY') phaseClass = 'phase-lowvol-tag';
      else phaseClass = 'phase-ranging-tag';
      phaseEl.innerHTML = `<span class="phase-tag ${phaseClass}">${data.phase}</span>`;
    }
    const atrEl = document.getElementById(`htf-atr-${id}`);
    if (atrEl) atrEl.innerText = data.atr.toFixed(2);
    const confFill = document.getElementById(`conf-fill-${id}`);
    if (confFill) {
      confFill.style.width = `${data.confidence}%`;
      confFill.style.background = data.confidence >= 70 ? 'var(--success-bloom)' : (data.confidence >= 40 ? 'var(--warning-bloom)' : 'var(--danger-bloom)');
    }
    const confText = document.getElementById(`conf-text-${id}`);
    if (confText) confText.innerText = `CONFIDENCE ${Math.round(data.confidence)}%`;
  }

  function createFreshState() { return { lastPrice: 0, trendScore: 0, l1: false, l2: false, l3: false, confirmed: false, type: 'none', entry: 0, sl: 0, tp: 0 }; }
  function loadState(id) { const saved = localStorage.getItem(`ura_state_${id}`); return saved ? JSON.parse(saved) : createFreshState(); }
  function saveState(id) { localStorage.setItem(`ura_state_${id}`, JSON.stringify(state[id])); }

  function updateSignal(id, price) {
    const s = state[id];
    const thresh = id === 'xau' ? 0.05 : 6;
    if (s.confirmed) {
      if ((s.type === 'buy' && (price >= s.tp || price <= s.sl)) || (s.type === 'sell' && (price <= s.tp || price >= s.sl))) resetSignal(id);
      return;
    }
    const diff = price - s.lastPrice;
    if (!s.confirmed && s.lastPrice !== 0 && Math.abs(diff) > thresh) {
      const dir = diff > 0 ? 'buy' : 'sell';
      if (!s.l1) { s.l1 = true; s.type = dir; saveState(id); updateSignalUI(id); }
      else if (!s.l2) { s.l2 = true; saveState(id); updateSignalUI(id); }
      else { lockSignal(id, price, dir); }
    }
    s.lastPrice = price;
    saveState(id);
  }

  function updateSignalUI(id) {
    const s = state[id];
    const l1 = document.getElementById(`l1-${id}`); if(l1) l1.className = s.l1 ? (s.type === 'sell' ? "dot active-down" : "dot active") : "dot";
    const l2 = document.getElementById(`l2-${id}`); if(l2) l2.className = s.l2 ? (s.type === 'sell' ? "dot active-down" : "dot active") : "dot";
    const l3 = document.getElementById(`l3-${id}`); if(l3) l3.className = s.l3 ? (s.type === 'sell' ? "dot active-down" : "dot active") : "dot";
    const sigTxt = document.getElementById(`signal-text-${id}`);
    if (sigTxt) {
      if (s.confirmed) sigTxt.innerText = s.type.toUpperCase();
      else if (s.l3) sigTxt.innerText = 'FVG';
      else if (s.l2) sigTxt.innerText = 'CHoCH';
      else if (s.l1) sigTxt.innerText = 'SWEEP';
      else sigTxt.innerText = 'IDLE';
      sigTxt.style.color = s.confirmed ? (s.type === 'buy' ? 'var(--success-bloom)' : 'var(--danger-bloom)') : 'var(--accent-bloomberg)';
    }
    const entryEl = document.getElementById(`entry-${id}`); if(entryEl) entryEl.innerText = s.confirmed ? s.entry.toFixed(2) : '--';
    const tpEl = document.getElementById(`tp-${id}`); if(tpEl) tpEl.innerText = s.confirmed ? s.tp.toFixed(2) : '--';
    const slEl = document.getElementById(`sl-${id}`); if(slEl) slEl.innerText = s.confirmed ? s.sl.toFixed(2) : '--';
  }

  function lockSignal(id, entry, type) {
    const s = state[id];
    s.l3 = true; s.confirmed = true; s.type = type; s.entry = entry;
    const risk = id === 'xau' ? 8 : entry * 0.004;
    if (type === 'buy') { s.sl = s.entry - risk; s.tp = s.entry + risk * 1.3; }
    else { s.sl = s.entry + risk; s.tp = s.entry - risk * 1.4; }
    saveState(id); updateSignalUI(id);
  }
  function resetSignal(id) { const s = state[id]; s.l1 = s.l2 = s.l3 = s.confirmed = false; s.type = 'none'; s.entry = s.sl = s.tp = 0; saveState(id); updateSignalUI(id); }

  async function fetchXAUPrice() {
    try { const resp = await fetch('https://api.gold-api.com/price/XAU'); const data = await resp.json(); if (data.price > 0) updateXAUPrice(data.price); }
    catch { fetch('https://api.exchangerate.host/convert?from=XAU&to=USD&amount=1').then(r=>r.json()).then(d=>{ if(d.result) updateXAUPrice(d.result); }); }
  }
  function updateXAUPrice(price) {
    if (!price) return;
    const priceEl = document.getElementById('price-xau');
    if (priceEl) { const old = state.xau.lastPrice; priceEl.innerText = price.toFixed(2); if (old && old !== price) { priceEl.style.color = price > old ? "var(--success-bloom)" : "var(--danger-bloom)"; setTimeout(()=>priceEl.style.color="", 150); } }
    updateHTFEngine('xau', price); updateSignal('xau', price);
  }

  function connectWebSocketBTC() {
    if (wsConnections.btc) wsConnections.btc.close();
    const ws = new WebSocket(btcConfig.wsUrl);
    ws.onopen = () => { wsStatus.btc = true; wsRetries.btc = 0; updateWSStatus('btc'); updateGlobalPulse(); };
    ws.onclose = () => { wsStatus.btc = false; updateWSStatus('btc'); updateGlobalPulse(); setTimeout(connectWebSocketBTC, 5000); };
    ws.onmessage = (e) => { const data = JSON.parse(e.data); const price = parseFloat(data.p); if (price && !isNaN(price)) { const priceEl = document.getElementById('price-btc'); if (priceEl) { const old = state.btc.lastPrice; priceEl.innerText = price.toFixed(2); if (old && old !== price) { priceEl.style.color = price > old ? "var(--success-bloom)" : "var(--danger-bloom)"; setTimeout(()=>priceEl.style.color="",150); } } updateHTFEngine('btc', price); updateSignal('btc', price); } };
    wsConnections.btc = ws;
  }
  function updateWSStatus(id) { const el = document.getElementById(`ws-status-${id}`); if(el) { el.className = `ws-status ${wsStatus[id] ? 'connected' : 'disconnected'}`; el.innerText = wsStatus[id] ? '● CONNECTED' : '○ RECONNECT'; } }
  function updateGlobalPulse() { const pulse = document.getElementById('globalPulse'); if(pulse) pulse.style.background = (wsStatus.btc || true) ? 'var(--success-bloom)' : 'var(--danger-bloom)'; }

  function init() {
    state.xau = loadState('xau'); state.btc = loadState('btc');
    seedHTFData('xau', 4680); seedHTFData('btc', 59000);
    const container = document.getElementById('terminals');
    container.innerHTML = `
        <div class="pair-card ${activePairId === 'xau' ? 'active' : ''}" id="card-xau"><div class="card">${cardHTML('xau','XAUUSD')}</div></div>
        <div class="pair-card ${activePairId === 'btc' ? 'active' : ''}" id="card-btc"><div class="card">${cardHTML('btc','BTCUSD')}</div></div>`;
    updateSignalUI('xau'); updateHTFUI('xau'); updateSignalUI('btc'); updateHTFUI('btc');
    fetchXAUPrice(); setInterval(fetchXAUPrice, 2500);
    connectWebSocketBTC();
    document.getElementById('switchLabel').innerText = activePairId === 'xau' ? 'XAUUSD' : 'BTCUSD';
    document.getElementById('switchPairBtn').onclick = () => { activePairId = activePairId === 'xau' ? 'btc' : 'xau'; localStorage.setItem('ura_active_pair', activePairId); document.getElementById('switchLabel').innerText = activePairId === 'xau' ? 'XAUUSD' : 'BTCUSD'; document.querySelectorAll('.pair-card').forEach(c=>c.classList.remove('active')); document.getElementById(`card-${activePairId}`).classList.add('active'); };
    updateGlobalPulse(); setInterval(updateGlobalPulse, 1500);
  }

  function cardHTML(id, label) {
    return `
        <div class="card-top"><div><span class="pair">${label}</span><div class="ws-status" id="ws-status-${id}">● CONNECTED</div></div><span class="price" id="price-${id}">0.00</span></div>
        <div class="signal-bar"><span>SIGNAL</span><div class="signal-dot-group"><div class="dot" id="l1-${id}"></div><div class="dot" id="l2-${id}"></div><div class="dot" id="l3-${id}"></div></div><span id="signal-text-${id}">IDLE</span></div>
        <div class="card-level-grid"><div class="level-item" onclick="copyValue('${id}','entry')"><span class="level-label">Entry</span><span class="level-value" id="entry-${id}">--</span></div><div class="level-item" onclick="copyValue('${id}','tp')"><span class="level-label">Target</span><span class="level-value" id="tp-${id}" style="color:var(--success-bloom)">--</span></div><div class="level-item" onclick="copyValue('${id}','sl')"><span class="level-label">S-Loss</span><span class="level-value" id="sl-${id}" style="color:var(--danger-bloom)">--</span></div></div>
        <div class="box-htf-full">
            <div class="label-sm">HTF CONTEXT</div>
            <div class="htf-grid-full">
                <div class="htf-block"><div class="htf-label">STRUCTURE</div><div class="htf-value" id="htf-trend-${id}">◆ NEUTRAL</div></div>
                <div class="htf-block"><div class="htf-label">MOMENTUM</div><div class="htf-value" id="htf-momentum-${id}">◆ FLAT</div></div>
                <div class="htf-block"><div class="htf-label">PHASE</div><div class="htf-value" id="htf-phase-${id}"><span class="phase-tag phase-ranging-tag">RANGE</span></div></div>
                <div class="htf-block"><div class="htf-label">ATR</div><div class="htf-value" id="htf-atr-${id}">0.00</div></div>
            </div>
            <div class="context-bar"><div class="context-fill" id="conf-fill-${id}" style="width:0%"></div></div>
            <div class="confidence-text" id="conf-text-${id}">CONFIDENCE 0%</div>
        </div>`;
  }

  window.copyValue = (id, type) => { const val = document.getElementById(`${type}-${id}`).innerText; if (val !== '--') { navigator.clipboard.writeText(val); if (navigator.vibrate) navigator.vibrate(50); } };
  setInterval(()=>{ const clk=document.getElementById('clock'); if(clk) clk.innerText = new Date().toISOString().split('T')[1].split('.')[0] + " UTC"; }, 1000);
  init();
</script>
</body>
</html>

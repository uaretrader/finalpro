<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>PRECISION TERMINAL v4.5.5</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;600;800&display=swap');

        :root {
            --bg: #1a1d21; 
            --text: #e6e8ea;
            --text-dim: #707a8a;
            --accent: #f0b90b;
            --success: #00FFFF; 
            --danger: #FF5252; 
            --feed-lightning: #FFEA00;
            --border: rgba(255, 255, 255, 0.1);
            --phase-trending: #00FF88;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            padding: 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { max-width: 450px; width: 100%; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .brand h1 { font-size: 1rem; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
        .sys-status { font-family: 'JetBrains Mono', monospace; font-size: 0.5rem; text-align: right; color: var(--text-dim); }
        
        .pulse { 
            display: inline-block; 
            width: 7px; 
            height: 7px; 
            background: var(--feed-lightning); 
            border-radius: 50%; 
            margin-right: 5px; 
            animation: blink 1.5s infinite; 
        }
        .pulse.connected {
            background: var(--success);
            box-shadow: 0 0 5px var(--success);
        }
        .pulse.disconnected {
            background: var(--danger);
            animation: blink 0.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .ws-status {
            font-size: 0.5rem;
            padding: 2px 6px;
            border-radius: 3px;
            margin-top: 2px;
            display: inline-block;
        }
        .ws-status.connected { color: var(--phase-trending); }
        .ws-status.disconnected { color: var(--danger); animation: blink 1s infinite; }

        .switch-pair-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255,255,255,0.03);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: 10px;
        }
        .switch-pair-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .pair-card { display: none; }
        .pair-card.active { display: block; }

        .card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card-top { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            margin-bottom: 8px; 
        }
        .pair-info {
            display: flex;
            flex-direction: column;
        }
        .pair { font-weight: 800; font-size: 1.1rem; letter-spacing: 1px; color: var(--text); }
        .price { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 1.2rem; 
            font-weight: 700; 
            background: transparent;
            padding: 4px 0;
            text-align: right;
        }

        .signal-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .signal-dot-group { display: flex; gap: 12px; align-items: center; }
        .dot { width: 8px; height: 8px; border-radius: 2px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .dot.active { background: var(--success); }
        .dot.active-down { background: var(--danger); }

        .card-level-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 4px;
        }
        .level-item { display: flex; flex-direction: column; cursor: pointer; }
        .level-item:nth-child(1) { align-items: flex-start; text-align: left; }
        .level-item:nth-child(2) { align-items: center; text-align: center; }
        .level-item:nth-child(3) { align-items: flex-end; text-align: right; }
        .level-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
        .level-value { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; font-weight: 700; }

        .analysis-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 8px; 
        }
        
        .box-htf, .box-pa { 
            background: transparent; 
            border: 1px solid var(--border); 
            padding: 10px 8px; 
            border-radius: 4px; 
            text-align: center;
        }
        
        .label-sm { 
            font-size: 0.55rem; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            margin-bottom: 8px; 
            padding-bottom: 4px; 
            border-bottom: 1px solid var(--border);
        }
        
        .htf-row, .pa-row {
            margin-bottom: 8px;
        }
        .htf-row:last-child, .pa-row:last-child {
            margin-bottom: 0;
        }
        
        .htf-label, .pa-label {
            font-size: 0.55rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .htf-value, .pa-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 0.7rem;
            margin-top: 2px;
        }

        footer { text-align: center; font-size: 0.55rem; color: var(--text-dim); margin-top: 10px; opacity: 0.6; }
        
        .trend-up { color: var(--success); }
        .trend-down { color: var(--danger); }
        .trend-neutral { color: var(--text-dim); }
        .momentum-up { color: var(--success); }
        .momentum-down { color: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="brand">
            <h1>uradvisor</h1>
            <p style="font-size: 0.5rem; color: var(--text-dim)">HTF PRECISION v4.5.5</p>
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <div class="sys-status">
                <div><span class="pulse" id="globalPulse"></span>LIVE</div>
                <div id="clock">00:00:00 UTC</div>
            </div>
            <button id="switchPairBtn" class="switch-pair-btn">
                <span id="switchLabel">XAUUSD</span>
            </button>
        </div>
    </header>

    <div id="terminals"></div>

    <footer>
        [ SYSTEM_LOG ]: HTF_ANALYSIS_ENABLED (H1) | PERSISTENCE_ACTIVE | BIAS_OFFSET_ENABLED (±3)<br>
        [ METHOD ]: SWEEP + CHoCH + FVG + HTF_TREND_FILTER
    </footer>
</div>

<script>
    const pairs = [
        { id: 'xau', name: 'XAUUSD', wsUrl: 'wss://stream.binance.com:9443/ws/paxgusdt@ticker', offset: 2.9, threshold: 0.05, trendThresh: 0.8, momThresh: 0.12 },
        { id: 'btc', name: 'BTCUSD', wsUrl: 'wss://stream.binance.com:9443/ws/btcusdt@ticker', offset: 0, threshold: 6, trendThresh: 50, momThresh: 15 }
    ];

    let state = {};
    let wsStatus = { xau: false, btc: false };
    let wsRetries = { xau: 0, btc: 0 };
    let activePairId = localStorage.getItem('ura_active_pair') || 'xau';
    let wsConnections = {};
    let priceHistory = { xau: [], btc: [] };
    let lastHeartbeat = { xau: Date.now(), btc: Date.now() };

    // HTF Data - diisi data awal agar tidak kosong
    let htfHistory = { 
        xau: [], 
        btc: [] 
    };
    let htfTrend = { xau: 'neutral', btc: 'neutral' };
    let htfMomentum = { xau: 0, btc: 0 };

    function createFreshState() {
        return { 
            lastPrice: 0, trendScore: 0, 
            l1: false, l2: false, l3: false, 
            confirmed: false, type: 'none', 
            entry: 0, sl: 0, tp: 0
        };
    }

    function loadState(id) {
        const saved = localStorage.getItem(`ura_state_${id}`);
        if (saved) {
            try {
                return JSON.parse(saved);
            } catch(e) {
                return createFreshState();
            }
        }
        return createFreshState();
    }

    function saveState(id) {
        const toSave = {
            lastPrice: state[id].lastPrice,
            trendScore: state[id].trendScore,
            l1: state[id].l1, l2: state[id].l2, l3: state[id].l3,
            confirmed: state[id].confirmed,
            type: state[id].type,
            entry: state[id].entry,
            sl: state[id].sl,
            tp: state[id].tp
        };
        localStorage.setItem(`ura_state_${id}`, JSON.stringify(toSave));
    }

    // ==================== HTF ANALYSIS (UPDATE SETIAP TICK) ====================
    function updateHTF(id, price) {
        // Simpan history
        htfHistory[id].push(price);
        
        // Selalu batasi maksimal 50 data
        if (htfHistory[id].length > 50) {
            htfHistory[id].shift();
        }
        
        // HITUNG TREND & MOMENTUM (tetap dihitung walau data belum 20)
        if (htfHistory[id].length >= 2) {
            // Ambil data terakhir (minimal 2 data untuk perhitungan sederhana)
            const len = htfHistory[id].length;
            const lastPrice = htfHistory[id][len - 1];
            const firstPrice = htfHistory[id][0];
            
            // Trend sederhana: bandingkan harga pertama dan terakhir
            if (lastPrice > firstPrice * 1.0003) {
                htfTrend[id] = 'up';
            } else if (lastPrice < firstPrice * 0.9997) {
                htfTrend[id] = 'down';
            } else {
                htfTrend[id] = 'neutral';
            }
            
            // Momentum: perubahan 5 tick terakhir atau semua data jika kurang
            if (len >= 5) {
                const oldPrice = htfHistory[id][len - 5];
                htfMomentum[id] = ((lastPrice - oldPrice) / oldPrice) * 100;
            } else if (len >= 2) {
                const oldPrice = htfHistory[id][0];
                htfMomentum[id] = ((lastPrice - oldPrice) / oldPrice) * 100;
            }
        } else {
            htfTrend[id] = 'neutral';
            htfMomentum[id] = 0;
        }
        
        // Debug di console (bisa dihapus setelah testing)
        console.log(`${id} HTF - History: ${htfHistory[id].length}, Trend: ${htfTrend[id]}, Momentum: ${htfMomentum[id].toFixed(4)}%`);
    }

    function getTrendSymbol(trend) {
        if (trend === 'up') return '▲ BULLISH';
        if (trend === 'down') return '▼ BEARISH';
        return '◆ NEUTRAL';
    }

    function getMomentumText(momentum) {
        if (momentum > 0.05) return '▲ STRONG';
        if (momentum > 0) return '▲ WEAK';
        if (momentum > -0.05) return '▼ WEAK';
        return '▼ STRONG';
    }

    // ==================== SIGNAL LOGIC ====================
    function updateSignal(id, price) {
        const s = state[id];
        const p = pairs.find(pair => pair.id === id);
        
        if (s.confirmed) {
            if (s.type === 'buy' && (price >= s.tp || price <= s.sl)) resetSignal(id);
            else if (s.type === 'sell' && (price <= s.tp || price >= s.sl)) resetSignal(id);
            return;
        }
        
        const diff = price - s.lastPrice;
        if (s.lastPrice !== 0 && diff !== 0) {
            s.trendScore += diff;
        }
        
        if (!s.confirmed && s.lastPrice !== 0 && Math.abs(diff) > p.threshold) {
            const direction = diff > 0 ? 'buy' : 'sell';
            if (!s.l1) { 
                s.l1 = true; 
                s.type = direction; 
                saveState(id);
            } 
            else if (!s.l2) { 
                s.l2 = true; 
                saveState(id);
            } 
            else { 
                lockSignal(id, price, direction); 
            }
        }
        
        s.lastPrice = price;
        saveState(id);
    }

    function lockSignal(id, entry, type) {
        const s = state[id];
        const offset = type === 'buy' ? -3 : +3;
        const adjustedEntry = entry + offset;
        
        s.l3 = true;
        s.confirmed = true;
        s.type = type;
        s.entry = adjustedEntry;
        
        const risk = id === 'xau' ? 8 : entry * 0.0020;
        
        if (type === 'buy') {
            s.sl = adjustedEntry - risk;
            s.tp = adjustedEntry + (risk * 1.3);
        } else {
            s.sl = adjustedEntry + risk;
            s.tp = adjustedEntry - (risk * 1.5);
        }
        
        saveState(id);
    }

    function resetSignal(id) {
        const s = state[id];
        s.l1 = false; s.l2 = false; s.l3 = false;
        s.confirmed = false; s.type = 'none';
        s.entry = 0; s.sl = 0; s.tp = 0;
        s.trendScore = 0;
        saveState(id);
    }

    // ==================== RENDER UI (UPDATE SEMUA ELEMEN) ====================
    function renderAll(id) {
        const s = state[id];
        const p = pairs.find(pair => pair.id === id);
        if (!p) return;
        
        // Price
        const priceEl = document.getElementById(`price-${id}`);
        if (priceEl && s.lastPrice) {
            priceEl.innerText = s.lastPrice.toFixed(2);
        }
        
        // Signal dots
        const l1Dot = document.getElementById(`l1-${id}`);
        if (l1Dot) l1Dot.className = s.l1 ? (s.type === 'sell' ? "dot active-down" : "dot active") : "dot";
        
        const l2Dot = document.getElementById(`l2-${id}`);
        if (l2Dot) l2Dot.className = s.l2 ? (s.type === 'sell' ? "dot active-down" : "dot active") : "dot";
        
        const l3Dot = document.getElementById(`l3-${id}`);
        if (l3Dot) l3Dot.className = s.l3 ? (s.type === 'sell' ? "dot active-down" : "dot active") : "dot";
        
        // Signal text
        const signalText = document.getElementById(`signal-text-${id}`);
        if (signalText) {
            if (!wsStatus[id]) {
                signalText.innerText = 'NO FEED';
                signalText.style.color = 'var(--danger)';
            } else if (s.confirmed) {
                signalText.innerText = s.type.toUpperCase();
                signalText.style.color = s.type === 'buy' ? 'var(--success)' : 'var(--danger)';
            } else if (s.l3) {
                signalText.innerText = 'FVG';
                signalText.style.color = 'var(--accent)';
            } else if (s.l2) {
                signalText.innerText = 'CHoCH';
                signalText.style.color = 'var(--accent)';
            } else if (s.l1) {
                signalText.innerText = 'SWEEP';
                signalText.style.color = 'var(--feed-lightning)';
            } else {
                signalText.innerText = 'IDLE';
                signalText.style.color = 'var(--text-dim)';
            }
        }
        
        // Entry, TP, SL
        const entryEl = document.getElementById(`entry-${id}`);
        if (entryEl) entryEl.innerText = s.confirmed ? s.entry.toFixed(2) : '--';
        
        const tpEl = document.getElementById(`tp-${id}`);
        if (tpEl) tpEl.innerText = s.confirmed ? s.tp.toFixed(2) : '--';
        
        const slEl = document.getElementById(`sl-${id}`);
        if (slEl) slEl.innerText = s.confirmed ? s.sl.toFixed(2) : '--';
        
        // ==================== HTF PANEL ====================
        const htfTrendEl = document.getElementById(`htf-trend-${id}`);
        if (htfTrendEl) {
            const trendSym = getTrendSymbol(htfTrend[id]);
            let trendClass = 'trend-neutral';
            if (htfTrend[id] === 'up') trendClass = 'trend-up';
            else if (htfTrend[id] === 'down') trendClass = 'trend-down';
            htfTrendEl.className = `htf-value ${trendClass}`;
            htfTrendEl.innerText = trendSym;
        }
        
        const htfMomentumEl = document.getElementById(`htf-momentum-${id}`);
        if (htfMomentumEl) {
            const momText = getMomentumText(htfMomentum[id]);
            const momClass = htfMomentum[id] >= 0 ? 'momentum-up' : 'momentum-down';
            htfMomentumEl.className = `htf-value ${momClass}`;
            htfMomentumEl.innerText = `${momText} (${htfMomentum[id] > 0 ? '+' : ''}${htfMomentum[id].toFixed(2)}%)`;
        }
        
        // ==================== PRICE ACTION PANEL ====================
        const trendPaEl = document.getElementById(`trend-${id}`);
        if (trendPaEl) {
            if (s.trendScore > p.trendThresh) {
                trendPaEl.innerText = "BULLISH";
                trendPaEl.style.color = "var(--success)";
            } else if (s.trendScore < -p.trendThresh) {
                trendPaEl.innerText = "BEARISH";
                trendPaEl.style.color = "var(--danger)";
            } else {
                trendPaEl.innerText = "NEUTRAL";
                trendPaEl.style.color = "var(--text-dim)";
            }
        }
        
        const momPaEl = document.getElementById(`mom-${id}`);
        if (momPaEl && s.lastPrice !== 0) {
            const prevPrice = state[id].lastPrice;
            const diff = s.lastPrice - prevPrice;
            const absDiff = Math.abs(diff);
            const direction = diff > 0 ? "UPWARD" : "DOWNWARD";
            const strength = absDiff > p.momThresh ? "STRONG " : "";
            momPaEl.innerHTML = strength + direction;
            momPaEl.style.color = diff > 0 ? "var(--success)" : "var(--danger)";
        }
    }

    function updateWSStatus(id) {
        const el = document.getElementById(`ws-status-${id}`);
        if (el) {
            el.textContent = wsStatus[id] ? '● CONNECTED' : '○ RECONNECTING...';
            el.className = `ws-status ${wsStatus[id] ? 'connected' : 'disconnected'}`;
        }
    }

    function updateGlobalPulse() {
        const pulseEl = document.getElementById('globalPulse');
        if (pulseEl) {
            pulseEl.className = (wsStatus.xau || wsStatus.btc) ? 'pulse connected' : 'pulse disconnected';
        }
    }

    function init() {
        pairs.forEach(p => {
            state[p.id] = loadState(p.id);
            priceHistory[p.id] = [];
            htfHistory[p.id] = [];
            
            // Isi data awal dengan harga default 4690 untuk XAU, 60000 untuk BTC
            const defaultPrice = p.id === 'xau' ? 4690 : 60000;
            for (let i = 0; i < 20; i++) {
                htfHistory[p.id].push(defaultPrice + (i * 0.1));
            }
            // Hitung HTF dari data awal
            updateHTF(p.id, defaultPrice + 2);
        });
        
        const container = document.getElementById('terminals');
        container.innerHTML = '';
        
        pairs.forEach(p => {
            container.innerHTML += `
                <div class="pair-card ${p.id === activePairId ? 'active' : ''}" id="card-${p.id}">
                    <div class="card">
                        <div class="card-top">
                            <div class="pair-info">
                                <span class="pair">${p.name}</span>
                                <span id="ws-status-${p.id}" class="ws-status disconnected">○ RECONNECTING...</span>
                            </div>
                            <span class="price" id="price-${p.id}">0.00</span>
                        </div>
                        
                        <div class="signal-bar">
                            <span>SIGNAL</span>
                            <div class="signal-dot-group">
                                <div class="dot" id="l1-${p.id}"></div>
                                <div class="dot" id="l2-${p.id}"></div>
                                <div class="dot" id="l3-${p.id}"></div>
                            </div>
                            <span id="signal-text-${p.id}">IDLE</span>
                        </div>
                        
                        <div class="card-level-grid">
                            <div class="level-item" onclick="copyValue('${p.id}','entry')">
                                <span class="level-label">Entry</span>
                                <span class="level-value" id="entry-${p.id}">--</span>
                            </div>
                            <div class="level-item" onclick="copyValue('${p.id}','tp')">
                                <span class="level-label">Target</span>
                                <span class="level-value" id="tp-${p.id}" style="color:var(--success)">--</span>
                            </div>
                            <div class="level-item" onclick="copyValue('${p.id}','sl')">
                                <span class="level-label">S-Loss</span>
                                <span class="level-value" id="sl-${p.id}" style="color:var(--danger)">--</span>
                            </div>
                        </div>
                        
                        <div class="analysis-grid">
                            <div class="box-htf">
                                <div class="label-sm">HTF (H1)</div>
                                <div class="htf-row">
                                    <div class="htf-label">TREND</div>
                                    <div class="htf-value" id="htf-trend-${p.id}">◆ --</div>
                                </div>
                                <div class="htf-row">
                                    <div class="htf-label">MOMENTUM</div>
                                    <div class="htf-value" id="htf-momentum-${p.id}">--</div>
                                </div>
                            </div>
                            <div class="box-pa">
                                <div class="label-sm">PRICE ACTION</div>
                                <div class="pa-row">
                                    <div class="pa-label">TREND</div>
                                    <div class="pa-value" id="trend-${p.id}">SCANNING</div>
                                </div>
                                <div class="pa-row">
                                    <div class="pa-label">MOMENTUM</div>
                                    <div class="pa-value" id="mom-${p.id}">--</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            renderAll(p.id);
            connectWebSocket(p.id);
        });

        document.getElementById('switchLabel').innerText = activePairId === 'xau' ? 'XAUUSD' : 'BTCUSD';
        document.getElementById('switchPairBtn').onclick = () => {
            activePairId = activePairId === 'xau' ? 'btc' : 'xau';
            localStorage.setItem('ura_active_pair', activePairId);
            document.getElementById('switchLabel').innerText = activePairId === 'xau' ? 'XAUUSD' : 'BTCUSD';
            document.querySelectorAll('.pair-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`card-${activePairId}`).classList.add('active');
        };
        
        updateGlobalPulse();
        setInterval(() => updateGlobalPulse(), 1000);
        
        // Log untuk debugging
        console.log('Initialization complete. HTF history seeded with 20 data points.');
    }

    function connectWebSocket(id) {
        const p = pairs.find(pair => pair.id === id);
        if (!p) return;
        
        if (wsConnections[id]) {
            try { wsConnections[id].close(); } catch(e) {}
        }
        
        try {
            const ws = new WebSocket(p.wsUrl);
            
            ws.onopen = () => {
                wsStatus[id] = true;
                wsRetries[id] = 0;
                lastHeartbeat[id] = Date.now();
                updateWSStatus(id);
                updateGlobalPulse();
            };
            
            ws.onclose = () => {
                wsStatus[id] = false;
                updateWSStatus(id);
                updateGlobalPulse();
                const delay = Math.min(1000 * Math.pow(2, wsRetries[id]), 30000);
                wsRetries[id]++;
                setTimeout(() => connectWebSocket(id), delay);
            };
            
            ws.onerror = () => {
                wsStatus[id] = false;
                updateWSStatus(id);
                updateGlobalPulse();
            };
            
            ws.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    const price = parseFloat(data.c) + p.offset;
                    if (price > 0) {
                        lastHeartbeat[id] = Date.now();
                        
                        if (!wsStatus[id]) {
                            wsStatus[id] = true;
                            updateWSStatus(id);
                            updateGlobalPulse();
                        }
                        
                        // Update price display dengan warna flash
                        const priceEl = document.getElementById(`price-${id}`);
                        if (priceEl) {
                            const oldPrice = state[id].lastPrice;
                            if (oldPrice !== 0) {
                                priceEl.style.color = price >= oldPrice ? "var(--success)" : "var(--danger)";
                                setTimeout(() => { priceEl.style.color = ""; }, 300);
                            }
                            priceEl.innerText = price.toFixed(2);
                        }
                        
                        // UPDATE HTF (Higher Timeframe)
                        updateHTF(id, price);
                        
                        // UPDATE SIGNAL
                        updateSignal(id, price);
                        
                        // RENDER ULANG SEMUA UI
                        renderAll(id);
                    }
                } catch(err) {
                    console.error(`Parse error for ${id}:`, err);
                }
            };
            
            wsConnections[id] = ws;
        } catch(err) {
            wsStatus[id] = false;
            updateWSStatus(id);
            updateGlobalPulse();
            setTimeout(() => connectWebSocket(id), 5000);
        }
    }

    window.copyValue = (id, type) => {
        const val = document.getElementById(`${type}-${id}`).innerText;
        if (val !== '--') {
            navigator.clipboard.writeText(val);
            if (navigator.vibrate) navigator.vibrate(50);
        }
    };

    setInterval(() => {
        const clk = document.getElementById('clock');
        if (clk) clk.innerText = new Date().toISOString().split('T')[1].split('.')[0] + " UTC";
    }, 1000);
    
    init();
</script>
</body>
</html>

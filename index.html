<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>PRECISION TERMINAL v5.0.0 - OPTIMIZED</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;600;800&display=swap');

        :root {
            --bg: #1a1d21; 
            --text: #e6e8ea;
            --text-dim: #707a8a;
            --accent: #f0b90b;
            --success: #00FFFF; 
            --danger: #FF5252; 
            --feed-lightning: #FFEA00;
            --border: rgba(255, 255, 255, 0.1);
            --phase-trending: #00FF88;
            --htf-bullish: #00FFFF;
            --htf-bearish: #FF5252;
            --htf-neutral: #707a8a;
            --htf-weak: #f0b90b;
            --phase-expansion: #FF6B6B;
            --phase-lowvol: #4ECDC4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            padding: 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { max-width: 450px; width: 100%; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .brand h1 { font-size: 1rem; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
        .sys-status { font-family: 'JetBrains Mono', monospace; font-size: 0.5rem; text-align: right; color: var(--text-dim); }
        
        .pulse { 
            display: inline-block; 
            width: 7px; 
            height: 7px; 
            background: var(--feed-lightning); 
            border-radius: 50%; 
            margin-right: 5px; 
            animation: blink 1.5s infinite; 
        }
        .pulse.connected {
            background: var(--success);
            box-shadow: 0 0 5px var(--success);
        }
        .pulse.disconnected {
            background: var(--danger);
            animation: blink 0.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .ws-status {
            font-size: 0.5rem;
            padding: 2px 6px;
            border-radius: 3px;
            margin-top: 2px;
            display: inline-block;
        }
        .ws-status.connected { color: var(--phase-trending); }
        .ws-status.disconnected { color: var(--danger); animation: blink 1s infinite; }

        .switch-pair-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255,255,255,0.03);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: 10px;
        }
        .switch-pair-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .pair-card { display: none; }
        .pair-card.active { display: block; }

        .card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card-top { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            margin-bottom: 8px; 
        }
        .pair-info {
            display: flex;
            flex-direction: column;
        }
        .pair { font-weight: 800; font-size: 1.1rem; letter-spacing: 1px; color: var(--text); }
        .price { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 1.2rem; 
            font-weight: 700; 
            background: transparent;
            padding: 4px 0;
            text-align: right;
            transition: color 0.1s ease;
        }

        .signal-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            user-select: none;
        }

        .signal-dot-group { display: flex; gap: 12px; align-items: center; }
        .dot { width: 8px; height: 8px; border-radius: 2px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .dot.active { background: var(--success); }
        .dot.active-down { background: var(--danger); }

        .card-level-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 4px;
        }
        .level-item { display: flex; flex-direction: column; cursor: pointer; }
        .level-item:nth-child(1) { align-items: flex-start; text-align: left; }
        .level-item:nth-child(2) { align-items: center; text-align: center; }
        .level-item:nth-child(3) { align-items: flex-end; text-align: right; }
        .level-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
        .level-value { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; font-weight: 700; }

        footer { text-align: center; font-size: 0.55rem; color: var(--text-dim); margin-top: 10px; opacity: 0.6; }
        
        .trend-up { color: var(--success); }
        .trend-down { color: var(--danger); }
        .trend-neutral { color: var(--text-dim); }
        .trend-weak { color: var(--htf-weak); }
        .momentum-up { color: var(--success); }
        .momentum-down { color: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="brand">
            <h1>uradvisor</h1>
            <p style="font-size: 0.5rem; color: var(--text-dim)">PRECISION SIGNAL v5.0.0</p>
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <div class="sys-status">
                <div><span class="pulse" id="globalPulse"></span>LIVE</div>
            </div>
            <button id="switchPairBtn" class="switch-pair-btn">
                <span id="switchLabel">XAUUSD</span>
            </button>
        </div>
    </header>

    <div id="terminals"></div>

    <footer>
        [ ENGINE CORE ]: PIVOT FRACTAL + DISPLACEMENT + ADAPTIVE ATR<br>
        [ METHOD ]: SWEEP + CHoCH + FVG
    </footer>
</div>

<script>
(function() {
    'use strict';

    // ==================== OPTIMASI ANTI-LAG ====================
    // 1. THROTTLE LocalStorage - hanya simpan setiap 1 detik
    let pendingSaveData = { xau: null, btc: null };
    let pendingSaveTimer = { xau: null, btc: null };
    const SAVE_INTERVAL = 1000;

    // 2. RAF Throttle untuk UI update - hanya update saat frame
    let rafPending = { xau: false, btc: false };
    let pendingPriceData = { xau: null, btc: null };
    let pendingSignalData = { xau: null, btc: null };

    // 3. Debounce untuk signal processing
    let signalDebounceTimer = { xau: null, btc: null };
    const SIGNAL_DEBOUNCE_MS = 50;

    // ==================== KONFIGURASI ====================
    const BTC_WS_URL = 'wss://stream.binance.com:9443/ws/btcusdt@aggTrade';
    const XAU_OFFSET = -3;
    
    // ==================== STATE MANAGEMENT ====================
    let state = { xau: null, btc: null };
    let wsStatus = { xau: true, btc: false };
    let activePairId = localStorage.getItem('ura_active_pair') || 'xau';
    
    // ==================== TRIPLE TAP RESET ====================
    let tapCounters = { xau: 0, btc: 0 };
    let tapTimers = { xau: null, btc: null };
    const TAP_TIMEOUT = 500;

    function handleSignalBarTap(id) {
        if (tapTimers[id]) {
            clearTimeout(tapTimers[id]);
            tapTimers[id] = null;
        }
        
        tapCounters[id]++;
        
        tapTimers[id] = setTimeout(() => {
            tapCounters[id] = 0;
            tapTimers[id] = null;
        }, TAP_TIMEOUT);
        
        if (tapCounters[id] === 3) {
            resetSignal(id);
            tapCounters[id] = 0;
            if (tapTimers[id]) {
                clearTimeout(tapTimers[id]);
                tapTimers[id] = null;
            }
            if (navigator.vibrate) navigator.vibrate(30);
        }
    }

    // ==================== THROTTLED LOCALSTORAGE ====================
    function throttledSaveState(id) {
        const s = state[id];
        if (!s) return;
        
        pendingSaveData[id] = {
            lastPrice: s.lastPrice,
            trendScore: s.trendScore,
            l1: s.l1, l2: s.l2, l3: s.l3,
            confirmed: s.confirmed,
            type: s.type,
            entry: s.entry, sl: s.sl, tp: s.tp
        };
        
        if (pendingSaveTimer[id]) return;
        
        pendingSaveTimer[id] = setTimeout(() => {
            if (pendingSaveData[id]) {
                localStorage.setItem(`ura_state_${id}`, JSON.stringify(pendingSaveData[id]));
                pendingSaveData[id] = null;
            }
            pendingSaveTimer[id] = null;
        }, SAVE_INTERVAL);
    }

    // ==================== RAF THROTTLED UI UPDATE ====================
    function throttledUpdateUI(id) {
        if (!rafPending[id]) {
            rafPending[id] = true;
            requestAnimationFrame(() => {
                if (pendingPriceData[id] !== null) {
                    updatePriceDisplayOnly(id, pendingPriceData[id]);
                    pendingPriceData[id] = null;
                }
                if (pendingSignalData[id] !== null) {
                    updateSignalUIOnly(id);
                    pendingSignalData[id] = null;
                }
                rafPending[id] = false;
            });
        }
    }
    
    function updatePriceDisplayOnly(id, price) {
        const priceEl = document.getElementById(`price-${id}`);
        if (priceEl) {
            const oldPrice = state[id]?.lastPrice || 0;
            priceEl.innerText = price.toFixed(2);
            if (oldPrice !== 0 && oldPrice !== price) {
                priceEl.style.color = price > oldPrice ? "var(--success)" : "var(--danger)";
                setTimeout(() => { if (priceEl) priceEl.style.color = ""; }, 150);
            }
        }
    }
    
    function updateSignalUIOnly(id) {
        const s = state[id];
        if (!s) return;
        
        const l1Dot = document.getElementById(`l1-${id}`);
        if (l1Dot) l1Dot.className = s.l1 ? (s.type === 'sell' ? "dot active-down" : "dot active") : "dot";
        
        const l2Dot = document.getElementById(`l2-${id}`);
        if (l2Dot) l2Dot.className = s.l2 ? (s.type === 'sell' ? "dot active-down" : "dot active") : "dot";
        
        const l3Dot = document.getElementById(`l3-${id}`);
        if (l3Dot) l3Dot.className = s.l3 ? (s.type === 'sell' ? "dot active-down" : "dot active") : "dot";
        
        const signalText = document.getElementById(`signal-text-${id}`);
        if (signalText) {
            if (!wsStatus[id] && id === 'btc') {
                signalText.innerText = 'NO FEED';
                signalText.style.color = 'var(--danger)';
            } else if (s.confirmed) {
                signalText.innerText = s.type.toUpperCase();
                signalText.style.color = s.type === 'buy' ? 'var(--success)' : 'var(--danger)';
            } else if (s.l3) {
                signalText.innerText = 'FVG';
                signalText.style.color = 'var(--accent)';
            } else if (s.l2) {
                signalText.innerText = 'CHoCH';
                signalText.style.color = 'var(--accent)';
            } else if (s.l1) {
                signalText.innerText = 'SWEEP';
                signalText.style.color = 'var(--feed-lightning)';
            } else {
                signalText.innerText = 'IDLE';
                signalText.style.color = 'var(--text-dim)';
            }
        }
        
        const entryEl = document.getElementById(`entry-${id}`);
        if (entryEl) entryEl.innerText = s.confirmed ? s.entry.toFixed(2) : '--';
        
        const tpEl = document.getElementById(`tp-${id}`);
        if (tpEl) tpEl.innerText = s.confirmed ? s.tp.toFixed(2) : '--';
        
        const slEl = document.getElementById(`sl-${id}`);
        if (slEl) slEl.innerText = s.confirmed ? s.sl.toFixed(2) : '--';
    }

    // ==================== SIGNAL ENGINE ====================
    let paEma = { xau: 0, btc: 0 };
    let paEmaAlpha = 0.2;

    function updatePA(id, price) {
        const s = state[id];
        if (paEma[id] === 0) {
            paEma[id] = price;
        } else {
            paEma[id] = (price * paEmaAlpha) + (paEma[id] * (1 - paEmaAlpha));
        }
        
        if (s.lastPrice !== 0) {
            const emaDiff = paEma[id] - s.lastPrice;
            s.trendScore += emaDiff * 0.5;
        }
        
        const maxTrend = id === 'xau' ? 5 : 500;
        if (s.trendScore > maxTrend) s.trendScore = maxTrend;
        if (s.trendScore < -maxTrend) s.trendScore = -maxTrend;
    }

    function createFreshState() {
        return { lastPrice: 0, trendScore: 0, l1: false, l2: false, l3: false, confirmed: false, type: 'none', entry: 0, sl: 0, tp: 0 };
    }

    function loadState(id) {
        const saved = localStorage.getItem(`ura_state_${id}`);
        if (saved) {
            try { return JSON.parse(saved); } catch(e) { return createFreshState(); }
        }
        return createFreshState();
    }

    // PROSES SIGNAL dengan debounce
    function processSignal(id, price) {
        const s = state[id];
        let threshold = (id === 'xau') ? 0.5 : 8;
        
        if (s.confirmed) {
            if ((s.type === 'buy' && (price >= s.tp || price <= s.sl)) ||
                (s.type === 'sell' && (price <= s.tp || price >= s.sl))) {
                resetSignal(id);
            }
            return;
        }
        
        updatePA(id, price);
        
        if (!s.confirmed && s.lastPrice !== 0 && Math.abs(price - s.lastPrice) > threshold) {
            const direction = price > s.lastPrice ? 'buy' : 'sell';
            if (!s.l1) { 
                s.l1 = true; s.type = direction;
                throttledSaveState(id);
                pendingSignalData[id] = true;
                throttledUpdateUI(id);
            } else if (!s.l2) { 
                s.l2 = true;
                throttledSaveState(id);
                pendingSignalData[id] = true;
                throttledUpdateUI(id);
            } else { 
                lockSignal(id, price, direction); 
            }
        }
        
        s.lastPrice = price;
        throttledSaveState(id);
    }
    
    function updateSignal(id, price) {
        if (signalDebounceTimer[id]) {
            clearTimeout(signalDebounceTimer[id]);
        }
        
        signalDebounceTimer[id] = setTimeout(() => {
            processSignal(id, price);
            signalDebounceTimer[id] = null;
        }, SIGNAL_DEBOUNCE_MS);
    }

    function lockSignal(id, entry, type) {
        const s = state[id];
        const offset = type === 'buy' ? -2 : +2;
        const adjustedEntry = entry + offset;
        
        s.l3 = true;
        s.confirmed = true;
        s.type = type;
        s.entry = adjustedEntry;
        
        const risk = id === 'xau' ? 7 : entry * 0.0030;
        
        if (type === 'buy') {
            s.sl = adjustedEntry - risk;
            s.tp = adjustedEntry + (risk * 1.4);
        } else {
            s.sl = adjustedEntry + risk;
            s.tp = adjustedEntry - (risk * 1.4);
        }
        
        throttledSaveState(id);
        pendingSignalData[id] = true;
        throttledUpdateUI(id);
    }

    function resetSignal(id) {
        const s = state[id];
        s.l1 = false; s.l2 = false; s.l3 = false;
        s.confirmed = false; s.type = 'none';
        s.entry = 0; s.sl = 0; s.tp = 0;
        s.trendScore = 0;
        throttledSaveState(id);
        pendingSignalData[id] = true;
        throttledUpdateUI(id);
    }

    // ==================== XAU PRICE ENGINE ====================
    let xauWs = null;
    let xauReconnectTimer = null;
    let xauReconnectAttempts = 0;
    let xauFetchRetryTimer = null;
    let xauCurrentPrice = 0;
    let xauLastHeartbeat = Date.now();

    function updateXAUDisplay(price) {
        if (!price || isNaN(price) || price <= 0) return;
        
        xauCurrentPrice = price;
        xauLastHeartbeat = Date.now();
        
        pendingPriceData.xau = price;
        throttledUpdateUI('xau');
        
        updateSignal('xau', price);
        
        const statusEl = document.getElementById('ws-status-xau');
        if (statusEl) {
            if (xauFetchRetryTimer && (!xauWs || xauWs.readyState !== WebSocket.OPEN)) {
                statusEl.textContent = '● FALLBACK';
                statusEl.className = 'ws-status connected';
            } else {
                statusEl.textContent = '● CONNECTED';
                statusEl.className = 'ws-status connected';
            }
        }
        wsStatus.xau = true;
        updateGlobalPulse();
    }

    async function xauFetchRestPrice() {
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 8000);
            const resp = await fetch('https://fapi.binance.com/fapi/v1/ticker/price?symbol=XAUUSDT', { signal: controller.signal });
            clearTimeout(timeoutId);
            const data = await resp.json();
            if (data?.price) {
                const price = parseFloat(data.price) + XAU_OFFSET;
                if (price > 0 && price !== xauCurrentPrice) {
                    updateXAUDisplay(price);
                    return true;
                }
            }
        } catch(e) { console.warn('XAU REST error'); }
        return false;
    }

    function initXAUWebSocket() {
        if (xauWs) { try { xauWs.close(); } catch(e) {} xauWs = null; }
        if (xauReconnectTimer) clearTimeout(xauReconnectTimer);
        
        try {
            xauWs = new WebSocket('wss://fstream.binance.com/ws/xauusdt@trade');
            
            const wsTimeout = setTimeout(() => {
                if (xauWs && xauWs.readyState !== WebSocket.OPEN) {
                    if (xauWs) try { xauWs.close(); } catch(e) {}
                    xauWs = null;
                    if (!xauFetchRetryTimer) {
                        xauFetchRetryTimer = setInterval(async () => {
                            await xauFetchRestPrice();
                        }, 3000);
                    }
                }
            }, 5000);
            
            xauWs.onopen = () => {
                clearTimeout(wsTimeout);
                xauReconnectAttempts = 0;
                if (xauFetchRetryTimer) { clearInterval(xauFetchRetryTimer); xauFetchRetryTimer = null; }
                updateGlobalPulse();
            };
            
            xauWs.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.p) {
                        const price = parseFloat(data.p) + XAU_OFFSET;
                        if (!isNaN(price) && price > 0 && price !== xauCurrentPrice) {
                            updateXAUDisplay(price);
                        }
                    }
                } catch(err) {}
            };
            
            xauWs.onerror = () => {
                if (!xauFetchRetryTimer) {
                    xauFetchRetryTimer = setInterval(async () => {
                        await xauFetchRestPrice();
                    }, 3000);
                }
            };
            
            xauWs.onclose = () => {
                const delay = Math.min(1000 * Math.pow(1.5, xauReconnectAttempts), 15000);
                xauReconnectAttempts++;
                xauReconnectTimer = setTimeout(() => initXAUWebSocket(), delay);
                
                if (!xauFetchRetryTimer) {
                    xauFetchRetryTimer = setInterval(async () => {
                        await xauFetchRestPrice();
                    }, 3000);
                }
            };
        } catch(err) {
            if (!xauFetchRetryTimer) {
                xauFetchRetryTimer = setInterval(async () => {
                    await xauFetchRestPrice();
                }, 3000);
            }
        }
    }

    // ==================== BTC WEBSOCKET ====================
    let btcWs = null;
    let btcReconnectTimer = null;
    let btcReconnectAttempts = 0;

    function initBTCWebSocket() {
        if (btcWs) { try { btcWs.close(); } catch(e) {} btcWs = null; }
        if (btcReconnectTimer) clearTimeout(btcReconnectTimer);
        
        try {
            btcWs = new WebSocket(BTC_WS_URL);
            
            btcWs.onopen = () => {
                btcReconnectAttempts = 0;
                wsStatus.btc = true;
                const statusEl = document.getElementById('ws-status-btc');
                if (statusEl) {
                    statusEl.textContent = '● CONNECTED';
                    statusEl.className = 'ws-status connected';
                }
                updateGlobalPulse();
                updateSignalUIOnly('btc');
            };
            
            btcWs.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    const price = parseFloat(data.p);
                    if (price && price > 0 && !isNaN(price)) {
                        pendingPriceData.btc = price;
                        throttledUpdateUI('btc');
                        updateSignal('btc', price);
                    }
                } catch(err) {}
            };
            
            btcWs.onclose = () => {
                wsStatus.btc = false;
                const statusEl = document.getElementById('ws-status-btc');
                if (statusEl) {
                    statusEl.textContent = '○ RECONNECTING...';
                    statusEl.className = 'ws-status disconnected';
                }
                updateGlobalPulse();
                updateSignalUIOnly('btc');
                const delay = Math.min(1000 * Math.pow(2, btcReconnectAttempts), 30000);
                btcReconnectAttempts++;
                btcReconnectTimer = setTimeout(() => initBTCWebSocket(), delay);
            };
            
            btcWs.onerror = () => {
                wsStatus.btc = false;
                updateGlobalPulse();
            };
        } catch(err) {
            wsStatus.btc = false;
            setTimeout(() => initBTCWebSocket(), 5000);
        }
    }

    function updateGlobalPulse() {
        const pulseEl = document.getElementById('globalPulse');
        if (pulseEl) {
            const isLive = (xauCurrentPrice > 0) || wsStatus.btc;
            pulseEl.className = isLive ? 'pulse connected' : 'pulse disconnected';
        }
    }

    // ==================== INITIALIZATION ====================
    function init() {
        state.xau = loadState('xau');
        state.btc = loadState('btc');
        
        const container = document.getElementById('terminals');
        container.innerHTML = '';
        
        container.innerHTML += `
            <div class="pair-card ${activePairId === 'xau' ? 'active' : ''}" id="card-xau">
                <div class="card">
                    <div class="card-top">
                        <div class="pair-info">
                            <span class="pair">XAUUSD</span>
                            <span id="ws-status-xau" class="ws-status connected">● CONNECTING...</span>
                        </div>
                        <span class="price" id="price-xau">0.00</span>
                    </div>
                    <div class="signal-bar" id="signal-bar-xau">
                        <span>SIGNAL</span>
                        <div class="signal-dot-group">
                            <div class="dot" id="l1-xau"></div>
                            <div class="dot" id="l2-xau"></div>
                            <div class="dot" id="l3-xau"></div>
                        </div>
                        <span id="signal-text-xau">IDLE</span>
                    </div>
                    <div class="card-level-grid">
                        <div class="level-item" onclick="window.copyValue('xau','entry')">
                            <span class="level-label">Entry</span>
                            <span class="level-value" id="entry-xau">--</span>
                        </div>
                        <div class="level-item" onclick="window.copyValue('xau','tp')">
                            <span class="level-label">Target</span>
                            <span class="level-value" id="tp-xau" style="color:var(--success)">--</span>
                        </div>
                        <div class="level-item" onclick="window.copyValue('xau','sl')">
                            <span class="level-label">S-Loss</span>
                            <span class="level-value" id="sl-xau" style="color:var(--danger)">--</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="pair-card ${activePairId === 'btc' ? 'active' : ''}" id="card-btc">
                <div class="card">
                    <div class="card-top">
                        <div class="pair-info">
                            <span class="pair">BTCUSD</span>
                            <span id="ws-status-btc" class="ws-status disconnected">○ RECONNECTING...</span>
                        </div>
                        <span class="price" id="price-btc">0.00</span>
                    </div>
                    <div class="signal-bar" id="signal-bar-btc">
                        <span>SIGNAL</span>
                        <div class="signal-dot-group">
                            <div class="dot" id="l1-btc"></div>
                            <div class="dot" id="l2-btc"></div>
                            <div class="dot" id="l3-btc"></div>
                        </div>
                        <span id="signal-text-btc">IDLE</span>
                    </div>
                    <div class="card-level-grid">
                        <div class="level-item" onclick="window.copyValue('btc','entry')">
                            <span class="level-label">Entry</span>
                            <span class="level-value" id="entry-btc">--</span>
                        </div>
                        <div class="level-item" onclick="window.copyValue('btc','tp')">
                            <span class="level-label">Target</span>
                            <span class="level-value" id="tp-btc" style="color:var(--success)">--</span>
                        </div>
                        <div class="level-item" onclick="window.copyValue('btc','sl')">
                            <span class="level-label">S-Loss</span>
                            <span class="level-value" id="sl-btc" style="color:var(--danger)">--</span>
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        const xauBar = document.getElementById('signal-bar-xau');
        const btcBar = document.getElementById('signal-bar-btc');
        if (xauBar) xauBar.addEventListener('click', () => handleSignalBarTap('xau'));
        if (btcBar) btcBar.addEventListener('click', () => handleSignalBarTap('btc'));
        
        updateSignalUIOnly('xau');
        updateSignalUIOnly('btc');
        
        initXAUWebSocket();
        xauFetchRestPrice();
        initBTCWebSocket();
        
        const switchLabel = document.getElementById('switchLabel');
        const switchBtn = document.getElementById('switchPairBtn');
        if (switchLabel && switchBtn) {
            switchLabel.innerText = activePairId === 'xau' ? 'XAUUSD' : 'BTCUSD';
            switchBtn.onclick = () => {
                activePairId = activePairId === 'xau' ? 'btc' : 'xau';
                localStorage.setItem('ura_active_pair', activePairId);
                switchLabel.innerText = activePairId === 'xau' ? 'XAUUSD' : 'BTCUSD';
                document.querySelectorAll('.pair-card').forEach(c => c.classList.remove('active'));
                document.getElementById(`card-${activePairId}`).classList.add('active');
            };
        }
        
        updateGlobalPulse();
        
        setInterval(() => {
            if (Date.now() - xauLastHeartbeat > 15000 && xauCurrentPrice > 0) {
                xauFetchRestPrice();
            }
            updateGlobalPulse();
        }, 10000);
    }
    
    window.copyValue = (id, type) => {
        const val = document.getElementById(`${type}-${id}`)?.innerText;
        if (val && val !== '--') {
            navigator.clipboard.writeText(val);
            if (navigator.vibrate) navigator.vibrate(50);
        }
    };
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
    
})();
</script>
</body>
</html>

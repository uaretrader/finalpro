<script>
(function () {
'use strict';

// ================================================================
//  URADVISOR APEX ENGINE v8.0 — REGIME ADAPTIVE SL
//  Upgrade: Market Regime Detection (TRENDING/RANGING/SQUEEZE)
//           otomatis menyesuaikan jarak Stop Loss
// ================================================================

const LS_SCHEMA_VERSION  = 5;
const BTC_WS_URL         = 'wss://stream.binance.com:9443/ws/btcusdt@trade';
const XAU_OFFSET         = -2.2;
const CONFIRMATION_WAIT_MS = 4000;
const MIN_CONFLUENCE     = 85;
const COOLDOWN_AFTER_SL_MS = 12000;
const RR_RATIO           = 1.6;

// ── Schema Migration ─────────────────────────────────────────────
function checkAndMigrateSchema() {
    const v = parseInt(localStorage.getItem('ura_schema_ver') || '1', 10);
    if (v < LS_SCHEMA_VERSION) {
        ['xau','btc'].forEach(id => { localStorage.removeItem(`ura_state_${id}`); localStorage.removeItem(`ura_stats_${id}`); });
        localStorage.setItem('ura_schema_ver', String(LS_SCHEMA_VERSION));
    }
}

// ── Toast ────────────────────────────────────────────────────────
let _tt = null;
function showToast(msg) { const el = document.getElementById('toast'); if (!el) return; el.textContent = msg; el.classList.add('show'); if (_tt) clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 2100); }

// ================================================================
//  INDICATOR LIBRARY
// ================================================================
function calcEMA(arr, period) {
    if (arr.length < period) return null;
    const k = 2 / (period + 1);
    let e = arr.slice(0, period).reduce((a,b) => a+b, 0) / period;
    for (let i = period; i < arr.length; i++) e = arr[i] * k + e * (1 - k);
    return e;
}

function calcRSI(closes, period = 14) {
    if (closes.length < period + 1) return null;
    const r = closes.slice(-period - 1);
    let g = 0, l = 0;
    for (let i = 1; i < r.length; i++) { const d = r[i] - r[i-1]; if (d > 0) g += d; else l -= d; }
    const ag = g / period, al = l / period;
    if (al === 0) return 100;
    return 100 - 100 / (1 + ag / al);
}

function calcMACD(closes, fast = 12, slow = 26, sig = 9) {
    if (closes.length < slow + sig + 2) return null;
    const ef = calcEMA(closes, fast);
    const es = calcEMA(closes, slow);
    if (ef === null || es === null) return null;
    const macdLine = ef - es;
    const hist = [];
    const stride = Math.max(1, Math.floor(closes.length / 60));
    for (let i = slow; i < closes.length; i += stride) {
        const sl2 = closes.slice(0, i + 1);
        const a = calcEMA(sl2, fast);
        const b = calcEMA(sl2, slow);
        if (a !== null && b !== null) hist.push(a - b);
    }
    if (hist.length < sig) return { line: macdLine, signal: 0, hist: macdLine };
    const sigLine = calcEMA(hist, Math.min(sig, hist.length));
    return { line: macdLine, signal: sigLine, hist: macdLine - (sigLine || 0) };
}

function calcBollinger(closes, period = 20, std = 2) {
    if (closes.length < period) return null;
    const sl = closes.slice(-period);
    const mean = sl.reduce((a,b) => a+b, 0) / period;
    const sd = Math.sqrt(sl.reduce((a,b) => a + (b - mean) ** 2, 0) / period);
    return { upper: mean + std * sd, lower: mean - std * sd, mid: mean, width: 2 * std * sd };
}

function calcVWAP(candles) {
    if (candles.length < 5) return null;
    const sl = candles.slice(-Math.min(180, candles.length));
    let cumTP = 0, cumV = 0;
    for (const c of sl) { const tp = (c.high + c.low + c.close) / 3; cumTP += tp * c.volume; cumV += c.volume; }
    return cumV > 0 ? cumTP / cumV : null;
}

function calcATR(candles, period = 14) {
    if (candles.length < period + 1) return null;
    const trs = [];
    for (let i = 1; i < candles.length; i++) trs.push(Math.max(candles[i].high - candles[i].low, Math.abs(candles[i].high - candles[i-1].close), Math.abs(candles[i].low - candles[i-1].close)));
    return trs.slice(-period).reduce((a,b) => a+b, 0) / period;
}

function detectCHoCH(candles) {
    if (candles.length < 10) return 'NONE';
    const a = candles.slice(-10, -5);
    const b = candles.slice(-5);
    const aH = Math.max(...a.map(c => c.high));
    const aL = Math.min(...a.map(c => c.low));
    const bH = Math.max(...b.map(c => c.high));
    const bL = Math.min(...b.map(c => c.low));
    if (bH > aH && bL > aL) return 'BULLISH';
    if (bL < aL && bH < aH) return 'BEARISH';
    return 'NONE';
}

function detectVolSpike(candles, lb = 12) {
    if (candles.length < lb + 1) return false;
    const avg = candles.slice(-lb - 1, -1).reduce((a,c) => a + c.volume, 0) / lb;
    return candles[candles.length - 1].volume > avg * 1.6;
}

// ================================================================
//  MARKET REGIME DETECTION (BARU — untuk adaptive SL)
// ================================================================
function detectMarketRegime(candles, id, bbWidth) {
    if (candles.length < 20) return 'UNKNOWN';
    const w = candles.slice(-20);
    let upMoves = 0, downMoves = 0;
    for (let i = 1; i < w.length; i++) {
        const up = w[i].high - w[i-1].high;
        const dn = w[i-1].low - w[i].low;
        if (up > dn && up > 0) upMoves++;
        else if (dn > up && dn > 0) downMoves++;
    }
    const directional = Math.abs(upMoves - downMoves) / (w.length - 1);
    if (directional >= 0.50 && bbWidth > (id === 'xau' ? 0.005 : 0.008)) {
        return upMoves > downMoves ? 'TRENDING_UP' : 'TRENDING_DOWN';
    } else if (bbWidth < (id === 'xau' ? 0.003 : 0.004)) {
        return 'SQUEEZE';
    }
    return 'RANGING';
}

// ================================================================
//  CONFLUENCE SCORER
// ================================================================
function scoreConfluence(id, price, candles) {
    if (candles.length < 28) return { score: 0, factors: {}, direction: null };

    const closes = candles.map(c => c.close);
    const atr    = calcATR(candles) || (id === 'xau' ? 3 : 300);

    const rsi    = calcRSI(closes);
    const macd   = calcMACD(closes);
    const bb     = calcBollinger(closes);
    const vwap   = calcVWAP(candles);
    const ema9   = calcEMA(closes, 9);
    const ema21  = calcEMA(closes, 21);
    const ema50  = calcEMA(closes, Math.min(50, closes.length - 1));
    const choch  = detectCHoCH(candles);
    const vspi   = detectVolSpike(candles);

    let bull = 0, bear = 0;
    const f = {};

    if (rsi !== null) {
    f.rsi = rsi.toFixed(1);

    if (rsi > 55) {
        bull += 3;
        f.rsi_sig = 'BULL';
    }
    else if (rsi < 45) {
        bear += 3;
        f.rsi_sig = 'BEAR';
    }
    else {
        f.rsi_sig = 'MID';
    }
}

    if (macd !== null) {
        f.macd_hist = macd.hist.toFixed(5);
        if (macd.hist > 0 && macd.line > 0)      { bull += 6; f.macd_sig = 'BULL'; }
        else if (macd.hist > 0)                  { bull +=  4; f.macd_sig = 'BULL_X'; }
        else if (macd.hist < 0 && macd.line < 0) { bear += 6; f.macd_sig = 'BEAR'; }
        else if (macd.hist < 0)                  { bear +=  4; f.macd_sig = 'BEAR_X'; }
        else f.macd_sig = 'FLAT';
    }

    if (ema9 && ema21) {
        f.ema_cross = ema9 > ema21 ? 'BULL' : 'BEAR';
        ema9 > ema21 ? bull += 25 : bear += 25;
    }

    if (ema50) {
        const tol = atr * 0.12;
        if (price > ema50 + tol)      { bull += 12; f.ema50 = 'ABOVE'; }
        else if (price < ema50 - tol) { bear += 12; f.ema50 = 'BELOW'; }
        else f.ema50 = 'AT';
    }

    if (vwap) {
        const tol = atr * 0.15;
        f.vwap_dist = (price - vwap).toFixed(2);
        if (price > vwap + tol)      { bull += 15; f.vwap = 'ABOVE'; }
        else if (price < vwap - tol) { bear += 15; f.vwap = 'BELOW'; }
        else f.vwap = 'AT';
    }

    if (bb) {
        f.bb_width = (bb.width / bb.mid * 100).toFixed(2) + '%';
        const squeeze = bb.width < atr * 1.3;
        f.bb_squeeze = squeeze;
        if (price <= bb.lower + atr * 0.18)      { bull += 2; f.bb = 'AT_LOWER'; }
        else if (price >= bb.upper - atr * 0.18) { bear += 2; f.bb = 'AT_UPPER'; }
        else if (squeeze)                         f.bb = 'SQUEEZE';
        else                                      f.bb = 'MID';
    }

    f.choch = choch;
    if (choch === 'BULLISH') bull += 30;
    else if (choch === 'BEARISH') bear += 30;

    f.vol_spike = vspi;

if (vspi && vwap != null) {
    if (choch === 'BULLISH' && price > vwap)
        bull += 5;
    else if (choch === 'BEARISH' && price < vwap)
        bear += 5;
}

    const MAX = 98;
    let direction = null, score = 0;
    const diff = Math.abs(bull - bear);
    if (bull > bear && diff >= 8) {
        direction = 'buy';
        score = Math.min(98, Math.round((bull / MAX) * 98 + bull * 0.15));
    } else if (bear > bull && diff >= 8) {
        direction = 'sell';
        score = Math.min(98, Math.round((bear / MAX) * 98 + bear * 0.15));
    } else {
        score = Math.round(Math.max(bull, bear) / 2);
    }

    return { score, factors: f, direction, bull, bear, rsi, macd, ema9, ema21, vwap, atr };
}

function createFreshState() {
    return { v: LS_SCHEMA_VERSION, lastPrice: 0, l1: false, l2: false, l3: false, confirmed: false, confirmedAt: 0, resetInProgress: false, warmupUntil: 0, cooldownUntil: 0, type: 'none', entry: 0, sl: 0, tp: 0, tempHigh: 0, tempLow: 0, originPrice: 0, retracePct: 0, confluenceScore: 0 };
}
function loadState(id) { try { const r = localStorage.getItem(`ura_state_${id}`); return r ? Object.assign(createFreshState(), JSON.parse(r)) : createFreshState(); } catch(e) { return createFreshState(); } }
function createDefaultStats() { return { tpHits: 0, retraceResets: 0, slHits: 0, total: 0, winrate: 0.0, drawrate: 0.0 }; }
function loadPerformanceStats(id) { try { const r = localStorage.getItem(`ura_stats_${id}`); return r ? Object.assign(createDefaultStats(), JSON.parse(r)) : createDefaultStats(); } catch(e) { return createDefaultStats(); } }
function savePerformanceStats(id) { try { localStorage.setItem(`ura_stats_${id}`, JSON.stringify(performanceStats[id])); } catch(e) {} }
function updateWinrateAndDrawrate(id) { const s = performanceStats[id]; s.total = s.tpHits + s.retraceResets + s.slHits; const wd = s.tpHits + s.slHits; s.winrate = wd > 0 ? parseFloat(((s.tpHits / wd) * 100).toFixed(1)) : 0.0; s.drawrate = s.total > 0 ? parseFloat(((s.retraceResets / s.total) * 100).toFixed(1)) : 0.0; }
function recordSignalResult(id, type) { const s = performanceStats[id]; if (type === 'tp') s.tpHits++; else if (type === 'retrace') s.retraceResets++; else if (type === 'sl') s.slHits++; updateWinrateAndDrawrate(id); savePerformanceStats(id); updatePerformanceUI(id); }

//  GLOBAL STATE VARS
// ================================================================
let state              = { xau: null, btc: null };
let wsStatus           = { xau: false, btc: false };
let activePairId       = localStorage.getItem('ura_active_pair') || 'xau';
let performanceStats   = {};
let pendingConfirmation= { xau: null, btc: null };
let tapCounters        = { xau: 0, btc: 0 };
let tapTimers          = { xau: null, btc: null };
let historyTapCounters = { xau: 0, btc: 0 };
let historyTapTimers   = { xau: null, btc: null };
const TAP_TIMEOUT      = 500;
let pendingPriceData   = { xau: null, btc: null };
let pendingSignalData  = { xau: false, btc: false };
let rafPending         = { xau: false, btc: false };
let pendingSaveData    = { xau: null, btc: null };
let pendingSaveTimer   = { xau: null, btc: null };
const SAVE_INTERVAL    = 1000;
let signalDebounceTimer= { xau: null, btc: null };
const SIGNAL_DEBOUNCE_MS = 12;

// candle engine
let marketData = {
    xau: { candles: [], currentCandle: null, candleStart: 0, atr: 0, ema: 0, prevEMA: 0, price: 0 },
    btc: { candles: [], currentCandle: null, candleStart: 0, atr: 0, ema: 0, prevEMA: 0, price: 0 }
};
const CANDLE_DUR = { xau: 5000, btc: 4000 };

function buildCandle(id, price) {
    const md = marketData[id]; const now = Date.now();
    if (!md.currentCandle || (now - md.candleStart) >= CANDLE_DUR[id]) {
        if (md.currentCandle) { md.currentCandle.closed = true; md.candles.push({ ...md.currentCandle }); if (md.candles.length > 200) md.candles.shift(); }
        md.currentCandle = { open: price, high: price, low: price, close: price, volume: 1, closed: false };
        md.candleStart = now;
    } else {
        md.currentCandle.high  = Math.max(md.currentCandle.high, price);
        md.currentCandle.low   = Math.min(md.currentCandle.low, price);
        md.currentCandle.close = price;
        md.currentCandle.volume++;
    }
    md.price = price;
    if (md.candles.length >= 5) {
        const c = md.candles.filter(x => x.closed);
        md.atr = calcATR(c) || md.atr;
        const cl = c.map(x => x.close);
        md.prevEMA = md.ema;
        md.ema = calcEMA(cl, Math.min(21, cl.length)) || md.ema;
    }
}
function getClosedCandles(id) { return marketData[id].candles.filter(c => c.closed); }

function seedCandles(id, base) {
    const step = id === 'xau' ? 0.5 : 55; const n = 65;
    marketData[id].candles = [];
    for (let i = 0; i < n; i++) {
        const noise = (Math.random() - 0.5) * step * 0.7;
        const open  = base + (i - n / 2) * step * 0.025 + noise;
        const close = open + (Math.random() - 0.48) * step * 0.18;
        const hi = Math.max(open, close) + Math.random() * step * 0.08;
        const lo = Math.min(open, close) - Math.random() * step * 0.08;
        marketData[id].candles.push({ open, high: hi, low: lo, close, volume: 40 + Math.floor(Math.random() * 90), closed: true });
    }
}

// ================================================================
//  EXECUTE LOCK SIGNAL — DENGAN REGIME ADAPTIVE SL
// ================================================================
function executeLockSignal(id, direction, livePrice, score) {
    const s = state[id];
    const entry = livePrice > 0 ? livePrice : (s.lastPrice || 0);
    if (entry <= 0) return;
    
    const atr = marketData[id].atr || (id === 'xau' ? 3.5 : 350);
    const closedCandles = getClosedCandles(id);
    
    // ========== MARKET REGIME DETECTION untuk Adaptive SL ==========
    let regimeMultiplier = 1.0;
    let regime = 'NORMAL';
    
    if (closedCandles.length >= 20) {
        const closes = closedCandles.map(c => c.close);
        const bb = calcBollinger(closes, 20, 2);
        const bbWidth = bb ? bb.width : 0;
        
        // Detect regime
        const w = closedCandles.slice(-20);
        let upMoves = 0, downMoves = 0;
        for (let i = 1; i < w.length; i++) {
            const up = w[i].high - w[i-1].high;
            const dn = w[i-1].low - w[i].low;
            if (up > dn && up > 0) upMoves++;
            else if (dn > up && dn > 0) downMoves++;
        }
        const directional = Math.abs(upMoves - downMoves) / (w.length - 1);
        
        if (directional >= 0.35 && bbWidth > (id === 'xau' ? 0.004 : 0.006)) {
            regime = upMoves > downMoves ? 'TRENDING_UP' : 'TRENDING_DOWN';
            regimeMultiplier = 1.3;  // Trending → SL lebih longgar (+30%)
        } else if (bbWidth < (id === 'xau' ? 0.003 : 0.004)) {
            regime = 'SQUEEZE';
            regimeMultiplier = 0.7;  // Squeeze → SL lebih ketat (-30%)
        } else {
            regime = 'RANGING';
            regimeMultiplier = 0.85; // Ranging → SL sedikit lebih ketat (-15%)
        }
    }
    // ================================================================
    
    const slD = Math.max(atr * regimeMultiplier, id === 'xau' ? 9 : 160);
    const tpD = slD * RR_RATIO;
    
    s.l3 = true; s.confirmed = true; s.confirmedAt = Date.now(); s.warmupUntil = Date.now() + 2500;
    s.type = direction; s.entry = entry; s.originPrice = entry;
    s.tempHigh = entry; s.tempLow = entry; s.retracePct = 0; s.confluenceScore = score;
    
    if (direction === 'buy') { 
        s.sl = entry - slD; 
        s.tp = entry + tpD; 
    } else { 
        s.sl = entry + slD; 
        s.tp = entry - tpD; 
    }
    
    throttledSaveState(id); pendingSignalData[id] = true; throttledUpdateUI(id);
    document.getElementById(`signal-bar-${id}`)?.classList.remove('confirm-wait');
    if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
    showToast(`${id.toUpperCase()} ${direction.toUpperCase()} @ ${entry.toFixed(2)} | ${regime} | SL:${slD.toFixed(2)}`);
}

// ================================================================
//  SIGNAL ENGINE — CORE
// ================================================================
function processSignal(id, price) {
    const s = state[id]; if (!s) return;
    if (Date.now() < (s.cooldownUntil || 0)) return;

    buildCandle(id, price);
    const closed = getClosedCandles(id);

    // OPEN TRADE — manage TP/SL/retrace
    if (s.confirmed && s.type !== 'none') {
        if (!s.tempHigh || s.tempHigh === 0) { s.tempHigh = s.entry; s.tempLow = s.entry; }
        if (price > s.tempHigh) s.tempHigh = price;
        if (price < s.tempLow)  s.tempLow  = price;
        updateTracker(id, price);
        const hitTP = (s.type === 'buy' && price >= s.tp)  || (s.type === 'sell' && price <= s.tp);
        const hitSL = (s.type === 'buy' && price <= s.sl) || (s.type === 'sell' && price >= s.sl);
        if (hitTP) { recordSignalResult(id, 'tp'); resetSignal(id); return; }
        if (hitSL) { state[id].cooldownUntil = Date.now() + COOLDOWN_AFTER_SL_MS; recordSignalResult(id, 'sl'); resetSignal(id); return; }
        const buf = id === 'xau' ? 8.5 : 130;
        if (s.type === 'buy'  && price <= (s.entry - buf) && Date.now() > (s.warmupUntil || 0)) { recordSignalResult(id, 'retrace'); resetSignal(id); return; }
        if (s.type === 'sell' && price >= (s.entry + buf) && Date.now() > (s.warmupUntil || 0)) { recordSignalResult(id, 'retrace'); resetSignal(id); return; }
        return;
    }

    if (pendingConfirmation[id]) { s.lastPrice = price; return; }
    if (closed.length < 28)     { s.lastPrice = price; return; }

    const cf = scoreConfluence(id, price, closed);
    updateEngineBadges(id, cf);
    updateConfluenceBar(id, cf.score);

    const thr0 = MIN_CONFLUENCE * 0.75;
    const thr1 = MIN_CONFLUENCE * 0.85;
    const thr2 = MIN_CONFLUENCE;

    if (!s.l1 && cf.direction && cf.score >= thr0) {
        s.l1 = true; s.type = cf.direction; s.originPrice = price; s.tempHigh = price; s.tempLow = price;
        pendingSignalData[id] = true; throttledUpdateUI(id); throttledSaveState(id); return;
    }
    if (s.l1 && !s.l2 && cf.direction === s.type && cf.score >= thr1) {
        s.l2 = true; pendingSignalData[id] = true; throttledUpdateUI(id); throttledSaveState(id); return;
    }
    if (s.l2 && !s.l3 && cf.direction === s.type && cf.score >= thr2) {
        s.l3 = true; pendingSignalData[id] = true; throttledUpdateUI(id); throttledSaveState(id);
        startConfirmationDelay(id, cf.direction, price, cf); return;
    }
    if (s.l1 && !s.confirmed && cf.direction && cf.direction !== s.type && cf.score > thr2 * 0.9) {
        resetSignal(id); return;
    }
    s.lastPrice = price; throttledSaveState(id);
}

function updateSignal(id, price) {
    if (signalDebounceTimer[id]) clearTimeout(signalDebounceTimer[id]);
    signalDebounceTimer[id] = setTimeout(() => { processSignal(id, price); signalDebounceTimer[id] = null; }, SIGNAL_DEBOUNCE_MS);
}

function startConfirmationDelay(id, direction, entryPrice, cf) {
    if (pendingConfirmation[id]) cancelPendingConfirmation(id);
    pendingConfirmation[id] = { direction, entryPrice, cf };
    const sb = document.getElementById(`signal-bar-${id}`);
    if (sb) sb.classList.add('confirm-wait');
    document.getElementById(`l3-${id}`)?.classList.add('confirm-pending');
    updateSignalUIOnly(id);
    pendingConfirmation[id].timerId = setTimeout(() => {
        if (!pendingConfirmation[id]) return;
        const closed = getClosedCandles(id);
        const lp = id === 'xau' ? xauCurrentPrice : (marketData[id].price || state[id].lastPrice || 0);
        const cf2 = closed.length >= 28 ? scoreConfluence(id, lp, closed) : { score: 0, direction: null };
        if (cf2.score >= MIN_CONFLUENCE && cf2.direction === direction) {
            executeLockSignal(id, direction, lp, cf2.score);
        } else {
            resetSignal(id);
            const st = document.getElementById(`signal-text-${id}`);
            if (st) { st.innerText = 'REJECT'; st.style.color = 'var(--danger)'; setTimeout(() => updateSignalUIOnly(id), 1500); }
        }
        pendingConfirmation[id] = null;
    }, CONFIRMATION_WAIT_MS);
}

function cancelPendingConfirmation(id) {
    if (!pendingConfirmation[id]) return;
    if (pendingConfirmation[id].timerId) clearTimeout(pendingConfirmation[id].timerId);
    pendingConfirmation[id] = null;
    document.getElementById(`signal-bar-${id}`)?.classList.remove('confirm-wait');
    updateSignalUIOnly(id);
}

function resetSignal(id) {
    const s = state[id]; if (!s || s.resetInProgress) return;
    s.resetInProgress = true;
    if (pendingConfirmation[id]) cancelPendingConfirmation(id);
    if (signalDebounceTimer[id]) { clearTimeout(signalDebounceTimer[id]); signalDebounceTimer[id] = null; }
    const kept = { lastPrice: s.lastPrice, cooldownUntil: s.cooldownUntil || 0 };
    Object.assign(s, createFreshState(), kept);
    pendingSignalData[id] = true; updateSignalUIOnly(id);
    const t = document.getElementById(`tracker-${id}`); if (t) t.innerText = '0';
    throttledSaveState(id); throttledUpdateUI(id);
    requestAnimationFrame(() => { s.resetInProgress = false; });
    setTimeout(() => { s.resetInProgress = false; }, 300);
}

// ================================================================
//  UI FUNCTIONS
// ================================================================
function throttledSaveState(id) {
    const s = state[id]; if (!s) return;
    pendingSaveData[id] = { ...s };
    if (pendingSaveTimer[id]) return;
    pendingSaveTimer[id] = setTimeout(() => {
        if (pendingSaveData[id]) { try { localStorage.setItem(`ura_state_${id}`, JSON.stringify(pendingSaveData[id])); } catch(e) {} pendingSaveData[id] = null; }
        pendingSaveTimer[id] = null;
    }, SAVE_INTERVAL);
}

function throttledUpdateUI(id) {
    if (!rafPending[id]) {
        rafPending[id] = true;
        requestAnimationFrame(() => {
            const p = pendingPriceData[id];
            if (p !== null) { updatePriceDisplayOnly(id, p); pendingPriceData[id] = null; }
            if (pendingSignalData[id]) { updateSignalUIOnly(id); pendingSignalData[id] = false; }
            rafPending[id] = false;
        });
    }
}

function updatePriceDisplayOnly(id, price) {
    const el = document.getElementById(`price-${id}`); if (!el) return;
    const prev = parseFloat(el.dataset.prev || '0');
    el.innerText = price.toFixed(2); el.dataset.prev = price;
    if (prev !== 0 && prev !== price) {
        el.style.color = price > prev ? 'var(--success)' : 'var(--danger)';
        clearTimeout(el._ct); el._ct = setTimeout(() => { el.style.color = ''; }, 280);
    }
    if (state[id]) updateTracker(id, price);
}

function updateTracker(id, price) {
    const s = state[id]; const t = document.getElementById(`tracker-${id}`);
    if (!s || !s.confirmed || s.type === 'none' || s.entry <= 0) { if (t) { t.innerText = '0'; t.style.color = ''; } return; }
    const dist = s.type === 'buy' ? price - s.entry : s.entry - price;
    if (t) { t.innerText = (Math.round(dist * 100) / 100).toFixed(2); t.style.color = dist >= 0 ? 'var(--emerald)' : 'var(--crimson)'; }
}

function updateSignalUIOnly(id) {
    const s = state[id]; if (!s) return;
    const setDot = (eid, on, type) => {
        const el = document.getElementById(eid); if (!el) return;
        if (!on) el.className = 'dot';
        else if (pendingConfirmation[id] && eid === `l3-${id}` && !s.confirmed) el.className = 'dot confirm-pending';
        else el.className = type === 'sell' ? 'dot active-down' : 'dot active';
    };
    setDot(`l1-${id}`, s.l1, s.type); setDot(`l2-${id}`, s.l2, s.type); setDot(`l3-${id}`, s.l3, s.type);
    const st = document.getElementById(`signal-text-${id}`);
    if (st) {
        if (!wsStatus[id] && id === 'btc') { st.innerText = 'NO FEED'; st.style.color = 'var(--danger)'; }
        else if (pendingConfirmation[id] && s.l3 && !s.confirmed) { st.innerText = 'CONFIRM...'; st.style.color = 'var(--gold)'; }
        else if (s.confirmed) { st.innerText = s.type.toUpperCase(); st.style.color = s.type === 'buy' ? 'var(--success)' : 'var(--danger)'; }
        else if (s.l3) { st.innerText = 'LOCKED'; st.style.color = 'var(--accent)'; }
        else if (s.l2) { st.innerText = 'STAGE 2'; st.style.color = 'var(--accent)'; }
        else if (s.l1) { st.innerText = 'STAGE 1'; st.style.color = 'var(--amber)'; }
        else { st.innerText = 'IDLE'; st.style.color = 'var(--text-dim)'; }
    }
    const eEl = document.getElementById(`entry-${id}`); if (eEl) eEl.innerText = s.confirmed ? s.entry.toFixed(2) : '--';
    const tEl = document.getElementById(`tp-${id}`);    if (tEl) tEl.innerText    = s.confirmed ? s.tp.toFixed(2)    : '--';
    const sEl = document.getElementById(`sl-${id}`);    if (sEl) sEl.innerText    = s.confirmed ? s.sl.toFixed(2)    : '--';
}

function updateEngineBadges(id, cf) {
    const badges = [
        {
    id: `eb-rsi-${id}`,
    val: cf.factors.rsi_sig || 'RSI',
    cls:
        cf.factors.rsi_sig === 'BULL' ? 'bull' :
        cf.factors.rsi_sig === 'BEAR' ? 'bear' :
        'neutral'
},
        { id: `eb-macd-${id}`,  val: cf.factors.macd_sig || 'MACD', cls: (cf.factors.macd_sig||'').startsWith('BULL') ? 'bull' : (cf.factors.macd_sig||'').startsWith('BEAR') ? 'bear' : 'neutral' },
        { id: `eb-ema-${id}`,   val: cf.factors.ema_cross|| 'EMA',  cls: cf.factors.ema_cross === 'BULL' ? 'bull' : cf.factors.ema_cross === 'BEAR' ? 'bear' : 'off' },
        { id: `eb-vwap-${id}`,  val: cf.factors.vwap     || 'VWAP', cls: cf.factors.vwap === 'ABOVE' ? 'bull' : cf.factors.vwap === 'BELOW' ? 'bear' : 'neutral' },
        { id: `eb-bb-${id}`,    val: cf.factors.bb       || 'BB',   cls: cf.factors.bb === 'AT_LOWER' ? 'bull' : cf.factors.bb === 'AT_UPPER' ? 'bear' : cf.factors.bb === 'SQUEEZE' ? 'active' : 'neutral' },
        { id: `eb-choch-${id}`, val: cf.factors.choch    || 'CHOCH',cls: cf.factors.choch === 'BULLISH' ? 'bull' : cf.factors.choch === 'BEARISH' ? 'bear' : 'off' },
        { id: `eb-vol-${id}`,   val: cf.factors.vol_spike ? 'SPIKE' : 'NORM', cls: cf.factors.vol_spike ? 'active' : 'off' },
    ];
    for (const b of badges) { const el = document.getElementById(b.id); if (el) { el.className = `ebadge ${b.cls}`; el.textContent = b.val; } }

    if (sc) {
        const s = Math.round(cf.score);
        sc.textContent = `CF:${s}`;
        sc.className = 'ebadge score';
        sc.style.color = s >= MIN_CONFLUENCE ? 'var(--emerald)' : s >= MIN_CONFLUENCE * 0.7 ? 'var(--gold)' : 'var(--text-dim)';
    }
}

function updateConfluenceBar(id, score) {
    const fill = document.getElementById(`cf-fill-${id}`); const txt = document.getElementById(`cf-txt-${id}`);
    if (!fill || !txt) return;
    const pct = Math.min(98, Math.max(0, score));

    txt.textContent = Math.round(pct);
    txt.style.color = pct >= MIN_CONFLUENCE ? 'var(--emerald)' : pct >= MIN_CONFLUENCE * 0.7 ? 'var(--gold)' : 'var(--text-dim)';
}

function updatePerformanceUI(id) {

function handleSignalBarTap(id) {

}
function handleHistoryPanelTap(id) {

    historyTapTimers[id] = setTimeout(() => { historyTapCounters[id] = 0; historyTapTimers[id] = null; }, TAP_TIMEOUT);
    if (historyTapCounters[id] === 3) { performanceStats[id] = createDefaultStats(); savePerformanceStats(id); updatePerformanceUI(id); historyTapCounters[id] = 0; if (historyTapTimers[id]) { clearTimeout(historyTapTimers[id]); historyTapTimers[id] = null; } if (navigator.vibrate) navigator.vibrate([30, 50, 30]); showToast('History reset ✓'); }
}

          <div style="display:flex;flex-direction:column;align-items:flex-end;">
            <span class="price" id="price-${id}">0.00</span>
            <span class="tracker-badge" id="tracker-${id}">0</span>
          </div>
        </div>
        <div class="signal-bar" id="signal-bar-${id}">
          <span>SIGNAL</span>
          <div class="signal-dot-group">
            <div class="dot" id="l1-${id}"></div>
            <div class="dot" id="l2-${id}"></div>
            <div class="dot" id="l3-${id}"></div>
          </div>
          <span id="signal-text-${id}">IDLE</span>
        </div>
        <div class="engine-badge-row">
          <span class="ebadge off" id="eb-rsi-${id}">RSI</span>
          <span class="ebadge off" id="eb-macd-${id}">MACD</span>
          <span class="ebadge off" id="eb-ema-${id}">EMA</span>
          <span class="ebadge off" id="eb-vwap-${id}">VWAP</span>
          <span class="ebadge off" id="eb-bb-${id}">BB</span>
          <span class="ebadge off" id="eb-choch-${id}">CHoCH</span>
          <span class="ebadge off" id="eb-vol-${id}">VOL</span>
        </div>
        <div class="confluence-panel">
          <span class="confluence-label">STRENGTH</span>
          <div class="confluence-bar-wrap"><div class="confluence-bar-fill" id="cf-fill-${id}" style="width:0%"></div></div>
          <span class="confluence-score-txt" id="cf-txt-${id}">0</span>
        </div>
        <div class="card-level-grid">
          <div class="level-item" onclick="window.copyValue('${id}','entry')">
            <span class="level-label">Entry</span><span class="level-value" id="entry-${id}">--</span>
          </div>
          <div class="level-item" onclick="window.copyValue('${id}','tp')">
            <span class="level-label">Target</span><span class="level-value" id="tp-${id}" style="color:var(--success)">--</span>
          </div>
          <div class="level-item" onclick="window.copyValue('${id}','sl')">
            <span class="level-label">Deep</span><span class="level-value" id="sl-${id}" style="color:var(--danger)">--</span>
          </div>
        </div>
        <div class="stats-grid" id="history-panel-${id}">
          <div class="stats-item"><span class="stats-label">TP HIT</span><span class="stats-value" id="stats-tp-${id}" style="color:var(--success)">0</span></div>
          <div class="stats-item"><span class="stats-label" style="color:var(--teal)">RETRACE</span><span class="stats-value retrace-value" id="stats-retrace-${id}">0</span></div>
          <div class="stats-item"><span class="stats-label">SL HIT</span><span class="stats-value" id="stats-sl-${id}" style="color:var(--danger)">0</span></div>
          <div class="stats-item"><span class="stats-label" style="color:var(--gold)">WINRATE</span><span class="stats-value winrate-value" id="stats-winrate-${id}">0%</span></div>
        </div>
      </div>
    </div>`;
}
window.copyValue = (id, type) => {
    const val = document.getElementById(`${type}-${id}`)?.innerText;
    if (val && val !== '--') { navigator.clipboard?.writeText(val).then(() => showToast(`${type.toUpperCase()} copied: ${val}`)).catch(() => showToast(val)); if (navigator.vibrate) navigator.vibrate(50); }
};

// ================================================================
//  WEBSOCKETS
// ================================================================
let xauWs = null, xauReconnectTimer = null, xauReconnectAttempts = 0;
let xauFetchRetryTimer = null, xauCurrentPrice = 0, xauLastHeartbeat = Date.now();
const XAU_REST = ['https://fapi.binance.com/fapi/v1/ticker/price?symbol=XAUUSDT','https://api.binance.com/api/v3/ticker/price?symbol=XAUUSDT'];
let xauRestIdx = 0;

function updateXAUDisplay(price) {
    if (!price || isNaN(price) || price <= 0) return;
    xauCurrentPrice = price; xauLastHeartbeat = Date.now();
    pendingPriceData.xau = price; pendingSignalData.xau = true;
    throttledUpdateUI('xau'); updateSignal('xau', price);
    wsStatus.xau = true; updateGlobalPulse();
    const el = document.getElementById('ws-status-xau'); if (el) { el.textContent = '● LIVE'; el.className = 'ws-status connected'; }
    updateFeedBadge('xau', 'ok');
}
async function xauFetchRestPrice() {
    for (let i = 0; i < XAU_REST.length; i++) {
        try {
            const ctrl = new AbortController(); const tid = setTimeout(() => ctrl.abort(), 7000);
            const resp = await fetch(XAU_REST[(xauRestIdx + i) % XAU_REST.length], { signal: ctrl.signal }); clearTimeout(tid);
            const data = await resp.json();
            if (data?.price) {
                const p = parseFloat(data.price) + XAU_OFFSET;
                if (p > 0 && p !== xauCurrentPrice) {
                    xauCurrentPrice = p; xauLastHeartbeat = Date.now();
                    pendingPriceData.xau = p; pendingSignalData.xau = true;
                    throttledUpdateUI('xau'); updateSignal('xau', p);
                    wsStatus.xau = true; updateGlobalPulse();
                    const el = document.getElementById('ws-status-xau'); if (el) { el.textContent = '● LIVE'; el.className = 'ws-status connected'; }
                    updateFeedBadge('xau', 'fallback'); xauRestIdx = (xauRestIdx + i) % XAU_REST.length; return true;
                }
            }
        } catch(e) {}
    }
    updateFeedBadge('xau', 'err'); return false;
}
function initXAUWebSocket() {
    if (xauWs) { try { xauWs.close(); } catch(e) {} xauWs = null; }
    if (xauReconnectTimer) clearTimeout(xauReconnectTimer);
    try {
        xauWs = new WebSocket('wss://fstream.binance.com/ws/xauusdt@trade');
        const wst = setTimeout(() => { if (xauWs && xauWs.readyState !== WebSocket.OPEN) { try { xauWs.close(); } catch(e) {} xauWs = null; updateFeedBadge('xau','fallback'); if (!xauFetchRetryTimer) xauFetchRetryTimer = setInterval(async () => { await xauFetchRestPrice(); }, 3000); } }, 5000);
        xauWs.onopen = () => { clearTimeout(wst); xauReconnectAttempts = 0; if (xauFetchRetryTimer) { clearInterval(xauFetchRetryTimer); xauFetchRetryTimer = null; } updateFeedBadge('xau','ok'); updateGlobalPulse(); };
        xauWs.onmessage = (e) => { try { const d = JSON.parse(e.data); if (d.p) { const p = parseFloat(d.p) + XAU_OFFSET; if (!isNaN(p) && p > 0 && p !== xauCurrentPrice) updateXAUDisplay(p); } } catch(err) {} };
        xauWs.onclose = () => { const delay = Math.min(1000 * Math.pow(1.5, xauReconnectAttempts), 15000); xauReconnectAttempts++; xauReconnectTimer = setTimeout(() => initXAUWebSocket(), delay); updateFeedBadge('xau','fallback'); if (!xauFetchRetryTimer) xauFetchRetryTimer = setInterval(async () => { await xauFetchRestPrice(); }, 3000); };
        xauWs.onerror = () => { updateFeedBadge('xau','fallback'); if (!xauFetchRetryTimer) xauFetchRetryTimer = setInterval(async () => { await xauFetchRestPrice(); }, 3000); };
    } catch(err) { updateFeedBadge('xau','fallback'); if (!xauFetchRetryTimer) xauFetchRetryTimer = setInterval(async () => { await xauFetchRestPrice(); }, 3000); }
}

let btcWs = null, btcReconnectTimer = null, btcReconnectAttempts = 0, btcFetchRetryTimer = null;
async function btcFetchRestPrice() {
    try {
        const resp = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
        const data = await resp.json();
        if (data?.price) { const p = parseFloat(data.price); if (p > 0 && !isNaN(p)) { pendingPriceData.btc = p; pendingSignalData.btc = true; throttledUpdateUI('btc'); updateSignal('btc', p); wsStatus.btc = true; updateGlobalPulse(); updateFeedBadge('btc','fallback'); return true; } }
    } catch(e) {}
    updateFeedBadge('btc','err'); return false;
}
function initBTCWebSocket() {
    if (btcWs) { try { btcWs.close(); } catch(e) {} btcWs = null; }
    if (btcReconnectTimer) clearTimeout(btcReconnectTimer);
    try {
        btcWs = new WebSocket(BTC_WS_URL);
        const wst = setTimeout(() => { if (btcWs && btcWs.readyState !== WebSocket.OPEN) { try { btcWs.close(); } catch(e) {} btcWs = null; updateFeedBadge('btc','fallback'); wsStatus.btc = false; if (!btcFetchRetryTimer) btcFetchRetryTimer = setInterval(async () => { await btcFetchRestPrice(); }, 3000); } }, 6000);
        btcWs.onopen = () => { clearTimeout(wst); btcReconnectAttempts = 0; wsStatus.btc = true; if (btcFetchRetryTimer) { clearInterval(btcFetchRetryTimer); btcFetchRetryTimer = null; } const el = document.getElementById('ws-status-btc'); if (el) { el.textContent = '● LIVE'; el.className = 'ws-status connected'; } updateFeedBadge('btc','ok'); updateGlobalPulse(); updateSignalUIOnly('btc'); };
        btcWs.onmessage = (e) => { try { const d = JSON.parse(e.data); const p = parseFloat(d.p); if (p && p > 0 && !isNaN(p)) { pendingPriceData.btc = p; pendingSignalData.btc = true; throttledUpdateUI('btc'); updateSignal('btc', p); } } catch(err) {} };
        btcWs.onclose = () => { wsStatus.btc = false; updateFeedBadge('btc','fallback'); updateGlobalPulse(); updateSignalUIOnly('btc'); const delay = Math.min(1000 * Math.pow(2, btcReconnectAttempts), 30000); btcReconnectAttempts++; btcReconnectTimer = setTimeout(() => initBTCWebSocket(), delay); if (!btcFetchRetryTimer) btcFetchRetryTimer = setInterval(async () => { await btcFetchRestPrice(); }, 3000); };
        btcWs.onerror = () => { wsStatus.btc = false; updateFeedBadge('btc','fallback'); updateGlobalPulse(); if (!btcFetchRetryTimer) btcFetchRetryTimer = setInterval(async () => { await btcFetchRestPrice(); }, 3000); };
    } catch(err) { wsStatus.btc = false; updateFeedBadge('btc','err'); setTimeout(() => initBTCWebSocket(), 5000); }
}

function switchPair() {
    activePairId = activePairId === 'xau' ? 'btc' : 'xau';
    try { localStorage.setItem('ura_active_pair', activePairId); } catch(e) {}
    const lb = document.getElementById('switchLabel'); if (lb) lb.innerText = activePairId === 'xau' ? 'XAUUSD' : 'BTCUSD';
    document.querySelectorAll('.pair-card').forEach(c => c.classList.remove('active'));
    document.getElementById(`card-${activePairId}`)?.classList.add('active');
    if (navigator.vibrate) navigator.vibrate(20);
}

// ================================================================
//  INIT
// ================================================================
function init() {
    checkAndMigrateSchema();
    state.xau = loadState('xau'); state.btc = loadState('btc');
    performanceStats.xau = loadPerformanceStats('xau'); performanceStats.btc = loadPerformanceStats('btc');
    updateWinrateAndDrawrate('xau'); updateWinrateAndDrawrate('btc');

    document.getElementById('terminals').innerHTML = buildCardHTML('xau','XAUUSD') + buildCardHTML('btc','BTCUSD');

    const bindTap = (el, handler) => {
        if (!el) return; let lastTap = 0;
        const h = (e) => { e.preventDefault(); const now = Date.now(); if (now - lastTap < 80) return; lastTap = now; handler(); };
        el.addEventListener('touchstart', h, { passive: false }); el.addEventListener('click', h);
    };
    bindTap(document.getElementById('signal-bar-xau'),    () => handleSignalBarTap('xau'));
    bindTap(document.getElementById('signal-bar-btc'),    () => handleSignalBarTap('btc'));
    bindTap(document.getElementById('history-panel-xau'), () => handleHistoryPanelTap('xau'));
    bindTap(document.getElementById('history-panel-btc'), () => handleHistoryPanelTap('btc'));

    const btn = document.getElementById('switchPairBtn');
    if (btn) {
        const nb = btn.cloneNode(true); btn.parentNode.replaceChild(nb, btn);
        const ds = function(e) { e.preventDefault(); e.stopPropagation(); nb.classList.add('btn-highlight'); setTimeout(() => nb.classList.remove('btn-highlight'), 150); switchPair(); };
        nb.addEventListener('click', ds); nb.addEventListener('touchstart', ds, { passive: false });
    }

    updateSignalUIOnly('xau'); updateSignalUIOnly('btc');
    updatePerformanceUI('xau'); updatePerformanceUI('btc');

    seedCandles('xau', 3300); seedCandles('btc', 105000);

    let seedFixed = { xau: false, btc: false };
    const fixSeed = (id, price) => {
        if (seedFixed[id]) return;
        const first = marketData[id].candles[0]?.close || 0;
        if (first > 0 && Math.abs(first - price) / price > 0.07) seedCandles(id, price);
        seedFixed[id] = true;
    };

    initXAUWebSocket(); xauFetchRestPrice();
    initBTCWebSocket(); btcFetchRestPrice();
    updateGlobalPulse();

    setInterval(() => {
        if (!seedFixed.xau && xauCurrentPrice > 0) fixSeed('xau', xauCurrentPrice);
        if (!seedFixed.btc && marketData.btc.price > 0) fixSeed('btc', marketData.btc.price);
        if (Date.now() - xauLastHeartbeat > 8000) xauFetchRestPrice();
        updateGlobalPulse();
    }, 3000);

    setInterval(() => {
        if (!xauWs || xauWs.readyState !== WebSocket.OPEN) xauFetchRestPrice();
        if (!btcWs || btcWs.readyState !== WebSocket.OPEN) btcFetchRestPrice();
    }, 2000);

    document.addEventListener('visibilitychange', () => {
        if (!document.hidden) { xauFetchRestPrice(); btcFetchRestPrice(); updateSignalUIOnly('xau'); updateSignalUIOnly('btc'); updateGlobalPulse(); }
    });
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();

})();
</script>

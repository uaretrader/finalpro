footer { font-family: 'IBM Plex Mono', monospace; font-size: 0.36rem; color: var(--text-dim); text-align: center; padding: 14px 0 6px; letter-spacing: 1.5px; text-transform: uppercase; border-top: 1px solid var(--edge); margin-top: 4px; line-height: 1.9; }

<script>
(function () {
'use strict';

// ================================================================
//  URADVISOR — BLUE CHART ENGINE v11.0
//  Method  : Blue Chart (BC) — Smart Money Concepts
//
//  MACRO (60s) — Institutional Bias Layer:
//    BC TREND  → EMA 21/50/200 alignment + slope filter
//    BC STRUCT → BOS / CHoCH market structure detection
//    BC ZONE   → Supply & Demand zone proximity scoring
//    BC FLOW   → Volume-weighted order flow delta
//
//  MICRO (15s) — Precision Entry Layer:
//    BC MOM    → RSI + MACD momentum at key level
//    BC LIQUID → Liquidity sweep (equal H/L taken & reversed)
//    BC DIVERG → RSI divergence at swing extremes
//
//  BC SCORE  → Weighted confluence 0–100
//  Entry     → After liquidity sweep into SD zone,
//               confirm with macro HTF bias alignment
// ================================================================

const LS_SCHEMA_VERSION    = 7;
const BTC_WS_URL           = 'wss://stream.binance.com:9443/ws/btcusdt@trade';
const XAU_WS_URL           = 'wss://fstream.binance.com/ws/xauusdt@trade';
const CONFIRMATION_WAIT_MS = 4000;

// ================================================================
//  LIVE PRICE OFFSET
//  Tambahkan nilai offset (positif atau negatif) untuk menyesuaikan
//  harga live sebelum diteruskan ke display dan signal engine.
//  Contoh: PRICE_OFFSET_XAU =  2.5  → harga XAU ditambah  2.5
//          PRICE_OFFSET_XAU = -1.0  → harga XAU dikurangi 1.0
//          PRICE_OFFSET_BTC =  100  → harga BTC ditambah 100
//          Set ke 0 untuk tidak menggunakan offset (default).
// ================================================================
const PRICE_OFFSET_XAU = -2.2;   // offset XAUUSD (satuan: USD per troy oz)
const PRICE_OFFSET_BTC = -60;   // offset BTCUSD (satuan: USD per BTC)
const COOLDOWN_AFTER_SL_MS = 20000;
const RR_RATIO             = 1.4;

// ── Blue Chart Timeframe Durations ────────────────────────────────
const MACRO_DUR = { xau: 60000, btc: 60000 };   // 60s HTF
const MICRO_DUR = { xau: 15000, btc: 15000 };   // 15s LTF

// ── Candle minimums ───────────────────────────────────────────────
const MACRO_MIN = 35;   // ~35 min HTF context
const MICRO_MIN = 10;   // ~2.5 min LTF context

// ── Blue Chart Score thresholds ───────────────────────────────────
const BC_SCORE_MIN = 70;   // minimum BC SCORE for valid bias
const ADX_MIN      = 18;   // minimum ADX (trend gate)

// ================================================================
//  SCHEMA MIGRATION
// ================================================================
function checkAndMigrateSchema() {
    const v = parseInt(localStorage.getItem('ura_schema_ver') || '1', 10);
    if (v < LS_SCHEMA_VERSION) {
        ['xau','btc'].forEach(id => {
            localStorage.removeItem(`ura_state_${id}`);
            localStorage.removeItem(`ura_stats_${id}`);
        });
        localStorage.setItem('ura_schema_ver', String(LS_SCHEMA_VERSION));
    }
}

// ── Toast ────────────────────────────────────────────────────────
let _tt = null;
function showToast(msg) {
    const el = document.getElementById('toast');
    if (!el) return;
    el.textContent = msg;
    el.classList.add('show');
    if (_tt) clearTimeout(_tt);
    _tt = setTimeout(() => el.classList.remove('show'), 2600);
}

// ================================================================
//  INDICATOR LIBRARY
// ================================================================

function calcEMA(arr, period) {
    if (!arr || arr.length < period) return null;
    const k = 2 / (period + 1);
    let e = arr.slice(0, period).reduce((a, b) => a + b, 0) / period;
    for (let i = period; i < arr.length; i++) e = arr[i] * k + e * (1 - k);
    return e;
}

function calcSMA(arr, period) {
    if (!arr || arr.length < period) return null;
    return arr.slice(-period).reduce((a, b) => a + b, 0) / period;
}

function calcRSI(closes, period) {
    period = period || 14;
    if (!closes || closes.length < period + 1) return null;
    const r = closes.slice(-(period + 1));
    let g = 0, l = 0;
    for (let i = 1; i < r.length; i++) {
        const d = r[i] - r[i - 1];
        if (d > 0) g += d; else l -= d;
    }
    const ag = g / period, al = l / period;
    if (al === 0) return 100;
    return 100 - 100 / (1 + ag / al);
}

function calcMACD(closes, fast, slow, sig) {
    fast = fast || 12; slow = slow || 26; sig = sig || 9;
    if (!closes || closes.length < slow + sig + 2) return null;
    const ef = calcEMA(closes, fast);
    const es = calcEMA(closes, slow);
    if (ef === null || es === null) return null;
    const macdLine = ef - es;
    const hist = [];
    const stride = Math.max(1, Math.floor(closes.length / 60));
    for (let i = slow; i < closes.length; i += stride) {
        const a = calcEMA(closes.slice(0, i + 1), fast);
        const b = calcEMA(closes.slice(0, i + 1), slow);
        if (a !== null && b !== null) hist.push(a - b);
    }
    if (hist.length < sig) return { line: macdLine, signal: 0, hist: macdLine };
    const sigLine = calcEMA(hist, Math.min(sig, hist.length));
    return { line: macdLine, signal: sigLine, hist: macdLine - (sigLine || 0) };
}

function calcATR(candles, period) {
    period = period || 14;
    if (!candles || candles.length < period + 1) return null;
    const trs = [];
    for (let i = 1; i < candles.length; i++) {
        trs.push(Math.max(
            candles[i].high - candles[i].low,
            Math.abs(candles[i].high - candles[i - 1].close),
            Math.abs(candles[i].low  - candles[i - 1].close)
        ));
    }
    return trs.slice(-period).reduce((a, b) => a + b, 0) / period;
}

function calcADX(candles, period) {
    period = period || 14;
    if (!candles || candles.length < period * 2 + 2) return null;
    const c = candles.slice(-(period * 2 + 2));
    const dmP = [], dmM = [], tr = [];
    for (let i = 1; i < c.length; i++) {
        const up = c[i].high  - c[i-1].high;
        const dn = c[i-1].low - c[i].low;
        dmP.push(up > dn && up > 0 ? up : 0);
        dmM.push(dn > up && dn > 0 ? dn : 0);
        tr.push(Math.max(
            c[i].high - c[i].low,
            Math.abs(c[i].high - c[i-1].close),
            Math.abs(c[i].low  - c[i-1].close)
        ));
    }
    let atr14 = tr.slice(0, period).reduce((a,b) => a+b, 0);
    let pdm14  = dmP.slice(0, period).reduce((a,b) => a+b, 0);
    let mdm14  = dmM.slice(0, period).reduce((a,b) => a+b, 0);
    const dxArr = [];
    const push_dx = (a, p, m) => {
        const pdi = a > 0 ? (p/a)*100 : 0;
        const mdi = a > 0 ? (m/a)*100 : 0;
        dxArr.push((pdi+mdi) > 0 ? Math.abs(pdi-mdi)/(pdi+mdi)*100 : 0);
    };
    push_dx(atr14, pdm14, mdm14);
    for (let i = period; i < tr.length; i++) {
        atr14 = atr14 - atr14/period + tr[i];
        pdm14  = pdm14  - pdm14/period  + dmP[i];
        mdm14  = mdm14  - mdm14/period  + dmM[i];
        push_dx(atr14, pdm14, mdm14);
    }
    if (dxArr.length < period) return null;
    return dxArr.slice(-period).reduce((a,b) => a+b, 0) / period;
}

// ================================================================
//  BLUE CHART INDICATOR 1: BC TREND
//  EMA 21/50/200 alignment + slope analysis
//  Bullish: 21 > 50 > 200 AND 21 sloping up
//  Bearish: 21 < 50 < 200 AND 21 sloping down
// ================================================================
function calcBCTrend(closes, atr) {
    const n = closes.length;
    const ema21  = calcEMA(closes, Math.min(21, n - 1));
    const ema50  = calcEMA(closes, Math.min(50, n - 1));
    const ema200 = n >= 200 ? calcEMA(closes, 200) : calcEMA(closes, Math.min(n - 1, 100));
    if (!ema21 || !ema50 || !ema200) return { trend: 'NEUTRAL', score: 0, ema21, ema50, ema200 };

    // Slope of EMA21 over last 5 bars
    const ema21Prev = calcEMA(closes.slice(0, -5), Math.min(21, n - 6));
    const slope21 = ema21Prev ? (ema21 - ema21Prev) / (atr || 1) : 0;

    const strongBull = ema21 > ema50 && ema50 > ema200 && slope21 > 0;
    const weakBull   = ema21 > ema50 && ema50 > ema200 && slope21 <= 0;
    const crossBull  = ema21 > ema50 && ema21 < ema200;
    const strongBear = ema21 < ema50 && ema50 < ema200 && slope21 < 0;
    const weakBear   = ema21 < ema50 && ema50 < ema200 && slope21 >= 0;
    const crossBear  = ema21 < ema50 && ema21 > ema200;

    let trend = 'NEUTRAL', score = 0;
    if (strongBull)      { trend = 'STRONG_BULL'; score = 30; }
    else if (weakBull)   { trend = 'BULL';         score = 22; }
    else if (crossBull)  { trend = 'BULL_X';       score = 14; }
    else if (strongBear) { trend = 'STRONG_BEAR';  score = -30; }
    else if (weakBear)   { trend = 'BEAR';          score = -22; }
    else if (crossBear)  { trend = 'BEAR_X';        score = -14; }

    return { trend, score, ema21, ema50, ema200, slope21 };
}

// ================================================================
//  BLUE CHART INDICATOR 2: BC STRUCT
//  Break of Structure (BOS) and Change of Character (CHoCH)
//  Identifies last 3 significant swing highs/lows
//  BOS BULL: price closes above last swing high → bullish continuation
//  CHoCH:    in downtrend, price closes above last lower high → reversal
// ================================================================
function calcBCStruct(candles) {
    if (!candles || candles.length < 20) return { struct: 'UNCLEAR', bos: null, choch: false, swingHighs: [], swingLows: [] };

    const rc = candles.slice(-30);
    const swingHighs = [], swingLows = [];

    // Detect swing points (3-bar pivot)
    for (let i = 2; i < rc.length - 1; i++) {
        if (rc[i].high > rc[i-1].high && rc[i].high > rc[i-2].high &&
            rc[i].high > rc[i+1].high) {
            swingHighs.push({ idx: i, price: rc[i].high });
        }
        if (rc[i].low < rc[i-1].low && rc[i].low < rc[i-2].low &&
            rc[i].low < rc[i+1].low) {
            swingLows.push({ idx: i, price: rc[i].low });
        }
    }

    const lastClose = rc[rc.length - 1].close;
    const lastHigh  = rc[rc.length - 1].high;
    const lastLow   = rc[rc.length - 1].low;
    let struct = 'UNCLEAR', bos = null, choch = false, score = 0;

    if (swingHighs.length >= 2 && swingLows.length >= 2) {
        const sh1 = swingHighs[swingHighs.length - 1];
        const sh2 = swingHighs[swingHighs.length - 2];
        const sl1 = swingLows[swingLows.length - 1];
        const sl2 = swingLows[swingLows.length - 2];

        const higherHighs = sh1.price > sh2.price;
        const higherLows  = sl1.price > sl2.price;
        const lowerHighs  = sh1.price < sh2.price;
        const lowerLows   = sl1.price < sl2.price;

        // BOS detection: price breaks last swing high/low
        if (lastClose > sh1.price) {
            struct = 'BOS_BULL'; bos = 'BULL'; score = 20;
        } else if (lastClose < sl1.price) {
            struct = 'BOS_BEAR'; bos = 'BEAR'; score = -20;
        } else if (higherHighs && higherLows) {
            struct = 'BULLISH'; score = 15;
        } else if (lowerHighs && lowerLows) {
            struct = 'BEARISH'; score = -15;
        }

        // CHoCH: reversal signal
        if (lowerHighs && lowerLows && lastClose > sh1.price) {
            struct = 'CHOCH_BULL'; choch = true; bos = 'BULL'; score = 20;
        } else if (higherHighs && higherLows && lastClose < sl1.price) {
            struct = 'CHOCH_BEAR'; choch = true; bos = 'BEAR'; score = -20;
        }
    }

    return { struct, bos, choch, swingHighs, swingLows, score, lastClose };
}

// ================================================================
//  BLUE CHART INDICATOR 3: BC ZONE
//  Supply & Demand zone detection
//  Demand zone: area below current price where strong bullish candles originated
//  Supply zone: area above current price where strong bearish candles originated
// ================================================================
function calcBCZone(candles, price, atr) {
    if (!candles || candles.length < 15) return { zone: 'NONE', proximity: 0, score: 0 };
    const rc = candles.slice(-25);
    const tol = atr * 0.5;

    // Find impulsive candles (large body, > 1.5x average body)
    const bodies = rc.map(c => Math.abs(c.close - c.open));
    const avgBody = bodies.reduce((a,b) => a+b, 0) / bodies.length;

    const demandZones = [], supplyZones = [];

    for (let i = 0; i < rc.length - 1; i++) {
        const body = Math.abs(rc[i].close - rc[i].open);
        if (body < avgBody * 1.4) continue;

        if (rc[i].close > rc[i].open) {
            // Bullish impulse → demand zone at base of candle
            demandZones.push({ top: rc[i].open, bot: rc[i].low });
        } else {
            // Bearish impulse → supply zone at base of candle
            supplyZones.push({ bot: rc[i].open, top: rc[i].high });
        }
    }

    // Check if price is in/near a demand zone (for buy)
    let nearDemand = false, demandDist = Infinity;
    for (const dz of demandZones) {
        if (price >= dz.bot - tol && price <= dz.top + tol) {
            nearDemand = true;
            demandDist = 0;
        } else {
            const d = Math.min(Math.abs(price - dz.top), Math.abs(price - dz.bot));
            if (d < demandDist) demandDist = d;
        }
    }

    // Check if price is in/near a supply zone (for sell)
    let nearSupply = false, supplyDist = Infinity;
    for (const sz of supplyZones) {
        if (price >= sz.bot - tol && price <= sz.top + tol) {
            nearSupply = true;
            supplyDist = 0;
        } else {
            const d = Math.min(Math.abs(price - sz.bot), Math.abs(price - sz.top));
            if (d < supplyDist) supplyDist = d;
        }
    }

    let zone = 'NONE', score = 0, proximity = 0;
    if (nearDemand) { zone = 'DEMAND'; score = 15; proximity = 100; }
    else if (nearSupply) { zone = 'SUPPLY'; score = -15; proximity = 100; }
    else if (demandDist < atr * 1.5) { zone = 'NEAR_DEMAND'; score = 8; proximity = Math.round((1 - demandDist/(atr*1.5))*100); }
    else if (supplyDist < atr * 1.5) { zone = 'NEAR_SUPPLY'; score = -8; proximity = Math.round((1 - supplyDist/(atr*1.5))*100); }

    return { zone, score, proximity, demandZones, supplyZones };
}

// ================================================================
//  BLUE CHART INDICATOR 4: BC FLOW
//  Volume-weighted order flow (buying vs selling pressure)
//  Uses candle anatomy to estimate delta
// ================================================================
function calcBCFlow(candles, lookback) {
    lookback = lookback || 10;
    if (!candles || candles.length < lookback) return { flow: 'NEUTRAL', delta: 0, score: 0 };
    const rc = candles.slice(-lookback);

    let buyVol = 0, sellVol = 0;
    for (const c of rc) {
        const range = c.high - c.low;
        if (range === 0) continue;
        const upperWick = c.high - Math.max(c.open, c.close);
        const lowerWick = Math.min(c.open, c.close) - c.low;
        const bodyUp = c.close > c.open ? c.close - c.open : 0;
        const bodyDn = c.close < c.open ? c.open - c.close : 0;

        // Estimate buy/sell volume from candle anatomy
        const v = c.volume || 1;
        buyVol  += v * (lowerWick + bodyUp) / range;
        sellVol += v * (upperWick + bodyDn) / range;
    }

    const total = buyVol + sellVol;
    const delta = total > 0 ? (buyVol - sellVol) / total : 0; // -1 to +1

    let flow = 'NEUTRAL', score = 0;
    if (delta > 0.20)       { flow = 'BUY_PRESSURE';   score = 12; }
    else if (delta > 0.08)  { flow = 'MILD_BUY';       score = 7;  }
    else if (delta < -0.20) { flow = 'SELL_PRESSURE';  score = -12; }
    else if (delta < -0.08) { flow = 'MILD_SELL';      score = -7; }

    return { flow, delta: parseFloat(delta.toFixed(3)), score };
}

// ================================================================
//  BLUE CHART INDICATOR 5: BC LIQUID (Liquidity Sweep)
//  Detect when price sweeps equal highs/lows (liquidity grab)
//  and immediately reverses — highest quality entry signal
// ================================================================
function calcBCLiquid(candles, atr) {
    if (!candles || candles.length < 8) return { sweep: 'NONE', quality: 0 };
    const rc = candles.slice(-8);
    const tol = atr * 0.25; // tolerance for "equal" highs/lows

    // Find equal highs (within tolerance) in first 6 bars
    const refBars = rc.slice(0, 6);
    const maxHigh = Math.max(...refBars.map(c => c.high));
    const minLow  = Math.min(...refBars.map(c => c.low));

    // Count how many bars touched near the level
    const eqHighCount = refBars.filter(c => Math.abs(c.high - maxHigh) < tol).length;
    const eqLowCount  = refBars.filter(c => Math.abs(c.low  - minLow)  < tol).length;

    const last2 = rc.slice(-2);
    const lastBar = rc[rc.length - 1];

    // Bullish sweep: price swept below equal lows and closed back above
    if (eqLowCount >= 2) {
        const swept = last2.some(c => c.low < minLow - tol * 0.3);
        const recovered = lastBar.close > minLow;
        const pinBar = (Math.min(lastBar.open, lastBar.close) - lastBar.low) >
                       Math.abs(lastBar.close - lastBar.open) * 1.2;
        if (swept && recovered) {
            return { sweep: 'BULL_SWEEP', quality: pinBar ? 90 : 70, level: minLow };
        }
    }

    // Bearish sweep: price swept above equal highs and closed back below
    if (eqHighCount >= 2) {
        const swept = last2.some(c => c.high > maxHigh + tol * 0.3);
        const recovered = lastBar.close < maxHigh;
        const pinBar = (lastBar.high - Math.max(lastBar.open, lastBar.close)) >
                       Math.abs(lastBar.close - lastBar.open) * 1.2;
        if (swept && recovered) {
            return { sweep: 'BEAR_SWEEP', quality: pinBar ? 90 : 70, level: maxHigh };
        }
    }

    return { sweep: 'NONE', quality: 0 };
}

// ================================================================
//  BLUE CHART INDICATOR 6: BC DIVERG (RSI Divergence)
//  Compare RSI slope vs price slope over swing points
//  Bullish divergence: price LL but RSI HL → buy signal
//  Bearish divergence: price HH but RSI LH → sell signal
// ================================================================
function calcBCDiverg(candles, closes, rsi) {
    if (!candles || candles.length < 14 || rsi === null) return { diverg: 'NONE', strength: 0 };

    const n = closes.length;
    if (n < 14) return { diverg: 'NONE', strength: 0 };

    // RSI series for last 10 bars
    const rsiSeries = [];
    for (let i = n - 10; i <= n - 1; i++) {
        const r = calcRSI(closes.slice(0, i + 1), Math.min(9, i));
        if (r !== null) rsiSeries.push({ price: closes[i], rsi: r, idx: i });
    }
    if (rsiSeries.length < 6) return { diverg: 'NONE', strength: 0 };

    const mid = Math.floor(rsiSeries.length / 2);
    const first = rsiSeries.slice(0, mid);
    const second = rsiSeries.slice(mid);

    const firstLow   = Math.min(...first.map(r => r.price));
    const secondLow  = Math.min(...second.map(r => r.price));
    const firstRSIAtLow  = first.find(r => r.price === firstLow)?.rsi  || 50;
    const secondRSIAtLow = second.find(r => r.price === secondLow)?.rsi || 50;

    const firstHigh  = Math.max(...first.map(r => r.price));
    const secondHigh = Math.max(...second.map(r => r.price));
    const firstRSIAtHigh  = first.find(r => r.price === firstHigh)?.rsi  || 50;
    const secondRSIAtHigh = second.find(r => r.price === secondHigh)?.rsi || 50;

    let diverg = 'NONE', strength = 0;

    // Bullish divergence: price made lower low but RSI made higher low
    if (secondLow < firstLow && secondRSIAtLow > firstRSIAtLow && rsi < 45) {
        const rsiGain = secondRSIAtLow - firstRSIAtLow;
        strength = Math.min(100, rsiGain * 3);
        diverg = 'BULL_DIV';
    }
    // Bearish divergence: price made higher high but RSI made lower high
    else if (secondHigh > firstHigh && secondRSIAtHigh < firstRSIAtHigh && rsi > 55) {
        const rsiDrop = firstRSIAtHigh - secondRSIAtHigh;
        strength = Math.min(100, rsiDrop * 3);
        diverg = 'BEAR_DIV';
    }

    return { diverg, strength };
}

// ================================================================
//  BC MACRO BIAS SCORER
//  Combines: BC TREND + BC STRUCT + BC ZONE + BC FLOW + MACD + ADX
//  Output: { bias, score, factors, valid }
// ================================================================
function scoreMacroBias(id, price, macroCandles) {
    const f = {};
    if (macroCandles.length < MACRO_MIN) return { bias: 'NEUTRAL', score: 0, factors: f, valid: false };

    const closes = macroCandles.map(c => c.close);
    const atr    = calcATR(macroCandles) || (id === 'xau' ? 3.0 : 300);
    const adx    = calcADX(macroCandles, 14);
    const macd   = calcMACD(closes);

    f.atr = atr;
    f.adx = adx ? adx.toFixed(1) : null;
    f.adx_class = adx
        ? (adx >= 35 ? 'STRONG' : adx >= 25 ? 'TREND' : adx >= 16 ? 'MILD' : 'CHOPPY')
        : 'UNKNOWN';

    // ADX gate: too choppy → no valid bias
    if (adx !== null && adx < ADX_MIN) {
        return { bias: 'NEUTRAL', score: 0, factors: f, valid: false, adx, atr };
    }

    const adxMult = adx !== null
        ? (adx >= 35 ? 1.18 : adx >= 25 ? 1.08 : adx >= 16 ? 0.93 : 0.75)
        : 0.85;

    // ── 1. BC TREND (weight: max 30 points) ──────────────────────
    const bcTrend = calcBCTrend(closes, atr);
    f.bc_trend = bcTrend.trend;
    f.ema21    = bcTrend.ema21;
    f.ema50    = bcTrend.ema50;

    // ── 2. BC STRUCT (weight: max 20 points) ─────────────────────
    const bcStruct = calcBCStruct(macroCandles);
    f.bc_struct = bcStruct.struct;
    f.bc_bos    = bcStruct.bos;

    // ── 3. BC ZONE (weight: max 15 points) ───────────────────────
    const bcZone = calcBCZone(macroCandles, price, atr);
    f.bc_zone = bcZone.zone;

    // ── 4. BC FLOW (weight: max 12 points) ───────────────────────
    const bcFlow = calcBCFlow(macroCandles, 12);
    f.bc_flow = bcFlow.flow;

    // ── 5. MACD (weight: max 15 points) ──────────────────────────
    let macdScore = 0, macdSig = 'FLAT';
    if (macd !== null) {
        f.macd_hist = macd.hist.toFixed(5);
        if (macd.hist > 0 && macd.line > 0)      { macdScore = 15; macdSig = 'BULL'; }
        else if (macd.hist > 0)                  { macdScore = 10; macdSig = 'BULL_X'; }
        else if (macd.hist < 0 && macd.line < 0) { macdScore = -15; macdSig = 'BEAR'; }
        else if (macd.hist < 0)                  { macdScore = -10; macdSig = 'BEAR_X'; }
        f.macd_sig = macdSig;
    }

    // ── Score Assembly ────────────────────────────────────────────
    // All scores are signed: positive = bull, negative = bear
    const rawBull =
        Math.max(0,  bcTrend.score) +
        Math.max(0,  bcStruct.score) +
        Math.max(0,  bcZone.score) +
        Math.max(0,  bcFlow.score) +
        Math.max(0,  macdScore);

    const rawBear =
        Math.max(0, -bcTrend.score) +
        Math.max(0, -bcStruct.score) +
        Math.max(0, -bcZone.score) +
        Math.max(0, -bcFlow.score) +
        Math.max(0, -macdScore);

    // Apply ADX multiplier
    let bull = Math.round(rawBull * adxMult);
    let bear = Math.round(rawBear * adxMult);

    // Conflict penalty: if trend and structure disagree
    const trendBull = bcTrend.score > 0;
    const trendBear = bcTrend.score < 0;
    const structBull = bcStruct.score > 0;
    const structBear = bcStruct.score < 0;
    if ((trendBull && structBear) || (trendBear && structBull)) {
        bull = Math.round(bull * 0.65);
        bear = Math.round(bear * 0.65);
        f.conflict = 'TREND_STRUCT';
    }

    // ── Bias determination ────────────────────────────────────────
    const MAX  = 72; // max possible raw score (30+20+15+12+15 = 92, normalized)
    const diff = Math.abs(bull - bear);
    let bias = 'NEUTRAL', score = 0;

    if (bull > bear && diff >= 10) {
        bias  = 'BULL';
        score = Math.min(100, Math.round((bull / MAX) * 100));
    } else if (bear > bull && diff >= 10) {
        bias  = 'BEAR';
        score = Math.min(100, Math.round((bear / MAX) * 100));
    } else {
        score = Math.round(Math.max(bull, bear) * 0.55);
    }

    const valid = score >= BC_SCORE_MIN && bias !== 'NEUTRAL';
    return { bias, score, factors: f, valid, adx, atr, ema21: bcTrend.ema21, bcZone };
}

// ================================================================
//  BC MICRO ENTRY SCORER
//  Combines: BC MOM + BC LIQUID + BC DIVERG + Volume spike
//  Entry only when macro bias is aligned
// ================================================================
function scoreMicroEntry(id, price, microCandles, macroBias) {
    const f = {};
    if (microCandles.length < MICRO_MIN) return { ready: false, direction: null, quality: 0, factors: f };
    if (!macroBias || !macroBias.valid) return { ready: false, direction: null, quality: 0, factors: f };

    const closes   = microCandles.map(c => c.close);
    const microATR = calcATR(microCandles, Math.min(10, microCandles.length - 1))
                     || macroBias.atr * 0.3;
    const rsi9     = calcRSI(closes, Math.min(9, closes.length - 1));
    const microMACD = calcMACD(closes, 5, 13, 4);

    f.rsi = rsi9 ? rsi9.toFixed(1) : null;

    const { bias, ema21: macroEMA21, atr: macroATR, bcZone } = macroBias;
    const direction = bias === 'BULL' ? 'buy' : 'sell';

    // ── BC LIQUID: Liquidity sweep (40 pts) ───────────────────────
    const bcLiquid = calcBCLiquid(microCandles, microATR);
    f.bc_liquid = bcLiquid.sweep;
    const liquidScore = bcLiquid.sweep === 'BULL_SWEEP' && direction === 'buy'  ? 40 :
                        bcLiquid.sweep === 'BEAR_SWEEP' && direction === 'sell' ? 40 : 0;

    // ── BC MOM: RSI momentum (25 pts) ────────────────────────────
    let momScore = 0, rsiSig = 'NEUTRAL';
    if (rsi9 !== null) {
        if (direction === 'buy') {
            if (rsi9 < 32)       { momScore = 25; rsiSig = 'OVERSOLD'; }
            else if (rsi9 < 45)  { momScore = 18; rsiSig = 'PULLBACK'; }
            else if (rsi9 < 55)  { momScore = 8;  rsiSig = 'MILD'; }
            else                 { momScore = 0;  rsiSig = 'HIGH'; }
        } else {
            if (rsi9 > 68)       { momScore = 25; rsiSig = 'OVERBOUGHT'; }
            else if (rsi9 > 55)  { momScore = 18; rsiSig = 'PULLBACK'; }
            else if (rsi9 > 45)  { momScore = 8;  rsiSig = 'MILD'; }
            else                 { momScore = 0;  rsiSig = 'LOW'; }
        }
    }
    f.rsi_sig = rsiSig;

    // ── BC DIVERG: RSI divergence (20 pts) ───────────────────────
    const bcDiv = calcBCDiverg(microCandles, closes, rsi9);
    f.bc_diverg = bcDiv.diverg;
    const divergScore = (bcDiv.diverg === 'BULL_DIV' && direction === 'buy')  ? 20 :
                        (bcDiv.diverg === 'BEAR_DIV' && direction === 'sell') ? 20 : 0;

    // ── Zone proximity check (15 pts) ────────────────────────────
    let zoneScore = 0, zoneType = 'NONE';
    const snapDist = macroATR * 0.30;
    if (direction === 'buy') {
        const nearEMA = macroEMA21 && price <= macroEMA21 + snapDist && price >= macroEMA21 - snapDist * 0.6;
        const inDemand = bcZone && (bcZone.zone === 'DEMAND' || bcZone.zone === 'NEAR_DEMAND');
        if (nearEMA) { zoneScore = 15; zoneType = 'EMA21'; }
        else if (inDemand) { zoneScore = 15; zoneType = 'DEMAND'; }
        else if (rsi9 !== null && rsi9 < 42) { zoneScore = 8; zoneType = 'RSI_PB'; }
    } else {
        const nearEMA = macroEMA21 && price >= macroEMA21 - snapDist && price <= macroEMA21 + snapDist * 0.6;
        const inSupply = bcZone && (bcZone.zone === 'SUPPLY' || bcZone.zone === 'NEAR_SUPPLY');
        if (nearEMA) { zoneScore = 15; zoneType = 'EMA21'; }
        else if (inSupply) { zoneScore = 15; zoneType = 'SUPPLY'; }
        else if (rsi9 !== null && rsi9 > 58) { zoneScore = 8; zoneType = 'RSI_PB'; }
    }
    f.zone_type = zoneType;

    // ── MACD micro momentum bonus ─────────────────────────────────
    let microMACD_bonus = 0;
    if (microMACD) {
        if (direction === 'buy'  && microMACD.hist > 0) microMACD_bonus = 5;
        if (direction === 'sell' && microMACD.hist < 0) microMACD_bonus = 5;
    }

    const quality = Math.min(100, liquidScore + momScore + divergScore + zoneScore + microMACD_bonus);
    f.quality = quality;
    f.in_zone = zoneScore > 0 || liquidScore > 0;

    // Entry gate: need minimum quality AND some zone/liquidity evidence
    const hasLiquidOrZone = liquidScore > 0 || zoneScore >= 8;
    const ready = quality >= 50 && hasLiquidOrZone;

    return { ready, direction, quality, factors: f, zoneType };
}

// ================================================================
//  STATE MANAGEMENT
// ================================================================
function createFreshState() {
    return {
        v: LS_SCHEMA_VERSION,
        lastPrice: 0,
        macroBias: 'NEUTRAL', macroScore: 0, macroValid: false,
        l1: false, l2: false, l3: false,
        confirmed: false, confirmedAt: 0,
        resetInProgress: false,
        warmupUntil: 0, cooldownUntil: 0,
        type: 'none', entry: 0, sl: 0, tp: 0,
        tempHigh: 0, tempLow: 0,
        originPrice: 0, confluenceScore: 0,
        entryZone: 'NONE',
        breakevenArmed: false
    };
}

function loadState(id) {
    try {
        const r = localStorage.getItem(`ura_state_${id}`);
        return r ? Object.assign(createFreshState(), JSON.parse(r)) : createFreshState();
    } catch(e) { return createFreshState(); }
}

function createDefaultStats() {
    return { tpHits: 0, retraceResets: 0, slHits: 0, breakevenHits: 0, total: 0, winrate: 0.0 };
}

function loadPerformanceStats(id) {
    try {
        const r = localStorage.getItem(`ura_stats_${id}`);
        return r ? Object.assign(createDefaultStats(), JSON.parse(r)) : createDefaultStats();
    } catch(e) { return createDefaultStats(); }
}

function savePerformanceStats(id) {
    try { localStorage.setItem(`ura_stats_${id}`, JSON.stringify(performanceStats[id])); } catch(e) {}
}

function updateWinrateAndDrawrate(id) {
    const s = performanceStats[id];
    s.total = s.tpHits + s.retraceResets + s.slHits + (s.breakevenHits || 0);
    const wd = s.tpHits + s.slHits;
    s.winrate  = wd > 0 ? parseFloat(((s.tpHits / wd) * 100).toFixed(1)) : 0.0;
    s.drawrate = s.total > 0 ? parseFloat((((s.retraceResets + (s.breakevenHits||0)) / s.total) * 100).toFixed(1)) : 0.0;
}

function recordSignalResult(id, type) {
    const s = performanceStats[id];
    if (type === 'tp')         s.tpHits++;
    else if (type === 'retrace') s.retraceResets++;
    else if (type === 'sl')    s.slHits++;
    else if (type === 'be')    { s.breakevenHits = (s.breakevenHits||0) + 1; }
    updateWinrateAndDrawrate(id);
    savePerformanceStats(id);
    updatePerformanceUI(id);
}

           micro: { candles: [], current: null, start: 0 }, atr: 0, price: 0 },
    btc: { macro: { candles: [], current: null, start: 0 },
           micro: { candles: [], current: null, start: 0 }, atr: 0, price: 0 }
};

let macroBiasCache = { xau: null, btc: null };

// ================================================================
//  DUAL TIMEFRAME CANDLE ENGINE
// ================================================================
function buildTFCandle(tf, dur, maxCandles, price) {
    const now = Date.now();
    if (!tf.current || (now - tf.start) >= dur) {
        if (tf.current) {
            tf.current.closed = true;
            tf.candles.push({ ...tf.current });
            if (tf.candles.length > maxCandles) tf.candles.shift();
        }
        tf.current = { open: price, high: price, low: price, close: price, volume: 1, closed: false };
        tf.start = now;
        return true;
    } else {
        tf.current.high   = Math.max(tf.current.high, price);
        tf.current.low    = Math.min(tf.current.low,  price);
        tf.current.close  = price;
        tf.current.volume++;
        return false;
    }
}

function buildCandles(id, price) {
    const md = marketData[id];
    const macroNew = buildTFCandle(md.macro, MACRO_DUR[id], 120, price);
    buildTFCandle(md.micro, MICRO_DUR[id], 80, price);
    md.price = price;

    const mc = md.macro.candles.filter(c => c.closed);
    if (mc.length >= 15) {
        md.atr = calcATR(mc, 14) || md.atr;
    }

    // Re-score macro bias only when macro candle closes
    if (macroNew && mc.length >= MACRO_MIN) {
        macroBiasCache[id] = scoreMacroBias(id, price, mc);
    }
}

function getMacroCandles(id) { return marketData[id].macro.candles.filter(c => c.closed); }
function getMicroCandles(id) { return marketData[id].micro.candles.filter(c => c.closed); }

// ================================================================
//  SEED CANDLES — realistic dual TF initialization
// ================================================================
function seedCandles(id, base) {
    const isXau = id === 'xau';
    const step  = isXau ? 1.2 : 120;
    const nMacro = 55, nMicro = 20;

    marketData[id].macro.candles = [];
    marketData[id].micro.candles = [];

    let price = base;
    for (let i = 0; i < nMacro; i++) {
        const drift = (Math.random() - 0.48) * step * 0.05;
        price += drift;
        const open  = price;
        const close = open + (Math.random() - 0.48) * step * 0.28;
        const hi    = Math.max(open, close) + Math.random() * step * 0.12;
        const lo    = Math.min(open, close) - Math.random() * step * 0.12;
        marketData[id].macro.candles.push({
            open, high: hi, low: lo, close,
            volume: 60 + Math.floor(Math.random() * 120), closed: true
        });
        price = close;
    }

    for (let i = 0; i < nMicro; i++) {
        const open  = price + (Math.random() - 0.5) * step * 0.07;
        const close = open  + (Math.random() - 0.48) * step * 0.09;
        const hi    = Math.max(open, close) + Math.random() * step * 0.04;
        const lo    = Math.min(open, close) - Math.random() * step * 0.04;
        marketData[id].micro.candles.push({
            open, high: hi, low: lo, close,
            volume: 20 + Math.floor(Math.random() * 50), closed: true
        });
        price = close;
    }

    const mc = getMacroCandles(id);
    if (mc.length >= 15) {
        marketData[id].atr = calcATR(mc, 14) || (isXau ? 3.0 : 300);
    }
}

// ================================================================
//  EXECUTE LOCK SIGNAL
// ================================================================
function executeLockSignal(id, direction, livePrice, macroScore, zoneType) {
    const s = state[id];
    const entry = livePrice > 0 ? livePrice : (s.lastPrice || 0);
    if (entry <= 0) return;

    const atr = marketData[id].atr || (id === 'xau' ? 3.0 : 300);
    const microCandles = getMicroCandles(id);
    let structuralSL = 0;

    if (microCandles.length >= 5) {
        const recent = microCandles.slice(-5);
        if (direction === 'buy') {
            const lowestLow = Math.min(...recent.map(c => c.low));
            structuralSL = lowestLow - atr * 0.12;
        } else {
            const highestHigh = Math.max(...recent.map(c => c.high));
            structuralSL = highestHigh + atr * 0.12;
        }
    }

    const minSL = id === 'xau' ? 14 : 180;
    let slD = Math.abs(entry - structuralSL);
    if (slD < minSL || structuralSL === 0) slD = Math.max(atr * 0.85, minSL);

    const tpD = slD * RR_RATIO;

    s.l3 = true; s.confirmed = true;
    s.confirmedAt   = Date.now();
    s.warmupUntil   = Date.now() + 3000;
    s.type          = direction;
    s.entry         = entry;
    s.originPrice   = entry;
    s.tempHigh      = entry;
    s.tempLow       = entry;
    s.confluenceScore = macroScore;
    s.entryZone     = zoneType || 'BC_ZONE';
    s.breakevenArmed = false;

    if (direction === 'buy') {
        s.sl = entry - slD;
        s.tp = entry + tpD;
    } else {
        s.sl = entry + slD;
        s.tp = entry - tpD;
    }

    throttledSaveState(id);
    pendingSignalData[id] = true;
    throttledUpdateUI(id);
    document.getElementById(`signal-bar-${id}`)?.classList.remove('confirm-wait');
    if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
    showToast(`${id.toUpperCase()} ${direction.toUpperCase()} @ ${entry.toFixed(2)} | ${zoneType} | SL:${slD.toFixed(2)}`);
}

// ================================================================
//  SIGNAL ENGINE — CORE
// ================================================================
function processSignal(id, price) {
    const s = state[id];
    if (!s) return;
    if (Date.now() < (s.cooldownUntil || 0)) return;

    buildCandles(id, price);

    // ── Open trade management ─────────────────────────────────────
    if (s.confirmed && s.type !== 'none') {
        if (!s.tempHigh) { s.tempHigh = s.entry; s.tempLow = s.entry; }
        if (price > s.tempHigh) s.tempHigh = price;
        if (price < s.tempLow)  s.tempLow  = price;

        updateTracker(id, price);

        const hitTP = (s.type === 'buy'  && price >= s.tp) ||
                      (s.type === 'sell' && price <= s.tp);
        const hitSL = (s.type === 'buy'  && price <= s.sl) ||
                      (s.type === 'sell' && price >= s.sl);

        if (hitTP) { recordSignalResult(id, 'tp'); resetSignal(id); return; }
        if (hitSL) {
            const result = s.breakevenArmed ? 'be' : 'sl';
            if (result === 'sl') state[id].cooldownUntil = Date.now() + COOLDOWN_AFTER_SL_MS;
            recordSignalResult(id, result);
            resetSignal(id);
            return;
        }

        // Dynamic breakeven: move SL to entry after 50% toward TP
        if (!s.breakevenArmed && Date.now() > (s.warmupUntil || 0)) {
            const tpDist = Math.abs(s.tp - s.entry);
            const moved  = s.type === 'buy' ? price - s.entry : s.entry - price;
            if (moved >= tpDist * 0.5) {
                s.sl = s.entry;
                s.breakevenArmed = true;
                throttledSaveState(id);
                showToast(`${id.toUpperCase()} SL → BREAKEVEN 🔒`);
            }
        }

        // Retrace buffer exit
        if (!s.breakevenArmed) {
            const buf = id === 'xau' ? 12.5 : 140;
            if (s.type === 'buy'  && price <= (s.entry - buf) && Date.now() > (s.warmupUntil || 0)) {
                recordSignalResult(id, 'retrace'); resetSignal(id); return;
            }
            if (s.type === 'sell' && price >= (s.entry + buf) && Date.now() > (s.warmupUntil || 0)) {
                recordSignalResult(id, 'retrace'); resetSignal(id); return;
            }
        }

        return;
    }

    if (pendingConfirmation[id]) { s.lastPrice = price; return; }

    const macroCandles = getMacroCandles(id);
    const microCandles = getMicroCandles(id);
    if (macroCandles.length < MACRO_MIN) { s.lastPrice = price; return; }
    if (microCandles.length < MICRO_MIN) { s.lastPrice = price; return; }

    // Get macro bias (cached, updated per macro candle close)
    let macroBias = macroBiasCache[id];
    if (!macroBias) {
        macroBias = scoreMacroBias(id, price, macroCandles);
        macroBiasCache[id] = macroBias;
    }

    updateEngineBadges(id, macroBias);
    updateConfluenceBar(id, macroBias.score);

    if (!macroBias.valid) {
        if (s.l1 || s.l2) resetSignal(id);
        s.lastPrice = price;
        return;
    }

    const micro = scoreMicroEntry(id, price, microCandles, macroBias);

    if (!s.l1) {
        s.l1 = true;
        s.type = macroBias.bias === 'BULL' ? 'buy' : 'sell';
        s.macroScore = macroBias.score;
        s.macroBias  = macroBias.bias;
        pendingSignalData[id] = true;
        throttledUpdateUI(id);
        throttledSaveState(id);
        return;
    }

    // If macro bias flipped → reset
    const expectedDir = s.type;
    const currentDir  = macroBias.bias === 'BULL' ? 'buy' : 'sell';
    if (s.l1 && !s.confirmed && macroBias.valid && currentDir !== expectedDir) {
        resetSignal(id);
        return;
    }

    if (s.l1 && !s.l2 && micro.ready) {
        s.l2 = true;
        pendingSignalData[id] = true;
        throttledUpdateUI(id);
        throttledSaveState(id);
        return;
    }

    if (s.l2 && !s.l3 && micro.ready && micro.quality >= 58) {
        s.l3 = true;
        pendingSignalData[id] = true;
        throttledUpdateUI(id);
        throttledSaveState(id);
        startConfirmationDelay(id, currentDir, price, macroBias.score, micro.zoneType);
        return;
    }

    if (s.l2 && !s.l3 && !micro.ready && !micro.factors.in_zone) {
        s.l2 = false;
        pendingSignalData[id] = true;
        throttledUpdateUI(id);
    }

    s.lastPrice = price;
    throttledSaveState(id);
}

function updateSignal(id, price) {
    if (signalDebounceTimer[id]) clearTimeout(signalDebounceTimer[id]);
    signalDebounceTimer[id] = setTimeout(() => {
        processSignal(id, price);
        signalDebounceTimer[id] = null;
    }, SIGNAL_DEBOUNCE_MS);
}

function startConfirmationDelay(id, direction, entryPrice, macroScore, zoneType) {
    if (pendingConfirmation[id]) cancelPendingConfirmation(id);
    pendingConfirmation[id] = { direction, entryPrice, macroScore, zoneType };
    const sb = document.getElementById(`signal-bar-${id}`);
    if (sb) sb.classList.add('confirm-wait');
    document.getElementById(`l3-${id}`)?.classList.add('confirm-pending');
    updateSignalUIOnly(id);

    pendingConfirmation[id].timerId = setTimeout(() => {
        if (!pendingConfirmation[id]) return;
        const macroC = getMacroCandles(id);
        const microC = getMicroCandles(id);
        const lp = id === 'xau' ? xauCurrentPrice : (marketData[id].price || state[id].lastPrice || 0);

        if (macroC.length >= MACRO_MIN && microC.length >= MICRO_MIN) {
            const mb2 = scoreMacroBias(id, lp, macroC);
            const mi2 = scoreMicroEntry(id, lp, microC, mb2);
            const stillValid = mb2.valid
                && (mb2.bias === 'BULL' ? 'buy' : 'sell') === direction
                && mi2.ready;

            if (stillValid) {
                executeLockSignal(id, direction, lp, mb2.score, mi2.zoneType || zoneType);
            } else {
                resetSignal(id);
                const st = document.getElementById(`signal-text-${id}`);
                if (st) {
                    st.innerText = 'REJECT';
                    st.style.color = 'var(--danger)';
                    setTimeout(() => updateSignalUIOnly(id), 1500);
                }
            }
        } else {
            resetSignal(id);
        }
        pendingConfirmation[id] = null;
    }, CONFIRMATION_WAIT_MS);
}

function cancelPendingConfirmation(id) {
    if (!pendingConfirmation[id]) return;
    if (pendingConfirmation[id].timerId) clearTimeout(pendingConfirmation[id].timerId);
    pendingConfirmation[id] = null;
    document.getElementById(`signal-bar-${id}`)?.classList.remove('confirm-wait');
    updateSignalUIOnly(id);
}

function resetSignal(id) {
    const s = state[id];
    if (!s || s.resetInProgress) return;
    s.resetInProgress = true;
    if (pendingConfirmation[id]) cancelPendingConfirmation(id);
    if (signalDebounceTimer[id]) { clearTimeout(signalDebounceTimer[id]); signalDebounceTimer[id] = null; }
    const kept = { lastPrice: s.lastPrice, cooldownUntil: s.cooldownUntil || 0 };
    Object.assign(s, createFreshState(), kept);
    pendingSignalData[id] = true;
    updateSignalUIOnly(id);
    const t = document.getElementById(`tracker-${id}`);
    if (t) t.innerText = '0';
    throttledSaveState(id);
    throttledUpdateUI(id);
    requestAnimationFrame(() => { s.resetInProgress = false; });
    setTimeout(() => { s.resetInProgress = false; }, 300);
}

// ================================================================
//  UI FUNCTIONS
// ================================================================
function throttledSaveState(id) {
    const s = state[id]; if (!s) return;
    pendingSaveData[id] = { ...s };
    if (pendingSaveTimer[id]) return;
    pendingSaveTimer[id] = setTimeout(() => {
        if (pendingSaveData[id]) {
            try { localStorage.setItem(`ura_state_${id}`, JSON.stringify(pendingSaveData[id])); } catch(e) {}
            pendingSaveData[id] = null;
        }
        pendingSaveTimer[id] = null;
    }, SAVE_INTERVAL);
}

function throttledUpdateUI(id) {
    if (!rafPending[id]) {
        rafPending[id] = true;
        requestAnimationFrame(() => {
            const p = pendingPriceData[id];
            if (p !== null) { updatePriceDisplayOnly(id, p); pendingPriceData[id] = null; }
            if (pendingSignalData[id]) { updateSignalUIOnly(id); pendingSignalData[id] = false; }
            rafPending[id] = false;
        });
    }
}

function updatePriceDisplayOnly(id, price) {
    const el = document.getElementById(`price-${id}`); if (!el) return;
    const prev = parseFloat(el.dataset.prev || '0');
    const decimals = id === 'xau' ? 2 : 2;
    el.innerText = price.toFixed(decimals); el.dataset.prev = price;
    if (prev !== 0 && prev !== price) {
        el.style.color = price > prev ? 'var(--success)' : 'var(--danger)';
        clearTimeout(el._ct);
        el._ct = setTimeout(() => { el.style.color = ''; }, 280);
    }
    if (state[id]) updateTracker(id, price);
}

function updateTracker(id, price) {
    const s = state[id];
    const t = document.getElementById(`tracker-${id}`);
    if (!s || !s.confirmed || s.type === 'none' || s.entry <= 0) {
        if (t) { t.innerText = '0'; t.style.color = ''; }
        return;
    }
    const dist = s.type === 'buy' ? price - s.entry : s.entry - price;
    if (t) {
        t.innerText = (Math.round(dist * 100) / 100).toFixed(2);
        t.style.color = dist >= 0 ? 'var(--emerald)' : 'var(--crimson)';
    }
}

function updateSignalUIOnly(id) {
    const s = state[id]; if (!s) return;
    const setDot = (eid, on, type) => {
        const el = document.getElementById(eid); if (!el) return;
        if (!on) el.className = 'dot';
        else if (pendingConfirmation[id] && eid === `l3-${id}` && !s.confirmed)
            el.className = 'dot confirm-pending';
        else el.className = type === 'sell' ? 'dot active-down' : 'dot active';
    };
    setDot(`l1-${id}`, s.l1, s.type);
    setDot(`l2-${id}`, s.l2, s.type);
    setDot(`l3-${id}`, s.l3, s.type);

    const st = document.getElementById(`signal-text-${id}`);
    if (st) {
        if (!wsStatus[id] && id === 'btc') {
            st.innerText = 'NO FEED'; st.style.color = 'var(--danger)';
        } else if (pendingConfirmation[id] && s.l3 && !s.confirmed) {
            st.innerText = 'CONFIRM...'; st.style.color = 'var(--gold)';
        } else if (s.confirmed) {
            const beLabel = s.breakevenArmed ? ' [BE]' : '';
            st.innerText = s.type.toUpperCase() + beLabel;
            st.style.color = s.type === 'buy' ? 'var(--success)' : 'var(--danger)';
        } else if (s.l3) {
            st.innerText = 'LOCKED'; st.style.color = 'var(--accent)';
        } else if (s.l2) {
            st.innerText = 'SWEEP'; st.style.color = 'var(--accent)';
        } else if (s.l1) {
            st.innerText = 'BIAS'; st.style.color = 'var(--amber)';
        } else {
            st.innerText = 'IDLE'; st.style.color = 'var(--text-dim)';
        }
    }

    const eEl = document.getElementById(`entry-${id}`); if (eEl) eEl.innerText = s.confirmed ? s.entry.toFixed(2) : '--';
    const tEl = document.getElementById(`tp-${id}`);    if (tEl) tEl.innerText = s.confirmed ? s.tp.toFixed(2) : '--';
    const sEl = document.getElementById(`sl-${id}`);    if (sEl) sEl.innerText = s.confirmed ? s.sl.toFixed(2) : '--';
}

function updateEngineBadges(id, mb) {
    if (!mb) return;
    const f = mb.factors || {};

    const badges = [
        {
            id: `eb-trend-${id}`,
            val: f.bc_trend ? f.bc_trend.replace('STRONG_','S-') : 'TRD',
            cls: (f.bc_trend||'').includes('BULL') ? 'bull' :
                 (f.bc_trend||'').includes('BEAR') ? 'bear' : 'neutral'
        },
        {
            id: `eb-struct-${id}`,
            val: f.bc_struct ? f.bc_struct.replace('_BULL','↑').replace('_BEAR','↓') : 'STR',
            cls: (f.bc_struct||'').includes('BULL') || f.bc_struct === 'BULLISH' ? 'bull' :
                 (f.bc_struct||'').includes('BEAR') || f.bc_struct === 'BEARISH' ? 'bear' :
                 f.bc_struct === 'CHOCH_BULL' || f.bc_struct === 'CHOCH_BEAR' ? 'active' : 'off'
        },
        {
            id: `eb-zone-${id}`,
            val: f.bc_zone || 'ZNE',
            cls: f.bc_zone === 'DEMAND' || f.bc_zone === 'NEAR_DEMAND' ? 'bull' :
                 f.bc_zone === 'SUPPLY' || f.bc_zone === 'NEAR_SUPPLY' ? 'bear' : 'off'
        },
        {
            id: `eb-flow-${id}`,
            val: f.bc_flow ? f.bc_flow.replace('_PRESSURE','').replace('MILD_','M-') : 'FLW',
            cls: (f.bc_flow||'').includes('BUY')  ? 'bull' :
                 (f.bc_flow||'').includes('SELL') ? 'bear' : 'neutral'
        },
        {
            id: `eb-macd-${id}`,
            val: f.macd_sig || 'MOM',
            cls: (f.macd_sig||'').startsWith('BULL') ? 'bull' :
                 (f.macd_sig||'').startsWith('BEAR') ? 'bear' : 'neutral'
        },
        {
            id: `eb-adx-${id}`,
            val: f.adx_class || 'ADX',
            cls: f.adx_class === 'STRONG' || f.adx_class === 'TREND' ? 'bull' :
                 f.adx_class === 'CHOPPY' ? 'bear' : 'neutral'
        },
        {
            id: `eb-conflict-${id}`,
            val: f.conflict ? 'CONFLICT' : (f.bc_bos ? 'BOS:'+f.bc_bos : 'ALIGN'),
            cls: f.conflict ? 'bear' : f.bc_bos ? 'active' : 'off'
        }
    ];

    for (const b of badges) {
        const el = document.getElementById(b.id);
        if (el) { el.className = `ebadge ${b.cls}`; el.textContent = b.val; }
    }

    const sc = document.getElementById(`eb-score-${id}`);
    if (sc) {
        const sv = Math.round(mb.score || 0);
        sc.textContent = `BC:${sv}`;
        sc.className = 'ebadge score';
        sc.style.color = mb.valid ? 'var(--emerald)' : sv >= BC_SCORE_MIN * 0.7 ? 'var(--gold)' : 'var(--text-dim)';
    }
}

function updateConfluenceBar(id, score) {
    const fill = document.getElementById(`cf-fill-${id}`);
    const txt  = document.getElementById(`cf-txt-${id}`);
    if (!fill || !txt) return;
    const pct = Math.min(100, Math.max(0, score));
    fill.style.width = pct + '%';
    fill.style.background = pct >= BC_SCORE_MIN ? 'var(--emerald)' :
                             pct >= BC_SCORE_MIN * 0.7 ? 'var(--gold)' : 'var(--crimson)';
    txt.textContent = Math.round(pct);
    txt.style.color = pct >= BC_SCORE_MIN ? 'var(--emerald)' :
                      pct >= BC_SCORE_MIN * 0.7 ? 'var(--gold)' : 'var(--text-dim)';
}

function updatePerformanceUI(id) {
    const s = performanceStats[id]; if (!s) return;
    const tp = document.getElementById(`stats-tp-${id}`);
    const rt = document.getElementById(`stats-retrace-${id}`);
    const sl = document.getElementById(`stats-sl-${id}`);
    const wr = document.getElementById(`stats-winrate-${id}`);
    if (tp) tp.innerText = s.tpHits;
    if (rt) { rt.innerText = s.retraceResets + (s.breakevenHits||0); rt.style.color = 'var(--teal)'; }
    if (sl) sl.innerText = s.slHits;
    if (wr) {
        wr.innerText = `${s.winrate}%`;
        wr.style.color = s.winrate >= 65 ? 'var(--emerald)' :
                         s.winrate >= 50 ? 'var(--gold)' : 'var(--crimson)';
    }
}

function updateFeedBadge(id, status) {
    const el = document.getElementById(`feed-badge-${id}`); if (!el) return;
    el.className = 'feed-badge';
    if (status === 'ok')            { el.textContent = '● WS';   el.classList.add('ok'); }
    else if (status === 'fallback') { el.textContent = '⚡ REST'; el.classList.add('fallback'); }
    else                            { el.textContent = '✕ ERR';  el.classList.add('err'); }
}

function updateGlobalPulse() {
    const el = document.getElementById('globalPulse');
    if (el) el.className = (xauCurrentPrice > 0 || wsStatus.btc) ? 'pulse connected' : 'pulse disconnected';
}

function handleSignalBarTap(id) {
    if (tapTimers[id]) clearTimeout(tapTimers[id]);
    tapCounters[id]++;
    tapTimers[id] = setTimeout(() => { tapCounters[id] = 0; tapTimers[id] = null; }, TAP_TIMEOUT);
    if (tapCounters[id] === 3) {
        if (pendingConfirmation[id]) cancelPendingConfirmation(id);
        resetSignal(id);
        tapCounters[id] = 0;
        if (tapTimers[id]) { clearTimeout(tapTimers[id]); tapTimers[id] = null; }
        if (navigator.vibrate) navigator.vibrate(30);
        showToast('Signal reset ✓');
    }
}

function handleHistoryPanelTap(id) {
    if (historyTapTimers[id]) clearTimeout(historyTapTimers[id]);
    historyTapCounters[id]++;
    historyTapTimers[id] = setTimeout(() => { historyTapCounters[id] = 0; historyTapTimers[id] = null; }, TAP_TIMEOUT);
    if (historyTapCounters[id] === 3) {
        performanceStats[id] = createDefaultStats();
        savePerformanceStats(id);
        updatePerformanceUI(id);
        historyTapCounters[id] = 0;
        if (historyTapTimers[id]) { clearTimeout(historyTapTimers[id]); historyTapTimers[id] = null; }
        if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
        showToast('History reset ✓');
    }
}

function buildCardHTML(id, label) {
    const isActive = activePairId === id ? 'active' : '';
    return `<div class="pair-card ${isActive}" id="card-${id}">
      <div class="card">
        <div class="card-top">
          <div class="pair-info">
            <span class="pair">${label}</span>
            <div class="status-row">

        </div>
        <div class="signal-bar" id="signal-bar-${id}">
          <span>SIGNAL</span>

            <div class="dot" id="l2-${id}"></div>

          <span class="confluence-label">BC SCORE</span>

          <span class="confluence-score-txt" id="cf-txt-${id}">0</span>

        <div class="card-level-grid">

          </div>
          <div class="level-item" onclick="window.copyValue('${id}','tp')">
            <span class="level-label">Target</span><span class="level-value" id="tp-${id}" style="color:var(--success)">--</span>
          </div>
          <div class="level-item" onclick="window.copyValue('${id}','sl')">

          <div class="stats-item"><span class="stats-label" style="color:var(--teal)">BREAK EVEN</span><span class="stats-value retrace-value" id="stats-retrace-${id}">0</span></div>
          <div class="stats-item"><span class="stats-label">SL HIT</span><span class="stats-value" id="stats-sl-${id}" style="color:var(--danger)">0</span></div>
          <div class="stats-item"><span class="stats-label" style="color:var(--gold)">WINRATE</span><span class="stats-value winrate-value" id="stats-winrate-${id}">0%</span></div>

      </div>
    </div>`;
}

window.copyValue = (id, type) => {
    const val = document.getElementById(`${type}-${id}`)?.innerText;
    if (val && val !== '--') {
        navigator.clipboard?.writeText(val)
            .then(() => showToast(`${type.toUpperCase()} copied: ${val}`))
            .catch(() => showToast(val));
        if (navigator.vibrate) navigator.vibrate(50);
    }
};

// ================================================================
//  PRICE FEEDS
//  XAUUSD: Primary WS → Binance XAUUSDT Futures (raw, no offset)
//          Fallback 1 → Binance XAUUSDT Futures REST
//          Fallback 2 → Binance XAUUSDT Spot REST
//          Fallback 3 → metals.live spot gold (most accurate for MT5)
//  BTCUSD: Primary WS → Binance BTCUSDT Trade
//          Fallback   → Binance BTCUSDT REST
// ================================================================
let xauWs = null, xauReconnectTimer = null, xauReconnectAttempts = 0;
let xauFetchRetryTimer = null, xauCurrentPrice = 0, xauLastHeartbeat = Date.now();

// XAU REST sources — ordered by MT5 accuracy
const XAU_REST_SOURCES = [
    // metals.live: spot gold price, closest to MT5 XAUUSD broker feed
    { url: 'https://api.metals.live/v1/spot/gold',
      parse: (d) => {
          if (Array.isArray(d)) {
              const g = d.find(x => x.gold !== undefined);
              return g ? parseFloat(g.gold) : null;
          }
          return d && d.gold ? parseFloat(d.gold) : null;
      }
    },
    // Binance XAUUSDT perpetual futures — very close to spot
    { url: 'https://fapi.binance.com/fapi/v1/ticker/price?symbol=XAUUSDT',
      parse: (d) => d?.price ? parseFloat(d.price) : null
    },
    // Binance XAUUSDT spot
    { url: 'https://api.binance.com/api/v3/ticker/price?symbol=XAUUSDT',
      parse: (d) => d?.price ? parseFloat(d.price) : null
    }
];
let xauRestIdx = 0;

function updateXAUDisplay(price, feedStatus) {
    if (!price || isNaN(price) || price < 100 || price > 20000) return;
    price = price + PRICE_OFFSET_XAU;
    xauCurrentPrice = price;
    xauLastHeartbeat = Date.now();
    pendingPriceData.xau = price;
    pendingSignalData.xau = true;
    throttledUpdateUI('xau');
    updateSignal('xau', price);
    wsStatus.xau = true;
    updateGlobalPulse();
    const el = document.getElementById('ws-status-xau');
    if (el) { el.textContent = '● LIVE'; el.className = 'ws-status connected'; }
    if (feedStatus) updateFeedBadge('xau', feedStatus);
}

async function xauFetchRestPrice() {
    for (let i = 0; i < XAU_REST_SOURCES.length; i++) {
        const src = XAU_REST_SOURCES[(xauRestIdx + i) % XAU_REST_SOURCES.length];
        try {
            const ctrl = new AbortController();
            const tid  = setTimeout(() => ctrl.abort(), 7000);
            const resp = await fetch(src.url, { signal: ctrl.signal });
            clearTimeout(tid);
            if (!resp.ok) continue;
            const data = await resp.json();
            const p = src.parse(data);
            if (p && p > 100 && !isNaN(p)) {
                const useFeed = i === 0 ? 'ok' : 'fallback';
                updateXAUDisplay(p, useFeed);
                xauRestIdx = (xauRestIdx + i) % XAU_REST_SOURCES.length;
                return true;
            }
        } catch(e) {}
    }
    updateFeedBadge('xau', 'err');
    return false;
}

function initXAUWebSocket() {
    if (xauWs) { try { xauWs.close(); } catch(e) {} xauWs = null; }
    if (xauReconnectTimer) clearTimeout(xauReconnectTimer);
    try {
        xauWs = new WebSocket(XAU_WS_URL);
        const wst = setTimeout(() => {
            if (xauWs && xauWs.readyState !== WebSocket.OPEN) {
                try { xauWs.close(); } catch(e) {} xauWs = null;
                updateFeedBadge('xau', 'fallback');
                if (!xauFetchRetryTimer)
                    xauFetchRetryTimer = setInterval(() => xauFetchRestPrice(), 2000);
            }
        }, 6000);
        xauWs.onopen = () => {
            clearTimeout(wst);
            xauReconnectAttempts = 0;
            if (xauFetchRetryTimer) { clearInterval(xauFetchRetryTimer); xauFetchRetryTimer = null; }
            updateFeedBadge('xau', 'ok');
            updateGlobalPulse();
        };
        xauWs.onmessage = (e) => {
            try {
                const d = JSON.parse(e.data);
                if (d.p) {
                    const p = parseFloat(d.p);
                    if (!isNaN(p) && p > 100 && p !== xauCurrentPrice)
                        updateXAUDisplay(p, 'ok');
                }
            } catch(err) {}
        };
        xauWs.onclose = () => {
            const delay = Math.min(1000 * Math.pow(1.6, xauReconnectAttempts), 20000);
            xauReconnectAttempts++;
            xauReconnectTimer = setTimeout(() => initXAUWebSocket(), delay);
            updateFeedBadge('xau', 'fallback');
            if (!xauFetchRetryTimer)
                xauFetchRetryTimer = setInterval(() => xauFetchRestPrice(), 2000);
        };
        xauWs.onerror = () => {
            updateFeedBadge('xau', 'fallback');
            if (!xauFetchRetryTimer)
                xauFetchRetryTimer = setInterval(() => xauFetchRestPrice(), 2000);
        };
    } catch(err) {
        updateFeedBadge('xau', 'fallback');
        if (!xauFetchRetryTimer)
            xauFetchRetryTimer = setInterval(() => xauFetchRestPrice(), 2000);
    }
}

let btcWs = null, btcReconnectTimer = null, btcReconnectAttempts = 0, btcFetchRetryTimer = null;

async function btcFetchRestPrice() {
    const urls = [
        'https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT',
        'https://fapi.binance.com/fapi/v1/ticker/price?symbol=BTCUSDT'
    ];
    for (const url of urls) {
        try {
            const ctrl = new AbortController();
            const tid  = setTimeout(() => ctrl.abort(), 7000);
            const resp = await fetch(url, { signal: ctrl.signal });
            clearTimeout(tid);
            if (!resp.ok) continue;
            const data = await resp.json();
            if (data?.price) {
                const p = parseFloat(data.price) + PRICE_OFFSET_BTC;
                if (p > 1000 && !isNaN(p)) {
                    pendingPriceData.btc = p;
                    pendingSignalData.btc = true;
                    throttledUpdateUI('btc');
                    updateSignal('btc', p);
                    wsStatus.btc = true;
                    updateGlobalPulse();
                    updateFeedBadge('btc', 'fallback');
                    return true;
                }
            }
        } catch(e) {}
    }
    updateFeedBadge('btc', 'err');
    return false;
}

function initBTCWebSocket() {
    if (btcWs) { try { btcWs.close(); } catch(e) {} btcWs = null; }
    if (btcReconnectTimer) clearTimeout(btcReconnectTimer);
    try {
        btcWs = new WebSocket(BTC_WS_URL);
        const wst = setTimeout(() => {
            if (btcWs && btcWs.readyState !== WebSocket.OPEN) {
                try { btcWs.close(); } catch(e) {} btcWs = null;
                updateFeedBadge('btc', 'fallback');
                wsStatus.btc = false;
                if (!btcFetchRetryTimer)
                    btcFetchRetryTimer = setInterval(() => btcFetchRestPrice(), 3000);
            }
        }, 7000);
        btcWs.onopen = () => {
            clearTimeout(wst);
            btcReconnectAttempts = 0;
            wsStatus.btc = true;
            if (btcFetchRetryTimer) { clearInterval(btcFetchRetryTimer); btcFetchRetryTimer = null; }
            const el = document.getElementById('ws-status-btc');
            if (el) { el.textContent = '● LIVE'; el.className = 'ws-status connected'; }
            updateFeedBadge('btc', 'ok');
            updateGlobalPulse();
            updateSignalUIOnly('btc');
        };
        btcWs.onmessage = (e) => {
            try {
                const d = JSON.parse(e.data);
                const p = parseFloat(d.p) + PRICE_OFFSET_BTC;
                if (p && p > 1000 && !isNaN(p)) {
                    pendingPriceData.btc = p;
                    pendingSignalData.btc = true;
                    throttledUpdateUI('btc');
                    updateSignal('btc', p);
                }
            } catch(err) {}
        };
        btcWs.onclose = () => {
            wsStatus.btc = false;
            updateFeedBadge('btc', 'fallback');
            updateGlobalPulse();
            updateSignalUIOnly('btc');
            const delay = Math.min(1000 * Math.pow(2, btcReconnectAttempts), 30000);
            btcReconnectAttempts++;
            btcReconnectTimer = setTimeout(() => initBTCWebSocket(), delay);
            if (!btcFetchRetryTimer)
                btcFetchRetryTimer = setInterval(() => btcFetchRestPrice(), 3000);
        };
        btcWs.onerror = () => {
            wsStatus.btc = false;
            updateFeedBadge('btc', 'fallback');
            updateGlobalPulse();
            if (!btcFetchRetryTimer)
                btcFetchRetryTimer = setInterval(() => btcFetchRestPrice(), 3000);
        };
    } catch(err) {
        wsStatus.btc = false;
        updateFeedBadge('btc', 'err');
        setTimeout(() => initBTCWebSocket(), 5000);
    }
}

function switchPair() {
    activePairId = activePairId === 'xau' ? 'btc' : 'xau';
    try { localStorage.setItem('ura_active_pair', activePairId); } catch(e) {}
    const lb = document.getElementById('switchLabel');
    if (lb) lb.innerText = activePairId === 'xau' ? 'XAUUSD' : 'BTCUSD';
    document.querySelectorAll('.pair-card').forEach(c => c.classList.remove('active'));
    document.getElementById(`card-${activePairId}`)?.classList.add('active');
    if (navigator.vibrate) navigator.vibrate(20);
}

// ================================================================
//  INIT
// ================================================================
function init() {
    checkAndMigrateSchema();
    state.xau = loadState('xau');
    state.btc = loadState('btc');
    performanceStats.xau = loadPerformanceStats('xau');
    performanceStats.btc = loadPerformanceStats('btc');
    updateWinrateAndDrawrate('xau');
    updateWinrateAndDrawrate('btc');

    document.getElementById('terminals').innerHTML =
        buildCardHTML('xau', 'XAUUSD') + buildCardHTML('btc', 'BTCUSD');

    const bindTap = (el, handler) => {
        if (!el) return;
        let lastTap = 0;
        const h = (e) => {
            e.preventDefault();
            const now = Date.now();
            if (now - lastTap < 80) return;
            lastTap = now;
            handler();
        };
        el.addEventListener('touchstart', h, { passive: false });
        el.addEventListener('click', h);
    };
    bindTap(document.getElementById('signal-bar-xau'),    () => handleSignalBarTap('xau'));
    bindTap(document.getElementById('signal-bar-btc'),    () => handleSignalBarTap('btc'));
    bindTap(document.getElementById('history-panel-xau'), () => handleHistoryPanelTap('xau'));
    bindTap(document.getElementById('history-panel-btc'), () => handleHistoryPanelTap('btc'));

    const btn = document.getElementById('switchPairBtn');
    if (btn) {
        const nb = btn.cloneNode(true);
        btn.parentNode.replaceChild(nb, btn);
        const ds = function(e) {
            e.preventDefault(); e.stopPropagation();
            nb.classList.add('btn-highlight');
            setTimeout(() => nb.classList.remove('btn-highlight'), 150);
            switchPair();
        };
        nb.addEventListener('click', ds);
        nb.addEventListener('touchstart', ds, { passive: false });
    }

    updateSignalUIOnly('xau'); updateSignalUIOnly('btc');
    updatePerformanceUI('xau'); updatePerformanceUI('btc');

    // Seed with realistic base prices
    seedCandles('xau', 3300);
    seedCandles('btc', 105000);

    // Re-seed with real price on first data
    let seedFixed = { xau: false, btc: false };
    const fixSeed = (id, price) => {
        if (seedFixed[id]) return;
        const mc = getMacroCandles(id);
        const first = mc[0]?.close || 0;
        if (first > 0 && Math.abs(first - price) / price > 0.04) {
            seedCandles(id, price);
            macroBiasCache[id] = null;
        }
        seedFixed[id] = true;
    };

    // Start price feeds
    initXAUWebSocket();
    xauFetchRestPrice();   // immediate first fetch
    initBTCWebSocket();
    btcFetchRestPrice();
    updateGlobalPulse();

    // Heartbeat loop: re-fetch if stale, fix seeds
    setInterval(() => {
        if (!seedFixed.xau && xauCurrentPrice > 0)     fixSeed('xau', xauCurrentPrice);
        if (!seedFixed.btc && marketData.btc.price > 0) fixSeed('btc', marketData.btc.price);
        if (Date.now() - xauLastHeartbeat > 6000)       xauFetchRestPrice();
        updateGlobalPulse();
    }, 3000);

    // Aggressive REST fallback every 2s if WS drops
    setInterval(() => {
        if (!xauWs || xauWs.readyState !== WebSocket.OPEN) xauFetchRestPrice();
        if (!btcWs || btcWs.readyState !== WebSocket.OPEN) btcFetchRestPrice();
    }, 2000);

    // Re-sync on tab visibility
    document.addEventListener('visibilitychange', () => {
        if (!document.hidden) {
            xauFetchRestPrice();
            btcFetchRestPrice();
            updateSignalUIOnly('xau');
            updateSignalUIOnly('btc');
            updateGlobalPulse();
        }
    });
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();

})();
</script>

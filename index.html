<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>BLOOMBERG FUSION v6.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            /* Black Rose Elegant Theme */
            --bg: #0a080c;
            --bg-panel: #0d0a12;
            --text: #d4cddc;
            --text-bright: #f0eaf8;
            --text-dim: #8a7a9a;
            --accent: #e8b4d8;
            --success: #c084fc;
            --danger: #f472b6;
            --warning: #fbbf24;
            --info: #818cf8;
            --feed: #e8b4d8;
            --buy-bg: #0d1a18;
            --sell-bg: #1a0d12;
            --border: rgba(232, 180, 216, 0.08);
            --border-bright: rgba(232, 180, 216, 0.2);
            --grid-line: rgba(232, 180, 216, 0.05);
            --header-bg: #0a080c;
            --terminal-green: #c084fc;
            --terminal-red: #f472b6;
            --terminal-orange: #fbbf24;
            --terminal-blue: #818cf8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'JetBrains Mono', monospace;
            padding: 8px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            font-size: 11px;
            letter-spacing: 0.02em;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 480px; width: 100%; }

        /* Bloomberg-style Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--header-bg);
            border: 1px solid var(--border);
            border-bottom: 2px solid var(--accent);
            padding: 8px 12px;
            margin-bottom: 4px;
        }

        .brand {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        .brand h1 { 
            font-size: 14px; 
            font-weight: 700; 
            color: var(--text-bright); 
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .brand .version {
            font-size: 8px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Live Pulse Dot */
        .live-pulse {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--terminal-red);
            border-radius: 50%;
            animation: pulseBlink 1.5s infinite;
        }
        .live-pulse.connected {
            background: var(--terminal-green);
            box-shadow: 0 0 6px rgba(192, 132, 252, 0.6);
        }
        @keyframes pulseBlink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        /* Switch Button Bloomberg Style - Simplified */
        .switch-pair-btn {
            background: var(--bg-panel);
            border: 1px solid var(--border-bright);
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            padding: 5px 14px;
            cursor: pointer;
            transition: all 0.15s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .switch-pair-btn:hover {
            border-color: var(--accent);
            background: rgba(232, 180, 216, 0.1);
        }

        /* Card */
        .pair-card { display: none; }
        .pair-card.active { display: block; }

        .card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-top: none;
            padding: 0;
            margin-bottom: 4px;
        }

        /* ============ ROW 1: PAIR + PRICE + WS STATUS ============ */
        .price-header {
            display: grid;
            grid-template-columns: auto 1fr;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid var(--grid-line);
            background: rgba(232, 180, 216, 0.01);
        }

        .pair-info {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }
        .pair-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-bright);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .ws-status {
            font-size: 8px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .ws-status.connected { color: var(--terminal-green); }
        .ws-status.disconnected { color: var(--terminal-red); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .price-display {
            text-align: right;
        }
        .price-value {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            line-height: 1;
        }
        .price-change {
            font-size: 8px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        /* ============ ROW 2: SIGNAL FUSION BAR ============ */
        .signal-fusion-bar {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 6px 12px;
            border-bottom: 1px solid var(--grid-line);
            background: rgba(0,0,0,0.2);
            gap: 10px;
        }

        .signal-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            text-align: left;
        }

        .signal-fusion-center {
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
        }

        .fusion-dot {
            width: 3px;
            height: 3px;
            border-radius: 1px;
            background: rgba(232, 180, 216, 0.15);
            transition: all 0.3s ease;
        }
        .fusion-dot.active-buy {
            background: var(--terminal-green);
            box-shadow: 0 0 6px rgba(192, 132, 252, 0.4);
        }
        .fusion-dot.active-sell {
            background: var(--terminal-red);
            box-shadow: 0 0 6px rgba(244, 114, 182, 0.4);
        }
        .fusion-dot.pulse {
            animation: fusionPulse 0.8s ease-in-out infinite;
        }
        @keyframes fusionPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.8); opacity: 0.6; }
        }

        .fusion-line {
            width: 45px;
            height: 1px;
            background: var(--border-bright);
        }

        .signal-status-text {
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-align: right;
            color: var(--text-dim);
        }

        /* ============ ROW 3: CARD LEVELS (FUSION STYLE) ============ */
        .levels-fusion {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: var(--border);
            border-bottom: 1px solid var(--border);
        }

        .level-box {
            background: var(--bg-panel);
            padding: 8px 10px;
            cursor: pointer;
            transition: background 0.15s ease;
            text-align: center;
        }
        .level-box:hover {
            background: rgba(232, 180, 216, 0.02);
        }
        .level-box:active {
            background: rgba(232, 180, 216, 0.04);
        }

        .level-box .lbl {
            font-size: 7px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            margin-bottom: 3px;
        }
        .level-box .val {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        .level-box.entry .val { color: var(--text-bright); }
        .level-box.target .val { color: var(--terminal-green); }
        .level-box.stop .val { color: var(--terminal-red); }

        /* ============ ROW 4: ANALYSIS PANELS ============ */
        .analysis-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--border);
        }

        .analysis-panel {
            background: var(--bg-panel);
            padding: 8px 10px;
        }

        .panel-title {
            font-size: 7px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            margin-bottom: 6px;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--grid-line);
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px 0;
            font-size: 8px;
        }
        .metric-label {
            color: var(--text-dim);
            letter-spacing: 0.5px;
        }
        .metric-value {
            font-weight: 500;
        }

        .mini-dot {
            display: inline-block;
            width: 5px;
            height: 5px;
            border-radius: 1px;
            margin-right: 3px;
            vertical-align: middle;
        }
        .mini-dot.on { background: var(--terminal-green); }
        .mini-dot.off { background: rgba(232, 180, 216, 0.1); }

        /* Footer */
        footer {
            text-align: center;
            font-size: 7px;
            color: var(--text-dim);
            padding: 6px;
            opacity: 0.5;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Bloomberg-style Header -->
    <header>
        <div class="brand">
            <h1>URA</h1>
            <span class="version">v6.0</span>
        </div>
        <div class="header-right">
            <div class="feed-status" style="display: flex; align-items: center; gap: 6px; font-size: 8px; font-weight: 500; color: var(--feed); background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 2px; border-left: 2px solid var(--feed);">
                <span id="livePulse" class="live-pulse"></span>
                <span>LIVE FEED</span>
            </div>
            <button id="switchPairBtn" class="switch-pair-btn">
                <span id="switchLabel">XAU</span>
            </button>
        </div>
    </header>

    <div id="terminals"></div>

    <footer>
        BLOOMBERG FUSION TERMINAL | SMC PRECISION ENGINE | BINANCE FEED
    </footer>
</div>

<script>
    // ==================== KONFIGURASI (EASY TO ADJUST) ====================
    const CONFIG = {
        pairs: {
            xau: {
                name: 'XAUUSD',
                symbol: 'XAU',
                wsUrl: 'wss://stream.binance.com:9443/ws/paxgusdt@ticker',
                offset: 6,
                risk: 8,          // Stop loss risk in points
                rr: 1.3,          // Risk-to-Reward ratio
                threshold: 0.05,  // Signal trigger threshold
                trendThreshold: 0.8,
                momThreshold: 0.12
            },
            btc: {
                name: 'BTCUSD',
                symbol: 'BTC',
                wsUrl: 'wss://stream.binance.com:9443/ws/btcusdt@ticker',
                offset: 5,
                risk: 0.0020,     // Stop loss risk (percentage of entry)
                rr: 1.4,
                threshold: 6,
                trendThreshold: 50,
                momThreshold: 15
            }
        },
        defaultPair: 'xau'
    };

    // ==================== STATE MANAGEMENT ====================
    let state = { xau: null, btc: null };
    let wsStatus = { xau: false, btc: false };
    let wsRetries = { xau: 0, btc: 0 };
    let activePairId = null;
    let wsConnections = {};
    let priceHistory = { xau: [], btc: [] };

    // ==================== HTF DATA (EMA20/50) ====================
    let htfHistory = { xau: [], btc: [] };
    let htfEma20 = { xau: 0, btc: 0 };
    let htfEma50 = { xau: 0, btc: 0 };
    let htfTrend = { xau: 'neutral', btc: 'neutral' };
    let htfMomentum = { xau: 0, btc: 0 };
    let htfCounter = { xau: 0, btc: 0 };
    const emaAlpha = 2 / 21;
    const emaAlpha50 = 2 / 51;

    // ==================== PA ROC DATA ====================
    let paHistory = { xau: [], btc: [] };
    let paTrend = { xau: 'neutral', btc: 'neutral' };
    let paMomentum = { xau: 0, btc: 0 };

    function createFreshState() {
        return { 
            lastPrice: 0, prevPrice: 0, trendScore: 0, 
            l1: false, l2: false, l3: false, 
            confirmed: false, type: 'none', 
            entry: 0, sl: 0, tp: 0
        };
    }

    function loadState() {
        const savedState = localStorage.getItem('ura_fusion_state');
        if (savedState) {
            try {
                const parsed = JSON.parse(savedState);
                state.xau = parsed.xau || createFreshState();
                state.btc = parsed.btc || createFreshState();
            } catch(e) {
                resetAllStates();
            }
        } else {
            resetAllStates();
        }
        activePairId = localStorage.getItem('ura_fusion_active_pair') || CONFIG.defaultPair;
    }

    function resetAllStates() {
        state.xau = createFreshState();
        state.btc = createFreshState();
    }

    function saveState() {
        localStorage.setItem('ura_fusion_state', JSON.stringify({ xau: state.xau, btc: state.btc }));
    }

    function saveActivePair(id) {
        localStorage.setItem('ura_fusion_active_pair', id);
    }

    // ==================== HTF EMA20/50 ====================
    function updateHTF(id, price) {
        htfHistory[id].push(price);
        if (htfHistory[id].length > 150) htfHistory[id].shift();
        htfCounter[id]++;
        if (htfCounter[id] < 6) return;
        htfCounter[id] = 0;
        
        const len = htfHistory[id].length;
        if (len >= 20) {
            if (htfEma20[id] === 0) {
                htfEma20[id] = htfHistory[id].slice(-20).reduce((a,b)=>a+b,0) / 20;
            } else {
                htfEma20[id] = (price * emaAlpha) + (htfEma20[id] * (1 - emaAlpha));
            }
        }
        if (len >= 50) {
            if (htfEma50[id] === 0) {
                htfEma50[id] = htfHistory[id].slice(-50).reduce((a,b)=>a+b,0) / 50;
            } else {
                htfEma50[id] = (price * emaAlpha50) + (htfEma50[id] * (1 - emaAlpha50));
            }
        }
        
        if (htfEma20[id] !== 0 && htfEma50[id] !== 0) {
            const diff = ((htfEma20[id] - htfEma50[id]) / htfEma50[id]) * 100;
            if (diff > 0.04) htfTrend[id] = 'up';
            else if (diff < -0.04) htfTrend[id] = 'down';
            else htfTrend[id] = 'neutral';
        }
        
        if (len >= 15) {
            const oldPrice = htfHistory[id][len - 15];
            htfMomentum[id] = ((price - oldPrice) / oldPrice) * 100;
        }
    }

    // ==================== PA ROC ====================
    function updatePA(id, price) {
        paHistory[id].push(price);
        if (paHistory[id].length > 20) paHistory[id].shift();
        if (paHistory[id].length >= 10) {
            const oldPrice = paHistory[id][paHistory[id].length - 10];
            const roc = ((price - oldPrice) / oldPrice) * 100;
            paMomentum[id] = roc;
            if (roc > 0.06) paTrend[id] = 'up';
            else if (roc < -0.06) paTrend[id] = 'down';
            else paTrend[id] = 'neutral';
        }
    }

    // ==================== SIGNAL ENGINE ====================
    function updateSignalLogic(id, price) {
        const s = state[id];
        const p = CONFIG.pairs[id];
        
        if (s.confirmed) {
            if (s.type === 'buy' && (price >= s.tp || price <= s.sl)) resetSignal(id);
            else if (s.type === 'sell' && (price <= s.tp || price >= s.sl)) resetSignal(id);
            return;
        }
        
        const diff = price - s.prevPrice;
        if (s.prevPrice !== 0 && diff !== 0) {
            s.trendScore += diff;
        }
        
        if (!s.confirmed && s.prevPrice !== 0 && Math.abs(diff) > p.threshold) {
            const direction = diff > 0 ? 'buy' : 'sell';
            if (!s.l1) { s.l1 = true; s.type = direction; saveState(); }
            else if (!s.l2) { s.l2 = true; saveState(); }
            else { lockSignal(id, price, direction); }
        }
    }

    function lockSignal(id, entry, type) {
        const s = state[id];
        const p = CONFIG.pairs[id];
        const offset = type === 'buy' ? 0 : 0;
        const adjustedEntry = entry + offset;
        
        s.l3 = true;
        s.confirmed = true;
        s.type = type;
        s.entry = adjustedEntry;
        
        let risk;
        if (id === 'xau') {
            risk = p.risk;
        } else {
            risk = entry * p.risk;
        }
        
        s.sl = type === 'buy' ? adjustedEntry - risk : adjustedEntry + risk;
        s.tp = type === 'buy' ? adjustedEntry + (risk * p.rr) : adjustedEntry - (risk * p.rr);
        saveState();
    }

    function resetSignal(id) {
        const s = state[id];
        const history = priceHistory[id];
        const prevPrice = s.lastPrice;
        
        state[id] = createFreshState();
        state[id].lastPrice = prevPrice;
        state[id].prevPrice = prevPrice;
        priceHistory[id] = history;
        saveState();
        renderUI(id);
    }

    // ==================== UPDATE DISPLAY ====================
    function updateDisplay(id, price) {
        const s = state[id];
        const p = CONFIG.pairs[id];
        s.prevPrice = s.lastPrice;
        s.lastPrice = price;
        
        // Update HTF dan PA
        updateHTF(id, price);
        updatePA(id, price);
        
        // Price display
        const priceEl = document.getElementById(`price-${id}`);
        if (priceEl) {
            priceEl.innerText = price.toFixed(2);
            if (s.prevPrice !== 0) {
                priceEl.style.color = price >= s.prevPrice ? 'var(--terminal-green)' : 'var(--terminal-red)';
            }
        }
        
        // Price change
        const changeEl = document.getElementById(`change-${id}`);
        if (changeEl && s.prevPrice !== 0) {
            const diff = price - s.prevPrice;
            changeEl.innerText = `${diff >= 0 ? '+' : ''}${diff.toFixed(2)}`;
            changeEl.style.color = diff >= 0 ? 'var(--terminal-green)' : 'var(--terminal-red)';
        }
        
        // Range
        if (priceHistory[id].length >= 2) {
            const high = Math.max(...priceHistory[id]);
            const low = Math.min(...priceHistory[id]);
            const rangeEl = document.getElementById(`range-${id}`);
            if (rangeEl) rangeEl.innerText = (high - low).toFixed(2);
        }
        
        // Signal logic
        updateSignalLogic(id, price);
        renderUI(id);
    }

    // ==================== RENDER UI ====================
    function renderUI(id) {
        const s = state[id];
        const isBuy = s.type === 'buy';
        const hasFeed = wsStatus[id];
        
        // Fusion dots
        ['fd1', 'fd2', 'fd3'].forEach((fd, i) => {
            const dot = document.getElementById(`${fd}-${id}`);
            if (!dot) return;
            const stage = s[`l${i+1}`];
            dot.className = 'fusion-dot';
            if (stage && s.confirmed) {
                dot.classList.add(isBuy ? 'active-buy' : 'active-sell');
                dot.classList.add('pulse');
            } else if (stage) {
                dot.classList.add(isBuy ? 'active-buy' : 'active-sell');
            }
        });
        
        // Signal text
        const sigText = document.getElementById(`signal-text-${id}`);
        if (sigText) {
            if (!hasFeed) {
                sigText.innerText = 'NO FEED';
                sigText.style.color = 'var(--terminal-red)';
            } else if (s.confirmed) {
                sigText.innerText = s.type.toUpperCase();
                sigText.style.color = isBuy ? 'var(--terminal-green)' : 'var(--terminal-red)';
            } else if (s.l3) {
                sigText.innerText = 'FVG';
                sigText.style.color = 'var(--terminal-orange)';
            } else if (s.l2) {
                sigText.innerText = 'CHoCH';
                sigText.style.color = 'var(--terminal-orange)';
            } else if (s.l1) {
                sigText.innerText = 'SWEEP';
                sigText.style.color = 'var(--terminal-blue)';
            } else {
                sigText.innerText = 'IDLE';
                sigText.style.color = 'var(--text-dim)';
            }
        }
        
        // Logic Engine mini dots
        ['ml1', 'ml2', 'ml3'].forEach((ml, i) => {
            const dot = document.getElementById(`${ml}-${id}`);
            if (dot) {
                dot.className = s[`l${i+1}`] ? 'mini-dot on' : 'mini-dot off';
            }
        });
        
        // Logic labels
        const l1El = document.getElementById(`logic-l1-${id}`);
        if (l1El) l1El.innerText = s.l1 ? 'DETECT' : '--';
        const l2El = document.getElementById(`logic-l2-${id}`);
        if (l2El) l2El.innerText = s.l2 ? 'DETECT' : '--';
        const l3El = document.getElementById(`logic-l3-${id}`);
        if (l3El) l3El.innerText = s.l3 ? 'DETECT' : '--';
        
        // Levels
        const entryEl = document.getElementById(`entry-${id}`);
        if (entryEl) entryEl.innerText = s.confirmed ? s.entry.toFixed(2) : '--';
        const tpEl = document.getElementById(`tp-${id}`);
        if (tpEl) tpEl.innerText = s.confirmed ? s.tp.toFixed(2) : '--';
        const slEl = document.getElementById(`sl-${id}`);
        if (slEl) slEl.innerText = s.confirmed ? s.sl.toFixed(2) : '--';
        
        // HTF Display (EMA20/50)
        const htfTrendEl = document.getElementById(`trend-${id}`);
        if (htfTrendEl) {
            let text = htfTrend[id] === 'up' ? '▲ BULLISH' : (htfTrend[id] === 'down' ? '▼ BEARISH' : '◆ NEUTRAL');
            htfTrendEl.innerText = text;
            htfTrendEl.style.color = htfTrend[id] === 'up' ? 'var(--terminal-green)' : (htfTrend[id] === 'down' ? 'var(--terminal-red)' : 'var(--text-dim)');
        }
        
        // PA Momentum (ROC)
        const momEl = document.getElementById(`mom-${id}`);
        if (momEl) {
            let momText = paMomentum[id] > 0.08 ? '▲ STRONG' : (paMomentum[id] > 0 ? '▲ WEAK' : (paMomentum[id] > -0.08 ? '▼ WEAK' : '▼ STRONG'));
            momEl.innerText = momText;
            momEl.style.color = paMomentum[id] >= 0 ? 'var(--terminal-green)' : 'var(--terminal-red)';
        }
        
        // Range sudah diupdate di updateDisplay
    }

    // ==================== WEBSOCKET ====================
    function connectWebSocket(id) {
        const p = CONFIG.pairs[id];
        if (!p) return;
        if (wsConnections[id]) try { wsConnections[id].close(); } catch(e) {}
        
        try {
            const ws = new WebSocket(p.wsUrl);
            ws.onopen = () => {
                wsStatus[id] = true;
                wsRetries[id] = 0;
                updateWSStatus(id);
                updateGlobalLivePulse();
            };
            ws.onclose = () => {
                wsStatus[id] = false;
                updateWSStatus(id);
                updateGlobalLivePulse();
                const delay = Math.min(1000 * Math.pow(2, wsRetries[id]), 30000);
                wsRetries[id]++;
                setTimeout(() => connectWebSocket(id), delay);
            };
            ws.onerror = () => {
                wsStatus[id] = false;
                updateWSStatus(id);
                updateGlobalLivePulse();
            };
            ws.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    const price = parseFloat(data.c) + p.offset;
                    if (price > 0) {
                        if (!wsStatus[id]) {
                            wsStatus[id] = true;
                            updateWSStatus(id);
                            updateGlobalLivePulse();
                        }
                        priceHistory[id].push(price);
                        if (priceHistory[id].length > 50) priceHistory[id].shift();
                        updateDisplay(id, price);
                    }
                } catch(err) { console.error(`Parse error ${id}:`, err); }
            };
            wsConnections[id] = ws;
        } catch(err) {
            wsStatus[id] = false;
            updateWSStatus(id);
            updateGlobalLivePulse();
            setTimeout(() => connectWebSocket(id), 5000);
        }
    }

    function updateWSStatus(id) {
        const el = document.getElementById(`ws-status-${id}`);
        if (el) {
            el.textContent = wsStatus[id] ? '● LIVE' : '● RECONNECT';
            el.className = `ws-status ${wsStatus[id] ? 'connected' : 'disconnected'}`;
        }
        renderUI(id);
    }

    function updateGlobalLivePulse() {
        const pulseEl = document.getElementById('livePulse');
        if (pulseEl) {
            const anyConnected = wsStatus.xau || wsStatus.btc;
            if (anyConnected) pulseEl.classList.add('connected');
            else pulseEl.classList.remove('connected');
        }
    }

    function updateSwitchLabel() {
        const label = document.getElementById('switchLabel');
        if (label) label.innerText = CONFIG.pairs[activePairId]?.symbol || activePairId.toUpperCase();
    }

    // ==================== INIT ====================
    function init() {
        loadState();
        
        // Seed HTF data
        for (let i = 0; i < 60; i++) {
            htfHistory.xau.push(4690 + i * 0.15);
            htfHistory.btc.push(60000 + i * 1.5);
        }
        updateHTF('xau', 4695);
        updateHTF('btc', 60030);
        
        const container = document.getElementById('terminals');
        container.innerHTML = '';
        
        Object.keys(CONFIG.pairs).forEach(id => {
            const p = CONFIG.pairs[id];
            if (!state[id]) state[id] = createFreshState();
            if (!priceHistory[id]) priceHistory[id] = [];
            
            container.innerHTML += `
                <div class="pair-card ${id === activePairId ? 'active' : ''}" id="card-${id}">
                    <div class="card">
                        <div class="price-header">
                            <div class="pair-info">
                                <span class="pair-name">${p.symbol}</span>
                                <span id="ws-status-${id}" class="ws-status disconnected">● RECONNECT</span>
                            </div>
                            <div class="price-display">
                                <div class="price-value" id="price-${id}">0.00</div>
                                <div class="price-change" id="change-${id}">--</div>
                            </div>
                        </div>
                        <div class="signal-fusion-bar">
                            <span class="signal-label">Signal</span>
                            <div class="signal-fusion-center">
                                <div class="fusion-dot" id="fd1-${id}"></div>
                                <div class="fusion-line"></div>
                                <div class="fusion-dot" id="fd2-${id}"></div>
                                <div class="fusion-line"></div>
                                <div class="fusion-dot" id="fd3-${id}"></div>
                            </div>
                            <span class="signal-status-text" id="signal-text-${id}">IDLE</span>
                        </div>
                        <div class="levels-fusion">
                            <div class="level-box entry" onclick="copyValue('${id}','entry')"><div class="lbl">Entry</div><div class="val" id="entry-${id}">--</div></div>
                            <div class="level-box target" onclick="copyValue('${id}','tp')"><div class="lbl">Target</div><div class="val" id="tp-${id}">--</div></div>
                            <div class="level-box stop" onclick="copyValue('${id}','sl')"><div class="lbl">Stop</div><div class="val" id="sl-${id}">--</div></div>
                        </div>
                        <div class="analysis-row">
                            <div class="analysis-panel">
                                <div class="panel-title">Logic Engine</div>
                                <div class="metric-row"><span class="metric-label"><span class="mini-dot" id="ml1-${id}"></span>SWEEP</span><span class="metric-value" id="logic-l1-${id}">--</span></div>
                                <div class="metric-row"><span class="metric-label"><span class="mini-dot" id="ml2-${id}"></span>CHoCH</span><span class="metric-value" id="logic-l2-${id}">--</span></div>
                                <div class="metric-row"><span class="metric-label"><span class="mini-dot" id="ml3-${id}"></span>FVG</span><span class="metric-value" id="logic-l3-${id}">--</span></div>
                            </div>
                            <div class="analysis-panel">
                                <div class="panel-title">Price Action</div>
                                <div class="metric-row"><span class="metric-label">TREND</span><span class="metric-value" id="trend-${id}">--</span></div>
                                <div class="metric-row"><span class="metric-label">MOMENTUM</span><span class="metric-value" id="mom-${id}">--</span></div>
                                <div class="metric-row"><span class="metric-label">RANGE</span><span class="metric-value" id="range-${id}">--</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            connectWebSocket(id);
        });

        updateSwitchLabel();
        document.getElementById('switchPairBtn').onclick = () => {
            const pairsList = Object.keys(CONFIG.pairs);
            const currentIndex = pairsList.indexOf(activePairId);
            const nextIndex = (currentIndex + 1) % pairsList.length;
            activePairId = pairsList[nextIndex];
            saveActivePair(activePairId);
            updateSwitchLabel();
            document.querySelectorAll('.pair-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`card-${activePairId}`).classList.add('active');
        };
        
        updateGlobalLivePulse();
        setInterval(() => updateGlobalLivePulse(), 1000);
    }

    window.copyValue = (id, type) => {
        const val = document.getElementById(`${type}-${id}`).innerText;
        if (val !== '--') {
            navigator.clipboard.writeText(val);
            if (navigator.vibrate) navigator.vibrate(50);
        }
    };
    
    init();
</script>
</body>
</html>

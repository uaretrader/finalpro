<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TERMINAL v7.0 - FULL SELF ADAPTIVE ENGINE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght=500;700&family=Inter:wght@400;600;800&display=swap');

        :root {
            --bg: #1a1d21; 
            --text: #e6e8ea;
            --text-dim: #707a8a;
            --accent: #f0b90b;
            --success: #00FFFF; 
            --danger: #FF5252; 
            --feed-lightning: #FFEA00;
            --border: rgba(255, 255, 255, 0.1);
            --phase-trending: #00FF88;
            --confirm-pending: #f0b90b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            padding: 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { max-width: 450px; width: 100%; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .brand h1 { font-size: 1rem; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
        .brand h1 span { font-size: 0.6rem; background: rgba(0,255,255,0.15); padding: 2px 6px; border-radius: 10px; margin-left: 6px; }
        .sys-status { font-family: 'JetBrains Mono', monospace; font-size: 0.5rem; text-align: right; color: var(--text-dim); }
        
        .pulse { 
            display: inline-block; 
            width: 7px; 
            height: 7px; 
            background: var(--feed-lightning); 
            border-radius: 50%; 
            margin-right: 5px; 
            animation: blink 1.5s infinite; 
        }
        .pulse.connected {
            background: var(--success);
            box-shadow: 0 0 5px var(--success);
        }
        .pulse.disconnected {
            background: var(--danger);
            animation: blink 0.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .ws-status {
            font-size: 0.5rem;
            padding: 2px 6px;
            border-radius: 3px;
            margin-top: 2px;
            display: inline-block;
        }
        .ws-status.connected { color: var(--phase-trending); }
        .ws-status.disconnected { color: var(--danger); animation: blink 1s infinite; }

        .switch-pair-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255,255,255,0.03);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: 10px;
        }
        .switch-pair-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .pair-card { display: none; }
        .pair-card.active { display: block; }

        .card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card-top { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            margin-bottom: 8px; 
        }
        .pair-info { display: flex; flex-direction: column; }
        .pair { font-weight: 800; font-size: 1.1rem; letter-spacing: 1px; color: var(--text); }
        .price { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 1.2rem; 
            font-weight: 700; 
            background: transparent;
            padding: 4px 0;
            text-align: right;
            transition: color 0.1s ease;
        }

        .signal-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
        }
        .signal-bar.confirm-wait {
            border-color: var(--confirm-pending);
            background: rgba(240, 185, 11, 0.1);
            animation: pulseBorder 1s infinite;
        }
        @keyframes pulseBorder {
            0%, 100% { border-color: rgba(240, 185, 11, 0.3); }
            50% { border-color: rgba(240, 185, 11, 1); }
        }

        .signal-dot-group { display: flex; gap: 12px; align-items: center; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); transition: all 0.1s; }
        .dot.active { background: var(--success); box-shadow: 0 0 6px var(--success); transform: scale(1.1); }
        .dot.active-down { background: var(--danger); box-shadow: 0 0 6px var(--danger); transform: scale(1.1); }
        .dot.confirm-pending { background: var(--confirm-pending); animation: pulseDot 0.8s infinite; }
        @keyframes pulseDot { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        .card-level-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 4px;
        }
        .level-item { display: flex; flex-direction: column; cursor: pointer; transition: 0.1s; }
        .level-item:active { background: rgba(255,255,255,0.05); }
        .level-item:nth-child(1) { align-items: flex-start; text-align: left; }
        .level-item:nth-child(2) { align-items: center; text-align: center; }
        .level-item:nth-child(3) { align-items: flex-end; text-align: right; }
        .level-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
        .level-value { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; font-weight: 700; }

        /* Regime Indicator */
        .regime-indicator {
            margin-top: 8px;
            padding: 4px 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            font-size: 0.55rem;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .regime-badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 700;
        }
        .regime-badge.ranging { background: rgba(114, 137, 218, 0.3); color: #7289da; }
        .regime-badge.trending { background: rgba(0, 255, 170, 0.2); color: #00FFAA; }
        .regime-badge.breakout { background: rgba(240, 185, 11, 0.3); color: #f0b90b; }
        .regime-badge.normal { background: rgba(255,255,255,0.1); color: var(--text-dim); }

        .htf-status { display: none; }
        footer { text-align: center; font-size: 0.55rem; color: var(--text-dim); margin-top: 10px; opacity: 0.6; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="brand">
            <h1>uradvisor <span>v7.0</span></h1>
            <p style="font-size: 0.5rem; color: var(--text-dim)">FULL SELF-ADAPTIVE ENGINE</p>
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <div class="sys-status">
                <div><span class="pulse" id="globalPulse"></span>LIVE</div>
            </div>
            <button id="switchPairBtn" class="switch-pair-btn">
                <span id="switchLabel">XAUUSD</span>
            </button>
        </div>
    </header>

    <div id="terminals"></div>

    <footer>
        [ ENGINE CORE ]: ADAPTIVE REGIME DETECTION + SMART SIGNAL + HTF CONFIRMATION<br>
        [ METHOD ]: RANGING(3x) | TRENDING(2x) | BREAKOUT(1x) | NORMAL(2x)
    </footer>
</div>

<script>
(function() {
    'use strict';

    // ==================== OPTIMASI ANTI-LAG ====================
    let pendingSaveData = { xau: null, btc: null };
    let pendingSaveTimer = { xau: null, btc: null };
    const SAVE_INTERVAL = 3000;
    let rafPending = { xau: false, btc: false };
    let pendingPriceData = { xau: null, btc: null };
    let pendingSignalData = { xau: null, btc: null };
    let signalDebounceTimer = { xau: null, btc: null };
    const SIGNAL_DEBOUNCE_MS = 30;

    // ==================== KONFIGURASI ====================
    const BTC_WS_URL = 'wss://stream.binance.com:9443/ws/btcusdt@aggTrade';
    const XAU_OFFSET = -3;
    const CONFIRMATION_DELAY_CYCLES = 3; 
    
    // ==================== STATE MANAGEMENT ====================
    let state = { xau: null, btc: null };
    let wsStatus = { xau: true, btc: false };
    let activePairId = localStorage.getItem('ura_active_pair') || 'xau';
    
    // ==================== PENDING CONFIRMATION STATE ====================
    let pendingConfirmation = { xau: null, btc: null };
    
    // ==================== REGIME STATE (ADAPTIVE) ====================
    let currentRegime = { xau: 'NORMAL', btc: 'NORMAL' };
    
    // ==================== TRIPLE TAP RESET ====================
    let tapCounters = { xau: 0, btc: 0 };
    let tapTimers = { xau: null, btc: null };
    const TAP_TIMEOUT = 500;

    function handleSignalBarTap(id) {
        if (tapTimers[id]) {
            clearTimeout(tapTimers[id]);
            tapTimers[id] = null;
        }
        
        tapCounters[id]++;
        
        tapTimers[id] = setTimeout(() => {
            tapCounters[id] = 0;
            tapTimers[id] = null;
        }, TAP_TIMEOUT);
        
        if (tapCounters[id] === 3) {
            if (pendingConfirmation[id]) cancelPendingConfirmation(id);
            resetSignal(id);
            tapCounters[id] = 0;
            if (tapTimers[id]) {
                clearTimeout(tapTimers[id]);
                tapTimers[id] = null;
            }
            if (navigator.vibrate) navigator.vibrate(30);
        }
    }

    function cancelPendingConfirmation(id) {
        if (pendingConfirmation[id]) {
            if (pendingConfirmation[id].timerId) {
                clearTimeout(pendingConfirmation[id].timerId);
            }
            pendingConfirmation[id] = null;
            
            const signalBar = document.getElementById(`signal-bar-${id}`);
            if (signalBar) signalBar.classList.remove('confirm-wait');
            
            const l3Dot = document.getElementById(`l3-${id}`);
            if (l3Dot) l3Dot.className = "dot";
            
            pendingSignalData[id] = true;
            throttledUpdateUI(id);
        }
    }

    // ==================== THROTTLED LOCALSTORAGE ====================
    function throttledSaveState(id) {
        const s = state[id];
        if (!s) return;
        
        pendingSaveData[id] = {
            lastPrice: s.lastPrice,
            trendScore: s.trendScore,
            l1: s.l1, l2: s.l2, l3: s.l3,
            confirmed: s.confirmed,
            type: s.type,
            entry: s.entry, sl: s.sl, tp: s.tp
        };
        
        if (pendingSaveTimer[id]) return;
        
        pendingSaveTimer[id] = setTimeout(() => {
            if (pendingSaveData[id]) {
                localStorage.setItem(`ura_state_${id}`, JSON.stringify(pendingSaveData[id]));
                pendingSaveData[id] = null;
            }
            pendingSaveTimer[id] = null;
        }, SAVE_INTERVAL);
    }

    // ==================== RAF THROTTLED UI UPDATE ====================
    function throttledUpdateUI(id) {
        if (!rafPending[id]) {
            rafPending[id] = true;
            requestAnimationFrame(() => {
                if (pendingPriceData[id] !== null) {
                    updatePriceDisplayOnly(id, pendingPriceData[id]);
                    pendingPriceData[id] = null;
                }
                if (pendingSignalData[id] !== null) {
                    updateSignalUIOnly(id);
                    pendingSignalData[id] = null;
                }
                rafPending[id] = false;
            });
        }
    }
    
    function updatePriceDisplayOnly(id, price) {
        const priceEl = document.getElementById(`price-${id}`);
        if (priceEl) {
            const oldPrice = state[id]?.lastPrice || 0;
            priceEl.innerText = price.toFixed(2);
            if (oldPrice !== 0 && oldPrice !== price) {
                priceEl.style.color = price > oldPrice ? "var(--success)" : "var(--danger)";
                setTimeout(() => { if (priceEl) priceEl.style.color = ""; }, 150);
            }
        }
    }
    
    function updateRegimeDisplay(id) {
        const regime = currentRegime[id] || 'NORMAL';
        const regimeEl = document.getElementById(`regime-${id}`);
        if (regimeEl) {
            let regimeClass = 'normal';
            if (regime === 'RANGING') regimeClass = 'ranging';
            else if (regime === 'TRENDING') regimeClass = 'trending';
            else if (regime === 'BREAKOUT') regimeClass = 'breakout';
            else regimeClass = 'normal';
            
            regimeEl.innerHTML = `<span>MARKET REGIME:</span><span class="regime-badge ${regimeClass}">${regime}</span>`;
        }
    }
    
    function updateSignalUIOnly(id) {
        const s = state[id];
        if (!s) return;
        
        const l1Dot = document.getElementById(`l1-${id}`);
        if (l1Dot) l1Dot.className = s.l1 ? (s.type === 'sell' ? "dot active-down" : "dot active") : "dot";
        
        const l2Dot = document.getElementById(`l2-${id}`);
        if (l2Dot) l2Dot.className = s.l2 ? (s.type === 'sell' ? "dot active-down" : "dot active") : "dot";
        
        const l3Dot = document.getElementById(`l3-${id}`);
        if (l3Dot) {
            if (pendingConfirmation[id] && s.l3 && !s.confirmed) {
                l3Dot.className = "dot confirm-pending";
            } else {
                l3Dot.className = s.l3 ? (s.type === 'sell' ? "dot active-down" : "dot active") : "dot";
            }
        }
        
        const signalText = document.getElementById(`signal-text-${id}`);
        if (signalText) {
            if (!wsStatus[id] && id === 'btc') {
                signalText.innerText = 'NO FEED';
                signalText.style.color = 'var(--danger)';
            } else if (pendingConfirmation[id] && s.l3 && !s.confirmed) {
                const progress = pendingConfirmation[id].cycleCounter || 0;
                signalText.innerText = `CONFIRM ${progress}/${CONFIRMATION_DELAY_CYCLES}`;
                signalText.style.color = 'var(--confirm-pending)';
            } else if (s.confirmed) {
                signalText.innerText = s.type.toUpperCase();
                signalText.style.color = s.type === 'buy' ? 'var(--success)' : 'var(--danger)';
            } else if (s.l3) {
                signalText.innerText = 'FVG';
                signalText.style.color = 'var(--accent)';
            } else if (s.l2) {
                signalText.innerText = 'CHoCH';
                signalText.style.color = 'var(--accent)';
            } else if (s.l1) {
                signalText.innerText = 'SWEEP';
                signalText.style.color = 'var(--feed-lightning)';
            } else {
                signalText.innerText = 'IDLE';
                signalText.style.color = 'var(--text-dim)';
            }
        }
        
        const entryEl = document.getElementById(`entry-${id}`);
        if (entryEl) entryEl.innerText = s.confirmed ? s.entry.toFixed(2) : '--';
        
        const tpEl = document.getElementById(`tp-${id}`);
        if (tpEl) tpEl.innerText = s.confirmed ? s.tp.toFixed(2) : '--';
        
        const slEl = document.getElementById(`sl-${id}`);
        if (slEl) slEl.innerText = s.confirmed ? s.sl.toFixed(2) : '--';
        
        updateRegimeDisplay(id);
    }

    // ==================== SMART HTF ENGINE V7 ====================
    const HTF_CANDLE_DURATION = 15000;

    function createHTFState() {
        return {
            candles: [],
            currentCandle: null,
            swings: [],
            structure: 'NEUTRAL',
            trend: 'SIDEWAYS',
            confidence: 0,
            momentum: 0,
            lastSwingHigh: null,
            lastSwingLow: null,
            atr: 1.5
        };
    }

    let htfDataStore = {
        xau: createHTFState(),
        btc: createHTFState()
    };

    function buildTimeCandle(id, price) {
        const htf = htfDataStore[id];
        const now = Date.now();

        if (!htf.currentCandle) {
            htf.currentCandle = {
                open: price,
                high: price,
                low: price,
                close: price,
                start: now,
                closed: false
            };
            return;
        }

        if (now - htf.currentCandle.start >= HTF_CANDLE_DURATION) {
            htf.currentCandle.closed = true;
            htf.candles.push(htf.currentCandle);

            if (htf.candles.length > 120) {
                htf.candles.shift();
            }

            htf.currentCandle = {
                open: price,
                high: price,
                low: price,
                close: price,
                start: now,
                closed: false
            };
        } else {
            htf.currentCandle.high = Math.max(htf.currentCandle.high, price);
            htf.currentCandle.low = Math.min(htf.currentCandle.low, price);
            htf.currentCandle.close = price;
        }
    }

    function calculateATR(id, period = 14) {
        const candles = htfDataStore[id].candles;

        if (candles.length < period + 1) {
            return id === 'xau' ? 1.5 : 30;
        }

        let trSum = 0;

        for (let i = candles.length - period; i < candles.length; i++) {
            const current = candles[i];
            const prev = candles[i - 1];

            const tr = Math.max(
                current.high - current.low,
                Math.abs(current.high - prev.close),
                Math.abs(current.low - prev.close)
            );

            trSum += tr;
        }

        const atr = trSum / period;
        htfDataStore[id].atr = atr;
        return atr;
    }

    // ==================== ADAPTIVE REGIME DETECTION (FIXED) ====================
    function detectAdaptiveRegime(id) {
        const candles = htfDataStore[id].candles;
        
        if (candles.length < 15) {
            currentRegime[id] = 'NORMAL';
            return { regime: 'NORMAL', multiplier: 0.32, confirmationReq: 2, aggression: 1.0, sensitivity: 1.0, confidenceBoost: 1.0, cooldown: 1 };
        }
        
        const recent = candles.slice(-18);
        let totalRange = 0;
        let momentum = 0;
        let impulseCount = 0;
        
        for (let i = 1; i < recent.length; i++) {
            const c = recent[i];
            const p = recent[i-1];
            const range = c.high - c.low;
            const delta = c.close - p.close;
            totalRange += range;
            momentum += delta;
            if (Math.abs(delta) > range * 0.55) {
                impulseCount++;
            }
        }
        
        const atr = Math.max(calculateATR(id), 0.5);
        const volatilityScore = totalRange / recent.length / atr;
        const directionalScore = Math.abs(momentum) / atr;
        const impulseScore = impulseCount / recent.length;
        
        let regime = 'NORMAL';
        let multiplier = 0.32;
        let confirmationReq = 2;
        let aggression = 1.0;
        let sensitivity = 1.0;
        let confidenceBoost = 1.0;
        let cooldown = 1;
        
        if (volatilityScore < 0.85) {
            regime = 'RANGING';
            multiplier = 0.55;
            confirmationReq = 3;
            aggression = 0.55;
            sensitivity = 0.65;
            confidenceBoost = 1.25;
            cooldown = 3;
        } else if (directionalScore > 5.5 && impulseScore > 0.35) {
            regime = 'BREAKOUT';
            multiplier = 0.25;
            confirmationReq = 1;
            aggression = 1.95;
            sensitivity = 1.75;
            confidenceBoost = 0.82;
            cooldown = 0;
        } else if (directionalScore > 2.8) {
            regime = 'TRENDING';
            multiplier = 0.35;
            confirmationReq = 2;
            aggression = 1.35;
            sensitivity = 1.28;
            confidenceBoost = 0.92;
            cooldown = 1;
        } else {
            regime = 'NORMAL';
            multiplier = 0.32;
            confirmationReq = 2;
            aggression = 1.0;
            sensitivity = 1.0;
            confidenceBoost = 1.0;
            cooldown = 1;
        }
        
        currentRegime[id] = regime;
        
        return { regime, multiplier, confirmationReq, aggression, sensitivity, confidenceBoost, cooldown };
    }
    
    function getAdaptiveThreshold(id) {
        const atr = calculateATR(id);
        const regime = detectAdaptiveRegime(id);
        let threshold = atr * regime.multiplier;
        
        const minThreshold = id === 'xau' ? 0.35 : 8;
        const maxThreshold = id === 'xau' ? 10 : 200;
        
        return Math.max(minThreshold, Math.min(maxThreshold, threshold));
    }
    
    function getAdaptiveConfirmationReq(id) {
        return detectAdaptiveRegime(id).confirmationReq;
    }
    
    function getAdaptiveConfidenceBoost(id) {
        return detectAdaptiveRegime(id).confidenceBoost;
    }
    
    function getAdaptiveAggression(id) {
        return detectAdaptiveRegime(id).aggression;
    }
    
    function getAdaptiveCooldown(id) {
        return detectAdaptiveRegime(id).cooldown;
    }

    function detectSmartSwings(id) {
        const htf = htfDataStore[id];
        const candles = htf.candles;

        if (candles.length < 5) return;

        const atr = calculateATR(id);
        const threshold = atr * 1.2;

        const recent = candles[candles.length - 2];
        if (!recent) return;

        if (!htf.lastSwingHigh || recent.high > htf.lastSwingHigh.price + threshold) {
            htf.lastSwingHigh = { price: recent.high, time: Date.now() };
            htf.swings.push({ type: 'H', value: recent.high });
        }

        if (!htf.lastSwingLow || recent.low < htf.lastSwingLow.price - threshold) {
            htf.lastSwingLow = { price: recent.low, time: Date.now() };
            htf.swings.push({ type: 'L', value: recent.low });
        }

        if (htf.swings.length > 20) {
            htf.swings.shift();
        }
    }

    function detectTrend(id) {
        const htf = htfDataStore[id];

        if (htf.swings.length < 4) {
            htf.trend = 'SIDEWAYS';
            return;
        }

        const highs = htf.swings.filter(s => s.type === 'H');
        const lows = htf.swings.filter(s => s.type === 'L');

        if (highs.length < 2 || lows.length < 2) return;

        const h1 = highs[highs.length - 2]?.value;
        const h2 = highs[highs.length - 1]?.value;
        const l1 = lows[lows.length - 2]?.value;
        const l2 = lows[lows.length - 1]?.value;

        if (h2 > h1 && l2 > l1) {
            htf.trend = 'UPTREND';
            htf.structure = 'BULLISH';
        } else if (h2 < h1 && l2 < l1) {
            htf.trend = 'DOWNTREND';
            htf.structure = 'BEARISH';
        } else {
            htf.trend = 'SIDEWAYS';
            htf.structure = 'NEUTRAL';
        }
    }

    function calculateNormalizedConfidence(id) {
        const htf = htfDataStore[id];
        const atr = calculateATR(id);
        const regimeBoost = getAdaptiveConfidenceBoost(id);

        if (htf.candles.length < 10) {
            htf.confidence = 0;
            return;
        }

        const recent = htf.candles.slice(-10);
        let directionalMove = 0;

        recent.forEach(c => {
            directionalMove += Math.abs(c.close - c.open);
        });

        const normalizedMove = directionalMove / (atr * recent.length);
        let confidence = normalizedMove * 18;

        if (htf.trend === 'UPTREND' || htf.trend === 'DOWNTREND') {
            confidence += 30;
        }

        const closes = recent.map(c => c.close);
        const momentum = closes[closes.length - 1] - closes[0];
        
        if (Math.abs(momentum) > atr * 2) {
            confidence += 25;
        }
        
        confidence = confidence / regimeBoost;

        htf.confidence = Math.max(0, Math.min(100, confidence));
    }

    function updateHTFEngine(id, price) {
        buildTimeCandle(id, price);
        detectSmartSwings(id);
        detectTrend(id);
        calculateNormalizedConfidence(id);
    }

    function isHTFConfirmingDirection(id, direction) {
        const htf = htfDataStore[id];
        const regime = currentRegime[id];
        const regimeConfidenceThreshold = (regime === 'RANGING') ? 35 : 45;

        if (!htf || htf.confidence < regimeConfidenceThreshold) {
            return false;
        }

        if (direction === 'buy') {
            return htf.trend === 'UPTREND';
        }
        if (direction === 'sell') {
            return htf.trend === 'DOWNTREND';
        }
        return false;
    }

    // ==================== DELAYED CONFIRMATION ====================
    function startConfirmationDelay(id, direction, entryPrice) {
        if (pendingConfirmation[id]) cancelPendingConfirmation(id);
        
        const adaptiveReq = getAdaptiveConfirmationReq(id);
        const cycles = Math.min(adaptiveReq, 3);
        
        pendingConfirmation[id] = {
            direction: direction,
            entryPrice: entryPrice,
            cycleCounter: 0,
            timerId: null,
            requiredCycles: cycles
        };
        
        const signalBar = document.getElementById(`signal-bar-${id}`);
        if (signalBar) signalBar.classList.add('confirm-wait');
        
        const l3Dot = document.getElementById(`l3-${id}`);
        if (l3Dot) l3Dot.classList.add('confirm-pending');
        
        updateSignalUIOnly(id);
        
        function checkConfirmationCycle() {
            if (!pendingConfirmation[id]) return;
            
            pendingConfirmation[id].cycleCounter++;
            updateSignalUIOnly(id);
            
            const required = pendingConfirmation[id].requiredCycles;
            if (pendingConfirmation[id].cycleCounter >= required) {
                const htfConfirmed = isHTFConfirmingDirection(id, direction);
                
                if (htfConfirmed) {
                    executeLockSignal(id, direction, entryPrice);
                } else {
                    resetSignal(id);
                    const signalText = document.getElementById(`signal-text-${id}`);
                    if (signalText) {
                        signalText.innerText = 'HTF REJECT';
                        signalText.style.color = 'var(--danger)';
                        setTimeout(() => updateSignalUIOnly(id), 1500);
                    }
                }
                pendingConfirmation[id] = null;
            } else {
                pendingConfirmation[id].timerId = setTimeout(checkConfirmationCycle, 4000);
            }
        }
        
        pendingConfirmation[id].timerId = setTimeout(checkConfirmationCycle, 4000);
    }
    
    function executeLockSignal(id, direction, entryPrice) {
        const s = state[id];
        const atr = calculateATR(id);
        const aggression = getAdaptiveAggression(id);
        
        s.l3 = true;
        s.confirmed = true;
        s.type = direction;
        
        const offset = (id === 'xau') ? 0.5 : 5;
        s.entry = direction === 'buy' ? entryPrice - offset : entryPrice + offset;
        
        const slDistance = atr * 1.3 * (1 / aggression);
        const tpDistance = atr * 2.4 * aggression;

        if (direction === 'buy') {
            s.sl = s.entry - slDistance;
            s.tp = s.entry + tpDistance;
        } else {
            s.sl = s.entry + slDistance;
            s.tp = s.entry - tpDistance;
        }

        throttledSaveState(id);
        pendingSignalData[id] = true;
        throttledUpdateUI(id);

        const signalBar = document.getElementById(`signal-bar-${id}`);
        if (signalBar) signalBar.classList.remove('confirm-wait');

        if (navigator.vibrate) navigator.vibrate(50);
    }

    // ==================== SMART SIGNAL ENGINE ====================
    let paEma = { xau: 0, btc: 0 };
    let paEmaAlpha = 0.2;
    let signalCooldown = { xau: 0, btc: 0 };

    function updatePA(id, price) {
        const s = state[id];

        if (paEma[id] === 0) {
            paEma[id] = price;
        } else {
            paEma[id] = (price * paEmaAlpha) + (paEma[id] * (1 - paEmaAlpha));
        }

        const emaDiff = paEma[id] - price;
        s.trendScore += emaDiff * 0.15;

        const clamp = id === 'xau' ? 12 : 1200;
        s.trendScore = Math.max(-clamp, Math.min(clamp, s.trendScore));
    }

    function createFreshState() {
        return {
            lastPrice: 0,
            trendScore: 0,
            l1: false,
            l2: false,
            l3: false,
            confirmed: false,
            type: 'none',
            entry: 0,
            sl: 0,
            tp: 0
        };
    }

    function loadState(id) {
        const saved = localStorage.getItem(`ura_state_${id}`);
        if (saved) {
            try { return JSON.parse(saved); }
            catch(e) { return createFreshState(); }
        }
        return createFreshState();
    }

    function processSignal(id, price) {
        const s = state[id];
        
        if (signalCooldown[id] > 0) {
            signalCooldown[id]--;
            s.lastPrice = price;
            return;
        }
        
        updatePA(id, price);
        
        const threshold = getAdaptiveThreshold(id);
        const cooldownVal = getAdaptiveCooldown(id);

        if (s.confirmed) {
            if ((s.type === 'buy' && (price >= s.tp || price <= s.sl)) ||
                (s.type === 'sell' && (price <= s.tp || price >= s.sl))) {
                resetSignal(id);
                signalCooldown[id] = cooldownVal;
            }
            s.lastPrice = price;
            return;
        }

        if (s.lastPrice === 0) {
            s.lastPrice = price;
            return;
        }

        const impulse = price - s.lastPrice;
        const emaBias = paEma[id] - s.lastPrice;
        const trendBias = Math.sign(s.trendScore || 0);
        const direction = impulse > 0 ? 'buy' : 'sell';
        
        const validImpulse = Math.abs(impulse) > threshold;
        const emaAligned = (direction === 'buy' && emaBias > 0) || (direction === 'sell' && emaBias < 0);
        const trendAligned = (direction === 'buy' && trendBias >= 0) || (direction === 'sell' && trendBias <= 0);

        if (!validImpulse || !emaAligned || !trendAligned) {
            s.lastPrice = price;
            return;
        }

        if (!s.l1) {
            s.l1 = true;
            s.type = direction;
        } else if (!s.l2 && direction === s.type) {
            s.l2 = true;
        } else if (!s.l3 && direction === s.type) {
            s.l3 = true;
            startConfirmationDelay(id, direction, price);
        }

        s.lastPrice = price;
        throttledSaveState(id);
        pendingSignalData[id] = true;
        throttledUpdateUI(id);
    }

    function updateSignal(id, price) {
        if (signalDebounceTimer[id]) {
            clearTimeout(signalDebounceTimer[id]);
        }
        
        signalDebounceTimer[id] = setTimeout(() => {
            processSignal(id, price);
            signalDebounceTimer[id] = null;
        }, SIGNAL_DEBOUNCE_MS);
    }

    function resetSignal(id) {
        if (pendingConfirmation[id]) {
            if (pendingConfirmation[id].timerId) clearTimeout(pendingConfirmation[id].timerId);
            pendingConfirmation[id] = null;
        }
        
        const s = state[id];
        s.l1 = false; s.l2 = false; s.l3 = false;
        s.confirmed = false; s.type = 'none';
        s.entry = 0; s.sl = 0; s.tp = 0;
        s.trendScore = 0;
        
        const signalBar = document.getElementById(`signal-bar-${id}`);
        if (signalBar) signalBar.classList.remove('confirm-wait');
        
        throttledSaveState(id);
        pendingSignalData[id] = true;
        throttledUpdateUI(id);
    }

    // ==================== XAU PRICE ENGINE ====================
    let xauWs = null;
    let xauReconnectTimer = null;
    let xauReconnectAttempts = 0;
    let xauFetchRetryTimer = null;
    let xauCurrentPrice = 0;
    let xauLastHeartbeat = Date.now();

    function updateXAUDisplay(price) {
        if (!price || isNaN(price) || price <= 0) return;
        
        xauCurrentPrice = price;
        xauLastHeartbeat = Date.now();
        
        pendingPriceData.xau = price;
        throttledUpdateUI('xau');
        
        updateHTFEngine('xau', price);
        updateSignal('xau', price);
        
        const statusEl = document.getElementById('ws-status-xau');
        if (statusEl) {
            if (xauFetchRetryTimer && (!xauWs || xauWs.readyState !== WebSocket.OPEN)) {
                statusEl.textContent = '● FALLBACK';
                statusEl.className = 'ws-status connected';
            } else {
                statusEl.textContent = '● CONNECTED';
                statusEl.className = 'ws-status connected';
            }
        }
        wsStatus.xau = true;
        updateGlobalPulse();
    }

    async function xauFetchRestPrice() {
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 8000);
            const resp = await fetch('https://fapi.binance.com/fapi/v1/ticker/price?symbol=XAUUSDT', { signal: controller.signal });
            clearTimeout(timeoutId);
            const data = await resp.json();
            if (data?.price) {
                const price = parseFloat(data.price) + XAU_OFFSET;
                if (price > 0 && price !== xauCurrentPrice) {
                    updateXAUDisplay(price);
                    return true;
                }
            }
        } catch(e) { console.warn('XAU REST error'); }
        return false;
    }

    function initXAUWebSocket() {
        if (xauWs) { try { xauWs.close(); } catch(e) {} xauWs = null; }
        if (xauReconnectTimer) clearTimeout(xauReconnectTimer);
        
        try {
            xauWs = new WebSocket('wss://fstream.binance.com/ws/xauusdt@trade');
            
            const wsTimeout = setTimeout(() => {
                if (xauWs && xauWs.readyState !== WebSocket.OPEN) {
                    if (xauWs) try { xauWs.close(); } catch(e) {}
                    xauWs = null;
                    if (!xauFetchRetryTimer) {
                        xauFetchRetryTimer = setInterval(async () => {
                            await xauFetchRestPrice();
                        }, 3000);
                    }
                }
            }, 5000);
            
            xauWs.onopen = () => {
                clearTimeout(wsTimeout);
                xauReconnectAttempts = 0;
                if (xauFetchRetryTimer) { clearInterval(xauFetchRetryTimer); xauFetchRetryTimer = null; }
                updateGlobalPulse();
            };
            
            xauWs.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.p) {
                        const price = parseFloat(data.p) + XAU_OFFSET;
                        if (!isNaN(price) && price > 0 && price !== xauCurrentPrice) {
                            updateXAUDisplay(price);
                        }
                    }
                } catch(err) {}
            };
            
            xauWs.onerror = () => {
                if (!xauFetchRetryTimer) {
                    xauFetchRetryTimer = setInterval(async () => {
                        await xauFetchRestPrice();
                    }, 3000);
                }
            };
            
            xauWs.onclose = () => {
                const delay = Math.min(1000 * Math.pow(1.5, xauReconnectAttempts), 15000);
                xauReconnectAttempts++;
                xauReconnectTimer = setTimeout(() => initXAUWebSocket(), delay);
                
                if (!xauFetchRetryTimer) {
                    xauFetchRetryTimer = setInterval(async () => {
                        await xauFetchRestPrice();
                    }, 3000);
                }
            };
        } catch(err) {
            if (!xauFetchRetryTimer) {
                xauFetchRetryTimer = setInterval(async () => {
                    await xauFetchRestPrice();
                }, 3000);
            }
        }
    }

    // ==================== BTC WEBSOCKET ====================
    let btcWs = null;
    let btcReconnectTimer = null;
    let btcReconnectAttempts = 0;

    function initBTCWebSocket() {
        if (btcWs) { try { btcWs.close(); } catch(e) {} btcWs = null; }
        if (btcReconnectTimer) clearTimeout(btcReconnectTimer);
        
        try {
            btcWs = new WebSocket(BTC_WS_URL);
            
            btcWs.onopen = () => {
                btcReconnectAttempts = 0;
                wsStatus.btc = true;
                const statusEl = document.getElementById('ws-status-btc');
                if (statusEl) {
                    statusEl.textContent = '● CONNECTED';
                    statusEl.className = 'ws-status connected';
                }
                updateGlobalPulse();
                updateSignalUIOnly('btc');
            };
            
            btcWs.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    const price = parseFloat(data.p);
                    if (price && price > 0 && !isNaN(price)) {
                        pendingPriceData.btc = price;
                        throttledUpdateUI('btc');
                        updateHTFEngine('btc', price);
                        updateSignal('btc', price);
                    }
                } catch(err) {}
            };
            
            btcWs.onclose = () => {
                wsStatus.btc = false;
                const statusEl = document.getElementById('ws-status-btc');
                if (statusEl) {
                    statusEl.textContent = '◌ RECONNECTING...';
                    statusEl.className = 'ws-status disconnected';
                }
                updateGlobalPulse();
                updateSignalUIOnly('btc');
                const delay = Math.min(1000 * Math.pow(2, btcReconnectAttempts), 30000);
                btcReconnectAttempts++;
                btcReconnectTimer = setTimeout(() => initBTCWebSocket(), delay);
            };
            
            btcWs.onerror = () => {
                wsStatus.btc = false;
                updateGlobalPulse();
            };
        } catch(err) {
            wsStatus.btc = false;
            setTimeout(() => initBTCWebSocket(), 5000);
        }
    }

    function updateGlobalPulse() {
        const pulseEl = document.getElementById('globalPulse');
        if (pulseEl) {
            const isLive = (xauCurrentPrice > 0) || wsStatus.btc;
            pulseEl.className = isLive ? 'pulse connected' : 'pulse disconnected';
        }
    }

    // ==================== CREATE REGIME INDICATORS ====================
    function createRegimeIndicator(id) {
        const card = document.getElementById(`card-${id}`);
        if (!card) return;
        const existing = document.getElementById(`regime-${id}`);
        if (existing) return;
        
        const regimeDiv = document.createElement('div');
        regimeDiv.id = `regime-${id}`;
        regimeDiv.className = 'regime-indicator';
        regimeDiv.innerHTML = `<span>📊 REGIME:</span><span class="regime-badge normal">NORMAL</span>`;
        const cardBody = card.querySelector('.card');
        if (cardBody) cardBody.appendChild(regimeDiv);
    }

    // ==================== INITIALIZATION ====================
    function init() {
        state.xau = loadState('xau');
        state.btc = loadState('btc');
        
        // Seed initial candles
        for (let i = 0; i < 20; i++) {
            const priceXau = 2620 + (Math.random() - 0.5) * 2;
            const priceBtc = 60000 + (Math.random() - 0.5) * 100;
            buildTimeCandle('xau', priceXau);
            buildTimeCandle('btc', priceBtc);
        }
        calculateATR('xau');
        calculateATR('btc');
        
        const container = document.getElementById('terminals');
        container.innerHTML = '';
        
        container.innerHTML += `
            <div class="pair-card ${activePairId === 'xau' ? 'active' : ''}" id="card-xau">
                <div class="card">
                    <div class="card-top">
                        <div class="pair-info">
                            <span class="pair">XAUUSD</span>
                            <span id="ws-status-xau" class="ws-status connected">● CONNECTING...</span>
                        </div>
                        <span class="price" id="price-xau">0.00</span>
                    </div>
                    <div class="signal-bar" id="signal-bar-xau">
                        <span>SIGNAL</span>
                        <div class="signal-dot-group">
                            <div class="dot" id="l1-xau"></div>
                            <div class="dot" id="l2-xau"></div>
                            <div class="dot" id="l3-xau"></div>
                        </div>
                        <span id="signal-text-xau">IDLE</span>
                    </div>
                    <div class="card-level-grid">
                        <div class="level-item" onclick="window.copyValue('xau','entry')">
                            <span class="level-label">Entry</span>
                            <span class="level-value" id="entry-xau">--</span>
                        </div>
                        <div class="level-item" onclick="window.copyValue('xau','tp')">
                            <span class="level-label">Target</span>
                            <span class="level-value" id="tp-xau" style="color:var(--success)">--</span>
                        </div>
                        <div class="level-item" onclick="window.copyValue('xau','sl')">
                            <span class="level-label">S-Loss</span>
                            <span class="level-value" id="sl-xau" style="color:var(--danger)">--</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="pair-card ${activePairId === 'btc' ? 'active' : ''}" id="card-btc">
                <div class="card">
                    <div class="card-top">
                        <div class="pair-info">
                            <span class="pair">BTCUSD</span>
                            <span id="ws-status-btc" class="ws-status disconnected">● RECONNECTING...</span>
                        </div>
                        <span class="price" id="price-btc">0.00</span>
                    </div>
                    <div class="signal-bar" id="signal-bar-btc">
                        <span>SIGNAL</span>
                        <div class="signal-dot-group">
                            <div class="dot" id="l1-btc"></div>
                            <div class="dot" id="l2-btc"></div>
                            <div class="dot" id="l3-btc"></div>
                        </div>
                        <span id="signal-text-btc">IDLE</span>
                    </div>
                    <div class="card-level-grid">
                        <div class="level-item" onclick="window.copyValue('btc','entry')">
                            <span class="level-label">Entry</span>
                            <span class="level-value" id="entry-btc">--</span>
                        </div>
                        <div class="level-item" onclick="window.copyValue('btc','tp')">
                            <span class="level-label">Target</span>
                            <span class="level-value" id="tp-btc" style="color:var(--success)">--</span>
                        </div>
                        <div class="level-item" onclick="window.copyValue('btc','sl')">
                            <span class="level-label">S-Loss</span>
                            <span class="level-value" id="sl-btc" style="color:var(--danger)">--</span>
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        createRegimeIndicator('xau');
        createRegimeIndicator('btc');
        
        const xauBar = document.getElementById('signal-bar-xau');
        const btcBar = document.getElementById('signal-bar-btc');
        if (xauBar) xauBar.addEventListener('click', () => handleSignalBarTap('xau'));
        if (btcBar) btcBar.addEventListener('click', () => handleSignalBarTap('btc'));
        
        updateSignalUIOnly('xau');
        updateSignalUIOnly('btc');
        
        initXAUWebSocket();
        xauFetchRestPrice();
        initBTCWebSocket();
        
        const switchLabel = document.getElementById('switchLabel');
        const switchBtn = document.getElementById('switchPairBtn');
        if (switchLabel && switchBtn) {
            switchLabel.innerText = activePairId === 'xau' ? 'XAUUSD' : 'BTCUSD';
            switchBtn.onclick = () => {
                activePairId = activePairId === 'xau' ? 'btc' : 'xau';
                localStorage.setItem('ura_active_pair', activePairId);
                switchLabel.innerText = activePairId === 'xau' ? 'XAUUSD' : 'BTCUSD';
                document.querySelectorAll('.pair-card').forEach(c => c.classList.remove('active'));
                document.getElementById(`card-${activePairId}`).classList.add('active');
            };
        }
        
        updateGlobalPulse();
        
        setInterval(() => {
            if (Date.now() - xauLastHeartbeat > 15000 && xauCurrentPrice > 0) {
                xauFetchRestPrice();
            }
            updateGlobalPulse();
        }, 10000);
        
        // Update regime periodically
        setInterval(() => {
            if (htfDataStore.xau.candles.length > 0) {
                detectAdaptiveRegime('xau');
                updateRegimeDisplay('xau');
            }
            if (htfDataStore.btc.candles.length > 0) {
                detectAdaptiveRegime('btc');
                updateRegimeDisplay('btc');
            }
        }, 30000);
    }
    
    window.copyValue = (id, type) => {
        const val = document.getElementById(`${type}-${id}`)?.innerText;
        if (val && val !== '--') {
            navigator.clipboard.writeText(val);
            if (navigator.vibrate) navigator.vibrate(50);
        }
    };
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
    
})();
</script>
</body>
</html>

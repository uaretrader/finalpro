<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>URA PRECISION v18.2 - Persistent Hybrid Engine</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;600;800&display=swap');

        :root {
            --bg: #1a1d21;
            --text: #e6e8ea;
            --text-dim: #707a8a;
            --accent: #f0b90b;
            --success: #00FFFF;
            --danger: #FF5252;
            --feed-lightning: #FFEA00;
            --border: rgba(255, 255, 255, 0.1);
            --card-bg: #1a1d21;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            padding: 0 15px 15px 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { max-width: 450px; width: 100%; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            padding-top: 10px;
            background: var(--bg);
        }

        .brand h1 { font-size: 1rem; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
        .sys-status { font-family: 'JetBrains Mono', monospace; font-size: 0.5rem; text-align: right; color: var(--text-dim); }

        .pulse {
            display: inline-block;
            width: 7px;
            height: 7px;
            background: var(--feed-lightning);
            border-radius: 50%;
            margin-right: 5px;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .switch-pair-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255,255,255,0.03);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: 10px;
        }
        .switch-pair-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 0;
            border-top: none;
            padding: 18px 20px 20px 20px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card-header-new {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .pair-big { font-weight: 800; font-size: 1.1rem; letter-spacing: 1px; color: var(--text); }
        .price-live { font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; font-weight: 700; }

        .signal-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 10px 14px;
            border-radius: 4px;
            margin-bottom: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .signal-dot-group { display: flex; gap: 12px; align-items: center; }
        .dot { width: 8px; height: 8px; border-radius: 2px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .dot.active { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .dot.active-down { background: var(--danger); box-shadow: 0 0 10px var(--danger); }

        .card-level-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 14px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 4px;
        }
        .level-item { display: flex; flex-direction: column; cursor: pointer; }
        .level-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
        .level-value { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; font-weight: 700; }

        .analysis-grid { display: grid; grid-template-columns: 1fr 1.1fr; gap: 12px; margin-bottom: 15px; }
        .box-logic, .box-pa { background: transparent; border: 1px solid var(--border); padding: 12px; border-radius: 4px; }
        .label-sm { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; display: block; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
        .stat { display: flex; justify-content: space-between; font-size: 0.7rem; font-family: 'JetBrains Mono', monospace; margin-bottom: 6px; }

        footer { text-align: center; font-size: 0.55rem; color: var(--text-dim); margin-top: 10px; font-family: 'JetBrains Mono', monospace; opacity: 0.6; }
        .pair-card { display: none; }
        .pair-card.active { display: block; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <div class="brand">
                <h1>uradvisor</h1>
                <p style="font-size: 0.5rem; color: var(--text-dim)">PRECISION ENGINE v18.2</p>
            </div>
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="sys-status">
                    <div><span class="pulse"></span>LIVE</div>
                    <div id="clock">00:00:00 UTC</div>
                </div>
                <button id="switchPairBtn" class="switch-pair-btn">
                    <span id="switchLabel">XAUUSD</span>
                </button>
            </div>
        </div>
    </header>

    <div id="terminals"></div>

    <footer>
        [ SYSTEM_LOG ]: AUTO_RESCAN_ACTIVE<br>
        [ METHOD ]: SWEEP + CHOCH + FVG_PRECISION
    </footer>
</div>

<script>
    // ==================== CONFIGURATION ====================
    const config = {
        xau: { sl: 7.00, rr: 2.0, lookback: 25, ws: 'wss://stream.binance.com:9443/ws/paxgusdt@ticker', offset: 8.6 },
        btc: { sl: 24.00, rr: 2.0, lookback: 40, ws: 'wss://stream.binance.com:9443/ws/btcusdt@ticker', offset: 0.0 }
    };

    let engineState = { xau: null, btc: null };
    let activePairId = localStorage.getItem('ura_active_pair') || 'xau';
    let wsConnections = {};

    function createFreshState() {
        return {
            priceHistory: [],
            swingHigh: 0,
            swingLow: Infinity,
            l1: false, l2: false, l3: false,
            type: 'none',
            entry: 0, sl: 0, tp: 0,
            confirmed: false,
            cooldown: false,
            lastPrice: 0
        };
    }

    // Persistence: Load Signal State
    function loadStates() {
        ['xau', 'btc'].forEach(id => {
            const saved = localStorage.getItem(`ura_state_${id}`);
            engineState[id] = saved ? JSON.parse(saved) : createFreshState();
        });
    }

    function saveState(id) {
        localStorage.setItem(`ura_state_${id}`, JSON.stringify(engineState[id]));
    }

    // ==================== CORE ALGORITHM ====================
    function analyzePrecisionLogic(id, price) {
        const s = engineState[id];
        const conf = config[id];
        
        s.priceHistory.push(price);
        if (s.priceHistory.length > 100) s.priceHistory.shift();

        // 1. AUTO RESET JIKA SL/TP HIT
        if (s.confirmed) {
            const hitTP = (s.type === 'buy' && price >= s.tp) || (s.type === 'sell' && price <= s.tp);
            const hitSL = (s.type === 'buy' && price <= s.sl) || (s.type === 'sell' && price >= s.sl);
            if (hitTP || hitSL) { 
                resetSignal(id); 
                return; 
            }
            return; 
        }

        if (s.cooldown) return;

        // 2. SCANNING LOGIC (SWEEP + CHOCH + FVG)
        if (!s.l1) {
            if (s.swingHigh !== 0 && price > s.swingHigh + (conf.sl * 0.1)) { s.l1 = true; s.type = 'sell'; saveState(id); }
            else if (s.swingLow !== Infinity && price < s.swingLow - (conf.sl * 0.1)) { s.l1 = true; s.type = 'buy'; saveState(id); }
        }
        
        if (s.l1 && !s.l2) {
            const recoveryThreshold = conf.sl * 0.2;
            if (s.type === 'sell' && price < s.swingHigh - recoveryThreshold) { s.l2 = true; saveState(id); }
            if (s.type === 'buy' && price > s.swingLow + recoveryThreshold) { s.l2 = true; saveState(id); }
        }
        
        if (s.l2 && !s.l3) {
            const p = s.priceHistory;
            const gap = Math.abs(p[p.length-1] - (p[p.length-4] || p[0]));
            if (gap > (conf.sl * 0.15)) {
                s.l3 = true;
                lockSignal(id, price);
            }
        }

        // 3. STRUCTURE CHANGE DETECTOR (Auto Reset if structure breaks too far)
        if (price > s.swingHigh) s.swingHigh = price;
        if (price < s.swingLow) s.swingLow = price;

        if (s.priceHistory.length % conf.lookback === 0) {
            s.swingHigh = price; 
            s.swingLow = price;
            saveState(id);
        }
    }

    function lockSignal(id, entry) {
        const s = engineState[id];
        const conf = config[id];
        s.confirmed = true;
        s.entry = entry;
        s.sl = s.type === 'buy' ? entry - conf.sl : entry + conf.sl;
        s.tp = s.type === 'buy' ? entry + (conf.sl * conf.rr) : entry - (conf.sl * conf.rr);
        saveState(id);
    }

    function resetSignal(id) {
        const s = engineState[id];
        // Reset everything but keep price history for continuity
        const history = s.priceHistory;
        Object.assign(s, createFreshState());
        s.priceHistory = history;
        s.cooldown = true;
        saveState(id);
        renderUI(id);
        // Kembali scanning otomatis setelah 10 detik
        setTimeout(() => { 
            s.cooldown = false; 
            saveState(id);
            renderUI(id); 
        }, 10000);
    }

    // ==================== UI ENGINE ====================
    function init() {
        loadStates();
        const container = document.getElementById('terminals');
        ['xau', 'btc'].forEach(id => {
            container.innerHTML += `
                <div class="pair-card ${id === activePairId ? 'active' : ''}" id="card-${id}">
                    <div class="card">
                        <div class="card-header-new">
                            <span class="pair-big">${id.toUpperCase()}USD</span>
                            <span class="price-live" id="price-${id}">0.00</span>
                        </div>
                        <div class="signal-bar">
                            <span>SIGNAL</span>
                            <div class="signal-dot-group">
                                <div class="dot" id="l1-${id}"></div>
                                <div class="dot" id="l2-${id}"></div>
                                <div class="dot" id="l3-${id}"></div>
                            </div>
                            <span id="signal-text-${id}">WAITING</span>
                        </div>
                        <div class="card-level-grid">
                            <div class="level-item" onclick="copyValue('${id}','entry')"><span class="level-label">Entry</span><span class="level-value" id="entry-${id}">--</span></div>
                            <div class="level-item" onclick="copyValue('${id}','tp')"><span class="level-label">Target</span><span class="level-value" id="tp-${id}" style="color:var(--success)">--</span></div>
                            <div class="level-item" onclick="copyValue('${id}','sl')"><span class="level-label">S-Loss</span><span class="level-value" id="sl-${id}" style="color:var(--danger)">--</span></div>
                        </div>
                        <div class="analysis-grid">
                            <div class="box-logic">
                                <span class="label-sm">Logic Engine</span>
                                <div class="stat"><span>SWEEP</span><span id="log-l1-${id}">•</span></div>
                                <div class="stat"><span>CHoCH</span><span id="log-l2-${id}">•</span></div>
                                <div class="stat"><span>FVG</span><span id="log-l3-${id}">•</span></div>
                            </div>
                            <div class="box-pa">
                                <span class="label-sm">Structure</span>
                                <div class="stat"><span>HIGH</span><span id="sh-${id}">--</span></div>
                                <div class="stat"><span>LOW</span><span id="slw-${id}">--</span></div>
                            </div>
                        </div>
                    </div>
                </div>`;
            
            const ws = new WebSocket(config[id].ws);
            ws.onmessage = e => {
                const price = parseFloat(JSON.parse(e.data).c) + config[id].offset;
                processPrice(id, price);
            };
            wsConnections[id] = ws;
        });

        document.getElementById('switchLabel').innerText = activePairId.toUpperCase() + 'USD';
        document.getElementById('switchPairBtn').onclick = () => {
            activePairId = activePairId === 'xau' ? 'btc' : 'xau';
            localStorage.setItem('ura_active_pair', activePairId);
            document.getElementById('switchLabel').innerText = activePairId.toUpperCase() + 'USD';
            document.querySelectorAll('.pair-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`card-${activePairId}`).classList.add('active');
        };
    }

    function processPrice(id, price) {
        const s = engineState[id];
        const oldPrice = s.lastPrice;
        s.lastPrice = price;
        const el = document.getElementById(`price-${id}`);
        if(el) {
            el.innerText = price.toFixed(2);
            el.style.color = price >= oldPrice ? "var(--success)" : "var(--danger)";
        }
        analyzePrecisionLogic(id, price);
        renderUI(id);
    }

    function renderUI(id) {
        const s = engineState[id];
        const l1 = document.getElementById(`l1-${id}`);
        if(l1) l1.className = s.l1 ? `dot ${s.type === 'buy' ? 'active' : 'active-down'}` : 'dot';
        const l2 = document.getElementById(`l2-${id}`);
        if(l2) l2.className = s.l2 ? `dot ${s.type === 'buy' ? 'active' : 'active-down'}` : 'dot';
        const l3 = document.getElementById(`l3-${id}`);
        if(l3) l3.className = s.l3 ? `dot ${s.type === 'buy' ? 'active' : 'active-down'}` : 'dot';
        
        document.getElementById(`log-l1-${id}`).innerText = s.l1 ? '✔' : '•';
        document.getElementById(`log-l2-${id}`).innerText = s.l2 ? '✔' : '•';
        document.getElementById(`log-l3-${id}`).innerText = s.l3 ? '✔' : '•';

        const txt = document.getElementById(`signal-text-${id}`);
        if (txt) {
            if (s.cooldown) { txt.innerText = 'RE-SCANNING'; txt.style.color = 'var(--text-dim)'; }
            else if (s.confirmed) { txt.innerText = s.type.toUpperCase(); txt.style.color = s.type === 'buy' ? 'var(--success)' : 'var(--danger)'; }
            else { txt.innerText = 'SCANNING'; txt.style.color = 'var(--accent)'; }
        }

        document.getElementById(`entry-${id}`).innerText = s.confirmed ? s.entry.toFixed(2) : '--';
        document.getElementById(`tp-${id}`).innerText = s.confirmed ? s.tp.toFixed(2) : '--';
        document.getElementById(`sl-${id}`).innerText = s.confirmed ? s.sl.toFixed(2) : '--';
        document.getElementById(`sh-${id}`).innerText = s.swingHigh.toFixed(1);
        document.getElementById(`slw-${id}`).innerText = s.swingLow === Infinity ? '--' : s.swingLow.toFixed(1);
    }

    window.copyValue = (id, type) => {
        const val = document.getElementById(`${type}-${id}`).innerText;
        if (val !== '--') navigator.clipboard.writeText(val);
    };

    setInterval(() => {
        const clk = document.getElementById('clock');
        if(clk) clk.innerText = new Date().toISOString().split('T')[1].split('.')[0] + " UTC";
    }, 1000);

    init();
</script>
</body>
</html>

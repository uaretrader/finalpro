<script>
(function () {
'use strict';

// ================================================================
//  URADVISOR — BLUE CHART ENGINE v11.1  [SMC ULTRA EDITION]
//  Upgrade: MTF Confluence, Order Block, FVG, Volume Profile,
//           Dynamic RR, Price Action Filter, Threshold 65/70
// ================================================================

const LS_SCHEMA_VERSION    = 9;   // bumped for new logic
const BTC_WS_URL           = 'wss://stream.binance.com:9443/ws/btcusdt@trade';
const XAU_WS_URL           = 'wss://fstream.binance.com/ws/xauusdt@trade';
const CONFIRMATION_WAIT_MS = 4000;

// ================================================================
//  LIVE PRICE OFFSET
// ================================================================
const PRICE_OFFSET_XAU = -2.55;
const PRICE_OFFSET_BTC = -92;
const COOLDOWN_AFTER_SL_MS = 20000;

// ── Blue Chart Timeframe Durations ────────────────────────────────
const MACRO_DUR = { xau: 60000, btc: 60000 };
const MICRO_DUR = { xau: 15000, btc: 15000 };

// ── Candle minimums ───────────────────────────────────────────────
const MACRO_MIN = 35;
const MICRO_MIN = 10;

// ── Blue Chart Score thresholds (UPGRADED) ───────────────────────
const BC_SCORE_MIN = 60;        // unchanged macro threshold
const ADX_MIN      = 20;

// ── NEW: Micro entry thresholds ──────────────────────────────────
const MICRO_READY_THRESHOLD = 65;    // was 50
const MICRO_LOCK_THRESHOLD  = 70;    // was 58

// ── Persistent Zone TTL & limits ─────────────────────────────────
const ZONE_TTL_MS  = 4 * 60 * 60 * 1000;   // 4 hours
const ZONE_MAX     = 12;

// ================================================================
//  SCHEMA MIGRATION
// ================================================================
function checkAndMigrateSchema() {
    const v = parseInt(localStorage.getItem('ura_schema_ver') || '1', 10);
    if (v < LS_SCHEMA_VERSION) {
        ['xau','btc'].forEach(id => {
            localStorage.removeItem(`ura_state_${id}`);
            localStorage.removeItem(`ura_stats_${id}`);
            localStorage.removeItem(`ura_zones_${id}`);
        });
        localStorage.setItem('ura_schema_ver', String(LS_SCHEMA_VERSION));
    }
}

// ── Toast ────────────────────────────────────────────────────────
let _tt = null;
function showToast(msg) {
    const el = document.getElementById('toast');
    if (!el) return;
    el.textContent = msg;
    el.classList.add('show');
    if (_tt) clearTimeout(_tt);
    _tt = setTimeout(() => el.classList.remove('show'), 2600);
}

// ================================================================
//  INDICATOR LIBRARY
// ================================================================

function calcEMA(arr, period) {
    if (!arr || arr.length < period) return null;
    const k = 2 / (period + 1);
    let e = arr.slice(0, period).reduce((a, b) => a + b, 0) / period;
    for (let i = period; i < arr.length; i++) e = arr[i] * k + e * (1 - k);
    return e;
}

function calcRSI(closes, period) {
    period = period || 14;
    if (!closes || closes.length < period + 1) return null;
    const r = closes.slice(-(period + 1));
    let g = 0, l = 0;
    for (let i = 1; i < r.length; i++) {
        const d = r[i] - r[i - 1];
        if (d > 0) g += d; else l -= d;
    }
    const ag = g / period, al = l / period;
    if (al === 0) return 100;
    return 100 - 100 / (1 + ag / al);
}

function calcMACD(closes, fast, slow, sig) {
    fast = fast || 12; slow = slow || 26; sig = sig || 9;
    if (!closes || closes.length < slow + sig) return null;
    const kFast = 2 / (fast + 1);
    const kSlow = 2 / (slow + 1);
    const kSig  = 2 / (sig  + 1);
    let emaFast = 0;
    for (let i = 0; i < fast; i++) emaFast += closes[i];
    emaFast /= fast;
    for (let i = fast; i < slow; i++) emaFast = closes[i] * kFast + emaFast * (1 - kFast);
    let emaSlow = 0;
    for (let i = 0; i < slow; i++) emaSlow += closes[i];
    emaSlow /= slow;
    const macdLine = [];
    for (let i = slow - 1; i < closes.length; i++) {
        emaFast = closes[i] * kFast + emaFast * (1 - kFast);
        if (i >= slow - 1) emaSlow = closes[i] * kSlow + emaSlow * (1 - kSlow);
        macdLine.push(emaFast - emaSlow);
    }
    if (macdLine.length < sig) return null;
    let sigVal = 0;
    for (let i = 0; i < sig; i++) sigVal += macdLine[i];
    sigVal /= sig;
    for (let i = sig; i < macdLine.length; i++) sigVal = macdLine[i] * kSig + sigVal * (1 - kSig);
    const line = macdLine[macdLine.length - 1];
    return { line, signal: sigVal, hist: line - sigVal };
}

function calcATR(candles, period) {
    period = period || 14;
    if (!candles || candles.length < period + 1) return null;
    const trs = [];
    for (let i = 1; i < candles.length; i++) {
        trs.push(Math.max(
            candles[i].high - candles[i].low,
            Math.abs(candles[i].high - candles[i - 1].close),
            Math.abs(candles[i].low  - candles[i - 1].close)
        ));
    }
    return trs.slice(-period).reduce((a, b) => a + b, 0) / period;
}

function calcADX(candles, period) {
    period = period || 14;
    if (!candles || candles.length < period * 2 + 2) return null;
    const c = candles.slice(-(period * 2 + 2));
    const dmP = [], dmM = [], tr = [];
    for (let i = 1; i < c.length; i++) {
        const up = c[i].high  - c[i-1].high;
        const dn = c[i-1].low - c[i].low;
        dmP.push(up > dn && up > 0 ? up : 0);
        dmM.push(dn > up && dn > 0 ? dn : 0);
        tr.push(Math.max(
            c[i].high - c[i].low,
            Math.abs(c[i].high - c[i-1].close),
            Math.abs(c[i].low  - c[i-1].close)
        ));
    }
    let atr14 = tr.slice(0, period).reduce((a,b) => a+b, 0);
    let pdm14  = dmP.slice(0, period).reduce((a,b) => a+b, 0);
    let mdm14  = dmM.slice(0, period).reduce((a,b) => a+b, 0);
    const dxArr = [];
    const push_dx = (a, p, m) => {
        const pdi = a > 0 ? (p/a)*100 : 0;
        const mdi = a > 0 ? (m/a)*100 : 0;
        dxArr.push((pdi+mdi) > 0 ? Math.abs(pdi-mdi)/(pdi+mdi)*100 : 0);
    };
    push_dx(atr14, pdm14, mdm14);
    for (let i = period; i < tr.length; i++) {
        atr14 = atr14 - atr14/period + tr[i];
        pdm14  = pdm14  - pdm14/period  + dmP[i];
        mdm14  = mdm14  - mdm14/period  + dmM[i];
        push_dx(atr14, pdm14, mdm14);
    }
    if (dxArr.length < period) return null;
    return dxArr.slice(-period).reduce((a,b) => a+b, 0) / period;
}

// ================================================================
//  BC TREND (unchanged)
// ================================================================
function calcBCTrend(closes, atr) {
    const n = closes.length;
    const ema21  = calcEMA(closes, Math.min(21, n - 1));
    const ema50  = calcEMA(closes, Math.min(50, n - 1));
    const ema200 = n >= 200 ? calcEMA(closes, 200) : (n >= 100 ? calcEMA(closes, 100) : calcEMA(closes, Math.max(50, n - 1)));
    const hasEma200 = n >= 200;
    if (!ema21 || !ema50 || !ema200) return { trend: 'NEUTRAL', score: 0, ema21, ema50, ema200 };
    const SLOPE_WINDOW = Math.min(10, n - 2);
    const ema21Prev = SLOPE_WINDOW > 0 ? calcEMA(closes.slice(0, -SLOPE_WINDOW), Math.min(21, n - SLOPE_WINDOW - 1)) : null;
    const ema50Prev = SLOPE_WINDOW > 0 ? calcEMA(closes.slice(0, -SLOPE_WINDOW), Math.min(50, n - SLOPE_WINDOW - 1)) : null;
    const slope21 = (ema21Prev && atr) ? (ema21 - ema21Prev) / atr : 0;
    const slope50 = (ema50Prev && atr) ? (ema50 - ema50Prev) / atr : 0;
    const SLOPE_MIN = 0.08;
    const ema21_1 = n > 2 ? calcEMA(closes.slice(0, -1), Math.min(21, n - 2)) : null;
    const ema50_1 = n > 2 ? calcEMA(closes.slice(0, -1), Math.min(50, n - 2)) : null;
    const justCrossedUp   = ema21_1 !== null && ema50_1 !== null && ema21_1 < ema50_1 && ema21 >= ema50;
    const justCrossedDown = ema21_1 !== null && ema50_1 !== null && ema21_1 > ema50_1 && ema21 <= ema50;
    const fullBull = ema21 > ema50 && ema50 > ema200;
    const fullBear = ema21 < ema50 && ema50 < ema200;
    const zoneBull = ema21 > ema50 && ema21 < ema200;
    const zoneBear = ema21 < ema50 && ema21 > ema200;
    let trend = 'NEUTRAL', score = 0;
    if      (justCrossedUp   && ema21 < ema200)  { trend = 'BULL_X';      score =  16; }
    else if (justCrossedUp   && fullBull)         { trend = 'BULL_X_BULL'; score =  28; }
    else if (justCrossedDown && ema21 > ema200)  { trend = 'BEAR_X';      score = -16; }
    else if (justCrossedDown && fullBear)         { trend = 'BEAR_X_BEAR'; score = -28; }
    else if (fullBull && slope21 >  SLOPE_MIN && slope50 > 0) { trend = 'STRONG_BULL'; score =  30; }

function calcBCStruct(candles) {

        if (rc[i].high > rc[i-1].high && rc[i].high > rc[i-2].high && rc[i].high > rc[i+1].high) swingHighs.push({ idx: i, price: rc[i].high });
        if (rc[i].low < rc[i-1].low && rc[i].low < rc[i-2].low && rc[i].low < rc[i+1].low) swingLows.push({ idx: i, price: rc[i].low });
    }

    if (swingHighs.length >= 2 && swingLows.length >= 2) {

        const sh2 = swingHighs[swingHighs.length - 2];
        const sl1 = swingLows[swingLows.length - 1];
        const sl2 = swingLows[swingLows.length - 2];
        const higherHighs = sh1.price > sh2.price;
        const higherLows  = sl1.price > sl2.price;
        const lowerHighs  = sh1.price < sh2.price;
        const lowerLows   = sl1.price < sl2.price;
        if (lastClose > sh1.price) { struct = 'BOS_BULL'; bos = 'BULL'; score = 20; }
        else if (lastClose < sl1.price) { struct = 'BOS_BEAR'; bos = 'BEAR'; score = -20; }
        else if (higherHighs && higherLows) { struct = 'BULLISH'; score = 15; }
        else if (lowerHighs && lowerLows) { struct = 'BEARISH'; score = -15; }
        if (lowerHighs && lowerLows && lastClose > sh1.price) { struct = 'CHOCH_BULL'; choch = true; bos = 'BULL'; score = 20; }
        else if (higherHighs && higherLows && lastClose < sl1.price) { struct = 'CHOCH_BEAR'; choch = true; bos = 'BEAR'; score = -20; }

// ================================================================
//  BC FLOW (unchanged)
// ================================================================
function calcBCFlow(candles, lookback) {
    lookback = lookback || 10;
    if (!candles || candles.length < lookback) return { flow: 'NEUTRAL', delta: 0, score: 0 };
    const rc = candles.slice(-lookback);
    let buyVol = 0, sellVol = 0;
    for (const c of rc) {
        const range = c.high - c.low; if (range === 0) continue;
        const upperWick = c.high - Math.max(c.open, c.close);
        const lowerWick = Math.min(c.open, c.close) - c.low;
        const bodyUp = c.close > c.open ? c.close - c.open : 0;
        const bodyDn = c.close < c.open ? c.open - c.close : 0;
        const v = c.volume || 1;
        buyVol  += v * (lowerWick + bodyUp) / range;
        sellVol += v * (upperWick + bodyDn) / range;
    }
    const total = buyVol + sellVol;
    const delta = total > 0 ? (buyVol - sellVol) / total : 0;
    let flow = 'NEUTRAL', score = 0;
    if (delta > 0.20)       { flow = 'BUY_PRESSURE';   score = 12; }
    else if (delta > 0.08)  { flow = 'MILD_BUY';       score = 7;  }
    else if (delta < -0.20) { flow = 'SELL_PRESSURE';  score = -12; }
    else if (delta < -0.08) { flow = 'MILD_SELL';      score = -7; }
    return { flow, delta: parseFloat(delta.toFixed(3)), score };
}

// ================================================================
//  BC LIQUID (unchanged)

function calcBCLiquid(candles, atr) {

    const rc  = candles.slice(-8); const tol = atr * 0.25;
    const refBars   = rc.slice(0, 6);
    const maxHigh   = Math.max(...refBars.map(c => c.high));
    const minLow    = Math.min(...refBars.map(c => c.low));
    const eqHighCount = refBars.filter(c => Math.abs(c.high - maxHigh) < tol).length;
    const eqLowCount  = refBars.filter(c => Math.abs(c.low  - minLow)  < tol).length;
    const last2   = rc.slice(-2); const lastBar = rc[rc.length - 1];
    if (eqLowCount >= 2) {
        const swept    = last2.some(c => c.low < minLow - tol * 0.3);
        const recovered = lastBar.close > minLow;
        const pinBar   = (Math.min(lastBar.open, lastBar.close) - lastBar.low) > Math.abs(lastBar.close - lastBar.open) * 1.2;
        if (swept && recovered) return { sweep: 'BULL_SWEEP', quality: pinBar ? 90 : 70, level: minLow };
    }
    if (eqHighCount >= 2) {
        const swept    = last2.some(c => c.high > maxHigh + tol * 0.3);
        const recovered = lastBar.close < maxHigh;
        const pinBar   = (lastBar.high - Math.max(lastBar.open, lastBar.close)) > Math.abs(lastBar.close - lastBar.open) * 1.2;
        if (swept && recovered) return { sweep: 'BEAR_SWEEP', quality: pinBar ? 90 : 70, level: maxHigh };

}

// ================================================================
//  BC DIVERG (unchanged)
// ================================================================
function calcBCDiverg(candles, closes, rsi) {

    const n = closes.length; if (n < 20) return { diverg: 'NONE', strength: 0 };
    const lookback = Math.min(40, n); const startIdx = n - lookback;
    const pts = [];
    for (let i = startIdx; i < n; i++) {
        const r = calcRSI(closes.slice(0, i + 1), 14);
        const cOff = candles.length - (n - i);
        const c    = (cOff >= 0 && cOff < candles.length) ? candles[cOff] : null;
        if (r !== null && c) pts.push({ price: c.close, high: c.high, low: c.low, rsi: r });
    }
    if (pts.length < 10) return { diverg: 'NONE', strength: 0 };
    const swingLows  = [], swingHighs = [];
    for (let i = 2; i < pts.length - 1; i++) {
        const p = pts[i];
        if (p.low  <= pts[i-1].low  && p.low  <= pts[i-2].low  && p.low  <= pts[i+1].low) swingLows.push(p);
        if (p.high >= pts[i-1].high && p.high >= pts[i-2].high && p.high >= pts[i+1].high) swingHighs.push(p);
    }
    let diverg = 'NONE', strength = 0;
    if (swingLows.length >= 2 && rsi < 50) {
        const sl1 = swingLows[swingLows.length - 2]; const sl2 = swingLows[swingLows.length - 1];
        if (sl2.price < sl1.price && sl2.rsi > sl1.rsi + 2) { const rsiDiff = sl2.rsi - sl1.rsi; strength = Math.min(100, rsiDiff * 3); diverg = 'BULL_DIV'; }
    }
    if (diverg === 'NONE' && swingHighs.length >= 2 && rsi > 50) {
        const sh1 = swingHighs[swingHighs.length - 2]; const sh2 = swingHighs[swingHighs.length - 1];
        if (sh2.price > sh1.price && sh2.rsi < sh1.rsi - 2) { const rsiDiff = sh1.rsi - sh2.rsi; strength = Math.min(100, rsiDiff * 3); diverg = 'BEAR_DIV'; }
    }
    return { diverg, strength };
}

// ================================================================
//  [NEW] 1. MTF CONFLUENCE
// ================================================================
function aggregateCandles(candles, factor) {
    if (!candles || candles.length < factor) return [];
    const result = [];
    for (let i = 0; i <= candles.length - factor; i += factor) {
        const slice = candles.slice(i, i + factor);
        if (slice.length === 0) continue;
        const open = slice[0].open;
        const close = slice[slice.length - 1].close;
        const high = Math.max(...slice.map(c => c.high));
        const low = Math.min(...slice.map(c => c.low));
        const volume = slice.reduce((sum, c) => sum + (c.volume || 0), 0);
        result.push({ open, high, low, close, volume, closed: true });
    }
    return result;
}

function getMTFConfirmation(id, price, macroCandles) {

    const tf15m = aggregateCandles(macroCandles, 15);
    const atr5 = calcATR(tf5m) || 1;
    const atr15 = calcATR(tf15m) || 1;
    const trend5m = tf5m.length >= 5 ? calcBCTrend(tf5m.map(c => c.close), atr5) : null;
    const trend15m = tf15m.length >= 3 ? calcBCTrend(tf15m.map(c => c.close), atr15) : null;
    let score = 0;
    let t5 = 'NEUTRAL', t15 = 'NEUTRAL';
    if (trend5m) {
        t5 = trend5m.trend;

        else if (trend5m.score < 0) score -= 10;

        if (t5 === 'BULL_X' || t5 === 'BULL_X_BULL') score += 5;
        if (t5 === 'BEAR_X' || t5 === 'BEAR_X_BEAR') score -= 5;
    }
    if (trend15m) {
        t15 = trend15m.trend;
        if (trend15m.score > 0) score += 10;
        else if (trend15m.score < 0) score -= 10;
        // Bonus jika trend adalah EMA cross baru
        if (t15 === 'BULL_X' || t15 === 'BULL_X_BULL') score += 5;
        if (t15 === 'BEAR_X' || t15 === 'BEAR_X_BEAR') score -= 5;
    }

    if (trend5m && trend15m && trend5m.score < 0 && trend15m.score < 0) score -= 5;

// ================================================================
//  [NEW] 2. ORDER BLOCK DETECTION
// ================================================================
function detectOrderBlock(candles, atr) {
    if (!candles || candles.length < 20) return { type: 'NONE', top: 0, bot: 0, strength: 0 };
    const recent = candles.slice(-20);
    for (let i = 2; i < recent.length; i++) {
        const body = Math.abs(recent[i].close - recent[i].open);
        const prevBody = Math.abs(recent[i-1].close - recent[i-1].open);
        if (body > prevBody * 1.8 && body > atr * 0.3) {
            if (recent[i].close > recent[i].open) {
                return { type: 'BULL_OB', top: recent[i].high, bot: recent[i].open, strength: body/atr };
            } else {
                return { type: 'BEAR_OB', top: recent[i].open, bot: recent[i].low, strength: body/atr };
            }
        }
    }
    return { type: 'NONE', top: 0, bot: 0, strength: 0 };
}

// ================================================================
//  [NEW] 3. FVG DETECTION
// ================================================================
function detectFVG(candles) {
    if (!candles || candles.length < 3) return { type: 'NONE', level: 0, gap: 0 };
    const last = candles.slice(-3);
    const c1 = last[0], c2 = last[1], c3 = last[2];
    if (c3.low > c1.high) {
        const gap = c3.low - c1.high;
        return { type: 'BULL_FVG', level: (c1.high + c3.low) / 2, gap };
    } else if (c3.high < c1.low) {
        const gap = c1.low - c3.high;
        return { type: 'BEAR_FVG', level: (c1.low + c3.high) / 2, gap };
    }
    return { type: 'NONE', level: 0, gap: 0 };
}

// ================================================================
//  [NEW] 4. VOLUME PROFILE (POC)
// ================================================================
function calcVolumeProfile(candles, price, atr) {
    if (!candles || candles.length < 10) return { nearPOC: false, pocLevel: 0, score: 0 };
    const lookback = 20; const rc = candles.slice(-lookback);
    const levels = []; const step = atr * 0.1;
    for (let i = 0; i < 21; i++) {
        const level = price - atr + i * step;
        let vol = 0;
        for (const c of rc) { if (c.low <= level && c.high >= level) vol += c.volume || 1; }
        levels.push({ level, vol });
    }
    const poc = levels.reduce((a, b) => a.vol > b.vol ? a : b);
    const nearPOC = Math.abs(price - poc.level) < atr * 0.3;
    return { nearPOC, pocLevel: poc.level, score: nearPOC ? 10 : 0 };
}

// ================================================================
//  [NEW] 5. PRICE ACTION FILTER
// ================================================================
function checkPriceAction(candles, direction, atr) {
    if (!candles || candles.length < 2) return 0;
    const last = candles.slice(-2);
    const c1 = last[0], c2 = last[1];
    let score = 0;
    if (direction === 'buy') {
        // Bullish engulfing
        if (c2.close > c1.high && c2.open < c1.low) score = 15;
        // Hammer / pin bar
        const body = Math.abs(c2.close - c2.open);
        if ((c2.high - Math.max(c2.open, c2.close)) > body * 2.5) score = 12;
        // Bullish harami
        if (c2.close > c2.open && c2.close < c1.close && c2.open > c1.open) score = 8;
    } else {
        // Bearish engulfing
        if (c2.close < c1.low && c2.open > c1.high) score = 15;
        // Shooting star / pin bar
        const body = Math.abs(c2.close - c2.open);
        if ((Math.min(c2.open, c2.close) - c2.low) > body * 2.5) score = 12;
        // Bearish harami
        if (c2.close < c2.open && c2.close > c1.close && c2.open < c1.open) score = 8;
    }
    return score;
}

// ================================================================
//  [NEW] 6. DYNAMIC RR
// ================================================================
function calculateDynamicRR(atr, price) {
    const volatilityPct = (atr / price) * 100;
    let rr;
    if (volatilityPct > 3.0) rr = 1.2;
    else if (volatilityPct > 2.0) rr = 1.4;
    else if (volatilityPct > 1.0) rr = 1.6;
    else rr = 2.0;
    return rr;
}

    const structBull = bcStruct.score > 0; const structBear = bcStruct.score < 0;

    const MAX = 72; const diff = Math.abs(bull - bear);

// ================================================================
//  BC MICRO ENTRY SCORER — UPGRADED WITH ALL NEW LOGIC

function scoreMicroEntry(id, price, microCandles, macroBias) {
    const f = {};
    if (microCandles.length < MICRO_MIN) return { ready: false, direction: null, quality: 0, factors: f, zoneType: null };
    if (!macroBias || !macroBias.valid)  return { ready: false, direction: null, quality: 0, factors: f, zoneType: null };

    const closes    = microCandles.map(c => c.close);
    const microATR  = calcATR(microCandles, Math.min(10, microCandles.length - 1)) || macroBias.atr * 0.3;
    const rsi9      = calcRSI(closes, Math.min(9, closes.length - 1));
    const microMACD = calcMACD(closes, 5, 13, 4);
    const ema9m     = closes.length > 2 ? calcEMA(closes, Math.min(9,  closes.length - 1)) : null;
    const ema21m    = closes.length > 2 ? calcEMA(closes, Math.min(21, closes.length - 1)) : null;
    const ema9m_1   = closes.length > 3 ? calcEMA(closes.slice(0, -1), Math.min(9,  closes.length - 2)) : null;
    const ema21m_1  = closes.length > 3 ? calcEMA(closes.slice(0, -1), Math.min(21, closes.length - 2)) : null;
    const microGoldenX = (ema9m !== null && ema21m !== null && ema9m_1 !== null && ema21m_1 !== null)
                         ? (ema9m_1 < ema21m_1 && ema9m >= ema21m) : false;
    const microDeathX  = (ema9m !== null && ema21m !== null && ema9m_1 !== null && ema21m_1 !== null)
                         ? (ema9m_1 > ema21m_1 && ema9m <= ema21m) : false;

    f.rsi = rsi9 ? rsi9.toFixed(1) : null;
    const { bias, ema21: macroEMA21, atr: macroATR, bcZone } = macroBias;
    const direction = bias === 'BULL' ? 'buy' : 'sell';

    // ── 1. BC LIQUID (40 pts) ─────────────────────────────────────
    const bcLiquid  = calcBCLiquid(microCandles, microATR);
    f.bc_liquid     = bcLiquid.sweep;
    const liquidScore = bcLiquid.sweep === 'BULL_SWEEP' && direction === 'buy'  ? 40 :
                        bcLiquid.sweep === 'BEAR_SWEEP' && direction === 'sell' ? 40 : 0;

    // ── 2. BC MOM (25 pts) ────────────────────────────────────────
    let momScore = 0, rsiSig = 'NEUTRAL';
    if (rsi9 !== null) {
        if (direction === 'buy') {
            if (rsi9 < 32) { momScore = 25; rsiSig = 'OVERSOLD'; }
            else if (rsi9 < 45) { momScore = 18; rsiSig = 'PULLBACK'; }
            else if (rsi9 < 55) { momScore = 8; rsiSig = 'MILD'; }
        } else {
            if (rsi9 > 68) { momScore = 25; rsiSig = 'OVERBOUGHT'; }
            else if (rsi9 > 55) { momScore = 18; rsiSig = 'PULLBACK'; }
            else if (rsi9 > 45) { momScore = 8; rsiSig = 'MILD'; }
        }
    }
    f.rsi_sig = rsiSig;

    // ── 3. BC DIVERG (20 pts) ─────────────────────────────────────
    const bcDiv    = calcBCDiverg(microCandles, closes, rsi9);
    f.bc_diverg    = bcDiv.diverg;
    const divergScore = (bcDiv.diverg === 'BULL_DIV' && direction === 'buy')  ? 20 :
                        (bcDiv.diverg === 'BEAR_DIV' && direction === 'sell') ? 20 : 0;

    // ── 4. Zone proximity (15 pts) ───────────────────────────────
    let zoneScore = 0, zoneType = 'NONE';
    const snapDist = macroATR * 0.30;
    if (direction === 'buy') {
        const nearEMA  = macroEMA21 && price <= macroEMA21 + snapDist && price >= macroEMA21 - snapDist * 0.6;
        const inDemand = bcZone && (bcZone.zone === 'DEMAND' || bcZone.zone === 'NEAR_DEMAND');
        if (nearEMA) { zoneScore = 15; zoneType = 'EMA21'; }
        else if (inDemand) { zoneScore = 15; zoneType = 'DEMAND'; }
        else if (rsi9 !== null && rsi9 < 42) { zoneScore = 8; zoneType = 'RSI_PB'; }
    } else {
        const nearEMA  = macroEMA21 && price >= macroEMA21 - snapDist && price <= macroEMA21 + snapDist * 0.6;
        const inSupply = bcZone && (bcZone.zone === 'SUPPLY' || bcZone.zone === 'NEAR_SUPPLY');
        if (nearEMA) { zoneScore = 15; zoneType = 'EMA21'; }
        else if (inSupply) { zoneScore = 15; zoneType = 'SUPPLY'; }
        else if (rsi9 !== null && rsi9 > 58) { zoneScore = 8; zoneType = 'RSI_PB'; }
    }
    f.zone_type = zoneType;

    // ── 5. MACD micro momentum bonus (5 pts) ─────────────────────
    let microMACD_bonus = 0;
    if (microMACD) {
        if (direction === 'buy'  && microMACD.hist > 0) microMACD_bonus = 5;
        if (direction === 'sell' && microMACD.hist < 0) microMACD_bonus = 5;
    }

    // ── 5b. MICRO EMA CROSS bonus (15 pts) ───────────────────────
    let microCrossScore = 0;
    if (direction === 'buy'  && microGoldenX) { microCrossScore = 15; f.micro_cross = 'GOLDEN_X'; }
    else if (direction === 'sell' && microDeathX)  { microCrossScore = 15; f.micro_cross = 'DEATH_X'; }
    else { f.micro_cross = 'NONE'; }

    // ── 6. MTF CONFLUENCE (max 25 pts) ────────────────────────────
    const macroCandles = getMacroCandles(id);
    const mtf = getMTFConfirmation(id, price, macroCandles);
    f.mtf_score = mtf.score;
    f.mtf_5m = mtf.trend5m;
    f.mtf_15m = mtf.trend15m;
    const mtfBonus = mtf.score;

    // ── 7. ORDER BLOCK (max 25 pts) ──────────────────────────────
    const ob = detectOrderBlock(microCandles, microATR);
    f.ob_type = ob.type;
    let obScore = 0;
    if (direction === 'buy' && ob.type === 'BULL_OB' && price <= ob.top && price >= ob.bot - microATR*0.2) obScore = 25;
    else if (direction === 'sell' && ob.type === 'BEAR_OB' && price >= ob.bot && price <= ob.top + microATR*0.2) obScore = 25;
    f.ob_score = obScore;

    // ── 8. FVG (max 18 pts) ───────────────────────────────────────
    const fvg = detectFVG(microCandles);
    f.fvg_type = fvg.type;
    let fvgScore = 0;
    if (direction === 'buy' && fvg.type === 'BULL_FVG' && price <= fvg.level + microATR*0.3) fvgScore = 18;
    else if (direction === 'sell' && fvg.type === 'BEAR_FVG' && price >= fvg.level - microATR*0.3) fvgScore = 18;
    f.fvg_score = fvgScore;

    // ── 9. VOLUME PROFILE (max 10 pts) ────────────────────────────
    const vp = calcVolumeProfile(microCandles, price, microATR);
    f.vp_nearPOC = vp.nearPOC;
    const vpScore = vp.score;

    // ── 10. PRICE ACTION (max 15 pts) ─────────────────────────────
    const paScore = checkPriceAction(microCandles, direction, microATR);
    f.pa_score = paScore;

    // ── QUALITY SUM ──────────────────────────────────────────────
    let quality = liquidScore + momScore + divergScore + zoneScore + microMACD_bonus +
                  mtfBonus + obScore + fvgScore + vpScore + paScore + microCrossScore;
    quality = Math.min(100, quality);
    f.quality = quality;
    f.in_zone = zoneScore > 0 || liquidScore > 0;

    // ── READY & LOCK THRESHOLDS (UPGRADED) ──────────────────────
    const hasLiquidOrZone = liquidScore > 0 || zoneScore >= 8 || obScore > 0 || fvgScore > 0;
    const ready = quality >= MICRO_READY_THRESHOLD && hasLiquidOrZone;
    const lockable = quality >= MICRO_LOCK_THRESHOLD && hasLiquidOrZone;

    return { ready, lockable, direction, quality, factors: f, zoneType };
}

function executeLockSignal(id, direction, livePrice, macroScore, zoneType) {

    if (entry <= 0) return;

    const microCandles = getMicroCandles(id);
    let structuralSL = 0;
    if (microCandles.length >= 5) {
        const recent = microCandles.slice(-5);
        if (direction === 'buy') { const lowestLow = Math.min(...recent.map(c => c.low)); structuralSL = lowestLow - atr * 0.12; }
        else { const highestHigh = Math.max(...recent.map(c => c.high)); structuralSL = highestHigh + atr * 0.12; }
    }
    const minSL = id === 'xau' ? 14 : 180;
    let slD = Math.abs(entry - structuralSL);
    if (slD < minSL || structuralSL === 0) slD = Math.max(atr * 0.85, minSL);

    // ── DYNAMIC RR ────────────────────────────────────────────────
    const rr = calculateDynamicRR(atr, entry);

    s.entry          = entry;

    s.tempHigh       = entry;
    s.tempLow        = entry;
    s.confluenceScore = macroScore;
    s.entryZone      = zoneType || 'BC_ZONE';
    s.breakevenArmed = false;
    s.rr_used        = rr;  // store for display

    if (direction === 'buy') { s.sl = entry - slD; s.tp = entry + tpD; }
    else                     { s.sl = entry + slD; s.tp = entry - tpD; }

    throttledSaveState(id);
    pendingSignalData[id] = true;
    throttledUpdateUI(id);
    document.getElementById(`signal-bar-${id}`)?.classList.remove('confirm-wait');
    if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
    showToast(`${id.toUpperCase()} ${direction.toUpperCase()} @ ${entry.toFixed(2)} | RR:${rr.toFixed(1)} | ${zoneType}`);
}

function processSignal(id, price) {

    if (Date.now() < (s.cooldownUntil || 0)) return;
    buildCandles(id, price);

    if (s.confirmed && s.type !== 'none') {
        if (!s.tempHigh) { s.tempHigh = s.entry; s.tempLow = s.entry; }
        if (price > s.tempHigh) s.tempHigh = price;
        if (price < s.tempLow)  s.tempLow  = price;
        updateTracker(id, price);
        const hitTP = (s.type === 'buy'  && price >= s.tp) || (s.type === 'sell' && price <= s.tp);
        const hitSL = (s.type === 'buy'  && price <= s.sl) || (s.type === 'sell' && price >= s.sl);
        if (hitTP) { recordSignalResult(id, 'tp'); resetSignal(id); return; }
        if (hitSL) { const result = s.breakevenArmed ? 'be' : 'sl'; if (result === 'sl') state[id].cooldownUntil = Date.now() + COOLDOWN_AFTER_SL_MS; recordSignalResult(id, result); resetSignal(id); return; }
        if (!s.breakevenArmed && Date.now() > (s.warmupUntil || 0)) {
            const tpDist = Math.abs(s.tp - s.entry);
            const moved  = s.type === 'buy' ? price - s.entry : s.entry - price;
            if (moved >= tpDist * 0.5) { s.sl = s.entry; s.breakevenArmed = true; throttledSaveState(id); showToast(`${id.toUpperCase()} SL → BREAKEVEN 🔒`); }
        }
        if (!s.breakevenArmed) {
            const buf = (marketData[id].atr || (id === 'xau' ? 3.0 : 300)) * 1.4;
            if (s.type === 'buy'  && price <= (s.entry - buf) && Date.now() > (s.warmupUntil || 0)) { recordSignalResult(id, 'retrace'); resetSignal(id); return; }
            if (s.type === 'sell' && price >= (s.entry + buf) && Date.now() > (s.warmupUntil || 0)) { recordSignalResult(id, 'retrace'); resetSignal(id); return; }
        }
        return;
    }

    if (pendingConfirmation[id]) { s.lastPrice = price; return; }

    const macroCandles = getMacroCandles(id);
    const microCandles = getMicroCandles(id);
    if (macroCandles.length < MACRO_MIN) { s.lastPrice = price; return; }
    if (microCandles.length < MICRO_MIN) { s.lastPrice = price; return; }

    let macroBias = macroBiasCache[id];
    if (!macroBias) { macroBias = scoreMacroBias(id, price, macroCandles); macroBiasCache[id] = macroBias; }
    updateEngineBadges(id, macroBias);
    updateConfluenceBar(id, macroBias.score);

    if (!macroBias.valid) { if (s.l1 || s.l2) resetSignal(id); s.lastPrice = price; return; }

    const micro = scoreMicroEntry(id, price, microCandles, macroBias);

    if (!s.l1) {
        s.l1 = true; s.type = macroBias.bias === 'BULL' ? 'buy' : 'sell'; s.macroScore = macroBias.score; s.macroBias = macroBias.bias;
        pendingSignalData[id] = true; throttledUpdateUI(id); throttledSaveState(id); return;
    }

    const expectedDir = s.type;
    const currentDir  = macroBias.bias === 'BULL' ? 'buy' : 'sell';
    if (s.l1 && !s.confirmed && macroBias.valid && currentDir !== expectedDir) { resetSignal(id); return; }

    if (s.l1 && !s.l2 && micro.ready) { s.l2 = true; pendingSignalData[id] = true; throttledUpdateUI(id); throttledSaveState(id); return; }

    // ── L3 LOCK: use lockable instead of ready ────────────────────
    if (s.l2 && !s.l3 && micro.lockable && micro.quality >= MICRO_LOCK_THRESHOLD) {
        s.l3 = true; pendingSignalData[id] = true; throttledUpdateUI(id); throttledSaveState(id);
        startConfirmationDelay(id, currentDir, price, macroBias.score, micro.zoneType); return;
    }

    if (s.l2 && !s.l3 && !micro.ready && !micro.factors.in_zone) { s.l2 = false; pendingSignalData[id] = true; throttledUpdateUI(id); }

    s.lastPrice = price; throttledSaveState(id);
}

        if (!pendingConfirmation[id]) return;

        if (macroC.length >= MACRO_MIN && microC.length >= MICRO_MIN) {
            const mb2 = scoreMacroBias(id, lp, macroC);

            const stillValid = mb2.valid && (mb2.bias === 'BULL' ? 'buy' : 'sell') === direction && mi2.ready;
            if (stillValid) {

            }
        } else { resetSignal(id); }
        pendingConfirmation[id] = null;
    }, CONFIRMATION_WAIT_MS);
}

function buildTFCandle(tf, dur, maxCandles, price, vol) {
    const now = Date.now();
    if (!tf.current || (now - tf.start) >= dur) {
        if (tf.current) { tf.current.closed = true; tf.candles.push({ ...tf.current }); if (tf.candles.length > maxCandles) tf.candles.shift(); }
        tf.current = { open: price, high: price, low: price, close: price, volume: vol || 1, closed: false }; tf.start = now; return true;
    } else {
        tf.current.high = Math.max(tf.current.high, price); tf.current.low = Math.min(tf.current.low, price);
        tf.current.close = price; tf.current.volume += (vol || 1); return false;
    }
}

    loadZones('xau'); loadZones('btc');
    document.getElementById('terminals').innerHTML = buildCardHTML('xau', 'XAUUSD') + buildCardHTML('btc', 'BTCUSD');

    const bindTap = (el, handler) => { if (!el) return; let lastTap = 0; const h = (e) => { e.preventDefault(); const now = Date.now(); if (now - lastTap < 80) return; lastTap = now; handler(); }; el.addEventListener('touchstart', h, { passive: false }); el.addEventListener('click', h); };
    bindTap(document.getElementById('signal-bar-xau'), () => handleSignalBarTap('xau'));
    bindTap(document.getElementById('signal-bar-btc'), () => handleSignalBarTap('btc'));
    bindTap(document.getElementById('history-panel-xau'), () => handleHistoryPanelTap('xau'));
    bindTap(document.getElementById('history-panel-btc'), () => handleHistoryPanelTap('btc'));

    const btn = document.getElementById('switchPairBtn');
    if (btn) { const nb = btn.cloneNode(true); btn.parentNode.replaceChild(nb, btn);
        const ds = function(e) { e.preventDefault(); e.stopPropagation(); nb.classList.add('btn-highlight'); setTimeout(() => nb.classList.remove('btn-highlight'), 150); switchPair(); };
        nb.addEventListener('click', ds); nb.addEventListener('touchstart', ds, { passive: false }); }

    updateSignalUIOnly('xau'); updateSignalUIOnly('btc'); updatePerformanceUI('xau'); updatePerformanceUI('btc');
    updateFeedBadge('xau', 'fallback'); updateFeedBadge('btc', 'fallback');
    const el_xau = document.getElementById('ws-status-xau'); const el_btc = document.getElementById('ws-status-btc');
    if (el_xau) { el_xau.textContent = '● LOADING...'; el_xau.className = 'ws-status connected'; }
    if (el_btc) { el_btc.textContent = '○ LOADING...'; el_btc.className = 'ws-status disconnected'; }

    await Promise.all([ initHistoricalCandles('xau'), initHistoricalCandles('btc') ]);
    initXAUWebSocket(); xauFetchRestPrice(); initBTCWebSocket(); btcFetchRestPrice(); updateGlobalPulse();
    setInterval(() => { if (Date.now() - xauLastHeartbeat > 6000) xauFetchRestPrice(); updateGlobalPulse(); }, 3000);
    setInterval(() => { if (!xauWs || xauWs.readyState !== WebSocket.OPEN) xauFetchRestPrice(); if (!btcWs || btcWs.readyState !== WebSocket.OPEN) btcFetchRestPrice(); }, 2000);
    document.addEventListener('visibilitychange', () => { if (!document.hidden) { xauFetchRestPrice(); btcFetchRestPrice(); updateSignalUIOnly('xau'); updateSignalUIOnly('btc'); updateGlobalPulse(); } });
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();

})();
</script>
</body>
</html>

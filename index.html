<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" name="viewport"/>
<title>TERMINAL v7.4 - REAL-TIME ENGINE</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;600;800&display=swap');

    :root {
        --bg: #0f1117;
        --bg2: #1a1d21;
        --text: #e6e8ea;
        --text-dim: #707a8a;
        --accent: #f0b90b;
        --success: #00FFCC;
        --danger: #FF4757;
        --feed-lightning: #FFEA00;
        --border: rgba(255, 255, 255, 0.08);
        --border-bright: rgba(255, 255, 255, 0.15);
        --phase-trending: #00FF88;
        --confirm-pending: #f0b90b;
        --glow-success: 0 0 12px rgba(0,255,204,0.3);
        --glow-danger: 0 0 12px rgba(255,71,87,0.3);
        --glow-accent: 0 0 12px rgba(240,185,11,0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Space Grotesk', sans-serif;
        padding: 14px;
        display: flex;
        justify-content: center;
        min-height: 100vh;
    }

    .container { max-width: 450px; width: 100%; }

    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 14px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 12px;
    }

    .brand h1 {
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: 2px;
        text-transform: uppercase;
    }
    .brand-sub {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.4rem;
        color: var(--text-dim);
        letter-spacing: 0.5px;
        margin-top: 1px;
    }

    .sys-status {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.48rem;
        text-align: right;
        color: var(--text-dim);
    }

    .pulse {
        display: inline-block;
        width: 6px; height: 6px;
        background: var(--feed-lightning);
        border-radius: 50%;
        margin-right: 4px;
        animation: blink 1.5s infinite;
    }
    .pulse.connected { background: var(--success); box-shadow: 0 0 5px var(--success); }
    .pulse.disconnected { background: var(--danger); animation: blink 0.5s infinite; }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

    .ws-status {
        font-size: 0.48rem;
        padding: 2px 6px;
        border-radius: 3px;
        margin-top: 2px;
        display: inline-block;
        font-family: 'JetBrains Mono', monospace;
    }
    .ws-status.connected { color: var(--phase-trending); }
    .ws-status.disconnected { color: var(--danger); animation: blink 1s infinite; }

    .header-right { display: flex; align-items: center; gap: 10px; }

    .switch-pair-btn {
        background: rgba(255,255,255,0.03);
        border: 1px solid var(--border);
        color: var(--text-dim);
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.68rem;
        font-weight: 700;
        padding: 6px 13px;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.15s ease;
        letter-spacing: 0.5px;
        display: flex;
        align-items: center;
        gap: 4px;
    }
    .switch-pair-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(240,185,11,0.08); }
    .switch-pair-btn:active, .switch-pair-btn.btn-highlight {
        background: rgba(240,185,11,0.2);
        border-color: var(--accent);
        color: var(--accent);
        transform: scale(0.96);
    }

    .pair-card { display: none; }
    .pair-card.active { display: block; }

    .card {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 2px;
        padding: 15px;
        margin-bottom: 11px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }

    .card-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 10px;
    }
    .pair-info { display: flex; flex-direction: column; gap: 3px; }
    .pair { font-weight: 800; font-size: 1.05rem; letter-spacing: 1.5px; color: var(--text); }

    .status-row {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
    }

    .price {
        font-family: 'JetBrains Mono', monospace;
        font-size: 1.2rem;
        font-weight: 700;
        text-align: right;
        transition: color 0.1s ease;
    }

    .signal-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(255,255,255,0.02);
        border: 1px solid var(--border);
        padding: 8px 12px;
        border-radius: 1px;
        margin-bottom: 9px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.78rem;
        font-weight: 700;
        text-transform: uppercase;
        cursor: pointer;
        user-select: none;
        transition: all 0.2s ease;
        position: relative;
        overflow: hidden;
    }
    .signal-bar.confirm-wait {
        border-color: var(--confirm-pending);
        background: rgba(240,185,11,0.06);
        animation: pulseBorder 1s infinite;
    }
    @keyframes pulseBorder {
        0%, 100% { border-color: rgba(240,185,11,0.25); }
        50% { border-color: rgba(240,185,11,1); }
    }

    .signal-dot-group { display: flex; gap: 10px; align-items: center; }
    .dot {
        width: 7px; height: 7px;
        border-radius: 50%;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        transition: all 0.15s;
    }
    .dot.active { background: var(--success); box-shadow: var(--glow-success); }
    .dot.active-down { background: var(--danger); box-shadow: var(--glow-danger); }
    .dot.confirm-pending { background: var(--confirm-pending); animation: pulseDot 0.8s infinite; }
    @keyframes pulseDot { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

    .card-level-grid {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        background: rgba(255,255,255,0.015);
        border: 1px solid var(--border);
        padding: 10px 12px;
        border-radius: 1px;
        margin-bottom: 9px;
        gap: 12px;
    }
    .level-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        cursor: pointer;
        transition: opacity 0.15s;
        text-align: center;
    }
    .level-item:first-child { align-items: flex-start; text-align: left; }
    .level-item:last-child { align-items: flex-end; text-align: right; }
    .level-item:nth-child(2) { align-items: center; text-align: center; }
    .level-item:active { opacity: 0.6; }
    .level-label {
        font-size: 0.56rem;
        color: var(--text-dim);
        text-transform: uppercase;
        margin-bottom: 3px;
        letter-spacing: 0.5px;
    }
    .level-value {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.82rem;
        font-weight: 700;
    }

    .stats-grid {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        background: rgba(255,255,255,0.015);
        border: 1px solid var(--border);
        padding: 8px 12px;
        border-radius: 1px;
        gap: 8px;
    }
    .stats-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        min-width: 0;
    }
    .stats-label {
        font-size: 0.48rem;
        color: var(--text-dim);
        text-transform: uppercase;
        margin-bottom: 2px;
        letter-spacing: 0.3px;
        white-space: nowrap;
    }
    .stats-value {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.7rem;
        font-weight: 700;
        white-space: nowrap;
    }

    .htf-badge { display: none; }

    footer {
        text-align: center;
        font-size: 0.5rem;
        color: var(--text-dim);
        margin-top: 10px;
        opacity: 0.55;
        line-height: 1.6;
    }

    #toast {
        position: fixed;
        bottom: 24px; left: 50%;
        transform: translateX(-50%) translateY(60px);
        background: var(--bg2);
        border: 1px solid var(--border-bright);
        border-radius: 20px;
        padding: 7px 18px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.65rem;
        color: var(--accent);
        z-index: 9999;
        transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
        opacity: 0;
        pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    .feed-badge {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.48rem; font-weight: 700;
        padding: 1px 6px; border-radius: 3px;
        border: 1px solid var(--border);
        color: var(--text-dim);
        transition: all 0.3s;
        white-space: nowrap;
    }
    .feed-badge.ok { color: var(--success); border-color: rgba(0,255,204,0.3); background: rgba(0,255,204,0.06); }
    .feed-badge.err { color: var(--danger); border-color: rgba(255,95,160,0.3); background: rgba(255,95,160,0.06); animation: blink 1s infinite; }
    .feed-badge.fallback { color: var(--accent); border-color: rgba(240,185,11,0.3); background: rgba(240,185,11,0.06); }
</style>
</head>
<body>
<div class="container">

<header>
    <div class="brand">
        <h1>uradvisor</h1>
        <div class="brand-sub">DUAL ENGINE • URA v7.4</div>
    </div>
    <div class="header-right">
        <div class="sys-status">
            <div><span class="pulse" id="globalPulse"></span>LIVE</div>
        </div>
        <button class="switch-pair-btn" id="switchPairBtn">
            <span id="switchLabel">XAUUSD</span>
        </button>
    </div>
</header>

<div id="terminals"></div>

<footer>
    [ ENGINE ]: SWEEP · CHoCH · FVG · HTF CONFIRM · RETRACE REAL-TIME | [ METHOD ]: DELAYED VALIDATION · DUAL FEED
</footer>
</div>

<div id="toast"></div>

<script>
(function () {
    'use strict';

    const LS_SCHEMA_VERSION = 3;
    
    function checkAndMigrateSchema() {
        const storedVer = parseInt(localStorage.getItem('ura_schema_ver') || '1', 10);
        if (storedVer < LS_SCHEMA_VERSION) {
            ['xau', 'btc'].forEach(id => {
                const raw = localStorage.getItem(`ura_state_${id}`);
                if (raw) {
                    try {
                        const s = JSON.parse(raw);
                        const defaults = createFreshState();
                        const migrated = Object.assign({}, defaults, s);
                        migrated.retracePct = 0;
                        localStorage.setItem(`ura_state_${id}`, JSON.stringify(migrated));
                    } catch (e) { localStorage.removeItem(`ura_state_${id}`); }
                }
            });
            localStorage.setItem('ura_schema_ver', String(LS_SCHEMA_VERSION));
        }
    }

    let toastTimer = null;
    function showToast(msg) {
        const el = document.getElementById('toast');
        if (!el) return;
        el.textContent = msg;
        el.classList.add('show');
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { el.classList.remove('show'); }, 1800);
    }

    // Throttle & RAF
    let pendingSaveData = { xau: null, btc: null };
    let pendingSaveTimer = { xau: null, btc: null };
    const SAVE_INTERVAL = 1000;
    let rafPending = { xau: false, btc: false };
    let pendingPriceData = { xau: null, btc: null };
    let pendingSignalData = { xau: null, btc: null };
    let signalDebounceTimer = { xau: null, btc: null };
    const SIGNAL_DEBOUNCE_MS = 20;

    const ATR_PERIOD = 14;
    const EMA_PERIOD = 21;
    const VOLUME_LOOKBACK = 12;
    const BTC_WS_URL = 'wss://stream.binance.com:9443/ws/btcusdt@trade';
    const XAU_OFFSET = -2.15;
    const CONFIRMATION_DELAY_CYCLES = 3;
    const RESET_THRESHOLD_XAU = 5;
    const RESET_THRESHOLD_BTC = 100;

    let marketData = {
        xau: { candles: [], atr: 0, ema: 0, volume: [], lastClose: 0, structureHigh: 0, structureLow: 0, currentCandle: null, price: 0 },
        btc: { candles: [], atr: 0, ema: 0, volume: [], lastClose: 0, structureHigh: 0, structureLow: 0, currentCandle: null, price: 0 }
    };

    let state = { xau: null, btc: null };
    let wsStatus = { xau: false, btc: false };
    let activePairId = localStorage.getItem('ura_active_pair') || 'xau';
    let pendingConfirmation = { xau: null, btc: null };
    let tapCounters = { xau: 0, btc: 0 };
    let tapTimers = { xau: null, btc: null };
    let historyTapCounters = { xau: 0, btc: 0 };
    let historyTapTimers = { xau: null, btc: null };
    const TAP_TIMEOUT = 500;

    function handleSignalBarTap(id) {
        if (tapTimers[id]) { clearTimeout(tapTimers[id]); tapTimers[id] = null; }
        tapCounters[id]++;
        tapTimers[id] = setTimeout(() => { tapCounters[id] = 0; tapTimers[id] = null; }, TAP_TIMEOUT);
        if (tapCounters[id] === 3) {
            if (pendingConfirmation[id]) cancelPendingConfirmation(id);
            resetSignal(id);
            tapCounters[id] = 0;
            if (tapTimers[id]) { clearTimeout(tapTimers[id]); tapTimers[id] = null; }
            if (navigator.vibrate) navigator.vibrate(30);
            showToast('Signal reset ✓');
        }
    }

    function handleHistoryPanelTap(id) {
        if (historyTapTimers[id]) { clearTimeout(historyTapTimers[id]); historyTapTimers[id] = null; }
        historyTapCounters[id]++;
        historyTapTimers[id] = setTimeout(() => { historyTapCounters[id] = 0; historyTapTimers[id] = null; }, TAP_TIMEOUT);
        if (historyTapCounters[id] === 3) {
            performanceStats[id] = createDefaultStats();
            savePerformanceStats(id);
            updatePerformanceUI(id);
            historyTapCounters[id] = 0;
            if (historyTapTimers[id]) { clearTimeout(historyTapTimers[id]); historyTapTimers[id] = null; }
            if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
            showToast('History reset ✓');
        }
    }

    function cancelPendingConfirmation(id) {
        if (pendingConfirmation[id]) {
            if (pendingConfirmation[id].timerId) clearTimeout(pendingConfirmation[id].timerId);
            pendingConfirmation[id] = null;
            const signalBar = document.getElementById(`signal-bar-${id}`);
            if (signalBar) signalBar.classList.remove('confirm-wait');
            const l3Dot = document.getElementById(`l3-${id}`);
            if (l3Dot && l3Dot.classList.contains('confirm-pending')) l3Dot.classList.remove('confirm-pending');
            updateSignalUIOnly(id);
        }
    }

    function throttledSaveState(id) {
        const s = state[id];
        if (!s) return;
        pendingSaveData[id] = {
            v: LS_SCHEMA_VERSION,
            lastPrice: s.lastPrice, trendScore: s.trendScore,
            l1: s.l1, l2: s.l2, l3: s.l3, confirmed: s.confirmed,
            type: s.type, entry: s.entry, sl: s.sl, tp: s.tp,
            tempHigh: s.tempHigh, tempLow: s.tempLow,
            originPrice: s.originPrice, warmupUntil: s.warmupUntil, confirmedAt: s.confirmedAt,
            retracePct: s.retracePct
        };
        if (pendingSaveTimer[id]) return;
        pendingSaveTimer[id] = setTimeout(() => {
            if (pendingSaveData[id]) {
                try { localStorage.setItem(`ura_state_${id}`, JSON.stringify(pendingSaveData[id])); } catch(e) {}
                pendingSaveData[id] = null;
            }
            pendingSaveTimer[id] = null;
        }, SAVE_INTERVAL);
    }

    // FIXED RETRACE PROGRESSION (R-PROG)
    // 0% = harga berada di titik ekstrim (highest untuk BUY, lowest untuk SELL) -> belum retrace
    // 100% = harga sudah retrace penuh kembali ke entry point
    function updateRetraceProgression(id, currentPrice) {
        const s = state[id];
        if (!s.confirmed || s.type === 'none' || s.entry <= 0) {
            if (s.retracePct !== 0) {
                s.retracePct = 0;
                const rprogEl = document.getElementById(`stats-rprog-${id}`);
                if (rprogEl) rprogEl.innerText = '0%';
            }
            return;
        }
        
        const entry = s.entry;
        let maxDistance = 0;
        let retraceDistance = 0;
        
        if (s.type === 'buy') {
            // highest = titik tertinggi yang pernah dicapai sejak signal
            const highest = Math.max(s.tempHigh, entry);
            maxDistance = highest - entry;
            if (maxDistance <= 0) {
                s.retracePct = 0;
            } else {
                // retraceDistance = seberapa jauh harga sudah turun dari titik tertinggi
                retraceDistance = highest - currentPrice;
                let rawPct = (retraceDistance / maxDistance) * 100;
                // Clamp dan round
                rawPct = Math.min(100, Math.max(0, rawPct));
                s.retracePct = Math.round(rawPct);
            }
        } else if (s.type === 'sell') {
            // lowest = titik terendah yang pernah dicapai sejak signal
            const lowest = Math.min(s.tempLow, entry);
            maxDistance = entry - lowest;
            if (maxDistance <= 0) {
                s.retracePct = 0;
            } else {
                // retraceDistance = seberapa jauh harga sudah naik dari titik terendah
                retraceDistance = currentPrice - lowest;
                let rawPct = (retraceDistance / maxDistance) * 100;
                rawPct = Math.min(100, Math.max(0, rawPct));
                s.retracePct = Math.round(rawPct);
            }
        }
        
        const rprogEl = document.getElementById(`stats-rprog-${id}`);
        if (rprogEl) rprogEl.innerText = `${s.retracePct}%`;
    }

    function throttledUpdateUI(id) {
        if (!rafPending[id]) {
            rafPending[id] = true;
            requestAnimationFrame(() => {
                const price = pendingPriceData[id];
                if (price !== null) {
                    updatePriceDisplayOnly(id, price);
                    updateRetraceProgression(id, price);
                    pendingPriceData[id] = null;
                }
                if (pendingSignalData[id] !== null) {
                    updateSignalUIOnly(id);
                    pendingSignalData[id] = null;
                }
                rafPending[id] = false;
            });
        }
    }

    function updatePriceDisplayOnly(id, price) {
        const priceEl = document.getElementById(`price-${id}`);
        if (!priceEl) return;
        const prev = parseFloat(priceEl.dataset.prev || '0');
        priceEl.innerText = price.toFixed(2);
        priceEl.dataset.prev = price;
        if (prev !== 0 && prev !== price) {
            priceEl.style.color = price > prev ? 'var(--success)' : 'var(--danger)';
            clearTimeout(priceEl._colorTimer);
            priceEl._colorTimer = setTimeout(() => { priceEl.style.color = ''; }, 300);
        }
        const s = state[id];
        if (s) updateRetraceProgression(id, price);
    }

    function updateSignalUIOnly(id) {
        const s = state[id];
        if (!s) return;
        const setDot = (elId, on, type) => {
            const el = document.getElementById(elId);
            if (!el) return;
            if (!on) el.className = 'dot';
            else if (pendingConfirmation[id] && elId === `l3-${id}` && !s.confirmed) el.className = 'dot confirm-pending';
            else el.className = type === 'sell' ? 'dot active-down' : 'dot active';
        };
        setDot(`l1-${id}`, s.l1, s.type);
        setDot(`l2-${id}`, s.l2, s.type);
        setDot(`l3-${id}`, s.l3, s.type);

        const signalText = document.getElementById(`signal-text-${id}`);
        if (signalText) {
            if (!wsStatus[id] && id === 'btc') { signalText.innerText = 'NO FEED'; signalText.style.color = 'var(--danger)'; }
            else if (pendingConfirmation[id] && s.l3 && !s.confirmed) { const p = pendingConfirmation[id].cycleCounter || 0; signalText.innerText = `CONFIRM ${p}/${CONFIRMATION_DELAY_CYCLES}`; signalText.style.color = 'var(--confirm-pending)'; }
            else if (s.confirmed) { signalText.innerText = s.type.toUpperCase(); signalText.style.color = s.type === 'buy' ? 'var(--success)' : 'var(--danger)'; }
            else if (s.l3) { signalText.innerText = 'LOCKED'; signalText.style.color = 'var(--accent)'; }
            else if (s.l2) { signalText.innerText = 'STAGE 2'; signalText.style.color = 'var(--accent)'; }
            else if (s.l1) { signalText.innerText = 'STAGE 1'; signalText.style.color = 'var(--feed-lightning)'; }
            else { signalText.innerText = 'IDLE'; signalText.style.color = 'var(--text-dim)'; }
        }

        const entryEl = document.getElementById(`entry-${id}`); if (entryEl) entryEl.innerText = s.confirmed ? s.entry.toFixed(2) : '--';
        const tpEl = document.getElementById(`tp-${id}`); if (tpEl) tpEl.innerText = s.confirmed ? s.tp.toFixed(2) : '--';
        const slEl = document.getElementById(`sl-${id}`); if (slEl) slEl.innerText = s.confirmed ? s.sl.toFixed(2) : '--';
    }

    let performanceStats = {};
    function createDefaultStats() { return { tpHits: 0, retraceResets: 0, total: 0, winrate: 0.0 }; }
    function loadPerformanceStats(id) {
        try {
            const saved = localStorage.getItem(`ura_stats_${id}`);
            if (!saved) return createDefaultStats();
            const p = JSON.parse(saved);
            return { tpHits: p.tpHits || 0, retraceResets: p.retraceResets || 0, total: p.total || 0, winrate: p.winrate || 0 };
        } catch (e) { return createDefaultStats(); }
    }
    function savePerformanceStats(id) { try { localStorage.setItem(`ura_stats_${id}`, JSON.stringify(performanceStats[id])); } catch(e) {} }
    function updateWinrate(id) {
        const s = performanceStats[id];
        s.total = s.tpHits + s.retraceResets;
        s.winrate = s.total > 0 ? ((s.tpHits / s.total) * 100).toFixed(1) : 0.0;
    }
    function recordSignalResult(id, resultType) {
        const s = performanceStats[id];
        if (resultType === 'tp') s.tpHits++;
        else if (resultType === 'retrace') s.retraceResets++;
        updateWinrate(id);
        savePerformanceStats(id);
        updatePerformanceUI(id);
    }
    function updatePerformanceUI(id) {
        const s = performanceStats[id];
        if (!s) return;
        const tpEl = document.getElementById(`stats-tp-${id}`);
        const lossEl = document.getElementById(`stats-loss-${id}`);
        const winrateEl = document.getElementById(`stats-winrate-${id}`);
        if (tpEl) tpEl.innerText = s.tpHits;
        if (lossEl) lossEl.innerText = s.retraceResets;
        if (winrateEl) winrateEl.innerText = `${s.winrate}%`;
    }

    // HTF engine (tidak diubah)
    let htfDataStore = {
        xau: { ohlcCandles: [], structure: 'NEUTRAL', momentum: 'STABLE', momentumStrength: 'NONE', confidence: 0 },
        btc: { ohlcCandles: [], structure: 'NEUTRAL', momentum: 'STABLE', momentumStrength: 'NONE', confidence: 0 }
    };
    let htfTickCounter = { xau: 0, btc: 0 };
    let htfCurrentCandle = { xau: null, btc: null };
    const HTF_TICK_PER_CANDLE = 10;
    function buildOHLCCandle(id, price) {
        htfTickCounter[id]++;
        if (!htfCurrentCandle[id] || htfTickCounter[id] >= HTF_TICK_PER_CANDLE) {
            if (htfCurrentCandle[id]) {
                htfCurrentCandle[id].closed = true;
                htfDataStore[id].ohlcCandles.push(htfCurrentCandle[id]);
                if (htfDataStore[id].ohlcCandles.length > 60) htfDataStore[id].ohlcCandles.shift();
            }
            htfTickCounter[id] = 0;
            htfCurrentCandle[id] = { open: price, high: price, low: price, close: price, closed: false };
        } else {
            htfCurrentCandle[id].high = Math.max(htfCurrentCandle[id].high, price);
            htfCurrentCandle[id].low = Math.min(htfCurrentCandle[id].low, price);
            htfCurrentCandle[id].close = price;
        }
    }
    function calculateSimpleHTF(id) {
        const data = htfDataStore[id];
        const candles = data.ohlcCandles.filter(c => c.closed);
        if (candles.length < 12) return;
        const window = Math.min(20, candles.length);
        const recentCandles = candles.slice(-window);
        let bullishCount = 0, bearishCount = 0;
        for (const c of recentCandles) { if (c.close > c.open) bullishCount++; else if (c.close < c.open) bearishCount++; }
        const threshold = Math.floor(window * 0.35);
        if (bullishCount > bearishCount + threshold) data.structure = 'BULLISH';
        else if (bearishCount > bullishCount + threshold) data.structure = 'BEARISH';
        else data.structure = 'NEUTRAL';
        const last5 = recentCandles.slice(-5);
        let upM = 0, downM = 0;
        for (let i = 1; i < last5.length; i++) { if (last5[i].close > last5[i-1].close) upM++; else if (last5[i].close < last5[i-1].close) downM++; }
        if (upM >= 3) data.momentum = 'BULLISH';
        else if (downM >= 3) data.momentum = 'BEARISH';
        else data.momentum = 'STABLE';
    }
    function seedHTFData(id, basePrice) {
        const step = id === 'xau' ? 0.4 : 40;
        for (let i = 0; i < 20; i++) {
            const drift = (i - 10) * step * 0.1;
            const open = basePrice + drift;
            const close = basePrice + drift + (i % 3 === 0 ? step * 0.2 : -step * 0.1);
            htfDataStore[id].ohlcCandles.push({ open, high: Math.max(open, close) + step * 0.1, low: Math.min(open, close) - step * 0.1, close, closed: true });
        }
        calculateSimpleHTF(id);
    }
    function updateHTFEngine(id, price) { buildOHLCCandle(id, price); calculateSimpleHTF(id); }
    function isHTFConfirmingDirection(id, direction) {
        const htf = htfDataStore[id];
        const market = marketData[id];
        if (!htf || !market) return false;
        const ema = market.ema || 0;
        const price = market.price || state[id]?.lastPrice || 0;
        if (ema <= 0 || price <= 0) return true;
        const atrTol = Math.max((market.atr || 0) * 0.18, id === 'xau' ? 0.35 : 18);
        const isAboveEMA = price >= (ema - atrTol);
        const isBelowEMA = price <= (ema + atrTol);
        const emaSlope = market.prevEMA !== undefined ? (ema - market.prevEMA) : 0;
        const slopeThreshold = Math.max(0.00001, (market.atr || 0) * 0.0045);
        const bullishBias = emaSlope >= -slopeThreshold;
        const bearishBias = emaSlope <= slopeThreshold;
        if (direction === 'buy') return ((htf.structure === 'BULLISH' || htf.momentum === 'BULLISH') && isAboveEMA && bullishBias);
        if (direction === 'sell') return ((htf.structure === 'BEARISH' || htf.momentum === 'BEARISH') && isBelowEMA && bearishBias);
        return true;
    }

    function startConfirmationDelay(id, direction, entryPrice) { 
        if (pendingConfirmation[id]) cancelPendingConfirmation(id);
        pendingConfirmation[id] = { direction, entryPrice, cycleCounter: 0, timerId: null };
        const signalBar = document.getElementById(`signal-bar-${id}`);
        if (signalBar) signalBar.classList.add('confirm-wait');
        const l3Dot = document.getElementById(`l3-${id}`);
        if (l3Dot) l3Dot.classList.add('confirm-pending');
        updateSignalUIOnly(id);
        function checkCycle() {
            if (!pendingConfirmation[id]) return;
            pendingConfirmation[id].cycleCounter++;
            updateSignalUIOnly(id);
            if (pendingConfirmation[id].cycleCounter >= CONFIRMATION_DELAY_CYCLES) {
                const htfConfirmed = isHTFConfirmingDirection(id, direction);
                if (htfConfirmed) executeLockSignal(id, direction, entryPrice);
                else { resetSignal(id); const st = document.getElementById(`signal-text-${id}`); if (st) { st.innerText = 'REJECT'; st.style.color = 'var(--danger)'; setTimeout(() => updateSignalUIOnly(id), 1200); } }
                if (pendingConfirmation[id]) pendingConfirmation[id] = null;
            } else { pendingConfirmation[id].timerId = setTimeout(() => { if (pendingConfirmation[id]) checkCycle(); }, 4000); }
        }
        pendingConfirmation[id].timerId = setTimeout(() => { if (pendingConfirmation[id]) checkCycle(); }, 4000);
    }
    
    function executeLockSignal(id, direction, entryPrice) {
        const s = state[id];
        s.l3 = true; s.confirmed = true; s.confirmedAt = Date.now(); s.warmupUntil = Date.now() + 2500;
        s.type = direction; s.entry = entryPrice; s.originPrice = entryPrice;
        s.tempHigh = entryPrice; s.tempLow = entryPrice;
        s.retracePct = 0;
        const risk = id === 'xau' ? 5 : entryPrice * 0.0025;
        if (direction === 'buy') { s.sl = entryPrice - risk; s.tp = entryPrice + (risk * 1.7); }
        else { s.sl = entryPrice + risk; s.tp = entryPrice - (risk * 1.7); }
        throttledSaveState(id); pendingSignalData[id] = true; throttledUpdateUI(id);
        const signalBar = document.getElementById(`signal-bar-${id}`);
        if (signalBar) signalBar.classList.remove('confirm-wait');
        if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
        showToast(`${id.toUpperCase()} SIGNAL: ${direction.toUpperCase()} @ ${entryPrice.toFixed(2)}`);
    }

    function buildRealCandle(id, price) { 
        const md = marketData[id]; const now = Date.now();
        if (!md.currentCandle) { md.currentCandle = { open: price, high: price, low: price, close: price, volume: 1, timestamp: now }; return; }
        md.currentCandle.high = Math.max(md.currentCandle.high, price);
        md.currentCandle.low = Math.min(md.currentCandle.low, price);
        md.currentCandle.close = price; md.currentCandle.volume++;
        if (now - md.currentCandle.timestamp >= 5000) {
            md.candles.push({ ...md.currentCandle });
            if (md.candles.length > 120) md.candles.shift();
            md.currentCandle = { open: price, high: price, low: price, close: price, volume: 1, timestamp: now };
            calculateAdvancedMetrics(id);
        }
    }
    function calculateAdvancedMetrics(id) {
        const md = marketData[id]; const candles = md.candles;
        if (candles.length < ATR_PERIOD + 5) return;
        let trValues = [];
        for (let i = 1; i < candles.length; i++) trValues.push(Math.max(candles[i].high - candles[i].low, Math.abs(candles[i].high - candles[i-1].close), Math.abs(candles[i].low - candles[i-1].close)));
        md.atr = trValues.slice(-ATR_PERIOD).reduce((a,b)=>a+b,0)/ATR_PERIOD;
        const closes = candles.map(c=>c.close); let ema = closes[0]; const alpha = 2/(EMA_PERIOD+1);
        for (let i=1;i<closes.length;i++) ema = (closes[i]*alpha)+(ema*(1-alpha));
        md.prevEMA = md.ema || ema; md.ema = ema; md.price = closes[closes.length-1];
        md.volume = candles.slice(-VOLUME_LOOKBACK).map(c=>c.volume);
    }
    function getAdaptiveThreshold(id) { const md = marketData[id]; return (!md.atr || md.atr <=0) ? (id==='xau'?0.7:15) : md.atr*1.35; }
    let paEma = { xau:0, btc:0 }; const paEmaAlpha = 0.2;
    function updatePA(id, price) { const s=state[id]; if(paEma[id]===0) paEma[id]=price; else paEma[id]=(price*paEmaAlpha)+(paEma[id]*(1-paEmaAlpha)); if(s.lastPrice!==0){const emaDiff=paEma[id]-s.lastPrice; s.trendScore+=emaDiff*0.5;} const maxTrend=id==='xau'?5:500; if(s.trendScore>maxTrend) s.trendScore=maxTrend; if(s.trendScore<-maxTrend) s.trendScore=-maxTrend; }
    function createFreshState() { return { v:LS_SCHEMA_VERSION, lastPrice:0, trendScore:0, l1:false,l2:false,l3:false,confirmed:false,confirmedAt:0,resetInProgress:false,warmupUntil:0,type:'none',entry:0,sl:0,tp:0,tempHigh:0,tempLow:0,originPrice:0,retracePct:0 }; }
    function loadState(id) { try{ const saved=localStorage.getItem(`ura_state_${id}`); if(!saved) return createFreshState(); const parsed=JSON.parse(saved); if(typeof parsed!=='object') return createFreshState(); return Object.assign(createFreshState(), parsed); }catch(e){ localStorage.removeItem(`ura_state_${id}`); return createFreshState(); } }
    
    function processSignal(id, price) {
        const s=state[id]; const resetThreshold= id==='xau'?RESET_THRESHOLD_XAU:RESET_THRESHOLD_BTC;
        if(s.confirmed){
            if(s.type!=='none'){
                if(s.tempHigh===0&&s.tempLow===0){s.tempHigh=s.entry||price; s.tempLow=s.entry||price;}
                if(price>s.tempHigh) s.tempHigh=price; 
                if(price<s.tempLow) s.tempLow=price;
                updateRetraceProgression(id, price);
                const refPrice=s.entry>0?s.entry:s.originPrice;
                const expansionDistance=s.type==='buy'? s.tempHigh-refPrice : refPrice-s.tempLow;
                if(expansionDistance>=resetThreshold){
                    const entryBuffer=id==='xau'?2:20;
                    const retraceReset=s.type==='buy'? price<=(refPrice-entryBuffer): price>=(refPrice+entryBuffer);
                    if(retraceReset && Date.now()>=(s.warmupUntil||0)){ recordSignalResult(id,'retrace'); resetSignal(id); return;}
                }
            }
            const hitTP=(s.type==='buy' && price>=s.tp)||(s.type==='sell' && price<=s.tp);
            const hitSL=(s.type==='buy' && price<=s.sl)||(s.type==='sell' && price>=s.sl);
            if(hitTP){ recordSignalResult(id,'tp'); resetSignal(id); } else if(hitSL){ resetSignal(id); } return;
        }
        if(pendingConfirmation[id]){ s.lastPrice=price; return; }
        updatePA(id,price);
        let threshold=getAdaptiveThreshold(id);
        buildRealCandle(id,price);
        if(!s.confirmed && s.lastPrice!==0 && Math.abs(price-s.lastPrice)>threshold){
            const direction=s.type!=='none'?s.type:(price>s.lastPrice?'buy':'sell');
            if(!s.l1){ s.l1=true; s.type=direction; s.originPrice=price; s.tempHigh=price; s.tempLow=price; throttledSaveState(id); pendingSignalData[id]=true; throttledUpdateUI(id); }
            else if(!s.l2){ s.l2=true; throttledSaveState(id); pendingSignalData[id]=true; throttledUpdateUI(id); }
            else if(!s.l3 && !s.confirmed){ s.l3=true; throttledSaveState(id); pendingSignalData[id]=true; throttledUpdateUI(id); startConfirmationDelay(id,direction,price); }
        }
        s.lastPrice=price;
        throttledSaveState(id);
    }
    
    function updateSignal(id, price) { if(signalDebounceTimer[id]) clearTimeout(signalDebounceTimer[id]); signalDebounceTimer[id]=setTimeout(()=>{ processSignal(id,price); signalDebounceTimer[id]=null; }, SIGNAL_DEBOUNCE_MS); }
    
    function resetSignal(id) { 
        const s=state[id]; 
        if(pendingConfirmation[id]) cancelPendingConfirmation(id); 
        if(s.resetInProgress) return; 
        s.resetInProgress=true; 
        if(signalDebounceTimer[id]){ clearTimeout(signalDebounceTimer[id]); signalDebounceTimer[id]=null; } 
        Object.assign(s,{ l1:false,l2:false,l3:false,confirmed:false,confirmedAt:0,warmupUntil:0,type:'none',entry:0,sl:0,tp:0,trendScore:0,tempHigh:0,tempLow:0,originPrice:0,lastPrice:0,retracePct:0 }); 
        pendingSignalData[id]=true; 
        updateSignalUIOnly(id); 
        const rprogEl = document.getElementById(`stats-rprog-${id}`);
        if (rprogEl) rprogEl.innerText = '0%';
        throttledSaveState(id); 
        throttledUpdateUI(id); 
        requestAnimationFrame(()=>{ s.resetInProgress=false; }); 
        setTimeout(()=>{ s.resetInProgress=false; },300); 
    }

    // WebSocket XAU & BTC (tidak diubah, tetap utuh)
    let xauWs=null, xauReconnectTimer=null, xauReconnectAttempts=0;
    let xauFetchRetryTimer=null, xauCurrentPrice=0, xauLastHeartbeat=Date.now();
    function updateFeedBadge(id,status){ const el=document.getElementById(`feed-badge-${id}`); if(!el) return; el.className='feed-badge'; if(status==='ok'){ el.textContent='● WS'; el.classList.add('ok'); } else if(status==='fallback'){ el.textContent='⚡ REST'; el.classList.add('fallback'); } else { el.textContent='○'; el.classList.add('err'); } }
    function updateXAUDisplay(price){ if(!price||isNaN(price)||price<=0) return; xauCurrentPrice=price; xauLastHeartbeat=Date.now(); pendingPriceData.xau=price; pendingSignalData.xau=true; throttledUpdateUI('xau'); updateHTFEngine('xau',price); updateSignal('xau',price); wsStatus.xau=true; updateGlobalPulse(); const statusEl=document.getElementById('ws-status-xau'); if(statusEl){ statusEl.textContent='● LIVE'; statusEl.className='ws-status connected'; } updateFeedBadge('xau','ok'); }
    const XAU_REST_SOURCES=['https://fapi.binance.com/fapi/v1/ticker/price?symbol=XAUUSDT','https://api.binance.com/api/v3/ticker/price?symbol=XAUUSDT'];
    let xauRestSourceIdx=0;
    async function xauFetchRestPrice(){ for(let attempt=0;attempt<XAU_REST_SOURCES.length;attempt++){ const url=XAU_REST_SOURCES[(xauRestSourceIdx+attempt)%XAU_REST_SOURCES.length]; try{ const controller=new AbortController(); const timeoutId=setTimeout(()=>controller.abort(),7000); const resp=await fetch(url,{signal:controller.signal}); clearTimeout(timeoutId); const data=await resp.json(); if(data?.price){ const price=parseFloat(data.price)+XAU_OFFSET; if(price>0 && price!==xauCurrentPrice){ updateXAUDisplay(price); updateFeedBadge('xau','fallback'); xauRestSourceIdx=(xauRestSourceIdx+attempt)%XAU_REST_SOURCES.length; return true; } } }catch(e){} } updateFeedBadge('xau','err'); return false; }
    function initXAUWebSocket(){ if(xauWs){ try{ xauWs.close(); }catch(e){} xauWs=null; } if(xauReconnectTimer) clearTimeout(xauReconnectTimer); try{ xauWs=new WebSocket('wss://fstream.binance.com/ws/xauusdt@trade'); const wsTimeout=setTimeout(()=>{ if(xauWs && xauWs.readyState!==WebSocket.OPEN){ try{ xauWs.close(); }catch(e){} xauWs=null; updateFeedBadge('xau','fallback'); if(!xauFetchRetryTimer) xauFetchRetryTimer=setInterval(async ()=>{ await xauFetchRestPrice(); },3000); } },5000); xauWs.onopen=()=>{ clearTimeout(wsTimeout); xauReconnectAttempts=0; if(xauFetchRetryTimer){ clearInterval(xauFetchRetryTimer); xauFetchRetryTimer=null; } updateFeedBadge('xau','ok'); updateGlobalPulse(); }; xauWs.onmessage=(e)=>{ try{ const data=JSON.parse(e.data); if(data.p){ const price=parseFloat(data.p)+XAU_OFFSET; if(!isNaN(price) && price>0 && price!==xauCurrentPrice) updateXAUDisplay(price); } }catch(err){} }; xauWs.onerror=()=>{ updateFeedBadge('xau','fallback'); if(!xauFetchRetryTimer) xauFetchRetryTimer=setInterval(async ()=>{ await xauFetchRestPrice(); },3000); }; xauWs.onclose=()=>{ const delay=Math.min(1000*Math.pow(1.5,xauReconnectAttempts),15000); xauReconnectAttempts++; xauReconnectTimer=setTimeout(()=>initXAUWebSocket(),delay); updateFeedBadge('xau','fallback'); if(!xauFetchRetryTimer) xauFetchRetryTimer=setInterval(async ()=>{ await xauFetchRestPrice(); },3000); }; }catch(err){ updateFeedBadge('xau','fallback'); if(!xauFetchRetryTimer) xauFetchRetryTimer=setInterval(async ()=>{ await xauFetchRestPrice(); },3000); } }
    
    let btcWs=null, btcReconnectTimer=null, btcReconnectAttempts=0;
    let btcFetchRetryTimer=null;
    async function btcFetchRestPrice(){ try{ const resp=await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT'); const data=await resp.json(); if(data?.price){ const price=parseFloat(data.price); if(price>0 && !isNaN(price)){ pendingPriceData.btc=price; pendingSignalData.btc=true; throttledUpdateUI('btc'); updateHTFEngine('btc',price); updateSignal('btc',price); wsStatus.btc=true; updateGlobalPulse(); updateFeedBadge('btc','fallback'); return true; } } }catch(e){} updateFeedBadge('btc','err'); return false; }
    function initBTCWebSocket(){ if(btcWs){ try{ btcWs.close(); }catch(e){} btcWs=null; } if(btcReconnectTimer) clearTimeout(btcReconnectTimer); try{ btcWs=new WebSocket(BTC_WS_URL); const wsTimeout=setTimeout(()=>{ if(btcWs && btcWs.readyState!==WebSocket.OPEN){ try{ btcWs.close(); }catch(e){} btcWs=null; updateFeedBadge('btc','fallback'); wsStatus.btc=false; if(!btcFetchRetryTimer) btcFetchRetryTimer=setInterval(async ()=>{ await btcFetchRestPrice(); },3000); } },6000); btcWs.onopen=()=>{ clearTimeout(wsTimeout); btcReconnectAttempts=0; wsStatus.btc=true; if(btcFetchRetryTimer){ clearInterval(btcFetchRetryTimer); btcFetchRetryTimer=null; } const statusEl=document.getElementById('ws-status-btc'); if(statusEl){ statusEl.textContent='● LIVE'; statusEl.className='ws-status connected'; } updateFeedBadge('btc','ok'); updateGlobalPulse(); updateSignalUIOnly('btc'); }; btcWs.onmessage=(e)=>{ try{ const data=JSON.parse(e.data); const price=parseFloat(data.p); if(price && price>0 && !isNaN(price)){ pendingPriceData.btc=price; pendingSignalData.btc=true; throttledUpdateUI('btc'); updateHTFEngine('btc',price); updateSignal('btc',price); } }catch(err){} }; btcWs.onclose=()=>{ wsStatus.btc=false; updateFeedBadge('btc','fallback'); updateGlobalPulse(); updateSignalUIOnly('btc'); const delay=Math.min(1000*Math.pow(2,btcReconnectAttempts),30000); btcReconnectAttempts++; btcReconnectTimer=setTimeout(()=>initBTCWebSocket(),delay); if(!btcFetchRetryTimer) btcFetchRetryTimer=setInterval(async ()=>{ await btcFetchRestPrice(); },3000); }; btcWs.onerror=()=>{ wsStatus.btc=false; updateFeedBadge('btc','fallback'); updateGlobalPulse(); if(!btcFetchRetryTimer) btcFetchRetryTimer=setInterval(async ()=>{ await btcFetchRestPrice(); },3000); }; }catch(err){ wsStatus.btc=false; updateFeedBadge('btc','err'); setTimeout(()=>initBTCWebSocket(),5000); } }
    
    function updateGlobalPulse(){ const pulseEl=document.getElementById('globalPulse'); if(pulseEl){ const isLive=(xauCurrentPrice>0)||wsStatus.btc; pulseEl.className=isLive?'pulse connected':'pulse disconnected'; } }
    function switchPair(){ activePairId=activePairId==='xau'?'btc':'xau'; try{ localStorage.setItem('ura_active_pair',activePairId); }catch(e){} const switchLabel=document.getElementById('switchLabel'); if(switchLabel) switchLabel.innerText=activePairId==='xau'?'XAUUSD':'BTCUSD'; document.querySelectorAll('.pair-card').forEach(card=>card.classList.remove('active')); const activeCard=document.getElementById(`card-${activePairId}`); if(activeCard) activeCard.classList.add('active'); if(navigator.vibrate) navigator.vibrate(20); }
    window.copyValue = (id, type) => { const val = document.getElementById(`${type}-${id}`)?.innerText; if(val && val !== '--'){ navigator.clipboard?.writeText(val).then(()=>showToast(`${type.toUpperCase()} copied: ${val}`)).catch(()=>showToast(`${val}`)); if(navigator.vibrate) navigator.vibrate(50); } };
    function buildCardHTML(id, label){ const isActive=activePairId===id?'active':''; const wsInitClass=id==='xau'?'connected':'disconnected'; const wsInitText=id==='xau'?'● CONNECTING...':'○ RECONNECTING...'; return `<div class="pair-card ${isActive}" id="card-${id}"><div class="card"><div class="card-top"><div class="pair-info"><span class="pair">${label}</span><div class="status-row"><span id="ws-status-${id}" class="ws-status ${wsInitClass}">${wsInitText}</span><span class="feed-badge" id="feed-badge-${id}">○ INIT</span></div></div><span class="price" id="price-${id}">0.00</span></div><div class="signal-bar" id="signal-bar-${id}"><span>SIGNAL</span><div class="signal-dot-group"><div class="dot" id="l1-${id}"></div><div class="dot" id="l2-${id}"></div><div class="dot" id="l3-${id}"></div></div><span id="signal-text-${id}">IDLE</span></div><div class="card-level-grid"><div class="level-item" onclick="window.copyValue('${id}','entry')"><span class="level-label">Entry</span><span class="level-value" id="entry-${id}">--</span></div><div class="level-item" onclick="window.copyValue('${id}','tp')"><span class="level-label">Target</span><span class="level-value" id="tp-${id}" style="color:var(--success)">--</span></div><div class="level-item" onclick="window.copyValue('${id}','sl')"><span class="level-label">Deep</span><span class="level-value" id="sl-${id}" style="color:var(--danger)">--</span></div></div><div class="stats-grid" id="history-panel-${id}"><div class="stats-item"><span class="stats-label">TP HIT</span><span class="stats-value" id="stats-tp-${id}" style="color:var(--success)">0</span></div><div class="stats-item"><span class="stats-label">RETRACE</span><span class="stats-value" id="stats-loss-${id}" style="color:var(--danger)">0</span></div><div class="stats-item"><span class="stats-label">R-PROG</span><span class="stats-value" id="stats-rprog-${id}" style="color:var(--feed-lightning)">0%</span></div><div class="stats-item"><span class="stats-label">WINRATE</span><span class="stats-value" id="stats-winrate-${id}" style="color:var(--accent)">0%</span></div></div></div></div>`; }
    
    function init(){ checkAndMigrateSchema(); state.xau=loadState('xau'); state.btc=loadState('btc'); performanceStats.xau=loadPerformanceStats('xau'); performanceStats.btc=loadPerformanceStats('btc'); seedHTFData('xau',2620); seedHTFData('btc',60000); document.getElementById('terminals').innerHTML=buildCardHTML('xau','XAUUSD')+buildCardHTML('btc','BTCUSD'); const bindTap=(el,handler)=>{ if(!el) return; let lastTap=0; const tapHandler=(e)=>{ e.preventDefault(); const now=Date.now(); if(now-lastTap<80) return; lastTap=now; handler(); }; el.addEventListener('touchstart',tapHandler,{passive:false}); el.addEventListener('click',tapHandler); }; bindTap(document.getElementById('signal-bar-xau'),()=>handleSignalBarTap('xau')); bindTap(document.getElementById('signal-bar-btc'),()=>handleSignalBarTap('btc')); bindTap(document.getElementById('history-panel-xau'),()=>handleHistoryPanelTap('xau')); bindTap(document.getElementById('history-panel-btc'),()=>handleHistoryPanelTap('btc')); const switchBtn=document.getElementById('switchPairBtn'); if(switchBtn){ const cleanBtn=switchBtn.cloneNode(true); switchBtn.parentNode.replaceChild(cleanBtn,switchBtn); const doSwitch=function(e){ e.preventDefault(); e.stopPropagation(); this.classList.add('btn-highlight'); setTimeout(()=>this.classList.remove('btn-highlight'),150); switchPair(); }; cleanBtn.addEventListener('click',doSwitch); cleanBtn.addEventListener('touchstart',doSwitch,{passive:false}); } updateSignalUIOnly('xau'); updateSignalUIOnly('btc'); updatePerformanceUI('xau'); updatePerformanceUI('btc'); initXAUWebSocket(); xauFetchRestPrice(); initBTCWebSocket(); btcFetchRestPrice(); updateGlobalPulse(); setInterval(()=>{ const now=Date.now(); if(now-xauLastHeartbeat>8000) xauFetchRestPrice(); updateGlobalPulse(); },3000); setInterval(()=>{ if(!xauWs || xauWs.readyState!==WebSocket.OPEN) xauFetchRestPrice(); if(!btcWs || btcWs.readyState!==WebSocket.OPEN) btcFetchRestPrice(); },2000); document.addEventListener('visibilitychange',()=>{ if(!document.hidden){ xauFetchRestPrice(); btcFetchRestPrice(); updateSignalUIOnly('xau'); updateSignalUIOnly('btc'); updateGlobalPulse(); } }); }
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init); else init();
})();

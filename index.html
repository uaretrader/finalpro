<script>
(function () {
'use strict';

// ================================================================
//  URADVISOR PRECISION ENGINE v10.0
//  Architecture : Dual Timeframe — MACRO (60s) + MICRO (15s)
//  Target       : Intraday 5–15 menit | XAU + BTC
//
//  MACRO Layer  → membaca BIAS & TREND (35 candle = ~35 menit)
//                 EMA 9/21, MACD, VWAP, ADX, Market Structure
//
//  MICRO Layer  → mendeteksi PULLBACK ke zona kunci
//                 RSI extreme, price rejection, volume spike
//
//  Entry Logic  → Entry di pullback MICRO saat MACRO bias kuat
//                 BUKAN entry di puncak momentum
//
//  Prinsip      → "Wait for the market to come to you"
// ================================================================

const LS_SCHEMA_VERSION    = 6;
const BTC_WS_URL           = 'wss://stream.binance.com:9443/ws/btcusdt@trade';
const XAU_OFFSET           = -1.6;
const CONFIRMATION_WAIT_MS = 4000;
const COOLDOWN_AFTER_SL_MS = 15000;
const RR_RATIO             = 1.8;

// ── Dual Timeframe Candle Durations ──────────────────────────────
const MACRO_DUR = { xau: 60000,  btc: 60000  };  // 60 detik
const MICRO_DUR = { xau: 15000,  btc: 15000  };  // 15 detik

// ── Minimum candle requirements ──────────────────────────────────
const MACRO_MIN = 35;   // 35 menit context
const MICRO_MIN = 10;   // 2.5 menit micro context

// ── Signal score threshold ────────────────────────────────────────
const MACRO_BIAS_MIN   = 72;   // minimum macro bias score
const ADX_MIN          = 18;   // minimum ADX untuk trend valid

// ================================================================
//  SCHEMA MIGRATION
// ================================================================
function checkAndMigrateSchema() {
    const v = parseInt(localStorage.getItem('ura_schema_ver') || '1', 10);
    if (v < LS_SCHEMA_VERSION) {
        ['xau','btc'].forEach(id => {
            localStorage.removeItem(`ura_state_${id}`);
            localStorage.removeItem(`ura_stats_${id}`);
        });
        localStorage.setItem('ura_schema_ver', String(LS_SCHEMA_VERSION));
    }
}

// ── Toast ────────────────────────────────────────────────────────
let _tt = null;
function showToast(msg) {
    const el = document.getElementById('toast');
    if (!el) return;
    el.textContent = msg;
    el.classList.add('show');
    if (_tt) clearTimeout(_tt);
    _tt = setTimeout(() => el.classList.remove('show'), 2400);
}

// ================================================================
//  INDICATOR LIBRARY
// ================================================================

function calcEMA(arr, period) {
    if (!arr || arr.length < period) return null;
    const k = 2 / (period + 1);
    let e = arr.slice(0, period).reduce((a, b) => a + b, 0) / period;
    for (let i = period; i < arr.length; i++) e = arr[i] * k + e * (1 - k);
    return e;
}

function calcRSI(closes, period = 14) {
    if (!closes || closes.length < period + 1) return null;
    const r = closes.slice(-(period + 1));
    let g = 0, l = 0;
    for (let i = 1; i < r.length; i++) {
        const d = r[i] - r[i - 1];
        if (d > 0) g += d; else l -= d;
    }
    const ag = g / period, al = l / period;
    if (al === 0) return 100;
    return 100 - 100 / (1 + ag / al);
}

function calcMACD(closes, fast = 12, slow = 26, sig = 9) {
    if (!closes || closes.length < slow + sig + 2) return null;
    const ef = calcEMA(closes, fast);
    const es = calcEMA(closes, slow);
    if (ef === null || es === null) return null;
    const macdLine = ef - es;
    const hist = [];
    const stride = Math.max(1, Math.floor(closes.length / 60));
    for (let i = slow; i < closes.length; i += stride) {
        const a = calcEMA(closes.slice(0, i + 1), fast);
        const b = calcEMA(closes.slice(0, i + 1), slow);
        if (a !== null && b !== null) hist.push(a - b);
    }
    if (hist.length < sig) return { line: macdLine, signal: 0, hist: macdLine };
    const sigLine = calcEMA(hist, Math.min(sig, hist.length));
    return { line: macdLine, signal: sigLine, hist: macdLine - (sigLine || 0) };
}

function calcBollinger(closes, period = 20, std = 2) {
    if (!closes || closes.length < period) return null;
    const sl = closes.slice(-period);
    const mean = sl.reduce((a, b) => a + b, 0) / period;
    const sd = Math.sqrt(sl.reduce((a, b) => a + (b - mean) ** 2, 0) / period);
    return { upper: mean + std * sd, lower: mean - std * sd, mid: mean, width: 2 * std * sd };
}

function calcVWAP(candles) {
    if (!candles || candles.length < 5) return null;
    const sl = candles.slice(-Math.min(90, candles.length));
    let cumTP = 0, cumV = 0;
    for (const c of sl) {
        const tp = (c.high + c.low + c.close) / 3;
        cumTP += tp * c.volume;
        cumV  += c.volume;
    }
    return cumV > 0 ? cumTP / cumV : null;
}

function calcATR(candles, period = 14) {
    if (!candles || candles.length < period + 1) return null;
    const trs = [];
    for (let i = 1; i < candles.length; i++) {
        trs.push(Math.max(
            candles[i].high - candles[i].low,
            Math.abs(candles[i].high - candles[i - 1].close),
            Math.abs(candles[i].low  - candles[i - 1].close)
        ));
    }
    return trs.slice(-period).reduce((a, b) => a + b, 0) / period;
}

// ── ADX ──────────────────────────────────────────────────────────
function calcADX(candles, period = 14) {
    if (!candles || candles.length < period * 2 + 2) return null;
    const c = candles.slice(-(period * 2 + 2));
    const dmP = [], dmM = [], tr = [];
    for (let i = 1; i < c.length; i++) {
        const up   = c[i].high  - c[i-1].high;
        const dn   = c[i-1].low - c[i].low;
        dmP.push(up > dn && up > 0 ? up : 0);
        dmM.push(dn > up && dn > 0 ? dn : 0);
        tr.push(Math.max(
            c[i].high - c[i].low,
            Math.abs(c[i].high - c[i-1].close),
            Math.abs(c[i].low  - c[i-1].close)
        ));
    }
    let atr14 = tr.slice(0, period).reduce((a,b) => a+b, 0);
    let pdm14  = dmP.slice(0, period).reduce((a,b) => a+b, 0);
    let mdm14  = dmM.slice(0, period).reduce((a,b) => a+b, 0);
    const dxArr = [];
    const push_dx = (a, p, m) => {
        const pdi = a > 0 ? (p/a)*100 : 0;
        const mdi = a > 0 ? (m/a)*100 : 0;
        dxArr.push((pdi+mdi) > 0 ? Math.abs(pdi-mdi)/(pdi+mdi)*100 : 0);
    };
    push_dx(atr14, pdm14, mdm14);
    for (let i = period; i < tr.length; i++) {
        atr14 = atr14 - atr14/period + tr[i];
        pdm14  = pdm14  - pdm14/period  + dmP[i];
        mdm14  = mdm14  - mdm14/period  + dmM[i];
        push_dx(atr14, pdm14, mdm14);
    }
    if (dxArr.length < period) return null;
    return dxArr.slice(-period).reduce((a,b) => a+b, 0) / period;
}

// ── Market Structure: HH/HL atau LH/LL ───────────────────────────
function detectStructure(candles) {
    if (!candles || candles.length < 20) return 'UNCLEAR';
    const rc = candles.slice(-20);
    const h1 = rc.slice(0, 10), h2 = rc.slice(10);
    const fH = Math.max(...h1.map(c => c.high));
    const fL = Math.min(...h1.map(c => c.low));
    const sH = Math.max(...h2.map(c => c.high));
    const sL = Math.min(...h2.map(c => c.low));
    if (sH > fH && sL > fL) return 'BULLISH';  // HH + HL
    if (sH < fH && sL < fL) return 'BEARISH';  // LH + LL
    return 'UNCLEAR';
}

// ── Volume spike ─────────────────────────────────────────────────
function detectVolSpike(candles, lb = 10) {
    if (!candles || candles.length < lb + 1) return false;
    const avg = candles.slice(-lb-1, -1).reduce((a,c) => a+c.volume, 0) / lb;
    return candles[candles.length-1].volume > avg * 1.5;
}

// ── Candle rejection (pin bar / engulfing signal) ─────────────────
// Mendeteksi apakah candle terakhir menolak level kunci
function detectRejection(candles) {
    if (!candles || candles.length < 2) return 'NONE';
    const c = candles[candles.length - 1];
    const body   = Math.abs(c.close - c.open);
    const range  = c.high - c.low;
    if (range === 0) return 'NONE';
    const upperWick = c.high - Math.max(c.open, c.close);
    const lowerWick = Math.min(c.open, c.close) - c.low;
    // Bullish rejection: lower wick panjang, close di atas midpoint
    if (lowerWick > body * 1.5 && lowerWick > upperWick * 1.8 && c.close > (c.high+c.low)/2)
        return 'BULLISH';
    // Bearish rejection: upper wick panjang, close di bawah midpoint
    if (upperWick > body * 1.5 && upperWick > lowerWick * 1.8 && c.close < (c.high+c.low)/2)
        return 'BEARISH';
    return 'NONE';
}

// ================================================================
//  MACRO LAYER SCORER
//  Input  : macro candles (60 detik)
//  Output : { bias:'BULL'|'BEAR'|'NEUTRAL', score:0-100, factors:{} }
//
//  Indikator:
//   EMA 9/21 cross    → arah trend utama    (bobot 28)
//   EMA 21/50 filter  → konfirmasi trend    (bobot 15)
//   MACD              → momentum            (bobot 20)
//   VWAP              → fair value          (bobot 18)
//   ADX               → kekuatan trend      (modifier)
//   Market Structure  → HH/HL atau LH/LL   (bobot 14)
//   BB Width          → kondisi volatilitas (modifier)
// ================================================================
function scoreMacroBias(id, price, macroCandles) {
    const f = {};
    if (macroCandles.length < MACRO_MIN) return { bias: 'NEUTRAL', score: 0, factors: f, valid: false };

    const closes = macroCandles.map(c => c.close);
    const atr    = calcATR(macroCandles) || (id === 'xau' ? 2.5 : 280);

    const ema9  = calcEMA(closes, 9);
    const ema21 = calcEMA(closes, 21);
    const ema50 = calcEMA(closes, Math.min(50, closes.length - 1));
    const macd  = calcMACD(closes);
    const vwap  = calcVWAP(macroCandles);
    const adx   = calcADX(macroCandles, 14);
    const str   = detectStructure(macroCandles);
    const bb    = calcBollinger(closes, 20, 2);

    f.atr = atr; f.vwap = vwap; f.structure = str;
    f.adx = adx ? adx.toFixed(1) : null;

    // ── ADX Gate ─────────────────────────────────────────────────
    // Market terlalu choppy → tidak ada bias yang valid
    if (adx !== null && adx < ADX_MIN) {
        f.adx_class = 'CHOPPY';
        return { bias: 'NEUTRAL', score: 0, factors: f, valid: false, adx };
    }
    const adxBoost = adx !== null
        ? (adx >= 35 ? 1.15 : adx >= 25 ? 1.05 : adx >= 18 ? 0.92 : 0.75)
        : 0.85;
    f.adx_class = adx !== null
        ? (adx >= 35 ? 'STRONG' : adx >= 25 ? 'TREND' : adx >= 18 ? 'MILD' : 'CHOPPY')
        : 'UNKNOWN';

    let bull = 0, bear = 0;

    // ── EMA 9/21 Cross (bobot 28) ─────────────────────────────────
    if (ema9 && ema21) {
        f.ema_cross = ema9 > ema21 ? 'BULL' : 'BEAR';
        ema9 > ema21 ? bull += 28 : bear += 28;
    }

    // ── EMA 21 vs Price (bobot 10) ────────────────────────────────
    if (ema21) {
        const tol = atr * 0.10;
        if (price > ema21 + tol)      { bull += 10; f.ema21_pos = 'ABOVE'; }
        else if (price < ema21 - tol) { bear += 10; f.ema21_pos = 'BELOW'; }
        else f.ema21_pos = 'AT';
    }

    // ── EMA50 filter (bobot 8) ────────────────────────────────────
    if (ema50) {
        const tol = atr * 0.10;
        if (price > ema50 + tol)      { bull += 8; f.ema50 = 'ABOVE'; }
        else if (price < ema50 - tol) { bear += 8; f.ema50 = 'BELOW'; }
        else f.ema50 = 'AT';
    }

    // ── MACD (bobot 20) ───────────────────────────────────────────
    if (macd !== null) {
        f.macd_hist = macd.hist.toFixed(5);
        if (macd.hist > 0 && macd.line > 0)      { bull += 20; f.macd_sig = 'BULL'; }
        else if (macd.hist > 0)                  { bull += 13; f.macd_sig = 'BULL_X'; }
        else if (macd.hist < 0 && macd.line < 0) { bear += 20; f.macd_sig = 'BEAR'; }
        else if (macd.hist < 0)                  { bear += 13; f.macd_sig = 'BEAR_X'; }
        else f.macd_sig = 'FLAT';
    }

    // ── VWAP (bobot 18) ───────────────────────────────────────────
    let vwapDir = 'NEUTRAL';
    if (vwap) {
        const tol = atr * 0.12;
        f.vwap_dist = (price - vwap).toFixed(2);
        if (price > vwap + tol)      { bull += 18; f.vwap_pos = 'ABOVE'; vwapDir = 'BULL'; }
        else if (price < vwap - tol) { bear += 18; f.vwap_pos = 'BELOW'; vwapDir = 'BEAR'; }
        else f.vwap_pos = 'AT';

        // ── VWAP Distance Filter ──────────────────────────────────
        // Jika harga terlalu jauh dari VWAP → entry beresiko (overbought/oversold macro)
        const distATR = Math.abs(price - vwap) / atr;
        f.vwap_atr_dist = distATR.toFixed(2);
        if (distATR > 3.5) {
            // Terlalu jauh — bias tidak valid untuk entry baru
            return { bias: 'NEUTRAL', score: 0, factors: f, valid: false, adx, vwap, atr, reason: 'VWAP_OVEREXTENDED' };
        }
    }

    // ── Market Structure HH/HL atau LH/LL (bobot 14) ─────────────
    if (str === 'BULLISH')       bull += 14;
    else if (str === 'BEARISH')  bear += 14;
    else { bull = Math.round(bull * 0.90); bear = Math.round(bear * 0.90); }

    // ── Bollinger Band Width modifier ─────────────────────────────
    if (bb) {
        const bbPct = bb.width / bb.mid;
        if (bbPct < 0.003) {
            // Squeeze — market mau breakout tapi arah belum jelas, kurangi confidence
            bull = Math.round(bull * 0.82);
            bear = Math.round(bear * 0.82);
            f.bb_state = 'SQUEEZE';
        } else {
            f.bb_state = 'NORMAL';
        }
    }

    // ── Apply ADX boost ───────────────────────────────────────────
    bull = Math.round(bull * adxBoost);
    bear = Math.round(bear * adxBoost);

    // ── Conflict check: indikator wajib harus searah ──────────────
    // Untuk bias BULL: EMA cross, MACD, VWAP harus tidak berlawanan semua
    const emaBull  = f.ema_cross === 'BULL';
    const macdBull = (f.macd_sig || '').startsWith('BULL');
    const macdBear = (f.macd_sig || '').startsWith('BEAR');
    const emaBear  = f.ema_cross === 'BEAR';

    // Jika EMA dan MACD berlawanan arah → konflik besar → kurangi drastis
    if (emaBull && macdBear) { bull = Math.round(bull * 0.6); bear = Math.round(bear * 0.6); f.conflict = 'EMA_MACD'; }
    if (emaBear && macdBull) { bull = Math.round(bull * 0.6); bear = Math.round(bear * 0.6); f.conflict = 'EMA_MACD'; }

    // ── Determine bias ────────────────────────────────────────────
    const MAX  = 100;
    const diff = Math.abs(bull - bear);
    let bias   = 'NEUTRAL';
    let score  = 0;

    if (bull > bear && diff >= 12) {
        bias  = 'BULL';
        score = Math.min(100, Math.round((bull / MAX) * 100 + bull * 0.12));
    } else if (bear > bull && diff >= 12) {
        bias  = 'BEAR';
        score = Math.min(100, Math.round((bear / MAX) * 100 + bear * 0.12));
    } else {
        score = Math.round(Math.max(bull, bear) * 0.5);
    }

    const valid = score >= MACRO_BIAS_MIN && bias !== 'NEUTRAL';
    return { bias, score, factors: f, valid, adx, vwap, atr, ema21, ema9, bull, bear };
}

// ================================================================
//  MICRO LAYER SCORER
//  Input  : micro candles (15 detik) + macro bias context
//  Output : { ready: bool, direction:'buy'|'sell'|null, quality:0-100 }
//
//  Logic  : Mendeteksi apakah harga sedang pullback ke zona kunci
//           dan siap untuk entry searah MACRO bias
//
//  Zona entry ideal (BUY):
//   — Harga mendekati VWAP macro atau EMA21 macro dari atas
//   — RSI micro < 45 (pullback territory)
//   — Candle rejection bullish di zona tersebut
//   — Volume spike sebagai trigger final
//
//  Zona entry ideal (SELL):
//   — Harga mendekati VWAP macro atau EMA21 macro dari bawah
//   — RSI micro > 55 (pullback territory)
//   — Candle rejection bearish di zona tersebut
//   — Volume spike sebagai trigger final
// ================================================================
function scoreMicroEntry(id, price, microCandles, macroBias) {
    const f = {};
    if (microCandles.length < MICRO_MIN) return { ready: false, direction: null, quality: 0, factors: f };
    if (!macroBias || !macroBias.valid) return { ready: false, direction: null, quality: 0, factors: f };

    const closes  = microCandles.map(c => c.close);
    const rsi     = calcRSI(closes, Math.min(9, closes.length - 1));
    const rejection = detectRejection(microCandles);
    const volSpike  = detectVolSpike(microCandles, 8);
    const microATR  = calcATR(microCandles, Math.min(10, microCandles.length - 1))
                      || macroBias.atr * 0.3;

    f.rsi      = rsi ? rsi.toFixed(1) : null;
    f.rejection = rejection;
    f.vol_spike = volSpike;

    const { bias, vwap, ema21, atr: macroATR } = macroBias;
    const direction = bias === 'BULL' ? 'buy' : 'sell';

    // ── Zona Pullback Detection ───────────────────────────────────
    // Apakah harga berada di zona menarik untuk entry searah bias?
    let inZone = false;
    let zoneType = 'NONE';
    const snapDist = macroATR * 0.40; // toleransi jarak ke zona kunci

    if (bias === 'BULL') {
        // Untuk BUY: harga harus sudah turun mendekati zona support
        const nearVWAP = vwap && price <= vwap + snapDist && price >= vwap - snapDist * 0.5;
        const nearEMA  = ema21 && price <= ema21 + snapDist && price >= ema21 - snapDist * 0.5;
        // Atau: harga sudah pullback dari puncak (RSI turun dari overbought)
        const rsiPullback = rsi !== null && rsi < 48;
        // Atau: micro candle membuat lower low tapi macro masih bullish
        const microDip = microCandles.length >= 4 &&
            microCandles[microCandles.length-1].low < microCandles[microCandles.length-3].low;

        if (nearVWAP)      { inZone = true; zoneType = 'VWAP'; }
        else if (nearEMA)  { inZone = true; zoneType = 'EMA21'; }
        else if (rsiPullback && microDip) { inZone = true; zoneType = 'RSI_DIP'; }

    } else if (bias === 'BEAR') {
        // Untuk SELL: harga harus sudah naik mendekati zona resistance
        const nearVWAP = vwap && price >= vwap - snapDist && price <= vwap + snapDist * 0.5;
        const nearEMA  = ema21 && price >= ema21 - snapDist && price <= ema21 + snapDist * 0.5;
        const rsiPullback = rsi !== null && rsi > 52;
        const microRip  = microCandles.length >= 4 &&
            microCandles[microCandles.length-1].high > microCandles[microCandles.length-3].high;

        if (nearVWAP)      { inZone = true; zoneType = 'VWAP'; }
        else if (nearEMA)  { inZone = true; zoneType = 'EMA21'; }
        else if (rsiPullback && microRip) { inZone = true; zoneType = 'RSI_RIP'; }
    }

    f.in_zone  = inZone;
    f.zone_type = zoneType;

    // ── Quality Score ─────────────────────────────────────────────
    let quality = 0;

    if (inZone) quality += 40;

    // RSI konfirmasi pullback
    if (bias === 'BULL') {
        if (rsi !== null && rsi < 40)      { quality += 25; f.rsi_sig = 'DEEP_PB'; }
        else if (rsi !== null && rsi < 48) { quality += 15; f.rsi_sig = 'PULLBACK'; }
        else { f.rsi_sig = 'HIGH'; }
    } else {
        if (rsi !== null && rsi > 60)      { quality += 25; f.rsi_sig = 'DEEP_PB'; }
        else if (rsi !== null && rsi > 52) { quality += 15; f.rsi_sig = 'PULLBACK'; }
        else { f.rsi_sig = 'LOW'; }
    }

    // Candle rejection di zona
    if (bias === 'BULL' && rejection === 'BULLISH') quality += 20;
    if (bias === 'BEAR' && rejection === 'BEARISH') quality += 20;

    // Volume spike sebagai trigger
    if (volSpike) quality += 15;

    // Tidak boleh terlalu jauh dari zona
    if (!inZone && quality < 30) {
        return { ready: false, direction, quality, factors: f, zoneType: 'NONE' };
    }

    // Minimum quality untuk ready
    const ready = quality >= 55 && inZone;

    return { ready, direction, quality, factors: f, zoneType };
}

// ================================================================
//  STATE MANAGEMENT
// ================================================================
function createFreshState() {
    return {
        v: LS_SCHEMA_VERSION,
        lastPrice: 0,
        // Macro bias
        macroBias: 'NEUTRAL', macroScore: 0, macroValid: false,
        // Signal stages
        l1: false, l2: false, l3: false,
        confirmed: false, confirmedAt: 0,
        resetInProgress: false,
        warmupUntil: 0, cooldownUntil: 0,
        // Trade
        type: 'none', entry: 0, sl: 0, tp: 0,
        tempHigh: 0, tempLow: 0,
        originPrice: 0, confluenceScore: 0,
        // Entry zone
        entryZone: 'NONE',
        // Breakeven
        breakevenArmed: false
    };
}

function loadState(id) {
    try {
        const r = localStorage.getItem(`ura_state_${id}`);
        return r ? Object.assign(createFreshState(), JSON.parse(r)) : createFreshState();
    } catch(e) { return createFreshState(); }
}

function createDefaultStats() {
    return { tpHits: 0, retraceResets: 0, slHits: 0, breakevenHits: 0, total: 0, winrate: 0.0 };
}

function loadPerformanceStats(id) {
    try {
        const r = localStorage.getItem(`ura_stats_${id}`);
        return r ? Object.assign(createDefaultStats(), JSON.parse(r)) : createDefaultStats();
    } catch(e) { return createDefaultStats(); }
}

function savePerformanceStats(id) {
    try { localStorage.setItem(`ura_stats_${id}`, JSON.stringify(performanceStats[id])); } catch(e) {}
}

function updateWinrateAndDrawrate(id) {
    const s = performanceStats[id];
    s.total = s.tpHits + s.retraceResets + s.slHits + (s.breakevenHits || 0);
    const wd = s.tpHits + s.slHits;
    s.winrate  = wd > 0 ? parseFloat(((s.tpHits / wd) * 100).toFixed(1)) : 0.0;
    s.drawrate = s.total > 0 ? parseFloat((((s.retraceResets + (s.breakevenHits||0)) / s.total) * 100).toFixed(1)) : 0.0;
}

function recordSignalResult(id, type) {
    const s = performanceStats[id];
    if (type === 'tp')         s.tpHits++;
    else if (type === 'retrace') s.retraceResets++;
    else if (type === 'sl')    s.slHits++;
    else if (type === 'be')    { s.breakevenHits = (s.breakevenHits||0) + 1; }
    updateWinrateAndDrawrate(id);
    savePerformanceStats(id);
    updatePerformanceUI(id);
}

let wsStatus          = { xau: false, btc: false };

let performanceStats  = {};
let pendingConfirmation = { xau: null, btc: null };
let tapCounters       = { xau: 0, btc: 0 };
let tapTimers         = { xau: null, btc: null };
let historyTapCounters= { xau: 0, btc: 0 };
let historyTapTimers  = { xau: null, btc: null };
const TAP_TIMEOUT     = 500;
let pendingPriceData  = { xau: null, btc: null };
let pendingSignalData = { xau: false, btc: false };
let rafPending        = { xau: false, btc: false };
let pendingSaveData   = { xau: null, btc: null };
let pendingSaveTimer  = { xau: null, btc: null };

let signalDebounceTimer = { xau: null, btc: null };

// ── Dual Timeframe Candle Store ───────────────────────────────────
let marketData = {
    xau: {
        macro: { candles: [], current: null, start: 0 },
        micro: { candles: [], current: null, start: 0 },
        atr: 0, price: 0
    },
    btc: {
        macro: { candles: [], current: null, start: 0 },
        micro: { candles: [], current: null, start: 0 },
        atr: 0, price: 0
    }
};

// ── Current macro bias cache (updated per macro candle close) ─────
let macroBiasCache = { xau: null, btc: null };

// ================================================================
//  DUAL TIMEFRAME CANDLE ENGINE
// ================================================================
function buildTFCandle(tf, dur, maxCandles, price) {
    const now = Date.now();
    if (!tf.current || (now - tf.start) >= dur) {
        if (tf.current) {
            tf.current.closed = true;
            tf.candles.push({ ...tf.current });
            if (tf.candles.length > maxCandles) tf.candles.shift();
        }
        tf.current = { open: price, high: price, low: price, close: price, volume: 1, closed: false };
        tf.start = now;
        return true; // new candle opened
    } else {
        tf.current.high   = Math.max(tf.current.high, price);
        tf.current.low    = Math.min(tf.current.low,  price);
        tf.current.close  = price;
        tf.current.volume++;
        return false;
    }
}

function buildCandles(id, price) {
    const md = marketData[id];
    const macroNew = buildTFCandle(md.macro, MACRO_DUR[id], 120, price);
    buildTFCandle(md.micro, MICRO_DUR[id], 80,  price);
    md.price = price;

    // Update ATR dari macro (lebih stabil)
    const mc = md.macro.candles.filter(c => c.closed);
    if (mc.length >= 15) {
        md.atr = calcATR(mc, 14) || md.atr;
    }

    // Re-compute macro bias hanya saat candle macro baru tutup
    if (macroNew && mc.length >= MACRO_MIN) {
        macroBiasCache[id] = scoreMacroBias(id, price, mc);
    }
}

function getMacroCandles(id) { return marketData[id].macro.candles.filter(c => c.closed); }
function getMicroCandles(id) { return marketData[id].micro.candles.filter(c => c.closed); }

// ================================================================
//  SEED CANDLES — realistic dual TF seed
// ================================================================
function seedCandles(id, base) {
    const isXau  = id === 'xau';
    const step   = isXau ? 0.8 : 80;
    const nMacro = 55;
    const nMicro = 20;

    marketData[id].macro.candles = [];
    marketData[id].micro.candles = [];

    let price = base;
    for (let i = 0; i < nMacro; i++) {
        const drift = (Math.random() - 0.48) * step * 0.04;
        price += drift;
        const open  = price;
        const close = open + (Math.random() - 0.48) * step * 0.25;
        const hi    = Math.max(open, close) + Math.random() * step * 0.10;
        const lo    = Math.min(open, close) - Math.random() * step * 0.10;
        marketData[id].macro.candles.push({
            open, high: hi, low: lo, close,
            volume: 60 + Math.floor(Math.random() * 120), closed: true
        });
        price = close;
    }

    for (let i = 0; i < nMicro; i++) {
        const open  = price + (Math.random() - 0.5) * step * 0.06;
        const close = open  + (Math.random() - 0.48) * step * 0.08;
        const hi    = Math.max(open, close) + Math.random() * step * 0.04;
        const lo    = Math.min(open, close) - Math.random() * step * 0.04;
        marketData[id].micro.candles.push({
            open, high: hi, low: lo, close,
            volume: 20 + Math.floor(Math.random() * 50), closed: true
        });
        price = close;
    }

    // Init ATR dari seed
    const mc = getMacroCandles(id);
    if (mc.length >= 15) {
        marketData[id].atr = calcATR(mc, 14) || (isXau ? 2.5 : 280);
    }
}

// ================================================================
//  EXECUTE LOCK SIGNAL — Entry di zona pullback
// ================================================================
function executeLockSignal(id, direction, livePrice, macroScore, zoneType) {
    const s = state[id];
    const entry = livePrice > 0 ? livePrice : (s.lastPrice || 0);
    if (entry <= 0) return;

    const atr = marketData[id].atr || (id === 'xau' ? 2.5 : 280);

    // ── SL Placement — structural, bukan hanya ATR flat ──────────
    // SL ditempatkan di bawah/atas zona entry untuk memberi ruang
    // yang lebih tepat sesuai struktur micro
    const microCandles = getMicroCandles(id);
    let structuralSL = 0;

    if (microCandles.length >= 5) {
        const recent = microCandles.slice(-5);
        if (direction === 'buy') {
            // SL di bawah low terendah 5 micro candle terakhir
            const lowestLow = Math.min(...recent.map(c => c.low));
            structuralSL = lowestLow - atr * 0.15; // sedikit buffer
        } else {
            // SL di atas high tertinggi 5 micro candle terakhir
            const highestHigh = Math.max(...recent.map(c => c.high));
            structuralSL = highestHigh + atr * 0.15;
        }
    }

    // Floor SL distance minimum
    const minSL = id === 'xau' ? 15 : 160;
    let slD = Math.abs(entry - structuralSL);
    if (slD < minSL || structuralSL === 0) slD = Math.max(atr * 0.8, minSL);

    const tpD = slD * RR_RATIO;

    s.l3 = true; s.confirmed = true;
    s.confirmedAt = Date.now();
    s.warmupUntil = Date.now() + 3000;
    s.type        = direction;
    s.entry       = entry;
    s.originPrice = entry;
    s.tempHigh    = entry;
    s.tempLow     = entry;
    s.confluenceScore = macroScore;
    s.entryZone   = zoneType || 'ZONE';
    s.breakevenArmed = false;

    if (direction === 'buy') {
        s.sl = entry - slD;
        s.tp = entry + tpD;
    } else {
        s.sl = entry + slD;
        s.tp = entry - tpD;
    }

    throttledSaveState(id);
    pendingSignalData[id] = true;
    throttledUpdateUI(id);
    document.getElementById(`signal-bar-${id}`)?.classList.remove('confirm-wait');
    if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
    showToast(`${id.toUpperCase()} ${direction.toUpperCase()} @ ${entry.toFixed(2)} | ZONE:${zoneType} | SL:${slD.toFixed(2)}`);
}

// ================================================================
//  SIGNAL ENGINE — CORE (Dual TF Logic)
// ================================================================
function processSignal(id, price) {
    const s = state[id];
    if (!s) return;
    if (Date.now() < (s.cooldownUntil || 0)) return;

    // Build both timeframes
    buildCandles(id, price);

    // ── OPEN TRADE MANAGEMENT ─────────────────────────────────────
    if (s.confirmed && s.type !== 'none') {
        if (!s.tempHigh) { s.tempHigh = s.entry; s.tempLow = s.entry; }
        if (price > s.tempHigh) s.tempHigh = price;
        if (price < s.tempLow)  s.tempLow  = price;

        updateTracker(id, price);

        const hitTP = (s.type === 'buy'  && price >= s.tp) ||
                      (s.type === 'sell' && price <= s.tp);
        const hitSL = (s.type === 'buy'  && price <= s.sl) ||
                      (s.type === 'sell' && price >= s.sl);

        if (hitTP) { recordSignalResult(id, 'tp'); resetSignal(id); return; }
        if (hitSL) {
            // Cek apakah ini breakeven atau SL sesungguhnya
            const result = s.breakevenArmed ? 'be' : 'sl';
            if (result === 'sl') state[id].cooldownUntil = Date.now() + COOLDOWN_AFTER_SL_MS;
            recordSignalResult(id, result);
            resetSignal(id);
            return;
        }

        // ── Dynamic Breakeven ─────────────────────────────────────
        // Jika harga sudah bergerak 50% menuju TP, geser SL ke entry
        if (!s.breakevenArmed && Date.now() > (s.warmupUntil || 0)) {
            const tpDist  = Math.abs(s.tp - s.entry);
            const priceMoved = s.type === 'buy'
                ? price - s.entry
                : s.entry - price;
            if (priceMoved >= tpDist * 0.5) {
                // Geser SL ke entry (breakeven)
                s.sl = s.entry;
                s.breakevenArmed = true;
                throttledSaveState(id);
                showToast(`${id.toUpperCase()} SL → BREAKEVEN 🔒`);
            }
        }

        // ── Retrace buffer — exit jika kembali ke entry sebelum BE ─
        if (!s.breakevenArmed) {
            const buf = id === 'xau' ? 12.5 : 140;
            if (s.type === 'buy'  && price <= (s.entry - buf) && Date.now() > (s.warmupUntil || 0)) {
                recordSignalResult(id, 'retrace'); resetSignal(id); return;
            }
            if (s.type === 'sell' && price >= (s.entry + buf) && Date.now() > (s.warmupUntil || 0)) {
                recordSignalResult(id, 'retrace'); resetSignal(id); return;
            }
        }

        return;
    }

    if (pendingConfirmation[id]) { s.lastPrice = price; return; }

    const macroCandles = getMacroCandles(id);
    const microCandles = getMicroCandles(id);
    if (macroCandles.length < MACRO_MIN) { s.lastPrice = price; return; }
    if (microCandles.length < MICRO_MIN) { s.lastPrice = price; return; }

    // ── Get macro bias (dari cache, di-update tiap close macro) ───
    let macroBias = macroBiasCache[id];
    if (!macroBias) {
        macroBias = scoreMacroBias(id, price, macroCandles);
        macroBiasCache[id] = macroBias;
    }

    // Update engine badges dengan macro data
    updateEngineBadges(id, macroBias);
    updateConfluenceBar(id, macroBias.score);

    // ── MACRO bias tidak valid → idle ─────────────────────────────
    if (!macroBias.valid) {
        if (s.l1 || s.l2) resetSignal(id);
        s.lastPrice = price;
        return;
    }

    // ── MICRO entry scoring ───────────────────────────────────────
    const micro = scoreMicroEntry(id, price, microCandles, macroBias);

    // Stage machine: l1 = macro valid, l2 = micro in zone, l3 = confirmed
    if (!s.l1) {
        // Stage 1: Macro bias terdeteksi kuat
        s.l1 = true;
        s.type = macroBias.bias === 'BULL' ? 'buy' : 'sell';
        s.macroScore = macroBias.score;
        s.macroBias = macroBias.bias;
        pendingSignalData[id] = true;
        throttledUpdateUI(id);
        throttledSaveState(id);
        return;
    }

    // Jika macro bias berbalik → reset
    const expectedDir = s.type;
    const currentDir  = macroBias.bias === 'BULL' ? 'buy' : 'sell';
    if (s.l1 && !s.confirmed && macroBias.valid && currentDir !== expectedDir) {
        resetSignal(id);
        return;
    }

    if (s.l1 && !s.l2 && micro.ready) {
        // Stage 2: Micro sudah di zona pullback
        s.l2 = true;
        pendingSignalData[id] = true;
        throttledUpdateUI(id);
        throttledSaveState(id);
        return;
    }

    if (s.l2 && !s.l3 && micro.ready && micro.quality >= 60) {
        // Stage 3: Kualitas micro cukup tinggi → start confirmation
        s.l3 = true;
        pendingSignalData[id] = true;
        throttledUpdateUI(id);
        throttledSaveState(id);
        startConfirmationDelay(id, currentDir, price, macroBias.score, micro.zoneType);
        return;
    }

    // Jika sudah l2 tapi micro keluar dari zona → turun ke l1
    if (s.l2 && !s.l3 && !micro.ready && !micro.factors.in_zone) {
        s.l2 = false;
        pendingSignalData[id] = true;
        throttledUpdateUI(id);
    }

    s.lastPrice = price;
    throttledSaveState(id);
}

function updateSignal(id, price) {
    if (signalDebounceTimer[id]) clearTimeout(signalDebounceTimer[id]);
    signalDebounceTimer[id] = setTimeout(() => {
        processSignal(id, price);
        signalDebounceTimer[id] = null;
    }, SIGNAL_DEBOUNCE_MS);
}

function startConfirmationDelay(id, direction, entryPrice, macroScore, zoneType) {
    if (pendingConfirmation[id]) cancelPendingConfirmation(id);
    pendingConfirmation[id] = { direction, entryPrice, macroScore, zoneType };
    const sb = document.getElementById(`signal-bar-${id}`);
    if (sb) sb.classList.add('confirm-wait');
    document.getElementById(`l3-${id}`)?.classList.add('confirm-pending');
    updateSignalUIOnly(id);

    pendingConfirmation[id].timerId = setTimeout(() => {
        if (!pendingConfirmation[id]) return;
        const macroC = getMacroCandles(id);
        const microC = getMicroCandles(id);
        const lp = id === 'xau' ? xauCurrentPrice : (marketData[id].price || state[id].lastPrice || 0);

        if (macroC.length >= MACRO_MIN && microC.length >= MICRO_MIN) {
            const mb2 = scoreMacroBias(id, lp, macroC);
            const mi2 = scoreMicroEntry(id, lp, microC, mb2);
            const stillValid = mb2.valid
                && (mb2.bias === 'BULL' ? 'buy' : 'sell') === direction
                && mi2.ready;

            if (stillValid) {
                executeLockSignal(id, direction, lp, mb2.score, mi2.zoneType || zoneType);
            } else {
                resetSignal(id);
                const st = document.getElementById(`signal-text-${id}`);
                if (st) {
                    st.innerText = 'REJECT';
                    st.style.color = 'var(--danger)';
                    setTimeout(() => updateSignalUIOnly(id), 1500);
                }
            }
        } else {
            resetSignal(id);
        }
        pendingConfirmation[id] = null;
    }, CONFIRMATION_WAIT_MS);
}

function cancelPendingConfirmation(id) {
    if (!pendingConfirmation[id]) return;
    if (pendingConfirmation[id].timerId) clearTimeout(pendingConfirmation[id].timerId);
    pendingConfirmation[id] = null;
    document.getElementById(`signal-bar-${id}`)?.classList.remove('confirm-wait');
    updateSignalUIOnly(id);
}

function resetSignal(id) {
    const s = state[id];
    if (!s || s.resetInProgress) return;
    s.resetInProgress = true;
    if (pendingConfirmation[id]) cancelPendingConfirmation(id);
    if (signalDebounceTimer[id]) { clearTimeout(signalDebounceTimer[id]); signalDebounceTimer[id] = null; }
    const kept = { lastPrice: s.lastPrice, cooldownUntil: s.cooldownUntil || 0 };
    Object.assign(s, createFreshState(), kept);
    pendingSignalData[id] = true;
    updateSignalUIOnly(id);
    const t = document.getElementById(`tracker-${id}`);
    if (t) t.innerText = '0';
    throttledSaveState(id);
    throttledUpdateUI(id);
    requestAnimationFrame(() => { s.resetInProgress = false; });
    setTimeout(() => { s.resetInProgress = false; }, 300);
}

// ================================================================
//  UI FUNCTIONS
// ================================================================
function throttledSaveState(id) {
    const s = state[id]; if (!s) return;
    pendingSaveData[id] = { ...s };
    if (pendingSaveTimer[id]) return;
    pendingSaveTimer[id] = setTimeout(() => {
        if (pendingSaveData[id]) {
            try { localStorage.setItem(`ura_state_${id}`, JSON.stringify(pendingSaveData[id])); } catch(e) {}
            pendingSaveData[id] = null;
        }
        pendingSaveTimer[id] = null;
    }, SAVE_INTERVAL);
}

function throttledUpdateUI(id) {
    if (!rafPending[id]) {
        rafPending[id] = true;
        requestAnimationFrame(() => {
            const p = pendingPriceData[id];
            if (p !== null) { updatePriceDisplayOnly(id, p); pendingPriceData[id] = null; }
            if (pendingSignalData[id]) { updateSignalUIOnly(id); pendingSignalData[id] = false; }
            rafPending[id] = false;
        });
    }
}

function updatePriceDisplayOnly(id, price) {
    const el = document.getElementById(`price-${id}`); if (!el) return;
    const prev = parseFloat(el.dataset.prev || '0');
    el.innerText = price.toFixed(2); el.dataset.prev = price;
    if (prev !== 0 && prev !== price) {
        el.style.color = price > prev ? 'var(--success)' : 'var(--danger)';
        clearTimeout(el._ct);
        el._ct = setTimeout(() => { el.style.color = ''; }, 280);
    }
    if (state[id]) updateTracker(id, price);
}

function updateTracker(id, price) {
    const s = state[id];
    const t = document.getElementById(`tracker-${id}`);
    if (!s || !s.confirmed || s.type === 'none' || s.entry <= 0) {
        if (t) { t.innerText = '0'; t.style.color = ''; }
        return;
    }
    const dist = s.type === 'buy' ? price - s.entry : s.entry - price;
    if (t) {
        t.innerText = (Math.round(dist * 100) / 100).toFixed(2);
        t.style.color = dist >= 0 ? 'var(--emerald)' : 'var(--crimson)';
    }
}

function updateSignalUIOnly(id) {
    const s = state[id]; if (!s) return;
    const setDot = (eid, on, type) => {
        const el = document.getElementById(eid); if (!el) return;
        if (!on) el.className = 'dot';
        else if (pendingConfirmation[id] && eid === `l3-${id}` && !s.confirmed)
            el.className = 'dot confirm-pending';
        else el.className = type === 'sell' ? 'dot active-down' : 'dot active';
    };
    setDot(`l1-${id}`, s.l1, s.type);
    setDot(`l2-${id}`, s.l2, s.type);
    setDot(`l3-${id}`, s.l3, s.type);

    const st = document.getElementById(`signal-text-${id}`);
    if (st) {
        if (!wsStatus[id] && id === 'btc') {
            st.innerText = 'NO FEED'; st.style.color = 'var(--danger)';
        } else if (pendingConfirmation[id] && s.l3 && !s.confirmed) {
            st.innerText = 'CONFIRM...'; st.style.color = 'var(--gold)';
        } else if (s.confirmed) {
            const beLabel = s.breakevenArmed ? ' [BE]' : '';
            st.innerText = s.type.toUpperCase() + beLabel;
            st.style.color = s.type === 'buy' ? 'var(--success)' : 'var(--danger)';
        } else if (s.l3) {
            st.innerText = 'LOCKED'; st.style.color = 'var(--accent)';
        } else if (s.l2) {
            st.innerText = 'PULLBACK'; st.style.color = 'var(--accent)';
        } else if (s.l1) {
            st.innerText = 'BIAS'; st.style.color = 'var(--amber)';
        } else {
            st.innerText = 'IDLE'; st.style.color = 'var(--text-dim)';
        }
    }

    const eEl = document.getElementById(`entry-${id}`); if (eEl) eEl.innerText = s.confirmed ? s.entry.toFixed(2) : '--';
    const tEl = document.getElementById(`tp-${id}`);    if (tEl) tEl.innerText = s.confirmed ? s.tp.toFixed(2) : '--';
    const sEl = document.getElementById(`sl-${id}`);    if (sEl) sEl.innerText = s.confirmed ? s.sl.toFixed(2) : '--';
}

function updateEngineBadges(id, mb) {
    if (!mb) return;
    const f = mb.factors || {};

    const badges = [
        {
            id: `eb-rsi-${id}`,
            val: f.rsi_sig || 'RSI',
            cls: f.rsi_sig === 'DEEP_PB' ? 'active' :
                 f.rsi_sig === 'PULLBACK' ? 'bull' :
                 f.rsi_sig === 'HIGH' || f.rsi_sig === 'LOW' ? 'bear' : 'neutral'
        },
        {
            id: `eb-macd-${id}`,
            val: f.macd_sig || 'MACD',
            cls: (f.macd_sig||'').startsWith('BULL') ? 'bull' :
                 (f.macd_sig||'').startsWith('BEAR') ? 'bear' : 'neutral'
        },
        {
            id: `eb-ema-${id}`,
            val: f.ema_cross || 'EMA',
            cls: f.ema_cross === 'BULL' ? 'bull' :
                 f.ema_cross === 'BEAR' ? 'bear' : 'off'
        },
        {
            id: `eb-vwap-${id}`,
            val: f.vwap_pos || 'VWAP',
            cls: f.vwap_pos === 'ABOVE' ? 'bull' :
                 f.vwap_pos === 'BELOW' ? 'bear' : 'neutral'
        },
        {
            id: `eb-bb-${id}`,
            val: f.bb_state || 'BB',
            cls: f.bb_state === 'SQUEEZE' ? 'active' : 'neutral'
        },
        {
            id: `eb-choch-${id}`,
            val: f.structure || 'STR',
            cls: f.structure === 'BULLISH' ? 'bull' :
                 f.structure === 'BEARISH' ? 'bear' : 'off'
        },
        {
            id: `eb-vol-${id}`,
            val: f.adx_class || 'ADX',
            cls: f.adx_class === 'STRONG' || f.adx_class === 'TREND' ? 'bull' :
                 f.adx_class === 'CHOPPY' ? 'bear' : 'neutral'
        }
    ];

    for (const b of badges) {
        const el = document.getElementById(b.id);
        if (el) { el.className = `ebadge ${b.cls}`; el.textContent = b.val; }
    }

    const sc = document.getElementById(`eb-score-${id}`);
    if (sc) {
        const sv = Math.round(mb.score || 0);
        sc.textContent = `BIAS:${sv}`;
        sc.className = 'ebadge score';
        sc.style.color = mb.valid ? 'var(--emerald)' : sv >= MACRO_BIAS_MIN * 0.7 ? 'var(--gold)' : 'var(--text-dim)';
    }
}

function updateConfluenceBar(id, score) {
    const fill = document.getElementById(`cf-fill-${id}`);
    const txt  = document.getElementById(`cf-txt-${id}`);
    if (!fill || !txt) return;
    const pct = Math.min(100, Math.max(0, score));
    fill.style.width = pct + '%';
    fill.style.background = pct >= MACRO_BIAS_MIN ? 'var(--emerald)' :
                             pct >= MACRO_BIAS_MIN * 0.7 ? 'var(--gold)' : 'var(--crimson)';
    txt.textContent = Math.round(pct);
    txt.style.color = pct >= MACRO_BIAS_MIN ? 'var(--emerald)' :
                      pct >= MACRO_BIAS_MIN * 0.7 ? 'var(--gold)' : 'var(--text-dim)';
}

function updatePerformanceUI(id) {
    const s = performanceStats[id]; if (!s) return;
    const tp = document.getElementById(`stats-tp-${id}`);
    const rt = document.getElementById(`stats-retrace-${id}`);
    const sl = document.getElementById(`stats-sl-${id}`);
    const wr = document.getElementById(`stats-winrate-${id}`);
    const dr = document.getElementById(`draw-rate-${id}`);
    if (tp) tp.innerText = s.tpHits;
    if (rt) { rt.innerText = s.retraceResets + (s.breakevenHits||0); rt.style.color = 'var(--teal)'; }
    if (sl) sl.innerText = s.slHits;
    if (wr) {
        wr.innerText = `${s.winrate}%`;
        wr.style.color = s.winrate >= 65 ? 'var(--emerald)' :
                         s.winrate >= 50 ? 'var(--gold)' : 'var(--crimson)';
    }
    if (dr) { dr.innerText = `${s.drawrate||0}%`; dr.style.color = 'var(--teal)'; }
}

function updateFeedBadge(id, status) {
    const el = document.getElementById(`feed-badge-${id}`); if (!el) return;
    el.className = 'feed-badge';
    if (status === 'ok')           { el.textContent = '● WS';   el.classList.add('ok'); }
    else if (status === 'fallback'){ el.textContent = '⚡ REST'; el.classList.add('fallback'); }
    else                           { el.textContent = '✕ ERR';  el.classList.add('err'); }
}

function updateGlobalPulse() {
    const el = document.getElementById('globalPulse');
    if (el) el.className = (xauCurrentPrice > 0 || wsStatus.btc) ? 'pulse connected' : 'pulse disconnected';
}

function handleSignalBarTap(id) {
    if (tapTimers[id]) clearTimeout(tapTimers[id]);
    tapCounters[id]++;
    tapTimers[id] = setTimeout(() => { tapCounters[id] = 0; tapTimers[id] = null; }, TAP_TIMEOUT);
    if (tapCounters[id] === 3) {
        if (pendingConfirmation[id]) cancelPendingConfirmation(id);
        resetSignal(id);
        tapCounters[id] = 0;
        if (tapTimers[id]) { clearTimeout(tapTimers[id]); tapTimers[id] = null; }
        if (navigator.vibrate) navigator.vibrate(30);
        showToast('Signal reset ✓');
    }
}

function handleHistoryPanelTap(id) {
    if (historyTapTimers[id]) clearTimeout(historyTapTimers[id]);
    historyTapCounters[id]++;
    historyTapTimers[id] = setTimeout(() => { historyTapCounters[id] = 0; historyTapTimers[id] = null; }, TAP_TIMEOUT);
    if (historyTapCounters[id] === 3) {
        performanceStats[id] = createDefaultStats();
        savePerformanceStats(id);
        updatePerformanceUI(id);
        historyTapCounters[id] = 0;
        if (historyTapTimers[id]) { clearTimeout(historyTapTimers[id]); historyTapTimers[id] = null; }
        if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
        showToast('History reset ✓');
    }
}

let xauWs = null, xauReconnectTimer = null, xauReconnectAttempts = 0;
let xauFetchRetryTimer = null, xauCurrentPrice = 0, xauLastHeartbeat = Date.now();
const XAU_REST = [
    'https://fapi.binance.com/fapi/v1/ticker/price?symbol=XAUUSDT',
    'https://api.binance.com/api/v3/ticker/price?symbol=XAUUSDT'
];
let xauRestIdx = 0;

function updateXAUDisplay(price) {
    if (!price || isNaN(price) || price <= 0) return;
    xauCurrentPrice = price; xauLastHeartbeat = Date.now();
    pendingPriceData.xau = price; pendingSignalData.xau = true;
    throttledUpdateUI('xau'); updateSignal('xau', price);
    wsStatus.xau = true; updateGlobalPulse();
    const el = document.getElementById('ws-status-xau');
    if (el) { el.textContent = '● LIVE'; el.className = 'ws-status connected'; }
    updateFeedBadge('xau', 'ok');
}

async function xauFetchRestPrice() {
    for (let i = 0; i < XAU_REST.length; i++) {
        try {
            const ctrl = new AbortController();
            const tid  = setTimeout(() => ctrl.abort(), 7000);
            const resp = await fetch(XAU_REST[(xauRestIdx + i) % XAU_REST.length], { signal: ctrl.signal });
            clearTimeout(tid);
            const data = await resp.json();
            if (data?.price) {
                const p = parseFloat(data.price) + XAU_OFFSET;
                if (p > 0 && p !== xauCurrentPrice) {
                    xauCurrentPrice = p; xauLastHeartbeat = Date.now();
                    pendingPriceData.xau = p; pendingSignalData.xau = true;
                    throttledUpdateUI('xau'); updateSignal('xau', p);
                    wsStatus.xau = true; updateGlobalPulse();
                    const el = document.getElementById('ws-status-xau');
                    if (el) { el.textContent = '● LIVE'; el.className = 'ws-status connected'; }
                    updateFeedBadge('xau', 'fallback');
                    xauRestIdx = (xauRestIdx + i) % XAU_REST.length;
                    return true;
                }
            }
        } catch(e) {}
    }
    updateFeedBadge('xau', 'err');
    return false;
}

function initXAUWebSocket() {
    if (xauWs) { try { xauWs.close(); } catch(e) {} xauWs = null; }
    if (xauReconnectTimer) clearTimeout(xauReconnectTimer);
    try {
        xauWs = new WebSocket('wss://fstream.binance.com/ws/xauusdt@trade');
        const wst = setTimeout(() => {
            if (xauWs && xauWs.readyState !== WebSocket.OPEN) {
                try { xauWs.close(); } catch(e) {} xauWs = null;
                updateFeedBadge('xau','fallback');
                if (!xauFetchRetryTimer) xauFetchRetryTimer = setInterval(async () => { await xauFetchRestPrice(); }, 3000);
            }
        }, 5000);
        xauWs.onopen    = () => { clearTimeout(wst); xauReconnectAttempts = 0; if (xauFetchRetryTimer) { clearInterval(xauFetchRetryTimer); xauFetchRetryTimer = null; } updateFeedBadge('xau','ok'); updateGlobalPulse(); };
        xauWs.onmessage = (e) => { try { const d = JSON.parse(e.data); if (d.p) { const p = parseFloat(d.p) + XAU_OFFSET; if (!isNaN(p) && p > 0 && p !== xauCurrentPrice) updateXAUDisplay(p); } } catch(err) {} };
        xauWs.onclose   = () => { const delay = Math.min(1000 * Math.pow(1.5, xauReconnectAttempts), 15000); xauReconnectAttempts++; xauReconnectTimer = setTimeout(() => initXAUWebSocket(), delay); updateFeedBadge('xau','fallback'); if (!xauFetchRetryTimer) xauFetchRetryTimer = setInterval(async () => { await xauFetchRestPrice(); }, 3000); };
        xauWs.onerror   = () => { updateFeedBadge('xau','fallback'); if (!xauFetchRetryTimer) xauFetchRetryTimer = setInterval(async () => { await xauFetchRestPrice(); }, 3000); };
    } catch(err) { updateFeedBadge('xau','fallback'); if (!xauFetchRetryTimer) xauFetchRetryTimer = setInterval(async () => { await xauFetchRestPrice(); }, 3000); }
}

let btcWs = null, btcReconnectTimer = null, btcReconnectAttempts = 0, btcFetchRetryTimer = null;

async function btcFetchRestPrice() {
    try {
        const resp = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
        const data = await resp.json();
        if (data?.price) {
            const p = parseFloat(data.price);
            if (p > 0 && !isNaN(p)) {
                pendingPriceData.btc = p; pendingSignalData.btc = true;
                throttledUpdateUI('btc'); updateSignal('btc', p);
                wsStatus.btc = true; updateGlobalPulse();
                updateFeedBadge('btc','fallback');
                return true;
            }
        }
    } catch(e) {}
    updateFeedBadge('btc','err');
    return false;
}

function initBTCWebSocket() {
    if (btcWs) { try { btcWs.close(); } catch(e) {} btcWs = null; }
    if (btcReconnectTimer) clearTimeout(btcReconnectTimer);
    try {
        btcWs = new WebSocket(BTC_WS_URL);
        const wst = setTimeout(() => {
            if (btcWs && btcWs.readyState !== WebSocket.OPEN) {
                try { btcWs.close(); } catch(e) {} btcWs = null;
                updateFeedBadge('btc','fallback'); wsStatus.btc = false;
                if (!btcFetchRetryTimer) btcFetchRetryTimer = setInterval(async () => { await btcFetchRestPrice(); }, 3000);
            }
        }, 6000);
        btcWs.onopen    = () => { clearTimeout(wst); btcReconnectAttempts = 0; wsStatus.btc = true; if (btcFetchRetryTimer) { clearInterval(btcFetchRetryTimer); btcFetchRetryTimer = null; } const el = document.getElementById('ws-status-btc'); if (el) { el.textContent = '● LIVE'; el.className = 'ws-status connected'; } updateFeedBadge('btc','ok'); updateGlobalPulse(); updateSignalUIOnly('btc'); };
        btcWs.onmessage = (e) => { try { const d = JSON.parse(e.data); const p = parseFloat(d.p); if (p && p > 0 && !isNaN(p)) { pendingPriceData.btc = p; pendingSignalData.btc = true; throttledUpdateUI('btc'); updateSignal('btc', p); } } catch(err) {} };
        btcWs.onclose   = () => { wsStatus.btc = false; updateFeedBadge('btc','fallback'); updateGlobalPulse(); updateSignalUIOnly('btc'); const delay = Math.min(1000 * Math.pow(2, btcReconnectAttempts), 30000); btcReconnectAttempts++; btcReconnectTimer = setTimeout(() => initBTCWebSocket(), delay); if (!btcFetchRetryTimer) btcFetchRetryTimer = setInterval(async () => { await btcFetchRestPrice(); }, 3000); };
        btcWs.onerror   = () => { wsStatus.btc = false; updateFeedBadge('btc','fallback'); updateGlobalPulse(); if (!btcFetchRetryTimer) btcFetchRetryTimer = setInterval(async () => { await btcFetchRestPrice(); }, 3000); };
    } catch(err) { wsStatus.btc = false; updateFeedBadge('btc','err'); setTimeout(() => initBTCWebSocket(), 5000); }
}

function switchPair() {
    activePairId = activePairId === 'xau' ? 'btc' : 'xau';
    try { localStorage.setItem('ura_active_pair', activePairId); } catch(e) {}
    const lb = document.getElementById('switchLabel');
    if (lb) lb.innerText = activePairId === 'xau' ? 'XAUUSD' : 'BTCUSD';
    document.querySelectorAll('.pair-card').forEach(c => c.classList.remove('active'));
    document.getElementById(`card-${activePairId}`)?.classList.add('active');
    if (navigator.vibrate) navigator.vibrate(20);
}

// ================================================================
//  INIT
// ================================================================
function init() {
    checkAndMigrateSchema();
    state.xau = loadState('xau'); state.btc = loadState('btc');
    performanceStats.xau = loadPerformanceStats('xau');
    performanceStats.btc = loadPerformanceStats('btc');
    updateWinrateAndDrawrate('xau'); updateWinrateAndDrawrate('btc');

    document.getElementById('terminals').innerHTML =
        buildCardHTML('xau','XAUUSD') + buildCardHTML('btc','BTCUSD');

    const bindTap = (el, handler) => {
        if (!el) return; let lastTap = 0;
        const h = (e) => {
            e.preventDefault();
            const now = Date.now(); if (now - lastTap < 80) return; lastTap = now;
            handler();
        };
        el.addEventListener('touchstart', h, { passive: false });
        el.addEventListener('click', h);
    };
    bindTap(document.getElementById('signal-bar-xau'),    () => handleSignalBarTap('xau'));
    bindTap(document.getElementById('signal-bar-btc'),    () => handleSignalBarTap('btc'));
    bindTap(document.getElementById('history-panel-xau'), () => handleHistoryPanelTap('xau'));
    bindTap(document.getElementById('history-panel-btc'), () => handleHistoryPanelTap('btc'));

    const btn = document.getElementById('switchPairBtn');
    if (btn) {
        const nb = btn.cloneNode(true); btn.parentNode.replaceChild(nb, btn);
        const ds = function(e) {
            e.preventDefault(); e.stopPropagation();
            nb.classList.add('btn-highlight');
            setTimeout(() => nb.classList.remove('btn-highlight'), 150);
            switchPair();
        };
        nb.addEventListener('click', ds);
        nb.addEventListener('touchstart', ds, { passive: false });
    }

    updateSignalUIOnly('xau'); updateSignalUIOnly('btc');
    updatePerformanceUI('xau'); updatePerformanceUI('btc');

    // Seed candles dengan harga realistis
    seedCandles('xau', 3300); seedCandles('btc', 105000);

    // Fix seed saat harga real pertama kali datang
    let seedFixed = { xau: false, btc: false };
    const fixSeed = (id, price) => {
        if (seedFixed[id]) return;
        const mc = getMacroCandles(id);
        const first = mc[0]?.close || 0;
        if (first > 0 && Math.abs(first - price) / price > 0.05) {
            seedCandles(id, price);
            macroBiasCache[id] = null; // invalidate cache
        }
        seedFixed[id] = true;
    };

    initXAUWebSocket(); xauFetchRestPrice();
    initBTCWebSocket(); btcFetchRestPrice();
    updateGlobalPulse();

    setInterval(() => {
        if (!seedFixed.xau && xauCurrentPrice > 0)    fixSeed('xau', xauCurrentPrice);
        if (!seedFixed.btc && marketData.btc.price > 0) fixSeed('btc', marketData.btc.price);
        if (Date.now() - xauLastHeartbeat > 8000) xauFetchRestPrice();
        updateGlobalPulse();
    }, 3000);

    setInterval(() => {
        if (!xauWs || xauWs.readyState !== WebSocket.OPEN) xauFetchRestPrice();
        if (!btcWs || btcWs.readyState !== WebSocket.OPEN) btcFetchRestPrice();
    }, 2000);

    document.addEventListener('visibilitychange', () => {
        if (!document.hidden) {
            xauFetchRestPrice(); btcFetchRestPrice();
            updateSignalUIOnly('xau'); updateSignalUIOnly('btc');
            updateGlobalPulse();
        }
    });
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();

})();
</script>
</body>

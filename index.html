<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>PRECISION TERMINAL v4.7.1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;600;800&display=swap');

        :root {
            --bg: #1a1d21; 
            --text: #e6e8ea;
            --text-dim: #707a8a;
            --accent: #f0b90b;
            --success: #00FFFF; 
            --danger: #FF5252; 
            --feed-lightning: #FFEA00;
            --border: rgba(255, 255, 255, 0.1);
            --phase-trending: #00FF88;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            padding: 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { max-width: 450px; width: 100%; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .brand h1 { font-size: 1rem; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
        .sys-status { font-family: 'JetBrains Mono', monospace; font-size: 0.5rem; text-align: right; color: var(--text-dim); }
        
        .pulse { 
            display: inline-block; 
            width: 7px; 
            height: 7px; 
            background: var(--feed-lightning); 
            border-radius: 50%; 
            margin-right: 5px; 
            animation: blink 1.5s infinite; 
        }
        .pulse.connected {
            background: var(--success);
            box-shadow: 0 0 5px var(--success);
        }
        .pulse.disconnected {
            background: var(--danger);
            animation: blink 0.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .ws-status {
            font-size: 0.5rem;
            padding: 2px 6px;
            border-radius: 3px;
            margin-top: 2px;
            display: inline-block;
        }
        .ws-status.connected { color: var(--phase-trending); }
        .ws-status.disconnected { color: var(--danger); animation: blink 1s infinite; }

        .switch-pair-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255,255,255,0.03);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: 10px;
        }
        .switch-pair-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .pair-card { display: none; }
        .pair-card.active { display: block; }

        .card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card-top { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            margin-bottom: 8px; 
        }
        .pair-info {
            display: flex;
            flex-direction: column;
        }
        .pair { font-weight: 800; font-size: 1.1rem; letter-spacing: 1px; color: var(--text); }
        .price { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 1.2rem; 
            font-weight: 700; 
            background: transparent;
            padding: 4px 0;
            text-align: right;
            transition: color 0.1s ease;
        }

        .signal-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .signal-dot-group { display: flex; gap: 12px; align-items: center; }
        .dot { width: 8px; height: 8px; border-radius: 2px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .dot.active { background: var(--success); }
        .dot.active-down { background: var(--danger); }

        .card-level-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 4px;
        }
        .level-item { display: flex; flex-direction: column; cursor: pointer; }
        .level-item:nth-child(1) { align-items: flex-start; text-align: left; }
        .level-item:nth-child(2) { align-items: center; text-align: center; }
        .level-item:nth-child(3) { align-items: flex-end; text-align: right; }
        .level-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
        .level-value { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; font-weight: 700; }

        .analysis-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 8px; 
        }
        
        .box-htf, .box-pa { 
            background: transparent; 
            border: 1px solid var(--border); 
            padding: 10px 8px; 
            border-radius: 4px; 
            text-align: center;
        }
        
        .label-sm { 
            font-size: 0.55rem; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            margin-bottom: 8px; 
            padding-bottom: 4px; 
            border-bottom: 1px solid var(--border);
        }
        
        .htf-row, .pa-row {
            margin-bottom: 8px;
        }
        .htf-row:last-child, .pa-row:last-child {
            margin-bottom: 0;
        }
        
        .htf-label, .pa-label {
            font-size: 0.55rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .htf-value, .pa-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 0.7rem;
            margin-top: 2px;
        }

        footer { text-align: center; font-size: 0.55rem; color: var(--text-dim); margin-top: 10px; opacity: 0.6; }
        
        .trend-up { color: var(--success); }
        .trend-down { color: var(--danger); }
        .trend-neutral { color: var(--text-dim); }
        .momentum-up { color: var(--success); }
        .momentum-down { color: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="brand">
            <h1>uradvisor</h1>
            <p style="font-size: 0.5rem; color: var(--text-dim)">HTF PRECISION v4.7.1</p>
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <div class="sys-status">
                <div><span class="pulse" id="globalPulse"></span>LIVE</div>
                <div id="clock">00:00:00 UTC</div>
            </div>
            <button id="switchPairBtn" class="switch-pair-btn">
                <span id="switchLabel">XAUUSD</span>
            </button>
        </div>
    </header>

    <div id="terminals"></div>

    <footer>
        [ SYSTEM_LOG ]: XAU:API_POLLING (1.5s) | BTC:AGGTRADE_LIVE | HTF_THROTTLE_10T<br>
        [ METHOD ]: SWEEP + CHoCH + FVG + HTF_TREND_FILTER
    </footer>
</div>

<script>
    // ==================== CONFIGURATION ====================
    const btcConfig = {
        id: 'btc', name: 'BTCUSD', wsUrl: 'wss://stream.binance.com:9443/ws/btcusdt@aggTrade', 
        offset: 0, threshold: 6, trendThresh: 50, momThresh: 15, isTicker: false
    };

    // STATE MANAGEMENT
    let state = {
        xau: null,
        btc: null
    };
    let wsStatus = { xau: false, btc: false };
    let wsRetries = { xau: 0, btc: 0 };
    let activePairId = localStorage.getItem('ura_active_pair') || 'xau';
    let wsConnections = {};
    let lastHeartbeat = { xau: Date.now(), btc: Date.now() };

    // HTF DATA
    let htfHistory = { xau: [], btc: [] };
    let htfTrend = { xau: 'neutral', btc: 'neutral' };
    let htfMomentum = { xau: 0, btc: 0 };
    let htfTickCounter = { xau: 0, btc: 0 };

    // ==================== CREATE FRESH STATE ====================
    function createFreshState() {
        return { 
            lastPrice: 0, trendScore: 0, 
            l1: false, l2: false, l3: false, 
            confirmed: false, type: 'none', 
            entry: 0, sl: 0, tp: 0
        };
    }

    // ==================== PERSISTENCE ====================
    function loadState(id) {
        const saved = localStorage.getItem(`ura_state_${id}`);
        if (saved) {
            try {
                return JSON.parse(saved);
            } catch(e) {
                return createFreshState();
            }
        }
        return createFreshState();
    }

    function saveState(id) {
        const toSave = {
            lastPrice: state[id].lastPrice,
            trendScore: state[id].trendScore,
            l1: state[id].l1, l2: state[id].l2, l3: state[id].l3,
            confirmed: state[id].confirmed,
            type: state[id].type,
            entry: state[id].entry,
            sl: state[id].sl,
            tp: state[id].tp
        };
        localStorage.setItem(`ura_state_${id}`, JSON.stringify(toSave));
    }

    // ==================== HTF ANALYSIS ====================
    function updateHTF(id, price) {
        htfHistory[id].push(price);
        if (htfHistory[id].length > 50) htfHistory[id].shift();
        
        htfTickCounter[id]++;
        if (htfTickCounter[id] < 10) return;
        htfTickCounter[id] = 0;
        
        const len = htfHistory[id].length;
        if (len >= 2) {
            const firstPrice = htfHistory[id][0];
            const lastPrice = htfHistory[id][len - 1];
            
            if (lastPrice > firstPrice * 1.0003) {
                htfTrend[id] = 'up';
            } else if (lastPrice < firstPrice * 0.9997) {
                htfTrend[id] = 'down';
            } else {
                htfTrend[id] = 'neutral';
            }
            
            if (len >= 5) {
                const oldPrice = htfHistory[id][len - 5];
                htfMomentum[id] = ((lastPrice - oldPrice) / oldPrice) * 100;
            } else if (len >= 2) {
                const oldPrice = htfHistory[id][0];
                htfMomentum[id] = ((lastPrice - oldPrice) / oldPrice) * 100;
            }
        } else {
            htfTrend[id] = 'neutral';
            htfMomentum[id] = 0;
        }
        
        updateHTFUI(id);
    }
    
    function updateHTFUI(id) {
        const htfTrendEl = document.getElementById(`htf-trend-${id}`);
        if (htfTrendEl) {
            let trendSym = htfTrend[id] === 'up' ? '▲ BULLISH' : (htfTrend[id] === 'down' ? '▼ BEARISH' : '◆ NEUTRAL');
            let trendClass = htfTrend[id] === 'up' ? 'trend-up' : (htfTrend[id] === 'down' ? 'trend-down' : 'trend-neutral');
            htfTrendEl.className = `htf-value ${trendClass}`;
            htfTrendEl.innerText = trendSym;
        }
        
        const htfMomentumEl = document.getElementById(`htf-momentum-${id}`);
        if (htfMomentumEl) {
            let momText = htfMomentum[id] > 0.05 ? '▲ STRONG' : (htfMomentum[id] > 0 ? '▲ WEAK' : (htfMomentum[id] > -0.05 ? '▼ WEAK' : '▼ STRONG'));
            let momClass = htfMomentum[id] >= 0 ? 'momentum-up' : 'momentum-down';
            htfMomentumEl.className = `htf-value ${momClass}`;
            htfMomentumEl.innerText = `${momText} (${htfMomentum[id] > 0 ? '+' : ''}${htfMomentum[id].toFixed(2)}%)`;
        }
    }

    // ==================== SIGNAL LOGIC ====================
    function updateSignal(id, price) {
        const s = state[id];
        let p;
        if (id === 'xau') {
            p = { threshold: 0.05, trendThresh: 0.8, momThresh: 0.12 };
        } else {
            p = btcConfig;
        }
        
        if (s.confirmed) {
            if (s.type === 'buy' && (price >= s.tp || price <= s.sl)) resetSignal(id);
            else if (s.type === 'sell' && (price <= s.tp || price >= s.sl)) resetSignal(id);
            return;
        }
        
        const diff = price - s.lastPrice;
        if (s.lastPrice !== 0 && diff !== 0) {
            s.trendScore += diff;
        }
        
        if (!s.confirmed && s.lastPrice !== 0 && Math.abs(diff) > p.threshold) {
            const direction = diff > 0 ? 'buy' : 'sell';
            if (!s.l1) { 
                s.l1 = true; 
                s.type = direction; 
                saveState(id);
                updateSignalUI(id);
            } 
            else if (!s.l2) { 
                s.l2 = true; 
                saveState(id);
                updateSignalUI(id);
            } 
            else { 
                lockSignal(id, price, direction); 
            }
        }
        
        s.lastPrice = price;
        saveState(id);
        updatePAUI(id);
    }
    
    function updateSignalUI(id) {
        const s = state[id];
        
        const l1Dot = document.getElementById(`l1-${id}`);
        if (l1Dot) l1Dot.className = s.l1 ? (s.type === 'sell' ? "dot active-down" : "dot active") : "dot";
        
        const l2Dot = document.getElementById(`l2-${id}`);
        if (l2Dot) l2Dot.className = s.l2 ? (s.type === 'sell' ? "dot active-down" : "dot active") : "dot";
        
        const l3Dot = document.getElementById(`l3-${id}`);
        if (l3Dot) l3Dot.className = s.l3 ? (s.type === 'sell' ? "dot active-down" : "dot active") : "dot";
        
        const signalText = document.getElementById(`signal-text-${id}`);
        if (signalText) {
            if (!wsStatus[id] && id === 'btc') {
                signalText.innerText = 'NO FEED';
                signalText.style.color = 'var(--danger)';
            } else if (s.confirmed) {
                signalText.innerText = s.type.toUpperCase();
                signalText.style.color = s.type === 'buy' ? 'var(--success)' : 'var(--danger)';
            } else if (s.l3) {
                signalText.innerText = 'FVG';
                signalText.style.color = 'var(--accent)';
            } else if (s.l2) {
                signalText.innerText = 'CHoCH';
                signalText.style.color = 'var(--accent)';
            } else if (s.l1) {
                signalText.innerText = 'SWEEP';
                signalText.style.color = 'var(--feed-lightning)';
            } else {
                signalText.innerText = 'IDLE';
                signalText.style.color = 'var(--text-dim)';
            }
        }
        
        const entryEl = document.getElementById(`entry-${id}`);
        if (entryEl) entryEl.innerText = s.confirmed ? s.entry.toFixed(2) : '--';
        
        const tpEl = document.getElementById(`tp-${id}`);
        if (tpEl) tpEl.innerText = s.confirmed ? s.tp.toFixed(2) : '--';
        
        const slEl = document.getElementById(`sl-${id}`);
        if (slEl) slEl.innerText = s.confirmed ? s.sl.toFixed(2) : '--';
    }
    
    function updatePAUI(id) {
        const s = state[id];
        let p = (id === 'xau') ? { trendThresh: 0.8, momThresh: 0.12 } : btcConfig;
        
        const trendPaEl = document.getElementById(`trend-${id}`);
        if (trendPaEl) {
            if (s.trendScore > p.trendThresh) {
                trendPaEl.innerText = "BULLISH";
                trendPaEl.style.color = "var(--success)";
            } else if (s.trendScore < -p.trendThresh) {
                trendPaEl.innerText = "BEARISH";
                trendPaEl.style.color = "var(--danger)";
            } else {
                trendPaEl.innerText = "NEUTRAL";
                trendPaEl.style.color = "var(--text-dim)";
            }
        }
        
        const momPaEl = document.getElementById(`mom-${id}`);
        if (momPaEl && s.lastPrice !== 0) {
            const prevPrice = state[id].lastPrice;
            const diff = s.lastPrice - prevPrice;
            const absDiff = Math.abs(diff);
            const direction = diff > 0 ? "UPWARD" : "DOWNWARD";
            const strength = absDiff > p.momThresh ? "STRONG " : "";
            momPaEl.innerHTML = strength + direction;
            momPaEl.style.color = diff > 0 ? "var(--success)" : "var(--danger)";
        }
    }

    function lockSignal(id, entry, type) {
        const s = state[id];
        const offset = type === 'buy' ? -3 : +3;
        const adjustedEntry = entry + offset;
        
        s.l3 = true;
        s.confirmed = true;
        s.type = type;
        s.entry = adjustedEntry;
        
        const risk = id === 'xau' ? 8 : entry * 0.0020;
        
        if (type === 'buy') {
            s.sl = adjustedEntry - risk;
            s.tp = adjustedEntry + (risk * 1.3);
        } else {
            s.sl = adjustedEntry + risk;
            s.tp = adjustedEntry - (risk * 1.5);
        }
        
        saveState(id);
        updateSignalUI(id);
    }

    function resetSignal(id) {
        const s = state[id];
        s.l1 = false; s.l2 = false; s.l3 = false;
        s.confirmed = false; s.type = 'none';
        s.entry = 0; s.sl = 0; s.tp = 0;
        s.trendScore = 0;
        saveState(id);
        updateSignalUI(id);
        updatePAUI(id);
    }

    // ==================== UI HELPERS ====================
    function updateWSStatus(id) {
        const el = document.getElementById(`ws-status-${id}`);
        if (el) {
            if (id === 'xau') {
                el.textContent = '● CONNECTED (API)';
                el.className = 'ws-status connected';
            } else {
                el.textContent = wsStatus[id] ? '● CONNECTED' : '○ RECONNECTING...';
                el.className = `ws-status ${wsStatus[id] ? 'connected' : 'disconnected'}`;
            }
        }
    }

    function updateGlobalPulse() {
        const pulseEl = document.getElementById('globalPulse');
        if (pulseEl) {
            pulseEl.className = (wsStatus.btc || true) ? 'pulse connected' : 'pulse disconnected';
        }
    }

    // ==================== FETCH XAU PRICE FROM API ====================
    let lastXAUPrice = 0;
    function fetchXAUPrice() {
        fetch('https://api.gold-api.com/price/XAU')
            .then(response => {
                if (!response.ok) throw new Error('API error');
                return response.json();
            })
            .then(data => {
                let price = data.price || data.USD || (data.rates && data.rates.USD);
                if (price > 0) {
                    updateXAUPrice(price);
                }
            })
            .catch(() => {
                // Fallback ke API lain
                fetch('https://api.exchangerate.host/convert?from=XAU&to=USD&amount=1')
                    .then(res => res.json())
                    .then(data => {
                        if (data.result && data.result > 0) {
                            updateXAUPrice(data.result);
                        }
                    })
                    .catch(err => console.error('XAU fetch error:', err));
            });
    }
    
    function updateXAUPrice(price) {
        if (price && price > 0 && !isNaN(price)) {
            lastXAUPrice = price;
            
            const priceEl = document.getElementById(`price-xau`);
            if (priceEl) {
                const oldPrice = state.xau.lastPrice;
                priceEl.innerText = price.toFixed(2);
                if (oldPrice !== 0 && oldPrice !== price) {
                    priceEl.style.color = price >= oldPrice ? "var(--success)" : "var(--danger)";
                    setTimeout(() => { if (priceEl) priceEl.style.color = ""; }, 150);
                }
            }
            
            updateHTF('xau', price);
            updateSignal('xau', price);
        }
    }

    // ==================== INITIALIZATION ====================
    function init() {
        state.xau = loadState('xau');
        state.btc = loadState('btc');
        
        htfHistory.xau = [];
        htfHistory.btc = [];
        
        for (let i = 0; i < 20; i++) {
            htfHistory.xau.push(4690 + (i * 0.1));
            htfHistory.btc.push(60000 + (i * 0.1));
        }
        updateHTF('xau', 4692);
        updateHTF('btc', 60002);
        
        const container = document.getElementById('terminals');
        container.innerHTML = '';
        
        // Card XAU (tanpa widget tambahan)
        container.innerHTML += `
            <div class="pair-card ${activePairId === 'xau' ? 'active' : ''}" id="card-xau">
                <div class="card">
                    <div class="card-top">
                        <div class="pair-info">
                            <span class="pair">XAUUSD</span>
                            <span id="ws-status-xau" class="ws-status connected">● CONNECTED (API)</span>
                        </div>
                        <span class="price" id="price-xau">0.00</span>
                    </div>
                    
                    <div class="signal-bar">
                        <span>SIGNAL</span>
                        <div class="signal-dot-group">
                            <div class="dot" id="l1-xau"></div>
                            <div class="dot" id="l2-xau"></div>
                            <div class="dot" id="l3-xau"></div>
                        </div>
                        <span id="signal-text-xau">IDLE</span>
                    </div>
                    
                    <div class="card-level-grid">
                        <div class="level-item" onclick="copyValue('xau','entry')">
                            <span class="level-label">Entry</span>
                            <span class="level-value" id="entry-xau">--</span>
                        </div>
                        <div class="level-item" onclick="copyValue('xau','tp')">
                            <span class="level-label">Target</span>
                            <span class="level-value" id="tp-xau" style="color:var(--success)">--</span>
                        </div>
                        <div class="level-item" onclick="copyValue('xau','sl')">
                            <span class="level-label">S-Loss</span>
                            <span class="level-value" id="sl-xau" style="color:var(--danger)">--</span>
                        </div>
                    </div>
                    
                    <div class="analysis-grid">
                        <div class="box-htf">
                            <div class="label-sm">HTF (H1)</div>
                            <div class="htf-row">
                                <div class="htf-label">TREND</div>
                                <div class="htf-value" id="htf-trend-xau">◆ --</div>
                            </div>
                            <div class="htf-row">
                                <div class="htf-label">MOMENTUM</div>
                                <div class="htf-value" id="htf-momentum-xau">--</div>
                            </div>
                        </div>
                        <div class="box-pa">
                            <div class="label-sm">PRICE ACTION</div>
                            <div class="pa-row">
                                <div class="pa-label">TREND</div>
                                <div class="pa-value" id="trend-xau">SCANNING</div>
                            </div>
                            <div class="pa-row">
                                <div class="pa-label">MOMENTUM</div>
                                <div class="pa-value" id="mom-xau">--</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        // Card BTC
        container.innerHTML += `
            <div class="pair-card ${activePairId === 'btc' ? 'active' : ''}" id="card-btc">
                <div class="card">
                    <div class="card-top">
                        <div class="pair-info">
                            <span class="pair">BTCUSD</span>
                            <span id="ws-status-btc" class="ws-status disconnected">○ RECONNECTING...</span>
                        </div>
                        <span class="price" id="price-btc">0.00</span>
                    </div>
                    
                    <div class="signal-bar">
                        <span>SIGNAL</span>
                        <div class="signal-dot-group">
                            <div class="dot" id="l1-btc"></div>
                            <div class="dot" id="l2-btc"></div>
                            <div class="dot" id="l3-btc"></div>
                        </div>
                        <span id="signal-text-btc">IDLE</span>
                    </div>
                    
                    <div class="card-level-grid">
                        <div class="level-item" onclick="copyValue('btc','entry')">
                            <span class="level-label">Entry</span>
                            <span class="level-value" id="entry-btc">--</span>
                        </div>
                        <div class="level-item" onclick="copyValue('btc','tp')">
                            <span class="level-label">Target</span>
                            <span class="level-value" id="tp-btc" style="color:var(--success)">--</span>
                        </div>
                        <div class="level-item" onclick="copyValue('btc','sl')">
                            <span class="level-label">S-Loss</span>
                            <span class="level-value" id="sl-btc" style="color:var(--danger)">--</span>
                        </div>
                    </div>
                    
                    <div class="analysis-grid">
                        <div class="box-htf">
                            <div class="label-sm">HTF (H1)</div>
                            <div class="htf-row">
                                <div class="htf-label">TREND</div>
                                <div class="htf-value" id="htf-trend-btc">◆ --</div>
                            </div>
                            <div class="htf-row">
                                <div class="htf-label">MOMENTUM</div>
                                <div class="htf-value" id="htf-momentum-btc">--</div>
                            </div>
                        </div>
                        <div class="box-pa">
                            <div class="label-sm">PRICE ACTION</div>
                            <div class="pa-row">
                                <div class="pa-label">TREND</div>
                                <div class="pa-value" id="trend-btc">SCANNING</div>
                            </div>
                            <div class="pa-row">
                                <div class="pa-label">MOMENTUM</div>
                                <div class="pa-value" id="mom-btc">--</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        updateSignalUI('xau');
        updatePAUI('xau');
        updateHTFUI('xau');
        updateSignalUI('btc');
        updatePAUI('btc');
        updateHTFUI('btc');
        
        // Start polling XAU price (setiap 1 detik)
        fetchXAUPrice();
        setInterval(fetchXAUPrice, 1500);
        
        // Connect WebSocket untuk BTC
        connectWebSocket();
        
        // Switch button
        document.getElementById('switchLabel').innerText = activePairId === 'xau' ? 'XAUUSD' : 'BTCUSD';
        document.getElementById('switchPairBtn').onclick = () => {
            activePairId = activePairId === 'xau' ? 'btc' : 'xau';
            localStorage.setItem('ura_active_pair', activePairId);
            document.getElementById('switchLabel').innerText = activePairId === 'xau' ? 'XAUUSD' : 'BTCUSD';
            document.querySelectorAll('.pair-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`card-${activePairId}`).classList.add('active');
        };
        
        updateGlobalPulse();
        setInterval(() => updateGlobalPulse(), 1000);
    }

    // ==================== WEBSOCKET BTC ====================
    function connectWebSocket() {
        if (wsConnections.btc) {
            try { wsConnections.btc.close(); } catch(e) {}
        }
        
        try {
            const ws = new WebSocket(btcConfig.wsUrl);
            
            ws.onopen = () => {
                wsStatus.btc = true;
                wsRetries.btc = 0;
                lastHeartbeat.btc = Date.now();
                updateWSStatus('btc');
                updateGlobalPulse();
                updateSignalUI('btc');
            };
            
            ws.onclose = () => {
                wsStatus.btc = false;
                updateWSStatus('btc');
                updateGlobalPulse();
                updateSignalUI('btc');
                const delay = Math.min(1000 * Math.pow(2, wsRetries.btc), 30000);
                wsRetries.btc++;
                setTimeout(connectWebSocket, delay);
            };
            
            ws.onerror = () => {
                wsStatus.btc = false;
                updateWSStatus('btc');
                updateGlobalPulse();
                updateSignalUI('btc');
            };
            
            ws.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    const price = parseFloat(data.p) + btcConfig.offset;
                    if (price && price > 0 && !isNaN(price)) {
                        lastHeartbeat.btc = Date.now();
                        if (!wsStatus.btc) {
                            wsStatus.btc = true;
                            updateWSStatus('btc');
                            updateGlobalPulse();
                            updateSignalUI('btc');
                        }
                        const priceEl = document.getElementById(`price-btc`);
                        if (priceEl) {
                            const oldPrice = state.btc.lastPrice;
                            priceEl.innerText = price.toFixed(2);
                            if (oldPrice !== 0 && oldPrice !== price) {
                                priceEl.style.color = price >= oldPrice ? "var(--success)" : "var(--danger)";
                                setTimeout(() => { if (priceEl) priceEl.style.color = ""; }, 150);
                            }
                        }
                        updateHTF('btc', price);
                        updateSignal('btc', price);
                    }
                } catch(err) {
                    console.error(`Parse error for BTC:`, err);
                }
            };
            
            wsConnections.btc = ws;
        } catch(err) {
            wsStatus.btc = false;
            updateWSStatus('btc');
            updateGlobalPulse();
            updateSignalUI('btc');
            setTimeout(connectWebSocket, 5000);
        }
    }

    window.copyValue = (id, type) => {
        const val = document.getElementById(`${type}-${id}`).innerText;
        if (val !== '--') {
            navigator.clipboard.writeText(val);
            if (navigator.vibrate) navigator.vibrate(50);
        }
    };

    setInterval(() => {
        const clk = document.getElementById('clock');
        if (clk) clk.innerText = new Date().toISOString().split('T')[1].split('.')[0] + " UTC";
    }, 1000);
    
    init();
</script>
</body>
</html>

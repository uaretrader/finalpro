<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>PRECISION TERMINAL v5.0.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;600;800&display=swap');

        :root {
            --bg: #1a1d21; 
            --text: #e6e8ea;
            --text-dim: #707a8a;
            --accent: #f0b90b;
            --success: #00FFFF; 
            --danger: #FF5252; 
            --feed-lightning: #FFEA00;
            --border: rgba(255, 255, 255, 0.1);
            --phase-trending: #00FF88;
            --htf-bullish: #00FFFF;
            --htf-bearish: #FF5252;
            --htf-neutral: #707a8a;
            --htf-weak: #f0b90b;
            --phase-expansion: #FF6B6B;
            --phase-lowvol: #4ECDC4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            padding: 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { max-width: 450px; width: 100%; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .brand h1 { font-size: 1rem; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
        .sys-status { font-family: 'JetBrains Mono', monospace; font-size: 0.5rem; text-align: right; color: var(--text-dim); }
        
        .pulse { 
            display: inline-block; 
            width: 7px; 
            height: 7px; 
            background: var(--feed-lightning); 
            border-radius: 50%; 
            margin-right: 5px; 
            animation: blink 1.5s infinite; 
        }
        .pulse.connected {
            background: var(--success);
            box-shadow: 0 0 5px var(--success);
        }
        .pulse.disconnected {
            background: var(--danger);
            animation: blink 0.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .ws-status {
            font-size: 0.5rem;
            padding: 2px 6px;
            border-radius: 3px;
            margin-top: 2px;
            display: inline-block;
        }
        .ws-status.connected { color: var(--phase-trending); }
        .ws-status.disconnected { color: var(--danger); animation: blink 1s infinite; }

        .switch-pair-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255,255,255,0.03);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: 10px;
        }
        .switch-pair-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .pair-card { display: none; }
        .pair-card.active { display: block; }

        .card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card-top { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            margin-bottom: 8px; 
        }
        .pair-info {
            display: flex;
            flex-direction: column;
        }
        .pair { font-weight: 800; font-size: 1.1rem; letter-spacing: 1px; color: var(--text); }
        .price { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 1.2rem; 
            font-weight: 700; 
            background: transparent;
            padding: 4px 0;
            text-align: right;
            transition: color 0.1s ease;
        }

        .signal-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .signal-dot-group { display: flex; gap: 12px; align-items: center; }
        .dot { width: 8px; height: 8px; border-radius: 2px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .dot.active { background: var(--success); }
        .dot.active-down { background: var(--danger); }

        .card-level-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 4px;
        }
        .level-item { display: flex; flex-direction: column; cursor: pointer; }
        .level-item:nth-child(1) { align-items: flex-start; text-align: left; }
        .level-item:nth-child(2) { align-items: center; text-align: center; }
        .level-item:nth-child(3) { align-items: flex-end; text-align: right; }
        .level-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
        .level-value { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; font-weight: 700; }

        .analysis-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 8px; 
        }
        
        .box-htf, .box-pa { 
            background: transparent; 
            border: 1px solid var(--border); 
            padding: 10px 8px; 
            border-radius: 4px; 
            text-align: left;
        }
        
        .label-sm { 
            font-size: 0.55rem; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            margin-bottom: 8px; 
            padding-bottom: 4px; 
            border-bottom: 1px solid var(--border);
            text-align: left;
        }
        
        .htf-row, .pa-row {
            margin-bottom: 8px;
            text-align: left;
        }
        .htf-row:last-child, .pa-row:last-child {
            margin-bottom: 0;
        }
        
        .htf-label, .pa-label {
            font-size: 0.55rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: left;
        }
        
        .htf-value, .pa-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 0.7rem;
            margin-top: 2px;
            text-align: center;
        }

        .context-bar {
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.05);
            border-radius: 1px;
            margin-top: 4px;
            overflow: hidden;
        }
        .context-fill {
            height: 100%;
            transition: width 0.5s ease;
            border-radius: 1px;
        }

        footer { text-align: center; font-size: 0.55rem; color: var(--text-dim); margin-top: 10px; opacity: 0.6; }
        
        .trend-up { color: var(--success); }
        .trend-down { color: var(--danger); }
        .trend-neutral { color: var(--text-dim); }
        .trend-weak { color: var(--htf-weak); }
        .momentum-up { color: var(--success); }
        .momentum-down { color: var(--danger); }
        .phase-tag {
            font-size: 0.5rem;
            padding: 1px 5px;
            border-radius: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
            margin-top: 2px;
        }
        .phase-trending-tag { background: rgba(0, 255, 136, 0.15); color: var(--phase-trending); border: 0.5px solid rgba(0, 255, 136, 0.3); }
        .phase-ranging-tag { background: rgba(240, 185, 11, 0.1); color: var(--htf-weak); border: 0.5px solid rgba(240, 185, 11, 0.2); }
        .phase-expansion-tag { background: rgba(255, 107, 107, 0.12); color: var(--phase-expansion); border: 0.5px solid rgba(255, 107, 107, 0.25); }
        .phase-lowvol-tag { background: rgba(78, 205, 196, 0.1); color: var(--phase-lowvol); border: 0.5px solid rgba(78, 205, 196, 0.2); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="brand">
            <h1>uradvisor</h1>
            <p style="font-size: 0.5rem; color: var(--text-dim)">HTF PRECISION v5.0.0</p>
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <div class="sys-status">
                <div><span class="pulse" id="globalPulse"></span>LIVE</div>
                <div id="clock">00:00:00 UTC</div>
            </div>
            <button id="switchPairBtn" class="switch-pair-btn">
                <span id="switchLabel">XAUUSD</span>
            </button>
        </div>
    </header>

    <div id="terminals"></div>

    <footer>
        [ HTF ENGINE ]: OHLC H1 + PIVOT FRACTAL + DISPLACEMENT + ADAPTIVE ATR<br>
        [ METHOD ]: SWEEP + CHoCH + FVG + HTF_CONTEXT_FILTER
    </footer>
</div>

<script>
    // ==================== CONFIGURATION ====================
    const btcConfig = {
        id: 'btc', name: 'BTCUSD', wsUrl: 'wss://stream.binance.com:9443/ws/btcusdt@aggTrade', 
        offset: 0, threshold: 6, isTicker: false
    };

    // STATE MANAGEMENT (UNCHANGED)
    let state = { xau: null, btc: null };
    let wsStatus = { xau: true, btc: false };
    let wsRetries = { xau: 0, btc: 0 };
    let activePairId = localStorage.getItem('ura_active_pair') || 'xau';
    let wsConnections = {};
    let lastHeartbeat = { xau: Date.now(), btc: Date.now() };

    // ==================== OPTIMIZED HTF DIRECTION ENGINE v5.0.0 ====================
    const HTF_TICK_PER_CANDLE = 8;
    const HTF_PIVOT_LOOKBACK = 2;
    const HTF_MOMENTUM_LOOKBACK = 4;
    const HTF_RANGE_LOOKBACK = 10;

    let htfData = {
        xau: {
            ohlcCandles: [],
            currentCandle: null,
            tickCounter: 0,
            swings: [],
            pivotHighs: [],
            pivotLows: [],
            structure: 'NEUTRAL',
            momentum: 'STABLE',
            momentumStrength: 'NONE',
            phase: 'RANGE',
            atr: 0,
            confidence: 0
        },
        btc: {
            ohlcCandles: [],
            currentCandle: null,
            tickCounter: 0,
            swings: [],
            pivotHighs: [],
            pivotLows: [],
            structure: 'NEUTRAL',
            momentum: 'STABLE',
            momentumStrength: 'NONE',
            phase: 'RANGE',
            atr: 0,
            confidence: 0
        }
    };

    // Seed initial candles for smoother startup
    function seedHTFData(id, basePrice) {
        const data = htfData[id];
        const volatility = id === 'xau' ? 0.3 : 30;
        for (let i = 0; i < 20; i++) {
            const open = basePrice + (Math.random() - 0.5) * volatility * 2;
            const close = basePrice + (Math.random() - 0.5) * volatility * 2;
            const high = Math.max(open, close) + Math.random() * volatility;
            const low = Math.min(open, close) - Math.random() * volatility;
            data.ohlcCandles.push({
                open, high, low, close,
                closed: true,
                body: Math.abs(close - open),
                range: high - low,
                isBullish: close >= open,
                upperWick: close >= open ? high - close : high - open,
                lowerWick: close >= open ? open - low : close - low
            });
        }
    }

    // ==================== 1. OPTIMIZED CANDLE ENGINE (Pseudo OHLC H1) ====================
    function buildOHLCCandle(id, price) {
        const data = htfData[id];
        data.tickCounter++;

        if (!data.currentCandle || data.tickCounter >= HTF_TICK_PER_CANDLE) {
            if (data.currentCandle) {
                data.currentCandle.closed = true;
                data.ohlcCandles.push(data.currentCandle);
                if (data.ohlcCandles.length > 100) data.ohlcCandles.shift();
            }
            data.tickCounter = 0;
            data.currentCandle = {
                open: price, high: price, low: price, close: price,
                closed: false, body: 0, range: 0, isBullish: true,
                upperWick: 0, lowerWick: 0
            };
        } else {
            data.currentCandle.high = Math.max(data.currentCandle.high, price);
            data.currentCandle.low = Math.min(data.currentCandle.low, price);
            data.currentCandle.close = price;
            data.currentCandle.range = data.currentCandle.high - data.currentCandle.low;
            data.currentCandle.body = Math.abs(data.currentCandle.close - data.currentCandle.open);
            data.currentCandle.isBullish = data.currentCandle.close >= data.currentCandle.open;
            data.currentCandle.upperWick = data.currentCandle.isBullish ? 
                data.currentCandle.high - data.currentCandle.close : 
                data.currentCandle.high - data.currentCandle.open;
            data.currentCandle.lowerWick = data.currentCandle.isBullish ? 
                data.currentCandle.open - data.currentCandle.low : 
                data.currentCandle.close - data.currentCandle.low;
        }
    }

    // ==================== 2. OPTIMIZED STRUCTURE ENGINE (Pivot Fractal) ====================
    function detectPivotFractals(id) {
        const data = htfData[id];
        const candles = data.ohlcCandles.filter(c => c.closed);
        if (candles.length < HTF_PIVOT_LOOKBACK * 2 + 1) return;

        data.pivotHighs = [];
        data.pivotLows = [];

        for (let i = HTF_PIVOT_LOOKBACK; i < candles.length - HTF_PIVOT_LOOKBACK; i++) {
            const current = candles[i];
            let isPivotHigh = true;
            let isPivotLow = true;

            for (let j = 1; j <= HTF_PIVOT_LOOKBACK; j++) {
                if (candles[i - j].high >= current.high) isPivotHigh = false;
                if (candles[i + j].high >= current.high) isPivotHigh = false;
                if (candles[i - j].low <= current.low) isPivotLow = false;
                if (candles[i + j].low <= current.low) isPivotLow = false;
            }

            if (isPivotHigh) data.pivotHighs.push({ index: i, price: current.high, candle: current });
            if (isPivotLow) data.pivotLows.push({ index: i, price: current.low, candle: current });
        }

        data.swings = [];
        const allPivots = [...data.pivotHighs.map(p => ({ ...p, type: 'H' })), 
                          ...data.pivotLows.map(p => ({ ...p, type: 'L' }))];
        allPivots.sort((a, b) => a.index - b.index);

        let lastType = null;
        allPivots.forEach(pivot => {
            if (pivot.type !== lastType) {
                data.swings.push({ val: pivot.price, type: pivot.type, index: pivot.index });
                lastType = pivot.type;
            }
        });

        detectStructure(id);
    }

    function detectStructure(id) {
        const data = htfData[id];
        const swings = data.swings;
        if (swings.length < 4) return;

        const recentSwings = swings.slice(-4);
        const highs = recentSwings.filter(s => s.type === 'H').map(s => s.val);
        const lows = recentSwings.filter(s => s.type === 'L').map(s => s.val);

        if (highs.length >= 2 && lows.length >= 2) {
            const last2Highs = highs.slice(-2);
            const last2Lows = lows.slice(-2);

            const isHH = last2Highs[1] > last2Highs[0];
            const isHL = last2Lows[1] > last2Lows[0];
            const isLH = last2Highs[1] < last2Highs[0];
            const isLL = last2Lows[1] < last2Lows[0];

            if (isHH && isHL) {
                data.structure = 'BULLISH';
            } else if (isLH && isLL) {
                data.structure = 'BEARISH';
            } else if ((isHH && !isHL) || (!isLH && isLL) || (!isHH && !isHL && !isLH && !isLL)) {
                data.structure = 'RANGE';
            } else {
                data.structure = 'TRANSITIONAL';
            }
        }
    }

    // ==================== 3. OPTIMIZED MOMENTUM ENGINE (Displacement Analysis) ====================
    function detectMomentum(id) {
        const data = htfData[id];
        const candles = data.ohlcCandles.filter(c => c.closed);
        if (candles.length < HTF_MOMENTUM_LOOKBACK) return;

        const recentCandles = candles.slice(-HTF_MOMENTUM_LOOKBACK);
        let bullishDisplacement = 0;
        let bearishDisplacement = 0;
        let totalBodyDominance = 0;

        recentCandles.forEach(candle => {
            const bodyRatio = candle.body / (candle.range || 0.0001);
            const isDisplacement = candle.range > (data.atr * 0.7);
            const isBodyDominant = bodyRatio > 0.55;
            const upperWickRatio = candle.upperWick / (candle.range || 0.0001);
            const lowerWickRatio = candle.lowerWick / (candle.range || 0.0001);

            totalBodyDominance += bodyRatio;

            if (candle.isBullish && isBodyDominant && isDisplacement && upperWickRatio < 0.25) {
                bullishDisplacement++;
            } else if (!candle.isBullish && isBodyDominant && isDisplacement && lowerWickRatio < 0.25) {
                bearishDisplacement++;
            }
        });

        const avgBodyDominance = totalBodyDominance / HTF_MOMENTUM_LOOKBACK;

        if (bullishDisplacement >= 3) {
            data.momentum = 'IMPULSIVE_UP';
            data.momentumStrength = 'STRONG';
        } else if (bearishDisplacement >= 3) {
            data.momentum = 'IMPULSIVE_DOWN';
            data.momentumStrength = 'STRONG';
        } else if (bullishDisplacement >= 2 && avgBodyDominance > 0.6) {
            data.momentum = 'IMPULSIVE_UP';
            data.momentumStrength = 'MODERATE';
        } else if (bearishDisplacement >= 2 && avgBodyDominance > 0.6) {
            data.momentum = 'IMPULSIVE_DOWN';
            data.momentumStrength = 'MODERATE';
        } else if (bullishDisplacement >= 1) {
            data.momentum = 'BULLISH';
            data.momentumStrength = 'WEAK';
        } else if (bearishDisplacement >= 1) {
            data.momentum = 'BEARISH';
            data.momentumStrength = 'WEAK';
        } else {
            data.momentum = 'STABLE';
            data.momentumStrength = 'NONE';
        }
    }

    // ==================== 4. OPTIMIZED MARKET PHASE ENGINE ====================
    function detectMarketPhase(id) {
        const data = htfData[id];
        const candles = data.ohlcCandles.filter(c => c.closed);
        if (candles.length < HTF_RANGE_LOOKBACK) return;

        const recentCandles = candles.slice(-HTF_RANGE_LOOKBACK);
        
        let overlapCount = 0;
        let expansionCount = 0;
        const ranges = [];

        for (let i = 1; i < recentCandles.length; i++) {
            const prev = recentCandles[i - 1];
            const curr = recentCandles[i];
            
            const prevMid = (prev.high + prev.low) / 2;
            const currMid = (curr.high + curr.low) / 2;
            const midDistance = Math.abs(currMid - prevMid);
            
            if (midDistance < (data.atr * 0.4)) {
                overlapCount++;
            }
            
            if (curr.range > (data.atr * 1.2)) {
                expansionCount++;
            }
            
            ranges.push(curr.range);
        }

        const avgRange = ranges.reduce((a, b) => a + b, 0) / ranges.length;
        const rangeVolatility = Math.max(...ranges) - Math.min(...ranges);

        const isTrending = data.structure === 'BULLISH' || data.structure === 'BEARISH';
        const hasMomentum = data.momentumStrength === 'STRONG' || data.momentumStrength === 'MODERATE';
        const lowOverlap = overlapCount <= 3;

        if (isTrending && hasMomentum && lowOverlap && expansionCount >= 2) {
            data.phase = 'TRENDING';
        } else if (expansionCount >= 3 && rangeVolatility > (data.atr * 0.5)) {
            data.phase = 'EXPANSION';
        } else if (overlapCount >= 6 && avgRange < (data.atr * 0.7)) {
            data.phase = 'LOW_VOLATILITY';
        } else {
            data.phase = 'RANGE';
        }
    }

    // ==================== 5. ADAPTIVE ATR CALCULATION ====================
    function calculateATR(id) {
        const data = htfData[id];
        const candles = data.ohlcCandles.filter(c => c.closed);
        if (candles.length < 14) return;

        const trueRanges = [];
        for (let i = 1; i < candles.length; i++) {
            const high = candles[i].high;
            const low = candles[i].low;
            const prevClose = candles[i - 1].close;
            
            const tr1 = high - low;
            const tr2 = Math.abs(high - prevClose);
            const tr3 = Math.abs(low - prevClose);
            
            trueRanges.push(Math.max(tr1, tr2, tr3));
        }

        const recentTR = trueRanges.slice(-14);
        data.atr = recentTR.reduce((a, b) => a + b, 0) / recentTR.length;
    }

    // ==================== HTF CONFIDENCE CALCULATION ====================
    function calculateHTFConfidence(id) {
        const data = htfData[id];
        let confidence = 0;

        if (data.structure === 'BULLISH' || data.structure === 'BEARISH') {
            confidence += 40;
        } else if (data.structure === 'TRANSITIONAL') {
            confidence += 15;
        }

        switch (data.momentumStrength) {
            case 'STRONG': confidence += 35; break;
            case 'MODERATE': confidence += 25; break;
            case 'WEAK': confidence += 10; break;
            default: confidence += 0;
        }

        switch (data.phase) {
            case 'TRENDING': confidence += 25; break;
            case 'EXPANSION': confidence += 15; break;
            case 'LOW_VOLATILITY': confidence += 5; break;
            default: confidence += 0;
        }

        const isAligned = 
            (data.structure === 'BULLISH' && data.momentum.includes('UP')) ||
            (data.structure === 'BEARISH' && data.momentum.includes('DOWN'));
        
        if (!isAligned && data.structure !== 'NEUTRAL' && data.structure !== 'RANGE') {
            confidence = Math.min(confidence, 35);
        }

        data.confidence = Math.max(0, Math.min(100, confidence));
    }

    // ==================== MAIN HTF ENGINE UPDATE ====================
    function updateHTFEngine(id, price) {
        const data = htfData[id];

        buildOHLCCandle(id, price);
        calculateATR(id);
        detectPivotFractals(id);
        detectMomentum(id);
        detectMarketPhase(id);
        calculateHTFConfidence(id);

        updateHTFUI(id);
    }

    // ==================== HTF UI RENDERING ====================
    function updateHTFUI(id) {
        const data = htfData[id];

        // === HTF TREND (Structure) ===
        const htfTrendEl = document.getElementById(`htf-trend-${id}`);
        if (htfTrendEl) {
            let trendText = '';
            let trendClass = '';

            switch (data.structure) {
                case 'BULLISH':
                    trendText = '▲ BULLISH';
                    trendClass = 'trend-up';
                    break;
                case 'BEARISH':
                    trendText = '▼ BEARISH';
                    trendClass = 'trend-down';
                    break;
                case 'TRANSITIONAL':
                    trendText = '◆ TRANS';
                    trendClass = 'trend-weak';
                    break;
                case 'RANGE':
                    trendText = '◆ RANGE';
                    trendClass = 'trend-neutral';
                    break;
                default:
                    trendText = '◆ NEUTRAL';
                    trendClass = 'trend-neutral';
            }

            htfTrendEl.className = `htf-value ${trendClass}`;
            htfTrendEl.innerText = trendText;
        }

        // === HTF MOMENTUM ===
        const htfMomentumEl = document.getElementById(`htf-momentum-${id}`);
        if (htfMomentumEl) {
            let momText = '';
            let momClass = '';

            switch (data.momentum) {
                case 'IMPULSIVE_UP':
                    momText = data.momentumStrength === 'STRONG' ? '▲ STRONG' : '▲ MODERATE';
                    momClass = 'momentum-up';
                    break;
                case 'IMPULSIVE_DOWN':
                    momText = data.momentumStrength === 'STRONG' ? '▼ STRONG' : '▼ MODERATE';
                    momClass = 'momentum-down';
                    break;
                case 'BULLISH':
                    momText = '▲ WEAK';
                    momClass = 'trend-weak';
                    break;
                case 'BEARISH':
                    momText = '▼ WEAK';
                    momClass = 'trend-weak';
                    break;
                default:
                    momText = '◆ FLAT';
                    momClass = 'trend-neutral';
            }

            htfMomentumEl.className = `htf-value ${momClass}`;
            htfMomentumEl.innerText = momText;
        }

        // === HTF PHASE + ATR + CONFIDENCE (Rendered in HTF box) ===
        const htfPhaseEl = document.getElementById(`htf-phase-${id}`);
        if (htfPhaseEl) {
            let phaseText = '';
            let phaseClass = '';
            
            switch (data.phase) {
                case 'TRENDING':
                    phaseText = 'TRENDING';
                    phaseClass = 'phase-trending-tag';
                    break;
                case 'EXPANSION':
                    phaseText = 'EXPANSION';
                    phaseClass = 'phase-expansion-tag';
                    break;
                case 'LOW_VOLATILITY':
                    phaseText = 'LOW VOL';
                    phaseClass = 'phase-lowvol-tag';
                    break;
                default:
                    phaseText = 'RANGE';
                    phaseClass = 'phase-ranging-tag';
            }
            
            htfPhaseEl.innerHTML = `
                <span class="phase-tag ${phaseClass}">${phaseText}</span>
                <div style="font-size:0.5rem;color:var(--text-dim);margin-top:2px;text-align:center;">ATR ${data.atr.toFixed(2)}</div>
                <div class="context-bar">
                    <div class="context-fill" style="width:${data.confidence}%;background:${data.confidence >= 70 ? 'var(--success)' : data.confidence >= 40 ? 'var(--htf-weak)' : 'var(--danger)'}"></div>
                </div>
                <div style="font-size:0.45rem;color:var(--text-dim);margin-top:1px;text-align:center;">CONF ${Math.round(data.confidence)}%</div>
            `;
        }
    }

    // ==================== PRICE ACTION (UNCHANGED - EMA SMOOTHED) ====================
    let paEma = { xau: 0, btc: 0 };
    let paEmaAlpha = 0.2;

    function updatePA(id, price) {
        const s = state[id];
        
        if (paEma[id] === 0) {
            paEma[id] = price;
        } else {
            paEma[id] = (price * paEmaAlpha) + (paEma[id] * (1 - paEmaAlpha));
        }
        
        if (s.lastPrice !== 0) {
            const emaDiff = paEma[id] - s.lastPrice;
            s.trendScore += emaDiff * 0.5;
        }
        
        const maxTrend = id === 'xau' ? 5 : 500;
        if (s.trendScore > maxTrend) s.trendScore = maxTrend;
        if (s.trendScore < -maxTrend) s.trendScore = -maxTrend;
        
        updatePAUI(id);
    }
    
    function updatePAUI(id) {
        const s = state[id];
        let p = (id === 'xau') ? { trendThresh: 0.8, momThresh: 0.08 } : { trendThresh: 50, momThresh: 10 };
        
        const trendPaEl = document.getElementById(`trend-${id}`);
        if (trendPaEl) {
            if (s.trendScore > p.trendThresh) {
                trendPaEl.innerText = "BULLISH";
                trendPaEl.style.color = "var(--success)";
            } else if (s.trendScore < -p.trendThresh) {
                trendPaEl.innerText = "BEARISH";
                trendPaEl.style.color = "var(--danger)";
            } else {
                trendPaEl.innerText = "NEUTRAL";
                trendPaEl.style.color = "var(--text-dim)";
            }
        }
        
        const momPaEl = document.getElementById(`mom-${id}`);
        if (momPaEl && s.lastPrice !== 0) {
            const prevPrice = state[id].lastPrice;
            const diff = s.lastPrice - prevPrice;
            const absDiff = Math.abs(diff);
            const direction = diff > 0 ? "UPWARD" : "DOWNWARD";
            const strength = absDiff > p.momThresh ? "STRONG " : "";
            momPaEl.innerHTML = strength + direction;
            momPaEl.style.color = diff > 0 ? "var(--success)" : "var(--danger)";
        }
    }

    // ==================== SIGNAL LOGIC (UNCHANGED) ====================
    function createFreshState() {
        return { 
            lastPrice: 0, trendScore: 0, 
            l1: false, l2: false, l3: false, 
            confirmed: false, type: 'none', 
            entry: 0, sl: 0, tp: 0
        };
    }

    function loadState(id) {
        const saved = localStorage.getItem(`ura_state_${id}`);
        if (saved) {
            try { return JSON.parse(saved); } catch(e) { return createFreshState(); }
        }
        return createFreshState();
    }

    function saveState(id) {
        const toSave = {
            lastPrice: state[id].lastPrice,
            trendScore: state[id].trendScore,
            l1: state[id].l1, l2: state[id].l2, l3: state[id].l3,
            confirmed: state[id].confirmed,
            type: state[id].type,
            entry: state[id].entry, sl: state[id].sl, tp: state[id].tp
        };
        localStorage.setItem(`ura_state_${id}`, JSON.stringify(toSave));
    }

    function updateSignal(id, price) {
        const s = state[id];
        let p = (id === 'xau') ? { threshold: 0.05 } : btcConfig;
        
        if (s.confirmed) {
            if (s.type === 'buy' && (price >= s.tp || price <= s.sl)) resetSignal(id);
            else if (s.type === 'sell' && (price <= s.tp || price >= s.sl)) resetSignal(id);
            return;
        }
        
        const diff = price - s.lastPrice;
        updatePA(id, price);
        
        if (!s.confirmed && s.lastPrice !== 0 && Math.abs(diff) > p.threshold) {
            const direction = diff > 0 ? 'buy' : 'sell';
            if (!s.l1) { 
                s.l1 = true; s.type = direction; saveState(id); updateSignalUI(id);
            } else if (!s.l2) { 
                s.l2 = true; saveState(id); updateSignalUI(id);
            } else { 
                lockSignal(id, price, direction); 
            }
        }
        
        s.lastPrice = price;
        saveState(id);
    }
    
    function updateSignalUI(id) {
        const s = state[id];
        
        const l1Dot = document.getElementById(`l1-${id}`);
        if (l1Dot) l1Dot.className = s.l1 ? (s.type === 'sell' ? "dot active-down" : "dot active") : "dot";
        
        const l2Dot = document.getElementById(`l2-${id}`);
        if (l2Dot) l2Dot.className = s.l2 ? (s.type === 'sell' ? "dot active-down" : "dot active") : "dot";
        
        const l3Dot = document.getElementById(`l3-${id}`);
        if (l3Dot) l3Dot.className = s.l3 ? (s.type === 'sell' ? "dot active-down" : "dot active") : "dot";
        
        const signalText = document.getElementById(`signal-text-${id}`);
        if (signalText) {
            if (!wsStatus[id] && id === 'btc') {
                signalText.innerText = 'NO FEED';
                signalText.style.color = 'var(--danger)';
            } else if (s.confirmed) {
                signalText.innerText = s.type.toUpperCase();
                signalText.style.color = s.type === 'buy' ? 'var(--success)' : 'var(--danger)';
            } else if (s.l3) {
                signalText.innerText = 'FVG';
                signalText.style.color = 'var(--accent)';
            } else if (s.l2) {
                signalText.innerText = 'CHoCH';
                signalText.style.color = 'var(--accent)';
            } else if (s.l1) {
                signalText.innerText = 'SWEEP';
                signalText.style.color = 'var(--feed-lightning)';
            } else {
                signalText.innerText = 'IDLE';
                signalText.style.color = 'var(--text-dim)';
            }
        }
        
        const entryEl = document.getElementById(`entry-${id}`);
        if (entryEl) entryEl.innerText = s.confirmed ? s.entry.toFixed(2) : '--';
        
        const tpEl = document.getElementById(`tp-${id}`);
        if (tpEl) tpEl.innerText = s.confirmed ? s.tp.toFixed(2) : '--';
        
        const slEl = document.getElementById(`sl-${id}`);
        if (slEl) slEl.innerText = s.confirmed ? s.sl.toFixed(2) : '--';
    }

    function lockSignal(id, entry, type) {
        const s = state[id];
        const offset = type === 'buy' ? -3 : +3;
        const adjustedEntry = entry + offset;
        
        s.l3 = true;
        s.confirmed = true;
        s.type = type;
        s.entry = adjustedEntry;
        
        const risk = id === 'xau' ? 8 : entry * 0.0020;
        
        if (type === 'buy') {
            s.sl = adjustedEntry - risk;
            s.tp = adjustedEntry + (risk * 1.3);
        } else {
            s.sl = adjustedEntry + risk;
            s.tp = adjustedEntry - (risk * 1.5);
        }
        
        saveState(id);
        updateSignalUI(id);
        updatePAUI(id);
    }

    function resetSignal(id) {
        const s = state[id];
        s.l1 = false; s.l2 = false; s.l3 = false;
        s.confirmed = false; s.type = 'none';
        s.entry = 0; s.sl = 0; s.tp = 0;
        s.trendScore = 0;
        saveState(id);
        updateSignalUI(id);
        updatePAUI(id);
    }

    // ==================== UI HELPERS ====================
    function updateWSStatus(id) {
        const el = document.getElementById(`ws-status-${id}`);
        if (el) {
            if (id === 'xau') {
                el.textContent = '● CONNECTED (API)';
                el.className = 'ws-status connected';
            } else {
                el.textContent = wsStatus[id] ? '● CONNECTED' : '○ RECONNECTING...';
                el.className = `ws-status ${wsStatus[id] ? 'connected' : 'disconnected'}`;
            }
        }
    }

    function updateGlobalPulse() {
        const pulseEl = document.getElementById('globalPulse');
        if (pulseEl) {
            pulseEl.className = (wsStatus.btc || true) ? 'pulse connected' : 'pulse disconnected';
        }
    }

    // ==================== FETCH XAU PRICE ====================
    let lastXAUPrice = 0;
    function fetchXAUPrice() {
        fetch('https://api.gold-api.com/price/XAU')
            .then(response => {
                if (!response.ok) throw new Error('API error');
                return response.json();
            })
            .then(data => {
                let price = data.price || data.USD || (data.rates && data.rates.USD);
                if (price > 0) updateXAUPrice(price);
            })
            .catch(() => {
                fetch('https://api.exchangerate.host/convert?from=XAU&to=USD&amount=1')
                    .then(res => res.json())
                    .then(data => {
                        if (data.result && data.result > 0) updateXAUPrice(data.result);
                    })
                    .catch(err => console.error('XAU fetch error:', err));
            });
    }
    
    function updateXAUPrice(price) {
        if (price && price > 0 && !isNaN(price)) {
            lastXAUPrice = price;
            
            const priceEl = document.getElementById(`price-xau`);
            if (priceEl) {
                const oldPrice = state.xau.lastPrice;
                priceEl.innerText = price.toFixed(2);
                if (oldPrice !== 0 && oldPrice !== price) {
                    priceEl.style.color = price >= oldPrice ? "var(--success)" : "var(--danger)";
                    setTimeout(() => { if (priceEl) priceEl.style.color = ""; }, 150);
                }
            }
            
            updateHTFEngine('xau', price);
            updateSignal('xau', price);
        }
    }

    // ==================== INITIALIZATION ====================
    function init() {
        state.xau = loadState('xau');
        state.btc = loadState('btc');
        
        // Seed HTF data
        seedHTFData('xau', 4695);
        seedHTFData('btc', 60030);
        calculateATR('xau');
        calculateATR('btc');
        
        const container = document.getElementById('terminals');
        container.innerHTML = '';
        
        // Card XAU
        container.innerHTML += `
            <div class="pair-card ${activePairId === 'xau' ? 'active' : ''}" id="card-xau">
                <div class="card">
                    <div class="card-top">
                        <div class="pair-info">
                            <span class="pair">XAUUSD</span>
                            <span id="ws-status-xau" class="ws-status connected">● CONNECTED (API)</span>
                        </div>
                        <span class="price" id="price-xau">0.00</span>
                    </div>
                    
                    <div class="signal-bar">
                        <span>SIGNAL</span>
                        <div class="signal-dot-group">
                            <div class="dot" id="l1-xau"></div>
                            <div class="dot" id="l2-xau"></div>
                            <div class="dot" id="l3-xau"></div>
                        </div>
                        <span id="signal-text-xau">IDLE</span>
                    </div>
                    
                    <div class="card-level-grid">
                        <div class="level-item" onclick="copyValue('xau','entry')">
                            <span class="level-label">Entry</span>
                            <span class="level-value" id="entry-xau">--</span>
                        </div>
                        <div class="level-item" onclick="copyValue('xau','tp')">
                            <span class="level-label">Target</span>
                            <span class="level-value" id="tp-xau" style="color:var(--success)">--</span>
                        </div>
                        <div class="level-item" onclick="copyValue('xau','sl')">
                            <span class="level-label">S-Loss</span>
                            <span class="level-value" id="sl-xau" style="color:var(--danger)">--</span>
                        </div>
                    </div>
                    
                    <div class="analysis-grid">
                        <div class="box-htf">
                            <div class="label-sm">HTF CONTEXT (H1)</div>
                            <div class="htf-row">
                                <div class="htf-label">STRUCTURE</div>
                                <div class="htf-value" id="htf-trend-xau">◆ NEUTRAL</div>
                            </div>
                            <div class="htf-row">
                                <div class="htf-label">MOMENTUM</div>
                                <div class="htf-value" id="htf-momentum-xau">◆ FLAT</div>
                            </div>
                            <div class="htf-row">
                                <div class="htf-label">PHASE</div>
                                <div class="htf-value" id="htf-phase-xau">--</div>
                            </div>
                        </div>
                        <div class="box-pa">
                            <div class="label-sm">PRICE ACTION</div>
                            <div class="pa-row">
                                <div class="pa-label">TREND</div>
                                <div class="pa-value" id="trend-xau">SCANNING</div>
                            </div>
                            <div class="pa-row">
                                <div class="pa-label">MOMENTUM</div>
                                <div class="pa-value" id="mom-xau">--</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        // Card BTC
        container.innerHTML += `
            <div class="pair-card ${activePairId === 'btc' ? 'active' : ''}" id="card-btc">
                <div class="card">
                    <div class="card-top">
                        <div class="pair-info">
                            <span class="pair">BTCUSD</span>
                            <span id="ws-status-btc" class="ws-status disconnected">○ RECONNECTING...</span>
                        </div>
                        <span class="price" id="price-btc">0.00</span>
                    </div>
                    
                    <div class="signal-bar">
                        <span>SIGNAL</span>
                        <div class="signal-dot-group">
                            <div class="dot" id="l1-btc"></div>
                            <div class="dot" id="l2-btc"></div>
                            <div class="dot" id="l3-btc"></div>
                        </div>
                        <span id="signal-text-btc">IDLE</span>
                    </div>
                    
                    <div class="card-level-grid">
                        <div class="level-item" onclick="copyValue('btc','entry')">
                            <span class="level-label">Entry</span>
                            <span class="level-value" id="entry-btc">--</span>
                        </div>
                        <div class="level-item" onclick="copyValue('btc','tp')">
                            <span class="level-label">Target</span>
                            <span class="level-value" id="tp-btc" style="color:var(--success)">--</span>
                        </div>
                        <div class="level-item" onclick="copyValue('btc','sl')">
                            <span class="level-label">S-Loss</span>
                            <span class="level-value" id="sl-btc" style="color:var(--danger)">--</span>
                        </div>
                    </div>
                    
                    <div class="analysis-grid">
                        <div class="box-htf">
                            <div class="label-sm">HTF CONTEXT (H1)</div>
                            <div class="htf-row">
                                <div class="htf-label">STRUCTURE</div>
                                <div class="htf-value" id="htf-trend-btc">◆ NEUTRAL</div>
                            </div>
                            <div class="htf-row">
                                <div class="htf-label">MOMENTUM</div>
                                <div class="htf-value" id="htf-momentum-btc">◆ FLAT</div>
                            </div>
                            <div class="htf-row">
                                <div class="htf-label">PHASE</div>
                                <div class="htf-value" id="htf-phase-btc">--</div>
                            </div>
                        </div>
                        <div class="box-pa">
                            <div class="label-sm">PRICE ACTION</div>
                            <div class="pa-row">
                                <div class="pa-label">TREND</div>
                                <div class="pa-value" id="trend-btc">SCANNING</div>
                            </div>
                            <div class="pa-row">
                                <div class="pa-label">MOMENTUM</div>
                                <div class="pa-value" id="mom-btc">--</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        updateSignalUI('xau');
        updatePAUI('xau');
        updateHTFUI('xau');
        updateSignalUI('btc');
        updatePAUI('btc');
        updateHTFUI('btc');
        
        fetchXAUPrice();
        setInterval(fetchXAUPrice, 2000);
        
        connectWebSocketBTC();
        
        document.getElementById('switchLabel').innerText = activePairId === 'xau' ? 'XAUUSD' : 'BTCUSD';
        document.getElementById('switchPairBtn').onclick = () => {
            activePairId = activePairId === 'xau' ? 'btc' : 'xau';
            localStorage.setItem('ura_active_pair', activePairId);
            document.getElementById('switchLabel').innerText = activePairId === 'xau' ? 'XAUUSD' : 'BTCUSD';
            document.querySelectorAll('.pair-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`card-${activePairId}`).classList.add('active');
        };
        
        updateGlobalPulse();
        setInterval(() => updateGlobalPulse(), 1000);
    }

    // ==================== WEBSOCKET BTC ====================
    function connectWebSocketBTC() {
        if (wsConnections.btc) {
            try { wsConnections.btc.close(); } catch(e) {}
        }
        
        try {
            const ws = new WebSocket(btcConfig.wsUrl);
            
            ws.onopen = () => {
                wsStatus.btc = true;
                wsRetries.btc = 0;
                lastHeartbeat.btc = Date.now();
                updateWSStatus('btc');
                updateGlobalPulse();
                updateSignalUI('btc');
            };
            
            ws.onclose = () => {
                wsStatus.btc = false;
                updateWSStatus('btc');
                updateGlobalPulse();
                updateSignalUI('btc');
                const delay = Math.min(1000 * Math.pow(2, wsRetries.btc), 30000);
                wsRetries.btc++;
                setTimeout(connectWebSocketBTC, delay);
            };
            
            ws.onerror = () => {
                wsStatus.btc = false;
                updateWSStatus('btc');
                updateGlobalPulse();
                updateSignalUI('btc');
            };
            
            ws.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    const price = parseFloat(data.p) + btcConfig.offset;
                    if (price && price > 0 && !isNaN(price)) {
                        lastHeartbeat.btc = Date.now();
                        if (!wsStatus.btc) {
                            wsStatus.btc = true;
                            updateWSStatus('btc');
                            updateGlobalPulse();
                            updateSignalUI('btc');
                        }
                        const priceEl = document.getElementById(`price-btc`);
                        if (priceEl) {
                            const oldPrice = state.btc.lastPrice;
                            priceEl.innerText = price.toFixed(2);
                            if (oldPrice !== 0 && oldPrice !== price) {
                                priceEl.style.color = price >= oldPrice ? "var(--success)" : "var(--danger)";
                                setTimeout(() => { if (priceEl) priceEl.style.color = ""; }, 150);
                            }
                        }
                        updateHTFEngine('btc', price);
                        updateSignal('btc', price);
                    }
                } catch(err) {
                    console.error(`Parse error for BTC:`, err);
                }
            };
            
            wsConnections.btc = ws;
        } catch(err) {
            wsStatus.btc = false;
            updateWSStatus('btc');
            updateGlobalPulse();
            updateSignalUI('btc');
            setTimeout(connectWebSocketBTC, 5000);
        }
    }

    window.copyValue = (id, type) => {
        const val = document.getElementById(`${type}-${id}`).innerText;
        if (val !== '--') {
            navigator.clipboard.writeText(val);
            if (navigator.vibrate) navigator.vibrate(50);
        }
    };

    setInterval(() => {
        const clk = document.getElementById('clock');
        if (clk) clk.innerText = new Date().toISOString().split('T')[1].split('.')[0] + " UTC";
    }, 1000);
    
    init();
</script>

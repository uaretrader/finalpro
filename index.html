<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" name="viewport"/>
<title>TERMINAL v6.0 - DUAL ENGINE</title>
<style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;600;800&display=swap');

        :root {
            --bg: #1a1d21; 
            --text: #e6e8ea;
            --text-dim: #707a8a;
            --accent: #f0b90b;
            --success: #00FFFF; 
            --danger: #FF5252; 
            --feed-lightning: #FFEA00;
            --border: rgba(255, 255, 255, 0.1);
            --phase-trending: #00FF88;
            --htf-bullish: #00FFFF;
            --htf-bearish: #FF5252;
            --htf-neutral: #707a8a;
            --htf-weak: #f0b90b;
            --phase-expansion: #FF6B6B;
            --phase-lowvol: #4ECDC4;
            --confirm-pending: #f0b90b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            padding: 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { max-width: 450px; width: 100%; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .brand h1 { font-size: 1rem; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
        .sys-status { font-family: 'JetBrains Mono', monospace; font-size: 0.5rem; text-align: right; color: var(--text-dim); }
        
        .pulse { 
            display: inline-block; 
            width: 7px; 
            height: 7px; 
            background: var(--feed-lightning); 
            border-radius: 50%; 
            margin-right: 5px; 
            animation: blink 1.5s infinite; 
        }
        .pulse.connected {
            background: var(--success);
            box-shadow: 0 0 5px var(--success);
        }
        .pulse.disconnected {
            background: var(--danger);
            animation: blink 0.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .ws-status {
            font-size: 0.5rem;
            padding: 2px 6px;
            border-radius: 3px;
            margin-top: 2px;
            display: inline-block;
        }
        .ws-status.connected { color: var(--phase-trending); }
        .ws-status.disconnected { color: var(--danger); animation: blink 1s infinite; }

        .switch-pair-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255,255,255,0.03);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: 10px;
        }
        .switch-pair-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .pair-card { display: none; }
        .pair-card.active { display: block; }

        .card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card-top { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            margin-bottom: 8px; 
        }
        .pair-info {
            display: flex;
            flex-direction: column;
        }
        .pair { font-weight: 800; font-size: 1.1rem; letter-spacing: 1px; color: var(--text); }
        .price { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 1.2rem; 
            font-weight: 700; 
            background: transparent;
            padding: 4px 0;
            text-align: right;
            transition: color 0.1s ease;
        }

        .signal-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
        }
        .signal-bar.confirm-wait {
            border-color: var(--confirm-pending);
            background: rgba(240, 185, 11, 0.1);
            animation: pulseBorder 1s infinite;
        }
        @keyframes pulseBorder {
            0%, 100% { border-color: rgba(240, 185, 11, 0.3); }
            50% { border-color: rgba(240, 185, 11, 1); }
        }

        .signal-dot-group { display: flex; gap: 12px; align-items: center; }
        .dot { width: 7px; height: 7px; border-radius: 6px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: all 0.1s; }
        .dot.active { background: var(--success); box-shadow: 0 0 4px var(--success); }
        .dot.active-down { background: var(--danger); box-shadow: 0 0 4px var(--danger); }
        .dot.confirm-pending { background: var(--confirm-pending); animation: pulseDot 0.8s infinite; }
        @keyframes pulseDot { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        .card-level-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 4px;
        }
        .level-item { display: flex; flex-direction: column; cursor: pointer; }
        .level-item:nth-child(1) { align-items: flex-start; text-align: left; }
        .level-item:nth-child(2) { align-items: center; text-align: center; }
        .level-item:nth-child(3) { align-items: flex-end; text-align: right; }
        .level-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
        .level-value { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; font-weight: 700; }

        /* HTF Status - SEMBUNYIKAN */
        .htf-status {
            display: none;
        }

        footer { text-align: center; font-size: 0.55rem; color: var(--text-dim); margin-top: 10px; opacity: 0.6; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 4px;
        }
        .stats-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .stats-label {
            font-size: 0.55rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .stats-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 700;
        }

    </style>
</head>
<body>
<div class="container">
<header>
<div class="brand">
<h1>uradvisor</h1>
<p style="font-size: 0.55rem; color: var(--text-dim)">URA v6.0</p>
</div>
<div style="display: flex; align-items: center; gap: 12px;">
<div class="sys-status">
<div><span class="pulse" id="globalPulse"></span>LIVE</div>
</div>
<button class="switch-pair-btn" id="switchPairBtn">
<span id="switchLabel">XAUUSD</span>
</button>
</div>
</header>
<div id="terminals"></div>
<footer>
        [ ENGINE CORE ]: SWEEP + CHoCH + FVG + HTF CONFIRMATION<br/>
        [ METHOD ]: DELAYED VALIDATION BEFORE LOCK
    </footer>
</div>
<script>
(function() {
    'use strict';

    // ==================== OPTIMASI ANTI-LAG ====================
    let pendingSaveData = { xau: null, btc: null };
    let pendingSaveTimer = { xau: null, btc: null };
    const SAVE_INTERVAL = 1000;
    let rafPending = { xau: false, btc: false };
    let pendingPriceData = { xau: null, btc: null };
    let pendingSignalData = { xau: null, btc: null };
    let signalDebounceTimer = { xau: null, btc: null };
    const SIGNAL_DEBOUNCE_MS = 20;

    // ==================== KONFIGURASI ====================
    // ==================== ADVANCED ENGINE CONFIG ====================
    const ATR_PERIOD = 14;
    const EMA_PERIOD = 21;
    const VOLUME_LOOKBACK = 12;
    const VOLATILITY_MULTIPLIER = 1.35;
    const HTF_EMA_PERIOD = 21;

    const BTC_WS_URL = 'wss://stream.binance.com:9443/ws/btcusdt@aggTrade';
    const XAU_OFFSET = -2.5;
    const CONFIRMATION_DELAY_CYCLES = 3;  // Delay 3 cycle sebelum lock
    const RESET_THRESHOLD_XAU = 5;      // Reset jika harga bergerak 5 poin lalu kembali ke entry
    const RESET_THRESHOLD_BTC = 80;       // Reset jika harga bergerak 80 poin lalu kembali ke entry
    
    
    // ==================== ADVANCED MARKET DATA ====================
    let marketData = {
        xau: { candles: [], atr: 0, ema: 0, volume: [], lastClose: 0, structureHigh: 0, structureLow: 0 },
        btc: { candles: [], atr: 0, ema: 0, volume: [], lastClose: 0, structureHigh: 0, structureLow: 0 }
    };

    // ==================== STATE MANAGEMENT ====================
    let state = { xau: null, btc: null };
    let wsStatus = { xau: true, btc: false };
    let activePairId = localStorage.getItem('ura_active_pair') || 'xau';
    
    // ==================== PENDING CONFIRMATION STATE ====================
    let pendingConfirmation = { xau: null, btc: null };
    
    // ==================== TRIPLE TAP RESET ====================
    let tapCounters = { xau: 0, btc: 0 };
    let tapTimers = { xau: null, btc: null };
    let historyTapCounters = { xau: 0, btc: 0 };
    let historyTapTimers = { xau: null, btc: null };
    const TAP_TIMEOUT = 500;

    function handleSignalBarTap(id) {
        if (tapTimers[id]) {
            clearTimeout(tapTimers[id]);
            tapTimers[id] = null;
        }
        
        tapCounters[id]++;
        
        tapTimers[id] = setTimeout(() => {
            tapCounters[id] = 0;
            tapTimers[id] = null;
        }, TAP_TIMEOUT);
        
        if (tapCounters[id] === 3) {
            if (pendingConfirmation[id]) cancelPendingConfirmation(id);

            // Reset signal + entry level only
            resetSignal(id);

            tapCounters[id] = 0;

            if (tapTimers[id]) {
                clearTimeout(tapTimers[id]);
                tapTimers[id] = null;
            }

            if (navigator.vibrate) navigator.vibrate(30);
        }
    }

    function handleHistoryPanelTap(id) {
        if (historyTapTimers[id]) {
            clearTimeout(historyTapTimers[id]);
            historyTapTimers[id] = null;
        }

        historyTapCounters[id]++;

        historyTapTimers[id] = setTimeout(() => {
            historyTapCounters[id] = 0;
            historyTapTimers[id] = null;
        }, TAP_TIMEOUT);

        if (historyTapCounters[id] === 3) {

            // Reset trade history only
            performanceStats[id] = createDefaultStats();

            savePerformanceStats(id);
            updatePerformanceUI(id);

            const signalText = document.getElementById(`signal-text-${id}`);

            if (signalText) {

                const previousText = signalText.innerText;
                const previousColor = signalText.style.color;

                signalText.innerText = 'HISTORY RESET';
                signalText.style.color = 'var(--accent)';

                setTimeout(() => {

                    signalText.innerText = previousText;
                    signalText.style.color = previousColor;

                }, 1200);
            }

            historyTapCounters[id] = 0;

            if (historyTapTimers[id]) {
                clearTimeout(historyTapTimers[id]);
                historyTapTimers[id] = null;
            }

            if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
        }
    }


    function cancelPendingConfirmation(id) {
        if (pendingConfirmation[id]) {
            if (pendingConfirmation[id].timerId) {
                clearTimeout(pendingConfirmation[id].timerId);
            }
            if (pendingConfirmation[id]) {
                    pendingConfirmation[id] = null;
                }
            
            const signalBar = document.getElementById(`signal-bar-${id}`);
            if (signalBar) signalBar.classList.remove('confirm-wait');
            
            const l3Dot = document.getElementById(`l3-${id}`);
            if (l3Dot && l3Dot.classList.contains('confirm-pending')) {
                l3Dot.classList.remove('confirm-pending');
            }
            
            updateSignalUIOnly(id);
        }
    }

    // ==================== THROTTLED LOCALSTORAGE ====================
    function throttledSaveState(id) {
        const s = state[id];
        if (!s) return;
        
        pendingSaveData[id] = {
            lastPrice: s.lastPrice,
            trendScore: s.trendScore,
            l1: s.l1, l2: s.l2, l3: s.l3,
            confirmed: s.confirmed,
            type: s.type,
            entry: s.entry, sl: s.sl, tp: s.tp,
            tempHigh: s.tempHigh,
            tempLow: s.tempLow
        };
        
        if (pendingSaveTimer[id]) return;
        
        pendingSaveTimer[id] = setTimeout(() => {
            if (pendingSaveData[id]) {
                localStorage.setItem(`ura_state_${id}`, JSON.stringify(pendingSaveData[id]));
                pendingSaveData[id] = null;
            }
            pendingSaveTimer[id] = null;
        }, SAVE_INTERVAL);
    }

    // ==================== RAF THROTTLED UI UPDATE ====================
    function throttledUpdateUI(id) {
        if (!rafPending[id]) {
            rafPending[id] = true;
            requestAnimationFrame(() => {
                if (pendingPriceData[id] !== null) {
                    updatePriceDisplayOnly(id, pendingPriceData[id]);
                    pendingPriceData[id] = null;
                }
                if (pendingSignalData[id] !== null) {
                    updateSignalUIOnly(id);
                    pendingSignalData[id] = null;
                }
                rafPending[id] = false;
            });
        }
    }
    
    function updatePriceDisplayOnly(id, price) {
        const priceEl = document.getElementById(`price-${id}`);
        if (priceEl) {
            const oldPrice = state[id]?.lastPrice || 0;
            priceEl.innerText = price.toFixed(2);
            if (oldPrice !== 0 && oldPrice !== price) {
                priceEl.style.color = price > oldPrice ? "var(--success)" : "var(--danger)";
                setTimeout(() => { if (priceEl) priceEl.style.color = ""; }, 150);
            }
        }
    }
    
    function updateSignalUIOnly(id) {
        const s = state[id];
        if (!s) return;
        
        const l1Dot = document.getElementById(`l1-${id}`);
        if (l1Dot) l1Dot.className = s.l1 ? (s.type === 'sell' ? "dot active-down" : "dot active") : "dot";
        
        const l2Dot = document.getElementById(`l2-${id}`);
        if (l2Dot) l2Dot.className = s.l2 ? (s.type === 'sell' ? "dot active-down" : "dot active") : "dot";
        
        const l3Dot = document.getElementById(`l3-${id}`);
        if (l3Dot) {
            if (pendingConfirmation[id] && s.l3 && !s.confirmed) {
                l3Dot.className = "dot confirm-pending";
            } else {
                l3Dot.className = s.l3 ? (s.type === 'sell' ? "dot active-down" : "dot active") : "dot";
            }
        }
        
        const signalText = document.getElementById(`signal-text-${id}`);
        if (signalText) {
            if (!wsStatus[id] && id === 'btc') {
                signalText.innerText = 'NO FEED';
                signalText.style.color = 'var(--danger)';
            } else if (pendingConfirmation[id] && s.l3 && !s.confirmed) {
                const progress = pendingConfirmation[id].cycleCounter || 0;
                signalText.innerText = `CONFIRM ${progress}/${CONFIRMATION_DELAY_CYCLES}`;
                signalText.style.color = 'var(--confirm-pending)';
            } else if (s.confirmed) {
                signalText.innerText = s.type.toUpperCase();
                signalText.style.color = s.type === 'buy' ? 'var(--success)' : 'var(--danger)';
            } else if (s.l3) {
                signalText.innerText = 'LOCKED';
                signalText.style.color = 'var(--accent)';
            } else if (s.l2) {
                signalText.innerText = 'STAGE 2';
                signalText.style.color = 'var(--accent)';
            } else if (s.l1) {
                signalText.innerText = 'STAGE 1';
                signalText.style.color = 'var(--feed-lightning)';
            } else {
                signalText.innerText = 'IDLE';
                signalText.style.color = 'var(--text-dim)';
            }
        }
        
        const entryEl = document.getElementById(`entry-${id}`);
        if (entryEl) entryEl.innerText = s.confirmed ? s.entry.toFixed(2) : '--';
        
        const tpEl = document.getElementById(`tp-${id}`);
        if (tpEl) tpEl.innerText = s.confirmed ? s.tp.toFixed(2) : '--';
        
        const slEl = document.getElementById(`sl-${id}`);
        if (slEl) slEl.innerText = s.confirmed ? s.sl.toFixed(2) : '--';
    }

    
    // ==================== PERFORMANCE TRACKER ====================
    let performanceStats = {
        xau: loadPerformanceStats('xau'),
        btc: loadPerformanceStats('btc')
    };

    function createDefaultStats() {
        return {
            tpHits: 0,
            retraceResets: 0,
            total: 0,
            winrate: 0.0
        };
    }

    function loadPerformanceStats(id) {
        try {
            const saved = localStorage.getItem(`ura_stats_${id}`);
            if (!saved) return createDefaultStats();

            const parsed = JSON.parse(saved);

            return {
                tpHits: parsed.tpHits || 0,
                retraceResets: parsed.retraceResets || 0,
                total: parsed.total || 0,
                winrate: parsed.winrate || 0
            };
        } catch(e) {
            return createDefaultStats();
        }
    }

    function savePerformanceStats(id) {
        localStorage.setItem(`ura_stats_${id}`, JSON.stringify(performanceStats[id]));
    }

    function updateWinrate(id) {
        const stats = performanceStats[id];
        stats.total = stats.tpHits + stats.retraceResets;
        stats.winrate = stats.total > 0
            ? ((stats.tpHits / stats.total) * 100).toFixed(1)
            : 0.0;
    }

    function recordSignalResult(id, resultType) {
        const stats = performanceStats[id];

        if (resultType === 'tp') {
            stats.tpHits++;
        } else if (resultType === 'retrace') {
            stats.retraceResets++;
        }

        updateWinrate(id);
        savePerformanceStats(id);
        updatePerformanceUI(id);
    }

    function updatePerformanceUI(id) {
        const stats = performanceStats[id];

        if (!stats) return;

        const tpEl = document.getElementById(`stats-tp-${id}`);
        const lossEl = document.getElementById(`stats-loss-${id}`);
        const winrateEl = document.getElementById(`stats-winrate-${id}`);

        if (tpEl) tpEl.innerText = stats.tpHits;

        if (lossEl) {

            const resetPercent = stats.total > 0
                ? ((stats.retraceResets / stats.total) * 100).toFixed(1)
                : 0.0;

            lossEl.innerText = `${stats.retraceResets} (${resetPercent}%)`;
        }

        if (winrateEl) {
            winrateEl.innerText = `${stats.winrate}%`;
        }
    }


    // ==================== HTF ENGINE (ENGINE 2) ====================
    let htfDataStore = {
        xau: { ohlcCandles: [], structure: 'NEUTRAL', momentum: 'STABLE', momentumStrength: 'NONE', confidence: 0 },
        btc: { ohlcCandles: [], structure: 'NEUTRAL', momentum: 'STABLE', momentumStrength: 'NONE', confidence: 0 }
    };
    
    let htfTickCounter = { xau: 0, btc: 0 };
    let htfCurrentCandle = { xau: null, btc: null };
    const HTF_TICK_PER_CANDLE = 8;

    function buildOHLCCandle(id, price) {
        htfTickCounter[id]++;
        
        if (!htfCurrentCandle[id] || htfTickCounter[id] >= HTF_TICK_PER_CANDLE) {
            if (htfCurrentCandle[id]) {
                htfCurrentCandle[id].closed = true;
                htfDataStore[id].ohlcCandles.push(htfCurrentCandle[id]);
                if (htfDataStore[id].ohlcCandles.length > 50) htfDataStore[id].ohlcCandles.shift();
            }
            htfTickCounter[id] = 0;
            htfCurrentCandle[id] = {
                open: price, high: price, low: price, close: price, closed: false
            };
        } else {
            htfCurrentCandle[id].high = Math.max(htfCurrentCandle[id].high, price);
            htfCurrentCandle[id].low = Math.min(htfCurrentCandle[id].low, price);
            htfCurrentCandle[id].close = price;
        }
    }

    function calculateSimpleHTF(id) {
        const data = htfDataStore[id];
        const candles = data.ohlcCandles.filter(c => c.closed);
        if (candles.length < 10) return;
        
        const recentCandles = candles.slice(-10);
        let bullishCount = 0, bearishCount = 0;
        
        for (let i = 0; i < recentCandles.length; i++) {
            const c = recentCandles[i];
            if (c.close > c.open) bullishCount++;
            else if (c.close < c.open) bearishCount++;
        }
        
        // Determine structure
        if (bullishCount > bearishCount + 2) {
            data.structure = 'BULLISH';
            data.confidence = 60 + (bullishCount * 5);
        } else if (bearishCount > bullishCount + 2) {
            data.structure = 'BEARISH';
            data.confidence = 60 + (bearishCount * 5);
        } else {
            data.structure = 'NEUTRAL';
            data.confidence = 40;
        }
        
        // Determine momentum
        const last3 = recentCandles.slice(-3);
        let upMomentum = 0, downMomentum = 0;
        for (let i = 1; i < last3.length; i++) {
            if (last3[i].close > last3[i-1].close) upMomentum++;
            else if (last3[i].close < last3[i-1].close) downMomentum++;
        }
        
        if (upMomentum >= 2) {
            data.momentum = 'BULLISH';
            data.momentumStrength = upMomentum === 2 ? 'MODERATE' : 'STRONG';
        } else if (downMomentum >= 2) {
            data.momentum = 'BEARISH';
            data.momentumStrength = downMomentum === 2 ? 'MODERATE' : 'STRONG';
        } else {
            data.momentum = 'STABLE';
            data.momentumStrength = 'NONE';
        }
        
        data.confidence = Math.min(100, Math.max(0, data.confidence));
    }

    function updateHTFEngine(id, price) {
        buildOHLCCandle(id, price);
        calculateSimpleHTF(id);
    }

    // ==================== ENGINE 2 VALIDATION ====================
    
function isHTFConfirmingDirection(id, direction) {
    const htf = htfDataStore[id];
    const market = marketData[id];

    if (!htf || !market) return false;

    const ema = market.ema || 0;
    const price = market.price || state[id]?.lastPrice || 0;

    if (ema <= 0 || price <= 0) return false;

    // EMA21 tolerance agar signal tetap cepat namun tetap terfilter
    const atrTolerance =
        Math.max(
            (market.atr || 0) * 0.18,
            id === 'xau' ? 0.35 : 18
        );

    const isAboveEMA =
        price >= (ema - atrTolerance);

    const isBelowEMA =
        price <= (ema + atrTolerance);

    // Slope dibuat lebih fleksibel agar tidak terlalu telat lock
    const emaSlope =
        market.prevEMA !== undefined
            ? (ema - market.prevEMA)
            : 0;

    const slopeThreshold =
        Math.max(
            0.00001,
            (market.atr || 0) * 0.0045
        );

    const bullishBias =
        emaSlope >= -slopeThreshold;

    const bearishBias =

    function buildRealCandle(id, price) {
        const md = marketData[id];
        const now = Date.now();

        if (!md.currentCandle) {
            md.currentCandle = {
                open: price,
                high: price,
                low: price,
                close: price,
                volume: 1,
                timestamp: now
            };
            return;
        }

        md.currentCandle.high = Math.max(md.currentCandle.high, price);
        md.currentCandle.low = Math.min(md.currentCandle.low, price);
        md.currentCandle.close = price;
        md.currentCandle.volume++;

        if (now - md.currentCandle.timestamp >= 5000) {
            md.candles.push({...md.currentCandle});

            if (md.candles.length > 120) {
                md.candles.shift();
            }

            md.currentCandle = {
                open: price,
                high: price,
                low: price,
                close: price,
                volume: 1,
                timestamp: now
            };

            calculateAdvancedMetrics(id);
        }

    function calculateAdvancedMetrics(id) {
        const md = marketData[id];
        const candles = md.candles;

        if (candles.length < ATR_PERIOD + 5) return;

        // ATR Dynamic
        let trValues = [];

        for (let i = 1; i < candles.length; i++) {
            const high = candles[i].high;
            const low = candles[i].low;
            const prevClose = candles[i - 1].close;

            const tr = Math.max(
                high - low,
                Math.abs(high - prevClose),
                Math.abs(low - prevClose)
            );

            trValues.push(tr);
        }

        md.atr = trValues.slice(-ATR_PERIOD).reduce((a,b)=>a+b,0) / ATR_PERIOD;

        // Real EMA Candle
        const closes = candles.map(c => c.close);
        let ema = closes[0];

        const alpha = 2 / (EMA_PERIOD + 1);

        for (let i = 1; i < closes.length; i++) {
            ema = (closes[i] * alpha) + (ema * (1 - alpha));
        }

        md.prevEMA = md.ema || ema;
        md.ema = ema;
        md.price = closes[closes.length - 1];
        md.lastUpdate = Date.now();

        // Volume impulse tracking
        md.volume = candles.slice(-VOLUME_LOOKBACK).map(c => c.volume);

        // Structure tracking
        const recent = candles.slice(-10);

        md.structureHigh = Math.max(...recent.map(c => c.high));
        md.structureLow = Math.min(...recent.map(c => c.low));
    }

    function getAdaptiveThreshold(id) {
        const md = marketData[id];

        if (!md.atr || md.atr <= 0) {
            return id === 'xau' ? 0.7 : 12;
        }

        return md.atr * VOLATILITY_MULTIPLIER;
    }

    function detectLiquiditySweep(id, price) {
        const md = marketData[id];

        if (!md.structureHigh || !md.structureLow) return null;

        if (price > md.structureHigh) {
            return 'buy';
        }

        if (price < md.structureLow) {
            return 'sell';
        }

        return null;
    }

    function detectBOSCHOCH(id, direction) {
        const md = marketData[id];
        const candles = md.candles;

        if (candles.length < 6) return false;

        const last = candles[candles.length - 1];
        const prev = candles[candles.length - 2];

        if (direction === 'buy') {
            return last.close > prev.high;
        }

        return last.close < prev.low;
    }

    function isVolumeImpulse(id) {
        const md = marketData[id];

        if (!md.volume || md.volume.length < 5) return false;

        const current = md.volume[md.volume.length - 1];
        const avg = md.volume.reduce((a,b)=>a+b,0) / md.volume.length;

        return current > (avg * 1.3);
    }

    function isCandleClosedConfirmed(id) {
        const md = marketData[id];

        if (!md.candles || md.candles.length < 2) return false;

        const last = md.candles[md.candles.length - 1];

        return Math.abs(last.close - last.open) > (md.atr * 0.2);
    }

                            <div class="dot" id="l3-xau"></div>
                        </div>
                        <span id="signal-text-xau">IDLE</span>
                    </div>
                    <div class="card-level-grid">
                        <div class="level-item" onclick="window.copyValue('xau','entry')">
                            <span class="level-label">Entry</span>
                            <span class="level-value" id="entry-xau">--</span>
                        </div>
                        <div class="level-item" onclick="window.copyValue('xau','tp')">
                            <span class="level-label">Target</span>
                            <span class="level-value" id="tp-xau" style="color:var(--success)">--</span>
                        </div>
                        <div class="level-item" onclick="window.copyValue('xau','sl')">
                            <span class="level-label">DEEP</span>
                            <span class="level-value" id="sl-xau" style="color:var(--danger)">--</span>
                        </div>
                    </div>

                    <div class="stats-grid" id="history-panel-xau">
                        <div class="stats-item">
                            <span class="stats-label">TP HIT</span>
                            <span class="stats-value" id="stats-tp-xau" style="color:var(--success)">0</span>
                        </div>
                        <div class="stats-item">
                            <span class="stats-label">RESET</span>
                            <span class="stats-value" id="stats-loss-xau" style="color:var(--danger)">0</span>
                        </div>
                        <div class="stats-item">
                            <span class="stats-label">WINRATE</span>
                            <span class="stats-value" id="stats-winrate-xau" style="color:var(--accent)">0%</span>
                        </div>
                    </div>

                </div>
            </div>
            <div class="pair-card ${activePairId === 'btc' ? 'active' : ''}" id="card-btc">
                <div class="card">
                    <div class="card-top">
                        <div class="pair-info">
                            <span class="pair">BTCUSD</span>
                            <span id="ws-status-btc" class="ws-status disconnected">○ RECONNECTING...</span>
                        </div>
                        <span class="price" id="price-btc">0.00</span>
                    </div>
                    <div class="signal-bar" id="signal-bar-btc">
                        <span>SIGNAL</span>
                        <div class="signal-dot-group">
                            <div class="dot" id="l1-btc"></div>
                            <div class="dot" id="l2-btc"></div>
                            <div class="dot" id="l3-btc"></div>
                        </div>
                        <span id="signal-text-btc">IDLE</span>
                    </div>
                    <div class="card-level-grid">
                        <div class="level-item" onclick="window.copyValue('btc','entry')">
                            <span class="level-label">Entry</span>
                            <span class="level-value" id="entry-btc">--</span>
                        </div>
                        <div class="level-item" onclick="window.copyValue('btc','tp')">
                            <span class="level-label">Target</span>
                            <span class="level-value" id="tp-btc" style="color:var(--success)">--</span>
                        </div>
                        <div class="level-item" onclick="window.copyValue('btc','sl')">
                            <span class="level-label">DEEP</span>
                            <span class="level-value" id="sl-btc" style="color:var(--danger)">--</span>
                        </div>
                    </div>

                    <div class="stats-grid" id="history-panel-btc">
                        <div class="stats-item">
                            <span class="stats-label">TP HIT</span>
                            <span class="stats-value" id="stats-tp-btc" style="color:var(--success)">0</span>
                        </div>
                        <div class="stats-item">
                            <span class="stats-label">RESET</span>
                            <span class="stats-value" id="stats-loss-btc" style="color:var(--danger)">0</span>
                        </div>
                        <div class="stats-item">
                            <span class="stats-label">WINRATE</span>
                            <span class="stats-value" id="stats-winrate-btc" style="color:var(--accent)">0%</span>
                        </div>
                    </div>

                </div>
            </div>
        `;
        
        const xauBar = document.getElementById('signal-bar-xau');
        const btcBar = document.getElementById('signal-bar-btc');
        const xauHistoryPanel = document.getElementById('history-panel-xau');
        const btcHistoryPanel = document.getElementById('history-panel-btc');

        // Android/mobile optimized tap listener
        const bindTap = (el, handler) => {
            if (!el) return;

            let lastTap = 0;

            const tapHandler = (e) => {
                e.preventDefault();

                const now = Date.now();

                // Anti ghost/double click protection
                if (now - lastTap < 80) return;

                lastTap = now;
                handler();
            };

            el.addEventListener('touchstart', tapHandler, { passive: false });
            el.addEventListener('click', tapHandler);
        };

        bindTap(xauBar, () => handleSignalBarTap('xau'));
        bindTap(btcBar, () => handleSignalBarTap('btc'));

        bindTap(xauHistoryPanel, () => handleHistoryPanelTap('xau'));
        bindTap(btcHistoryPanel, () => handleHistoryPanelTap('btc'));
        
        updateSignalUIOnly('xau');
        updateSignalUIOnly('btc');
        updatePerformanceUI('xau');
        updatePerformanceUI('btc');
        
        initXAUWebSocket();
        xauFetchRestPrice();
        initBTCWebSocket();
        
        const switchLabel = document.getElementById('switchLabel');
        const switchBtn = document.getElementById('switchPairBtn');
        if (switchLabel && switchBtn) {
            switchLabel.innerText = activePairId === 'xau' ? 'XAUUSD' : 'BTCUSD';
            switchBtn.onclick = () => {
                activePairId = activePairId === 'xau' ? 'btc' : 'xau';
                localStorage.setItem('ura_active_pair', activePairId);
                switchLabel.innerText = activePairId === 'xau' ? 'XAUUSD' : 'BTCUSD';
                document.querySelectorAll('.pair-card').forEach(c => c.classList.remove('active'));
                document.getElementById(`card-${activePairId}`).classList.add('active');
            };
        }
        
        updateGlobalPulse();
        
        setInterval(() => {
            if (Date.now() - xauLastHeartbeat > 15000 && xauCurrentPrice > 0) {
                xauFetchRestPrice();
            }
            updateGlobalPulse();
        }, 10000);
    }
    
    window.copyValue = (id, type) => {
        const val = document.getElementById(`${type}-${id}`)?.innerText;
        if (val && val !== '--') {
            navigator.clipboard.writeText(val);
            if (navigator.vibrate) navigator.vibrate(50);
        }
    };
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
    
})();
</script>
</body>
</html>

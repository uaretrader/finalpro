<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" name="viewport"/>
<title>URADVISOR v7.6 — PRECISION ENGINE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
    :root {
        --obsidian: #1a1a1a;
        --surface: ##FBBC05;
        --surface2: #1f1f1f;
        --surface3: #0a0a0a;
        --edge: rgba(255,255,255,0.055);
        --edge-bright: rgba(255,255,255,0.12);
        --gold: #ffb830;
        --gold-dim: rgba(201,168,76,0.18);
        --gold-glow: 0 0 20px rgba(201,168,76,0.25), 0 0 40px rgba(201,168,76,0.08);
        --emerald: #00e5a0;
        --emerald-dim: rgba(0,229,160,0.12);
        --emerald-glow: 0 0 16px rgba(0,229,160,0.3);
        --crimson: #FF5773;
        --crimson-dim: rgba(255,61,90,0.12);
        --crimson-glow: 0 0 16px rgba(255,61,90,0.3);
        --amber: #ffb830;
        --sky: #4db8ff;
        --cyan: #ffb830;
        --text-primary: #e8edf2;
        --text-muted: #C4C4C6;
        --text-dim: #C4C4C6;
        --shadow-deep: 0 24px 64px rgba(0,0,0,0.7), 0 8px 24px rgba(0,0,0,0.5);
        --radius: 6px;
        --radius-sm: 3px;
        --success: var(--emerald);
        --danger: var(--crimson);
        --accent: var(--gold);
        --feed-lightning: var(--amber);
        --confirm-pending: var(--gold);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        background: var(--obsidian);
        background-image:
            radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,168,76,0.04) 0%, transparent 60%),
            radial-gradient(ellipse 60% 40% at 80% 100%, rgba(0,229,160,0.025) 0%, transparent 50%);
        color: var(--text-primary);
        font-family: 'Syne', sans-serif;
        padding: 18px 16px;
        display: flex;
        justify-content: center;
        min-height: 100vh;
    }

    .container {
        max-width: 450px;
        width: 100%;
        position: relative;
        z-index: 1;
    }

    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 18px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--edge);
        position: relative;
    }
    header::after {
        content: '';
        position: absolute;
        bottom: -1px; left: 0;
        width: 60px; height: 1px;
        background: linear-gradient(90deg, var(--gold), transparent);
    }

    .brand h1 {
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--text-primary);
        letter-spacing: 3px;
        text-transform: uppercase;
        line-height: 1;
    }
    .brand h1 span { color: var(--gold); }

    .brand-sub {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.42rem;
        color: var(--text-muted);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-top: 4px;
    }

    .sys-status {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.45rem;
        text-align: right;
        color: var(--text-muted);
        letter-spacing: 1px;
    }

    .pulse {
        display: inline-block;
        width: 5px; height: 5px;
        background: var(--amber);
        border-radius: 50%;
        margin-right: 5px;
        vertical-align: middle;
        animation: blink 1.5s infinite;
    }
    .pulse.connected { background: var(--emerald); box-shadow: var(--emerald-glow); }
    .pulse.disconnected { background: var(--crimson); animation: blink 0.5s infinite; }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }

    .header-right { display: flex; align-items: center; gap: 10px; }

    .switch-pair-btn {
        background: transparent;
        border: 1px solid var(--edge-bright);
        color: var(--text-muted);
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.62rem;
        font-weight: 500;
        padding: 6px 14px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all 0.2s ease;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        position: relative;
        overflow: hidden;
    }
    .switch-pair-btn::before {
        content: '';
        position: absolute; inset: 0;
        background: linear-gradient(135deg, rgba(201,168,76,0.08), transparent);
        opacity: 0;
        transition: opacity 0.2s;
    }
    .switch-pair-btn:hover { border-color: var(--gold); color: var(--gold); }
    .switch-pair-btn:hover::before { opacity: 1; }
    .switch-pair-btn:active, .switch-pair-btn.btn-highlight {
        border-color: var(--gold); color: var(--gold);
        transform: scale(0.96);
        box-shadow: var(--gold-glow);
    }

    .pair-card { display: none; }
    .pair-card.active { display: block; }

    .card {
        background: var(--surface);
        border: 1px solid var(--edge);
        border-radius: 1px;
        padding: 0;
        margin-bottom: 10px;
        box-shadow: var(--shadow-deep);
        overflow: hidden;
        position: relative;
    }
    .card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; height: 1px;
        background: linear-gradient(90deg, transparent, var(--gold), transparent);
        opacity: 0.4;
    }

    .card-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 16px 18px 14px;
        background: linear-gradient(180deg, var(--surface2) 0%, var(--surface) 100%);
        border-bottom: 1px solid var(--edge);
    }
    .pair-info { display: flex; flex-direction: column; gap: 5px; }
    .pair {
        font-weight: 800;
        font-size: 1rem;
        letter-spacing: 2px;
        color: var(--text-primary);
        text-transform: uppercase;
    }
    .status-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

    .ws-status {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.42rem;
        padding: 2px 7px;
        border-radius: 2px;
        display: inline-block;
        letter-spacing: 1px;
        text-transform: uppercase;
        border: 1px solid transparent;
    }
    .ws-status.connected {
        color: var(--emerald);
        border-color: rgba(0,229,160,0.2);
        background: rgba(0,229,160,0.06);
    }
    .ws-status.disconnected {
        color: var(--crimson);
        border-color: rgba(255,61,90,0.2);
        background: rgba(255,61,90,0.06);
        animation: blink 1s infinite;
    }

    .price {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 1.45rem;
        font-weight: 700;
        text-align: right;
        color: var(--text-primary);
        transition: color 0.12s ease;
        letter-spacing: -0.5px;
        line-height: 1;
        padding-top: 2px;
    }

    .tracker-badge {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.7rem;
        font-weight: 700;
        text-align: right;
        letter-spacing: 0.5px;
        margin-top: 4px;
        background: rgba(0,0,0,0.3);
        padding: 2px 8px;
        border-radius: 2px;
        display: inline-block;
        align-self: flex-end;
    }

    .signal-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 18px;
        background: var(--surface2);
        border-bottom: 1px solid var(--edge);
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.72rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        cursor: pointer;
        user-select: none;
        transition: all 0.2s ease;
        position: relative;
        overflow: hidden;
        color: var(--text-muted);
    }
    .signal-bar::after {
        content: '';
        position: absolute; inset: 0;
        background: linear-gradient(90deg, transparent, rgba(201,168,76,0.03), transparent);
        opacity: 0;
        transition: opacity 0.3s;
    }
    .signal-bar:hover::after { opacity: 1; }
    .signal-bar.confirm-wait {
        background: rgba(201,168,76,0.05);
        animation: pulseBorder 1s infinite;
    }
    @keyframes pulseBorder {
        0%, 100% { border-bottom-color: rgba(201,168,76,0.1); }
        50% { border-bottom-color: rgba(201,168,76,0.5); }
    }

    /* RUNNING TEXT MODE - mengganti seluruh isi signal bar */
    .signal-bar.running-mode {
        justify-content: center;
        padding: 10px 18px;
        overflow: hidden;
    }
    .signal-bar.running-mode .signal-dot-group,
    .signal-bar.running-mode > span:first-child {
        display: none;
    }
    .running-text-container {
        width: 100%;
        overflow: hidden;
        position: relative;
    }
    .running-text-scroll {
        display: inline-block;
        white-space: nowrap;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 2px;
        color: var(--gold);
        text-transform: uppercase;
        animation: scrollMarquee 25s linear infinite;
        padding-left: 100%;
    }
    @keyframes scrollMarquee {
        0% { transform: translateX(0); }
        100% { transform: translateX(-100%); }
    }

    .signal-dot-group { display: flex; gap: 8px; align-items: center; }
    .dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: var(--surface3);
        border: 1px solid var(--edge);
        transition: all 0.2s ease;
    }
    .dot.active { background: var(--emerald); border-color: var(--emerald); box-shadow: var(--emerald-glow); }
    .dot.active-down { background: var(--crimson); border-color: var(--crimson); box-shadow: var(--crimson-glow); }
    .dot.confirm-pending {
        background: var(--gold); border-color: var(--gold);
        animation: pulseDot 0.8s infinite;
        box-shadow: 0 0 10px rgba(201,168,76,0.5);
    }
    @keyframes pulseDot { 0%, 100% { opacity: 0.3; transform: scale(0.85); } 50% { opacity: 1; transform: scale(1.1); } }

    /* BARIS 1: Entry | Target | Deep | Draw Rate */
    .card-level-grid {
        display: flex;
        justify-content: space-between;
        align-items: stretch;
        border-bottom: 1px solid var(--edge);
    }
    .level-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 12px 8px;
        cursor: pointer;
        transition: background 0.15s;
        text-align: center;
    }
    .level-item:first-child { align-items: flex-start; padding-left: 18px; border-right: 1px solid var(--edge); }
    .level-item:last-child { align-items: flex-end; padding-right: 18px; border-left: 1px solid var(--edge); }
    .level-item:hover { background: rgba(255,255,255,0.02); }
    .level-item:active { background: rgba(255,255,255,0.04); }

    .level-label {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.42rem;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 5px;
    }
    .level-value {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: -0.3px;
    }

    /* BARIS 2: TP HIT | RETRACE | SL HIT | WINRATE */
    .stats-grid {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        padding: 11px 18px;
    }
    .stats-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        min-width: 0;
    }
    .stats-item + .stats-item { border-left: 1px solid var(--edge); }

    .stats-label {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.4rem;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 4px;
    }
    .stats-value {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.5px;
    }

    /* Warna khusus untuk RETRACE dan DRAW RATE */
    .retrace-value {
        color: var(--gold);
    }
    .draw-value {
        color: var(--gold);
    }
    .winrate-value {
        color: var(--gold);
    }

    .htf-badge { display: none; }

    .feed-badge {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.4rem;
        font-weight: 500;
        padding: 2px 6px;
        border-radius: 2px;
        border: 1px solid var(--edge);
        color: var(--text-dim);
        letter-spacing: 1px;
        text-transform: uppercase;
        transition: all 0.3s;
        white-space: nowrap;
    }
    .feed-badge.ok { color: var(--emerald); border-color: rgba(0,229,160,0.25); background: rgba(0,229,160,0.06); }
    .feed-badge.err { color: var(--crimson); border-color: rgba(255,61,90,0.25); background: rgba(255,61,90,0.06); animation: blink 1s infinite; }
    .feed-badge.fallback { color: var(--amber); border-color: rgba(255,184,48,0.25); background: rgba(255,184,48,0.06); }

    footer {
        text-align: center;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.38rem;
        color: var(--text-dim);
        margin-top: 14px;
        letter-spacing: 1.5px;
        opacity: 0.6;
        line-height: 1.8;
        text-transform: uppercase;
    }

    #toast {
        position: fixed;
        bottom: 28px; left: 50%;
        transform: translateX(-50%) translateY(70px);
        background: var(--surface2);
        border: 1px solid var(--edge-bright);
        border-radius: 20px;
        padding: 8px 20px;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.62rem;
        color: var(--gold);
        z-index: 9999;
        transition: transform 0.35s cubic-bezier(.34,1.56,.64,1), opacity 0.35s;
        opacity: 0;
        pointer-events: none;
        letter-spacing: 1px;
        box-shadow: var(--shadow-deep), var(--gold-glow);
        white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    body::before {
        content: '';
        position: fixed; inset: 0;
        background: repeating-linear-gradient(
            0deg,
            transparent, transparent 2px,
            rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
        );
        pointer-events: none;
        z-index: 0;
    }

    .engine-tag {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        background: var(--gold-dim);
        border: 1px solid rgba(201,168,76,0.2);
        border-radius: 2px;
        padding: 3px 8px;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.42rem;
        color: var(--gold);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        margin-bottom: 3px;
    }
</style>
</head>
<body>
<div class="container">

<header>
    <div class="brand">
        <h1>ur<span>advisor</span></h1>
        <div class="brand-sub">URA v7.6</div>
    </div>
    <div class="header-right">
        <div class="sys-status">
            <div><span class="pulse" id="globalPulse"></span>GLOBAL LIVE</div>
        </div>
        <button class="switch-pair-btn" id="switchPairBtn">
            <span id="switchLabel">XAUUSD</span>
        </button>
    </div>
</header>

<div id="terminals"></div>

<footer>
    ENGINE: SWEEP · CHOCH · FVG · HTF CONFIRM · RETRACE RT • METHOD: DELAYED VALIDATION · DUAL FEED · ADAPTIVE ATR
</footer>
</div>

<div id="toast"></div>

<script>
(function () {
    'use strict';

    // ============================================================
    // ========== KONTROL RUNNING TEXT (UBAH DI SINI) ============
    // ============================================================
    // Set ke false untuk menonaktifkan running text
    // Set ke true untuk mengaktifkan running text
    const ENABLE_RUNNING_TEXT = false;   // <---- GANTI KE false UNTUK MATIKAN
    // ============================================================

    const LS_SCHEMA_VERSION = 3;
    
    function checkAndMigrateSchema() {
        const storedVer = parseInt(localStorage.getItem('ura_schema_ver') || '1', 10);
        if (storedVer < LS_SCHEMA_VERSION) {
            ['xau', 'btc'].forEach(id => {
                const raw = localStorage.getItem(`ura_state_${id}`);
                if (raw) {
                    try {
                        const s = JSON.parse(raw);
                        const defaults = createFreshState();
                        const migrated = Object.assign({}, defaults, s);
                        migrated.retracePct = 0;
                        localStorage.setItem(`ura_state_${id}`, JSON.stringify(migrated));
                    } catch (e) { localStorage.removeItem(`ura_state_${id}`); }
                }
            });
            localStorage.setItem('ura_schema_ver', String(LS_SCHEMA_VERSION));
        }
    }

    let toastTimer = null;
    function showToast(msg) {
        const el = document.getElementById('toast');
        if (!el) return;
        el.textContent = msg;
        el.classList.add('show');
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { el.classList.remove('show'); }, 1800);
    }

    let pendingSaveData = { xau: null, btc: null };
    let pendingSaveTimer = { xau: null, btc: null };
    const SAVE_INTERVAL = 1000;
    let rafPending = { xau: false, btc: false };
    let pendingPriceData = { xau: null, btc: null };
    let pendingSignalData = { xau: null, btc: null };
    let signalDebounceTimer = { xau: null, btc: null };
    const SIGNAL_DEBOUNCE_MS = 20;

    const ATR_PERIOD = 14;
    const EMA_PERIOD = 21;
    const VOLUME_LOOKBACK = 12;
    const BTC_WS_URL = 'wss://stream.binance.com:9443/ws/btcusdt@trade';
    const XAU_OFFSET = -3;
    const CONFIRMATION_DELAY_CYCLES = 3;
    const RESET_THRESHOLD_XAU = 1.5;
    const RESET_THRESHOLD_BTC = 60;

    let marketData = {
        xau: { candles: [], atr: 0, ema: 0, volume: [], lastClose: 0, structureHigh: 0, structureLow: 0, currentCandle: null, price: 0 },
        btc: { candles: [], atr: 0, ema: 0, volume: [], lastClose: 0, structureHigh: 0, structureLow: 0, currentCandle: null, price: 0 }
    };

    let state = { xau: null, btc: null };
    let wsStatus = { xau: false, btc: false };
    let activePairId = localStorage.getItem('ura_active_pair') || 'xau';
    let pendingConfirmation = { xau: null, btc: null };
    let tapCounters = { xau: 0, btc: 0 };
    let tapTimers = { xau: null, btc: null };
    let historyTapCounters = { xau: 0, btc: 0 };
    let historyTapTimers = { xau: null, btc: null };
    const TAP_TIMEOUT = 500;

    function handleSignalBarTap(id) {
        if (tapTimers[id]) { clearTimeout(tapTimers[id]); tapTimers[id] = null; }
        tapCounters[id]++;
        tapTimers[id] = setTimeout(() => { tapCounters[id] = 0; tapTimers[id] = null; }, TAP_TIMEOUT);
        if (tapCounters[id] === 3) {
            if (pendingConfirmation[id]) cancelPendingConfirmation(id);
            resetSignal(id);
            tapCounters[id] = 0;
            if (tapTimers[id]) { clearTimeout(tapTimers[id]); tapTimers[id] = null; }
            if (navigator.vibrate) navigator.vibrate(30);
            showToast('Signal reset ✓');
        }
    }

    function handleHistoryPanelTap(id) {
        if (historyTapTimers[id]) { clearTimeout(historyTapTimers[id]); historyTapTimers[id] = null; }
        historyTapCounters[id]++;
        historyTapTimers[id] = setTimeout(() => { historyTapCounters[id] = 0; historyTapTimers[id] = null; }, TAP_TIMEOUT);
        if (historyTapCounters[id] === 3) {
            performanceStats[id] = createDefaultStats();
            savePerformanceStats(id);
            updatePerformanceUI(id);
            historyTapCounters[id] = 0;
            if (historyTapTimers[id]) { clearTimeout(historyTapTimers[id]); historyTapTimers[id] = null; }
            if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
            showToast('History reset ✓');
        }
    }

    function cancelPendingConfirmation(id) {
        if (pendingConfirmation[id]) {
            if (pendingConfirmation[id].timerId) clearTimeout(pendingConfirmation[id].timerId);
            pendingConfirmation[id] = null;
            const signalBar = document.getElementById(`signal-bar-${id}`);
            if (signalBar) signalBar.classList.remove('confirm-wait');
            const l3Dot = document.getElementById(`l3-${id}`);
            if (l3Dot && l3Dot.classList.contains('confirm-pending')) l3Dot.classList.remove('confirm-pending');
            updateSignalUIOnly(id);
        }
    }

    function throttledSaveState(id) {
        const s = state[id];
        if (!s) return;
        pendingSaveData[id] = {
            v: LS_SCHEMA_VERSION,
            lastPrice: s.lastPrice, trendScore: s.trendScore,
            l1: s.l1, l2: s.l2, l3: s.l3, confirmed: s.confirmed,
            type: s.type, entry: s.entry, sl: s.sl, tp: s.tp,
            tempHigh: s.tempHigh, tempLow: s.tempLow,
            originPrice: s.originPrice, warmupUntil: s.warmupUntil, confirmedAt: s.confirmedAt,
            retracePct: s.retracePct
        };
        if (pendingSaveTimer[id]) return;
        pendingSaveTimer[id] = setTimeout(() => {
            if (pendingSaveData[id]) {
                try { localStorage.setItem(`ura_state_${id}`, JSON.stringify(pendingSaveData[id])); } catch(e) {}
                pendingSaveData[id] = null;
            }
            pendingSaveTimer[id] = null;
        }, SAVE_INTERVAL);
    }

    function updateTracker(id, currentPrice) {
        const s = state[id];
        if (!s.confirmed || s.type === 'none' || s.entry <= 0) {
            const trackerEl = document.getElementById(`tracker-${id}`);
            if (trackerEl) trackerEl.innerText = '0';
            return;
        }
        
        const entry = s.entry;
        let distance;
        if (s.type === 'buy') {
            distance = currentPrice - entry;
        } else {
            distance = entry - currentPrice;
        }
        
        const rounded = Math.round(distance * 100) / 100;
        const trackerEl = document.getElementById(`tracker-${id}`);
        if (trackerEl) trackerEl.innerText = rounded;
        if (trackerEl) {
            trackerEl.style.color = distance >= 0 ? 'var(--emerald)' : 'var(--crimson)';
        }
    }

    function throttledUpdateUI(id) {
        if (!rafPending[id]) {
            rafPending[id] = true;
            requestAnimationFrame(() => {
                const price = pendingPriceData[id];
                if (price !== null) {
                    updatePriceDisplayOnly(id, price);
                    pendingPriceData[id] = null;
                }

    const HTF_TICK_PER_CANDLE = 20;
    function buildOHLCCandle(id, price) {
        htfTickCounter[id]++;
        if (!htfCurrentCandle[id] || htfTickCounter[id] >= HTF_TICK_PER_CANDLE) {
            if (htfCurrentCandle[id]) {
                htfCurrentCandle[id].closed = true;
                htfDataStore[id].ohlcCandles.push(htfCurrentCandle[id]);
                if (htfDataStore[id].ohlcCandles.length > 60) htfDataStore[id].ohlcCandles.shift();
            }
            htfTickCounter[id] = 0;
            htfCurrentCandle[id] = { open: price, high: price, low: price, close: price, closed: false };
        } else {
            htfCurrentCandle[id].high = Math.max(htfCurrentCandle[id].high, price);
            htfCurrentCandle[id].low = Math.min(htfCurrentCandle[id].low, price);
            htfCurrentCandle[id].close = price;
        }
    }
    function calculateSimpleHTF(id) {
        const data = htfDataStore[id];
        const candles = data.ohlcCandles.filter(c => c.closed);
        if (candles.length < 12) return;
        const window = Math.min(20, candles.length);
        const recentCandles = candles.slice(-window);
        let bullishCount = 0, bearishCount = 0;
        for (const c of recentCandles) { if (c.close > c.open) bullishCount++; else if (c.close < c.open) bearishCount++; }
        const threshold = Math.floor(window * 0.45);
        if (bullishCount > bearishCount + threshold) data.structure = 'BULLISH';
        else if (bearishCount > bullishCount + threshold) data.structure = 'BEARISH';
        else data.structure = 'NEUTRAL';
        const last5 = recentCandles.slice(-5);
        let upM = 0, downM = 0;
        for (let i = 1; i < last5.length; i++) { if (last5[i].close > last5[i-1].close) upM++; else if (last5[i].close < last5[i-1].close) downM++; }
        if (upM >= 4) data.momentum = 'BULLISH';
        else if (downM >= 4) data.momentum = 'BEARISH';
        else data.momentum = 'STABLE';
    }
    let htfSeeded = { xau: false, btc: false };
    let htfLiveSeedDone = { xau: false, btc: false };
    function seedHTFData(id, basePrice) {
        const seed = basePrice;
        const step = id === 'xau' ? 0.4 : 40;
        htfDataStore[id].ohlcCandles = [];
        for (let i = 0; i < 20; i++) {
            const drift = (i - 10) * step * 0.1;
            const open = seed + drift;
            const close = seed + drift + (i % 3 === 0 ? step * 0.2 : -step * 0.1);
            htfDataStore[id].ohlcCandles.push({ open, high: Math.max(open, close) + step * 0.1, low: Math.min(open, close) - step * 0.1, close, closed: true });
        }
        calculateSimpleHTF(id);
        htfSeeded[id] = true;
    }
    function maybeReseedHTF(id, livePrice) {
        if (htfLiveSeedDone[id]) return;
        if (!htfSeeded[id] || htfDataStore[id].ohlcCandles.length === 0) {
            seedHTFData(id, livePrice);
            htfLiveSeedDone[id] = true;
            return;
        }
        const firstClose = htfDataStore[id].ohlcCandles[0]?.close || 0;
        if (firstClose > 0 && Math.abs(firstClose - livePrice) / livePrice > 0.10) {
            seedHTFData(id, livePrice);
            htfLiveSeedDone[id] = true;
        }
    }

    function isHTFConfirmingDirection(id, direction) {
        const htf = htfDataStore[id];
        const market = marketData[id];
        if (!htf || !market) return false;
        const ema = market.ema || 0;
        const price = market.price || state[id]?.lastPrice || 0;
        if (ema <= 0 || price <= 0) return false;
        const atrTol = Math.max((market.atr || 0) * 0.05, id === 'xau' ? 0.10 : 5);
        const isAboveEMA = price >= (ema - atrTol);
        const isBelowEMA = price <= (ema + atrTol);
        const emaSlope = market.prevEMA !== 0 ? (ema - market.prevEMA) : 0;
        const slopeThreshold = Math.max(0.00001, (market.atr || 0) * 0.003);
        const bullishBias = emaSlope >= slopeThreshold;
        const bearishBias = emaSlope <= -slopeThreshold;
        const strongSlopeThreshold = slopeThreshold * 2;
        const strongBullish = emaSlope >= strongSlopeThreshold;
        const strongBearish = emaSlope <= -strongSlopeThreshold;
        if (direction === 'buy') {
            const trendingOK  = htf.structure === 'BULLISH' && htf.momentum === 'BULLISH' && isAboveEMA && bullishBias;
            const neutralOK   = htf.structure === 'NEUTRAL' && htf.momentum === 'BULLISH' && isAboveEMA && strongBullish;
            return trendingOK || neutralOK;
        }
        if (direction === 'sell') {
            const trendingOK  = htf.structure === 'BEARISH' && htf.momentum === 'BEARISH' && isBelowEMA && bearishBias;
            const neutralOK   = htf.structure === 'NEUTRAL' && htf.momentum === 'BEARISH' && isBelowEMA && strongBearish;
            return trendingOK || neutralOK;
        }
        return true;
    }

    function buildRealCandle(id, price) { 
        const md = marketData[id]; const now = Date.now();
        if (!md.currentCandle) { md.currentCandle = { open: price, high: price, low: price, close: price, volume: 1, timestamp: now }; return; }
        md.currentCandle.high = Math.max(md.currentCandle.high, price);
        md.currentCandle.low = Math.min(md.currentCandle.low, price);
        md.currentCandle.close = price; md.currentCandle.volume++;
        if (now - md.currentCandle.timestamp >= 5000) {
            md.candles.push({ ...md.currentCandle });
            if (md.candles.length > 120) md.candles.shift();
            md.currentCandle = { open: price, high: price, low: price, close: price, volume: 1, timestamp: now };
            calculateAdvancedMetrics(id);
        }
    }
    function calculateAdvancedMetrics(id) {
        const md = marketData[id]; const candles = md.candles;
        if (candles.length < ATR_PERIOD + 5) return;
        let trValues = [];
        for (let i = 1; i < candles.length; i++) trValues.push(Math.max(candles[i].high - candles[i].low, Math.abs(candles[i].high - candles[i-1].close), Math.abs(candles[i].low - candles[i-1].close)));
        md.atr = trValues.slice(-ATR_PERIOD).reduce((a,b)=>a+b,0)/ATR_PERIOD;
        const closes = candles.map(c=>c.close); let ema = closes[0]; const alpha = 2/(EMA_PERIOD+1);
        for (let i=1;i<closes.length;i++) ema = (closes[i]*alpha)+(ema*(1-alpha));
        md.prevEMA = md.ema || ema; md.ema = ema; md.price = closes[closes.length-1];
        md.volume = candles.slice(-VOLUME_LOOKBACK).map(c=>c.volume);
    }
    function getAdaptiveThreshold(id) {
    const md = marketData[id];

    if (!md.atr || md.atr <= 0) {
        return id === 'xau' ? 1.25 : 50;

    return id === 'xau'
        ? md.atr * 1.5
        : md.atr * 1.8;
}

    function createFreshState() { return { v:LS_SCHEMA_VERSION, lastPrice:0, trendScore:0, l1:false,l2:false,l3:false,confirmed:false,confirmedAt:0,resetInProgress:false,warmupUntil:0,type:'none',entry:0,sl:0,tp:0,tempHigh:0,tempLow:0,originPrice:0,retracePct:0 }; }

    function processSignal(id, price) {
        if (!state[id]) return;
        const s=state[id]; const resetThreshold= id==='xau'?RESET_THRESHOLD_XAU:RESET_THRESHOLD_BTC;
        if(s.confirmed){
            if(s.type!=='none'){
                if(s.tempHigh===0&&s.tempLow===0){s.tempHigh=s.entry||price; s.tempLow=s.entry||price;}
                if(price>s.tempHigh) s.tempHigh=price; 
                if(price<s.tempLow) s.tempLow=price;
                updateTracker(id, price);
                const refPrice=s.entry>0?s.entry:s.originPrice;
                const expansionDistance=s.type==='buy'? s.tempHigh-refPrice : refPrice-s.tempLow;
                if(expansionDistance>=resetThreshold){
                    const entryBuffer=id==='xau'?5:120;
                    const retraceReset=s.type==='buy'? price<=(refPrice-entryBuffer): price>=(refPrice+entryBuffer);
                    if(retraceReset && Date.now()>=(s.warmupUntil||0)){ recordSignalResult(id,'retrace'); resetSignal(id); return;}
                }
            }
            const hitTP=(s.type==='buy' && price>=s.tp)||(s.type==='sell' && price<=s.tp);
            const hitSL=(s.type==='buy' && price<=s.sl)||(s.type==='sell' && price>=s.sl);
            if(hitTP){ recordSignalResult(id,'tp'); resetSignal(id); }
            else if(hitSL){ recordSignalResult(id,'sl'); resetSignal(id); }
            return;
        }
        if(pendingConfirmation[id]){ s.lastPrice=price; return; }
        updatePA(id,price);
        let threshold=getAdaptiveThreshold(id);
        buildRealCandle(id,price);
        if(!s.confirmed && s.lastPrice!==0 && Math.abs(price-s.lastPrice)>threshold){
            const direction=s.type!=='none'?s.type:(price>s.lastPrice?'buy':'sell');
            if(!s.l1){ s.l1=true; s.type=direction; s.originPrice=price; s.tempHigh=price; s.tempLow=price; throttledSaveState(id); pendingSignalData[id]=true; throttledUpdateUI(id); }

            else if(!s.l3 && !s.confirmed){ s.l3=true; throttledSaveState(id); pendingSignalData[id]=true; throttledUpdateUI(id); startConfirmationDelay(id,direction,price); }
        }
        s.lastPrice=price;
        throttledSaveState(id);
    }

    let xauFetchRetryTimer=null, xauCurrentPrice=0, xauLastHeartbeat=Date.now();
    function updateFeedBadge(id,status){ const el=document.getElementById(`feed-badge-${id}`); if(!el) return; el.className='feed-badge'; if(status==='ok'){ el.textContent='● WS'; el.classList.add('ok'); } else if(status==='fallback'){ el.textContent='⚡ REST'; el.classList.add('fallback'); } else { el.textContent='●'; el.classList.add('err'); } }
    function updateXAUDisplay(price){ if(!price||isNaN(price)||price<=0) return; xauCurrentPrice=price; xauLastHeartbeat=Date.now(); pendingPriceData.xau=price; pendingSignalData.xau=true; throttledUpdateUI('xau'); maybeReseedHTF('xau',price); updateHTFEngine('xau',price); updateSignal('xau',price); wsStatus.xau=true; updateGlobalPulse(); const statusEl=document.getElementById('ws-status-xau'); if(statusEl){ statusEl.textContent='● LIVE'; statusEl.className='ws-status connected'; } updateFeedBadge('xau','ok'); }
    const XAU_REST_SOURCES=['https://fapi.binance.com/fapi/v1/ticker/price?symbol=XAUUSDT','https://api.binance.com/api/v3/ticker/price?symbol=XAUUSDT'];
    let xauRestSourceIdx=0;
    async function xauFetchRestPrice(){ for(let attempt=0;attempt<XAU_REST_SOURCES.length;attempt++){ const url=XAU_REST_SOURCES[(xauRestSourceIdx+attempt)%XAU_REST_SOURCES.length]; try{ const controller=new AbortController(); const timeoutId=setTimeout(()=>controller.abort(),7000); const resp=await fetch(url,{signal:controller.signal}); clearTimeout(timeoutId); const data=await resp.json(); if(data?.price){ const price=parseFloat(data.price)+XAU_OFFSET; if(price>0 && price!==xauCurrentPrice){
            xauCurrentPrice=price; xauLastHeartbeat=Date.now(); pendingPriceData.xau=price; pendingSignalData.xau=true; throttledUpdateUI('xau'); maybeReseedHTF('xau',price); updateHTFEngine('xau',price); updateSignal('xau',price); wsStatus.xau=true; updateGlobalPulse(); const statusEl=document.getElementById('ws-status-xau'); if(statusEl){ statusEl.textContent='● LIVE'; statusEl.className='ws-status connected'; }
            updateFeedBadge('xau','fallback'); xauRestSourceIdx=(xauRestSourceIdx+attempt)%XAU_REST_SOURCES.length; return true; } } }catch(e){} } updateFeedBadge('xau','err'); return false; }
    function initXAUWebSocket(){ if(xauWs){ try{ xauWs.close(); }catch(e){} xauWs=null; } if(xauReconnectTimer) clearTimeout(xauReconnectTimer); try{ xauWs=new WebSocket('wss://fstream.binance.com/ws/xauusdt@trade'); const wsTimeout=setTimeout(()=>{ if(xauWs && xauWs.readyState!==WebSocket.OPEN){ try{ xauWs.close(); }catch(e){} xauWs=null; updateFeedBadge('xau','fallback'); if(!xauFetchRetryTimer) xauFetchRetryTimer=setInterval(async ()=>{ await xauFetchRestPrice(); },3000); } },5000); xauWs.onopen=()=>{ clearTimeout(wsTimeout); xauReconnectAttempts=0; if(xauFetchRetryTimer){ clearInterval(xauFetchRetryTimer); xauFetchRetryTimer=null; } updateFeedBadge('xau','ok'); updateGlobalPulse(); }; xauWs.onmessage=(e)=>{ try{ const data=JSON.parse(e.data); if(data.p){ const price=parseFloat(data.p)+XAU_OFFSET; if(!isNaN(price) && price>0 && price!==xauCurrentPrice) updateXAUDisplay(price); } }catch(err){} }; xauWs.onerror=()=>{ updateFeedBadge('xau','fallback'); if(!xauFetchRetryTimer) xauFetchRetryTimer=setInterval(async ()=>{ await xauFetchRestPrice(); },3000); }; xauWs.onclose=()=>{ const delay=Math.min(1000*Math.pow(1.5,xauReconnectAttempts),15000); xauReconnectAttempts++; xauReconnectTimer=setTimeout(()=>initXAUWebSocket(),delay); updateFeedBadge('xau','fallback'); if(!xauFetchRetryTimer) xauFetchRetryTimer=setInterval(async ()=>{ await xauFetchRestPrice(); },3000); }; }catch(err){ updateFeedBadge('xau','fallback'); if(!xauFetchRetryTimer) xauFetchRetryTimer=setInterval(async ()=>{ await xauFetchRestPrice(); },3000); } }
    
    let btcWs=null, btcReconnectTimer=null, btcReconnectAttempts=0;
    let btcFetchRetryTimer=null;
    async function btcFetchRestPrice(){ try{ const resp=await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT'); const data=await resp.json(); if(data?.price){ const price=parseFloat(data.price); if(price>0 && !isNaN(price)){ pendingPriceData.btc=price; pendingSignalData.btc=true; throttledUpdateUI('btc'); maybeReseedHTF('btc',price); updateHTFEngine('btc',price); updateSignal('btc',price); wsStatus.btc=true; updateGlobalPulse(); updateFeedBadge('btc','fallback'); return true; } } }catch(e){} updateFeedBadge('btc','err'); return false; }
    function initBTCWebSocket(){ if(btcWs){ try{ btcWs.close(); }catch(e){} btcWs=null; } if(btcReconnectTimer) clearTimeout(btcReconnectTimer); try{ btcWs=new WebSocket(BTC_WS_URL); const wsTimeout=setTimeout(()=>{ if(btcWs && btcWs.readyState!==WebSocket.OPEN){ try{ btcWs.close(); }catch(e){} btcWs=null; updateFeedBadge('btc','fallback'); wsStatus.btc=false; if(!btcFetchRetryTimer) btcFetchRetryTimer=setInterval(async ()=>{ await btcFetchRestPrice(); },3000); } },6000); btcWs.onopen=()=>{ clearTimeout(wsTimeout); btcReconnectAttempts=0; wsStatus.btc=true; if(btcFetchRetryTimer){ clearInterval(btcFetchRetryTimer); btcFetchRetryTimer=null; } const statusEl=document.getElementById('ws-status-btc'); if(statusEl){ statusEl.textContent='● LIVE'; statusEl.className='ws-status connected'; } updateFeedBadge('btc','ok'); updateGlobalPulse(); updateSignalUIOnly('btc'); }; btcWs.onmessage=(e)=>{ try{ const data=JSON.parse(e.data); const price=parseFloat(data.p); if(price && price>0 && !isNaN(price)){ pendingPriceData.btc=price; pendingSignalData.btc=true; throttledUpdateUI('btc'); maybeReseedHTF('btc',price); updateHTFEngine('btc',price); updateSignal('btc',price); } }catch(err){} }; btcWs.onclose=()=>{ wsStatus.btc=false; updateFeedBadge('btc','fallback'); updateGlobalPulse(); updateSignalUIOnly('btc'); const delay=Math.min(1000*Math.pow(2,btcReconnectAttempts),30000); btcReconnectAttempts++; btcReconnectTimer=setTimeout(()=>initBTCWebSocket(),delay); if(!btcFetchRetryTimer) btcFetchRetryTimer=setInterval(async ()=>{ await btcFetchRestPrice(); },3000); }; btcWs.onerror=()=>{ wsStatus.btc=false; updateFeedBadge('btc','fallback'); updateGlobalPulse(); if(!btcFetchRetryTimer) btcFetchRetryTimer=setInterval(async ()=>{ await btcFetchRestPrice(); },3000); }; }catch(err){ wsStatus.btc=false; updateFeedBadge('btc','err'); setTimeout(()=>initBTCWebSocket(),5000); } }
    
    function updateGlobalPulse(){ const pulseEl=document.getElementById('globalPulse'); if(pulseEl){ const isLive=(xauCurrentPrice>0)||wsStatus.btc; pulseEl.className=isLive?'pulse connected':'pulse disconnected'; } }
    function switchPair(){ activePairId=activePairId==='xau'?'btc':'xau'; try{ localStorage.setItem('ura_active_pair',activePairId); }catch(e){} const switchLabel=document.getElementById('switchLabel'); if(switchLabel) switchLabel.innerText=activePairId==='xau'?'XAUUSD':'BTCUSD'; document.querySelectorAll('.pair-card').forEach(card=>card.classList.remove('active')); const activeCard=document.getElementById(`card-${activePairId}`); if(activeCard) activeCard.classList.add('active'); if(navigator.vibrate) navigator.vibrate(20); }
    window.copyValue = (id, type) => { const val = document.getElementById(`${type}-${id}`)?.innerText; if(val && val !== '--'){ navigator.clipboard?.writeText(val).then(()=>showToast(`${type.toUpperCase()} copied: ${val}`)).catch(()=>showToast(`${val}`)); if(navigator.vibrate) navigator.vibrate(50); } };
    
    // BUILD CARD HTML dengan DRAW RATE di baris 1
    function buildCardHTML(id, label){ 
        const isActive=activePairId===id?'active':''; 
        const wsInitClass=id==='xau'?'connected':'disconnected'; 
        const wsInitText=id==='xau'?'● CONNECTING...':'○ RECONNECTING...'; 
        return `<div class="pair-card ${isActive}" id="card-${id}">
            <div class="card">
                <div class="card-top">
                    <div class="pair-info">
                        <span class="pair">${label}</span>
                        <div class="status-row">
                            <span id="ws-status-${id}" class="ws-status ${wsInitClass}">${wsInitText}</span>
                            <span class="feed-badge" id="feed-badge-${id}">○ INIT</span>
                        </div>
                    </div>
                    <div style="display: flex; flex-direction: column; align-items: flex-end;">
                        <span class="price" id="price-${id}">0.00</span>
                        <span class="tracker-badge" id="tracker-${id}">0</span>
                    </div>
                </div>
                <div class="signal-bar" id="signal-bar-${id}">
                    <span>SIGNAL</span>
                    <div class="signal-dot-group">
                        <div class="dot" id="l1-${id}"></div>
                        <div class="dot" id="l2-${id}"></div>
                        <div class="dot" id="l3-${id}"></div>
                    </div>
                    <span id="signal-text-${id}">IDLE</span>
                </div>
                <!-- BARIS 1: Entry | Target | Deep | DRAW RATE -->
                <div class="card-level-grid">
                    <div class="level-item" onclick="window.copyValue('${id}','entry')">
                        <span class="level-label">Entry</span>
                        <span class="level-value" id="entry-${id}">--</span>
                    </div>
                    <div class="level-item" onclick="window.copyValue('${id}','tp')">
                        <span class="level-label">Target</span>
                        <span class="level-value" id="tp-${id}" style="color:var(--success)">--</span>
                    </div>
                    <div class="level-item" onclick="window.copyValue('${id}','sl')">
                        <span class="level-label">Deep</span>
                        <span class="level-value" id="sl-${id}" style="color:var(--danger)">--</span>
                    </div>
                    <div class="level-item">
                        <span class="level-label" style="color:var(--cyan)">DRAW</span>
                        <span class="level-value draw-value" id="draw-rate-${id}">0%</span>
                    </div>
                </div>
                <!-- BARIS 2: TP HIT | RETRACE | SL HIT | WINRATE -->
                <div class="stats-grid" id="history-panel-${id}">
                    <div class="stats-item">
                        <span class="stats-label">TP HIT</span>
                        <span class="stats-value" id="stats-tp-${id}" style="color:var(--success)">0</span>
                    </div>
                    <div class="stats-item">
                        <span class="stats-label" style="color:var(--cyan)">RETRACE</span>
                        <span class="stats-value retrace-value" id="stats-retrace-${id}">0</span>
                    </div>
                    <div class="stats-item">
                        <span class="stats-label">SL HIT</span>
                        <span class="stats-value" id="stats-sl-${id}" style="color:var(--danger)">0</span>
                    </div>
                    <div class="stats-item">
                        <span class="stats-label" style="color:var(--gold)">WINRATE</span>
                        <span class="stats-value winrate-value" id="stats-winrate-${id}">0%</span>
                    </div>
                </div>
            </div>
        </div>`;
    }
    
    function init(){ 
        checkAndMigrateSchema(); 
        state.xau=loadState('xau'); 
        state.btc=loadState('btc'); 
        performanceStats.xau=loadPerformanceStats('xau'); 
        performanceStats.btc=loadPerformanceStats('btc'); 
        
        // Hitung ulang winrate & drawrate setelah load
        updateWinrateAndDrawrate('xau');
        updateWinrateAndDrawrate('btc');
        
        htfSeeded.xau=false; 
        htfSeeded.btc=false; 
        htfLiveSeedDone.xau=false; 
        htfLiveSeedDone.btc=false; 
        seedHTFData('xau',4500); 
        seedHTFData('btc',100000); 
        document.getElementById('terminals').innerHTML=buildCardHTML('xau','XAUUSD')+buildCardHTML('btc','BTCUSD'); 
        const bindTap=(el,handler)=>{ if(!el) return; let lastTap=0; const tapHandler=(e)=>{ e.preventDefault(); const now=Date.now(); if(now-lastTap<80) return; lastTap=now; handler(); }; el.addEventListener('touchstart',tapHandler,{passive:false}); el.addEventListener('click',tapHandler); }; 
        bindTap(document.getElementById('signal-bar-xau'),()=>handleSignalBarTap('xau')); 
        bindTap(document.getElementById('signal-bar-btc'),()=>handleSignalBarTap('btc')); 
        bindTap(document.getElementById('history-panel-xau'),()=>handleHistoryPanelTap('xau')); 
        bindTap(document.getElementById('history-panel-btc'),()=>handleHistoryPanelTap('btc')); 
        const switchBtn=document.getElementById('switchPairBtn'); 
        if(switchBtn){ const cleanBtn=switchBtn.cloneNode(true); switchBtn.parentNode.replaceChild(cleanBtn,switchBtn); const doSwitch=function(e){ e.preventDefault(); e.stopPropagation(); this.classList.add('btn-highlight'); setTimeout(()=>this.classList.remove('btn-highlight'),150); switchPair(); }; cleanBtn.addEventListener('click',doSwitch); cleanBtn.addEventListener('touchstart',doSwitch,{passive:false}); } 
        updateSignalUIOnly('xau'); 
        updateSignalUIOnly('btc'); 
        updatePerformanceUI('xau'); 
        updatePerformanceUI('btc'); 
        initXAUWebSocket(); 
        xauFetchRestPrice(); 
        initBTCWebSocket(); 
        btcFetchRestPrice(); 
        updateGlobalPulse(); 
        setInterval(()=>{ const now=Date.now(); if(now-xauLastHeartbeat>8000) xauFetchRestPrice(); updateGlobalPulse(); },3000); 
        setInterval(()=>{ if(!xauWs || xauWs.readyState!==WebSocket.OPEN) xauFetchRestPrice(); if(!btcWs || btcWs.readyState!==WebSocket.OPEN) btcFetchRestPrice(); },2000); 
        document.addEventListener('visibilitychange',()=>{ if(!document.hidden){ xauFetchRestPrice(); btcFetchRestPrice(); updateSignalUIOnly('xau'); updateSignalUIOnly('btc'); updateGlobalPulse(); } }); 
        
        initRunningTextForAllPairs();
    }
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init); else init();
})();
</script>
</body>
</html>

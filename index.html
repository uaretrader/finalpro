<script>
// ================================================================
//  URADVISOR PRECISION ENGINE v10.0
//  MULTI-TIMEFRAME ARCHITECTURE — Intraday 5-15 Menit
// ================================================================

(function () {
'use strict';

const LS_SCHEMA_VERSION    = 6;
const BTC_WS_URL           = 'wss://stream.binance.com:9443/ws/btcusdt@trade';
const XAU_OFFSET           = -2.4;
const CONFIRMATION_WAIT_MS = 4000;
const COOLDOWN_AFTER_SL_MS = 14000;
const RR_RATIO             = 1.8;

// Dual timeframe durations
const MACRO_DUR = { xau: 60000, btc: 60000 };
const MICRO_DUR = { xau: 15000, btc: 15000 };

const MIN_MACRO_SCORE = 58;
const MIN_MICRO_CONF  = 50;

// ── Schema Migration ─────────────────────────────────────────────
function checkAndMigrateSchema() {
    const v = parseInt(localStorage.getItem('ura_schema_ver') || '1', 10);
    if (v < LS_SCHEMA_VERSION) {
        ['xau','btc'].forEach(id => {
            localStorage.removeItem(`ura_state_${id}`);
            localStorage.removeItem(`ura_stats_${id}`);
        });
        localStorage.setItem('ura_schema_ver', String(LS_SCHEMA_VERSION));
    }
}

// ── Toast ────────────────────────────────────────────────────────
let _tt = null;
function showToast(msg) {
    const el = document.getElementById('toast');
    if (!el) return;
    el.textContent = msg;
    el.classList.add('show');
    if (_tt) clearTimeout(_tt);
    _tt = setTimeout(() => el.classList.remove('show'), 2400);
}

// ================================================================
//  INDICATOR LIBRARY
// ================================================================
function calcEMA(arr, period) {
    if (!arr || arr.length < period) return null;
    const k = 2 / (period + 1);
    let e = arr.slice(0, period).reduce((a,b) => a+b, 0) / period;
    for (let i = period; i < arr.length; i++) e = arr[i] * k + e * (1 - k);
    return e;
}

function calcRSI(closes, period = 14) {
    if (!closes || closes.length < period + 1) return null;
    const r = closes.slice(-period - 1);
    let g = 0, l = 0;
    for (let i = 1; i < r.length; i++) {
        const d = r[i] - r[i-1];
        if (d > 0) g += d; else l -= d;
    }
    const ag = g / period, al = l / period;
    if (al === 0) return 100;
    return 100 - 100 / (1 + ag / al);
}

function calcMACD(closes, fast = 12, slow = 26, sig = 9) {
    if (!closes || closes.length < slow + sig + 2) return null;
    const ef = calcEMA(closes, fast);
    const es = calcEMA(closes, slow);
    if (ef === null || es === null) return null;
    const macdLine = ef - es;
    const hist = [];
    const stride = Math.max(1, Math.floor(closes.length / 60));
    for (let i = slow; i < closes.length; i += stride) {
        const sl2 = closes.slice(0, i + 1);
        const a = calcEMA(sl2, fast);
        const b = calcEMA(sl2, slow);
        if (a !== null && b !== null) hist.push(a - b);
    }
    if (hist.length < sig) return { line: macdLine, signal: 0, hist: macdLine };
    const sigLine = calcEMA(hist, Math.min(sig, hist.length));
    return { line: macdLine, signal: sigLine, hist: macdLine - (sigLine || 0) };
}

function calcBollinger(closes, period = 20, std = 2) {
    if (!closes || closes.length < period) return null;
    const sl = closes.slice(-period);
    const mean = sl.reduce((a,b) => a+b, 0) / period;
    const sd = Math.sqrt(sl.reduce((a,b) => a + (b - mean) ** 2, 0) / period);
    return { upper: mean + std * sd, lower: mean - std * sd, mid: mean, width: 2 * std * sd };
}

function calcVWAP(candles) {
    if (!candles || candles.length < 5) return null;
    const sl = candles.slice(-Math.min(90, candles.length));
    let cumTP = 0, cumV = 0;
    for (const c of sl) {
        const tp = (c.high + c.low + c.close) / 3;
        cumTP += tp * c.volume;
        cumV  += c.volume;
    }
    return cumV > 0 ? cumTP / cumV : null;
}

function calcATR(candles, period = 14) {
    if (!candles || candles.length < period + 1) return null;
    const trs = [];
    for (let i = 1; i < candles.length; i++) {
        trs.push(Math.max(
            candles[i].high - candles[i].low,
            Math.abs(candles[i].high - candles[i-1].close),
            Math.abs(candles[i].low  - candles[i-1].close)
        ));
    }
    return trs.slice(-period).reduce((a,b) => a+b, 0) / period;
}

function calcADX(candles, period = 14) {
    if (!candles || candles.length < period * 2 + 1) return null;
    const c = candles.slice(-(period * 2 + 2));
    const dmPlus = [], dmMinus = [], tr = [];
    for (let i = 1; i < c.length; i++) {
        const upMove   = c[i].high  - c[i-1].high;
        const downMove = c[i-1].low - c[i].low;
        dmPlus.push(upMove > downMove && upMove > 0 ? upMove : 0);
        dmMinus.push(downMove > upMove && downMove > 0 ? downMove : 0);
        tr.push(Math.max(
            c[i].high - c[i].low,
            Math.abs(c[i].high - c[i-1].close),
            Math.abs(c[i].low  - c[i-1].close)
        ));
    }
    let atr14 = tr.slice(0, period).reduce((a,b) => a+b, 0);
    let pdm14  = dmPlus.slice(0, period).reduce((a,b) => a+b, 0);
    let mdm14  = dmMinus.slice(0, period).reduce((a,b) => a+b, 0);
    const dxArr = [];
    const push = () => {
        const pDI = atr14 > 0 ? (pdm14 / atr14) * 100 : 0;
        const mDI = atr14 > 0 ? (mdm14 / atr14) * 100 : 0;
        dxArr.push((pDI + mDI) > 0 ? Math.abs(pDI - mDI) / (pDI + mDI) * 100 : 0);
    };
    push();
    for (let i = period; i < tr.length; i++) {
        atr14 = atr14 - (atr14 / period) + tr[i];
        pdm14  = pdm14  - (pdm14  / period) + dmPlus[i];
        mdm14  = mdm14  - (mdm14  / period) + dmMinus[i];
        push();
    }
    if (dxArr.length < period) return null;
    return dxArr.slice(-period).reduce((a,b) => a+b, 0) / period;
}

function detectVolSpike(candles, lb = 10) {
    if (!candles || candles.length < lb + 1) return false;
    const avg = candles.slice(-lb - 1, -1).reduce((a,c) => a + c.volume, 0) / lb;
    return candles[candles.length - 1].volume > avg * 1.65;
}

// ================================================================
//  MACRO BIAS SCORER
// ================================================================
function scoreMacroBias(id, price, macroCandles) {
    if (!macroCandles || macroCandles.length < 30) {
        return { bias: 'NEUTRAL', score: 0, zone: null, atr: null, adx: null, factors: {} };
    }

    const closes = macroCandles.map(c => c.close);
    const atr    = calcATR(macroCandles, 14) || (id === 'xau' ? 3.5 : 350);
    const adx    = calcADX(macroCandles, 14);
    const ema9   = calcEMA(closes, 9);
    const ema21  = calcEMA(closes, 21);
    const ema50  = calcEMA(closes, Math.min(50, closes.length - 1));
    const macd   = calcMACD(closes);
    const vwap   = calcVWAP(macroCandles);
    const bb     = calcBollinger(closes, 20, 2);

    const half   = Math.floor(macroCandles.length / 2);
    const first  = macroCandles.slice(0, half);
    const second = macroCandles.slice(half);
    const fH = Math.max(...first.map(c => c.high));
    const fL  = Math.min(...first.map(c => c.low));
    const sH = Math.max(...second.map(c => c.high));
    const sL  = Math.min(...second.map(c => c.low));
    const structure = (sH > fH && sL > fL) ? 'BULLISH' : (sH < fH && sL < fL) ? 'BEARISH' : 'UNCLEAR';

    const f = {};
    let bull = 0, bear = 0;

    f.adx = adx ? adx.toFixed(1) : null;
    const adxClass = !adx ? 'UNKNOWN' : adx < 15 ? 'DEAD' : adx < 22 ? 'WEAK' : adx < 30 ? 'MILD' : 'STRONG';
    f.adx_class = adxClass;

    if (adxClass === 'DEAD') {
        return { bias: 'NEUTRAL', score: 0, zone: null, atr, adx, factors: f };
    }
    const adxW = adxClass === 'WEAK' ? 0.6 : adxClass === 'MILD' ? 0.85 : 1.0;

    if (ema9 && ema21) {
        f.ema_cross = ema9 > ema21 ? 'BULL' : 'BEAR';
        ema9 > ema21 ? bull += 28 : bear += 28;
    }

    if (ema50) {
        const tol = atr * 0.1;
        if (price > ema50 + tol)      { bull += 12; f.ema50 = 'ABOVE'; }
        else if (price < ema50 - tol) { bear += 12; f.ema50 = 'BELOW'; }
        else f.ema50 = 'AT';
    }

    let macdDir = 'NEUTRAL';
    if (macd) {
        f.macd_sig = macd.hist > 0 && macd.line > 0 ? 'BULL' :
                     macd.hist > 0                   ? 'BULL_X' :
                     macd.hist < 0 && macd.line < 0  ? 'BEAR' :
                     macd.hist < 0                   ? 'BEAR_X' : 'FLAT';
        if (f.macd_sig.startsWith('BULL')) { bull += 18; macdDir = 'BULL'; }
        else if (f.macd_sig.startsWith('BEAR')) { bear += 18; macdDir = 'BEAR'; }
    }

    let vwapDir = 'NEUTRAL';
    if (vwap) {
        const tol = atr * 0.12;
        f.vwap = price > vwap + tol ? 'ABOVE' : price < vwap - tol ? 'BELOW' : 'AT';
        if (f.vwap === 'ABOVE') { bull += 18; vwapDir = 'BULL'; }
        else if (f.vwap === 'BELOW') { bear += 18; vwapDir = 'BEAR'; }
    }

    f.structure = structure;
    if (structure === 'BULLISH') bull += 14;
    else if (structure === 'BEARISH') bear += 14;
    else { bull = Math.round(bull * 0.88); bear = Math.round(bear * 0.88); }

    if (bb) {
        const bwPct = bb.width / bb.mid;
        f.bb_squeeze = bwPct < (id === 'xau' ? 0.004 : 0.006);
        if (f.bb_squeeze) {
            bull = Math.round(bull * 0.75);
            bear = Math.round(bear * 0.75);
            f.squeeze_warn = true;
        }
    }

    let conflict = 0;
    const emaBias = ema9 && ema21 ? (ema9 > ema21 ? 'BULL' : 'BEAR') : 'NEUTRAL';
    if (emaBias === 'BULL' && macdDir === 'BEAR') conflict += 12;
    if (emaBias === 'BEAR' && macdDir === 'BULL') conflict += 12;
    if (vwapDir === 'BULL' && structure === 'BEARISH') conflict += 10;
    if (vwapDir === 'BEAR' && structure === 'BULLISH') conflict += 10;
    if (emaBias === 'BULL' && vwapDir === 'BEAR') conflict += 8;
    if (emaBias === 'BEAR' && vwapDir === 'BULL') conflict += 8;
    f.conflict = conflict;

    if (conflict >= 22) {
        return { bias: 'NEUTRAL', score: 0, zone: null, atr, adx, factors: f };
    }

    bull = Math.round(bull * adxW) - (bull > bear ? conflict : 0);
    bear = Math.round(bear * adxW) - (bear > bull ? conflict : 0);
    bull = Math.max(0, bull);
    bear = Math.max(0, bear);

    const diff = Math.abs(bull - bear);
    let bias = 'NEUTRAL';
    let score = 0;

    if (bull > bear && diff >= 10) {
        bias  = 'BULL';
        score = Math.min(100, Math.round(bull * 1.1));
    } else if (bear > bull && diff >= 10) {
        bias  = 'BEAR';
        score = Math.min(100, Math.round(bear * 1.1));
    } else {
        score = Math.round(Math.max(bull, bear) * 0.5);
    }

    if (bias === 'BULL') {
        if (emaBias !== 'BULL' || macdDir !== 'BULL' || vwapDir !== 'BULL') {
            f.triple_fail = true;
            bias  = 'NEUTRAL';
            score = Math.round(score * 0.5);
        }
    } else if (bias === 'BEAR') {
        if (emaBias !== 'BEAR' || macdDir !== 'BEAR' || vwapDir !== 'BEAR') {
            f.triple_fail = true;
            bias  = 'NEUTRAL';
            score = Math.round(score * 0.5);
        }
    }

    let zone = null;
    if (bias !== 'NEUTRAL' && ema21 && vwap) {
        if (bias === 'BULL') {
            const zoneHigh = Math.max(ema21, vwap) + atr * 0.15;
            const zoneLow  = Math.min(ema21, vwap) - atr * 0.3;
            zone = { high: zoneHigh, low: zoneLow, mid: (ema21 + vwap) / 2, type: 'SUPPORT' };
        } else {
            const zoneHigh = Math.max(ema21, vwap) + atr * 0.3;
            const zoneLow  = Math.min(ema21, vwap) - atr * 0.15;
            zone = { high: zoneHigh, low: zoneLow, mid: (ema21 + vwap) / 2, type: 'RESISTANCE' };
        }
    }

    f.ema21_val = ema21 ? ema21.toFixed(2) : null;
    f.vwap_val  = vwap  ? vwap.toFixed(2)  : null;

    return { bias, score, zone, atr, adx, vwap, ema21, factors: f };
}

// ================================================================
//  MICRO PULLBACK SCORER
// ================================================================
function scoreMicroPullback(id, price, microCandles, macroBias, macroZone, macroATR) {
    if (!microCandles || microCandles.length < 8) {
        return { confirmed: false, score: 0, rejection: false, factors: {} };
    }

    const closes  = microCandles.map(c => c.close);
    const rsi     = calcRSI(closes, 9);
    const macd    = calcMACD(closes, 6, 13, 5);
    const volSpike = detectVolSpike(microCandles, 8);
    const atr     = calcATR(microCandles, 8) || macroATR * 0.3;

    const f = {};
    let score = 0;

    if (rsi !== null) {
        f.rsi = rsi.toFixed(1);
        if (macroBias === 'BULL') {
            if (rsi < 35)       { score += 28; f.rsi_sig = 'OVS'; }
            else if (rsi < 45)  { score += 18; f.rsi_sig = 'LOW'; }
            else if (rsi > 65)  { score -= 15; f.rsi_sig = 'HIGH_WARN'; }
            else f.rsi_sig = 'MID';
        } else if (macroBias === 'BEAR') {
            if (rsi > 65)       { score += 28; f.rsi_sig = 'OVB'; }
            else if (rsi > 55)  { score += 18; f.rsi_sig = 'HIGH'; }
            else if (rsi < 35)  { score -= 15; f.rsi_sig = 'LOW_WARN'; }
            else f.rsi_sig = 'MID';
        }
    }

    if (macd) {
        f.macd_micro = macd.hist.toFixed(5);
        if (macroBias === 'BULL') {
            if (macd.hist > 0)       { score += 22; f.macd_micro_sig = 'TURNING_BULL'; }
            else if (macd.hist > -0.0001 * (id === 'xau' ? 1 : 100)) { score += 10; f.macd_micro_sig = 'NEAR_CROSS'; }
            else                     { score += 5;  f.macd_micro_sig = 'STILL_BEAR'; }
        } else if (macroBias === 'BEAR') {
            if (macd.hist < 0)       { score += 22; f.macd_micro_sig = 'TURNING_BEAR'; }
            else if (macd.hist < 0.0001 * (id === 'xau' ? 1 : 100)) { score += 10; f.macd_micro_sig = 'NEAR_CROSS'; }
            else                     { score += 5;  f.macd_micro_sig = 'STILL_BULL'; }
        }
    }

    let rejection = false;
    if (microCandles.length >= 3) {
        const last3 = microCandles.slice(-3);
        if (macroBias === 'BULL') {
            const c = last3[last3.length - 1];
            const c2 = last3[last3.length - 2];
            const bullRej = c.close > c.open &&
                            c.close > c2.close &&
                            (c.close - c.low) > (c.high - c.close) * 0.6;
            if (bullRej) { rejection = true; score += 30; f.rejection = 'BULL_REJ'; }
        } else if (macroBias === 'BEAR') {
            const c = last3[last3.length - 1];
            const c2 = last3[last3.length - 2];
            const bearRej = c.close < c.open &&
                            c.close < c2.close &&
                            (c.high - c.close) > (c.close - c.low) * 0.6;
            if (bearRej) { rejection = true; score += 30; f.rejection = 'BEAR_REJ'; }
        }
    }

    f.vol_spike = volSpike;
    if (volSpike) { score += 20; }

    if (macroZone) {
        const distToMid = Math.abs(price - macroZone.mid);
        const inZone = price >= macroZone.low && price <= macroZone.high;
        f.in_zone = inZone;
        f.zone_dist = distToMid.toFixed(2);
        if (inZone) {
            score += 18;
            if (distToMid < macroATR * 0.25) score += 8;
        }
    }

    f.micro_score = score;
    const confirmed = score >= MIN_MICRO_CONF;
    return { confirmed, score, rejection, factors: f };
}

// ================================================================
//  STATE MANAGEMENT
// ================================================================
function createFreshState() {
    return {
        v: LS_SCHEMA_VERSION,
        lastPrice: 0,
        l1: false, l2: false, l3: false,
        confirmed: false, confirmedAt: 0,
        resetInProgress: false,
        warmupUntil: 0,
        cooldownUntil: 0,
        type: 'none', entry: 0, sl: 0, tp: 0,
        tempHigh: 0, tempLow: 0,
        originPrice: 0, retracePct: 0,
        confluenceScore: 0,
        macroBias: 'NEUTRAL',
        macroScore: 0,
        pullbackWaiting: false,
        pullbackZone: null,
        inZoneSince: 0,
    };
}

function loadState(id) {
    try {
        const r = localStorage.getItem(`ura_state_${id}`);
        return r ? Object.assign(createFreshState(), JSON.parse(r)) : createFreshState();
    } catch(e) { return createFreshState(); }
}

function createDefaultStats() {
    return { tpHits: 0, retraceResets: 0, slHits: 0, total: 0, winrate: 0.0, drawrate: 0.0 };
}

function loadPerformanceStats(id) {
    try {
        const r = localStorage.getItem(`ura_stats_${id}`);
        return r ? Object.assign(createDefaultStats(), JSON.parse(r)) : createDefaultStats();
    } catch(e) { return createDefaultStats(); }
}

function savePerformanceStats(id) {
    try { localStorage.setItem(`ura_stats_${id}`, JSON.stringify(performanceStats[id])); } catch(e) {}
}

function updateWinrateAndDrawrate(id) {
    const s = performanceStats[id];
    s.total = s.tpHits + s.retraceResets + s.slHits;
    const wd = s.tpHits + s.slHits;
    s.winrate  = wd > 0    ? parseFloat(((s.tpHits / wd) * 100).toFixed(1)) : 0.0;
    s.drawrate = s.total > 0 ? parseFloat(((s.retraceResets / s.total) * 100).toFixed(1)) : 0.0;
}

function recordSignalResult(id, type) {
    const s = performanceStats[id];
    if (type === 'tp') s.tpHits++;
    else if (type === 'retrace') s.retraceResets++;
    else if (type === 'sl') s.slHits++;
    updateWinrateAndDrawrate(id);
    savePerformanceStats(id);
    updatePerformanceUI(id);
}

// ================================================================
//  GLOBAL STATE
// ================================================================
let state             = { xau: null, btc: null };
let wsStatus          = { xau: false, btc: false };
let activePairId      = localStorage.getItem('ura_active_pair') || 'xau';
let performanceStats  = {};
let pendingConfirmation = { xau: null, btc: null };
let tapCounters       = { xau: 0, btc: 0 };
let tapTimers         = { xau: null, btc: null };
let historyTapCounters = { xau: 0, btc: 0 };
let historyTapTimers  = { xau: null, btc: null };
const TAP_TIMEOUT     = 500;
let pendingPriceData  = { xau: null, btc: null };
let pendingSignalData = { xau: false, btc: false };
let rafPending        = { xau: false, btc: false };
let pendingSaveData   = { xau: null, btc: null };
let pendingSaveTimer  = { xau: null, btc: null };
const SAVE_INTERVAL   = 1000;
let signalDebounceTimer = { xau: null, btc: null };
const SIGNAL_DEBOUNCE_MS = 15;

// ================================================================
//  DUAL TIMEFRAME CANDLE ENGINE
// ================================================================
let marketData = {
    xau: {
        macro: { candles: [], currentCandle: null, candleStart: 0 },
        micro: { candles: [], currentCandle: null, candleStart: 0 },
        atr: 0, price: 0,
        lastMacroBias: null,
        lastMacroAt: 0,
    },
    btc: {
        macro: { candles: [], currentCandle: null, candleStart: 0 },
        micro: { candles: [], currentCandle: null, candleStart: 0 },
        atr: 0, price: 0,
        lastMacroBias: null,
        lastMacroAt: 0,
    }
};

function buildDualCandle(id, price) {
    const md  = marketData[id];
    const now = Date.now();

    const mac = md.macro;
    if (!mac.currentCandle || (now - mac.candleStart) >= MACRO_DUR[id]) {
        if (mac.currentCandle) {
            mac.currentCandle.closed = true;
            mac.candles.push({ ...mac.currentCandle });
            if (mac.candles.length > 120) mac.candles.shift();
        }
        mac.currentCandle = { open: price, high: price, low: price, close: price, volume: 1, closed: false };
        mac.candleStart = now;
    } else {
        mac.currentCandle.high   = Math.max(mac.currentCandle.high, price);
        mac.currentCandle.low    = Math.min(mac.currentCandle.low,  price);
        mac.currentCandle.close  = price;
        mac.currentCandle.volume++;
    }

    const mic = md.micro;
    if (!mic.currentCandle || (now - mic.candleStart) >= MICRO_DUR[id]) {
        if (mic.currentCandle) {
            mic.currentCandle.closed = true;
            mic.candles.push({ ...mic.currentCandle });
            if (mic.candles.length > 80) mic.candles.shift();
        }
        mic.currentCandle = { open: price, high: price, low: price, close: price, volume: 1, closed: false };
        mic.candleStart = now;
    } else {
        mic.currentCandle.high   = Math.max(mic.currentCandle.high, price);
        mic.currentCandle.low    = Math.min(mic.currentCandle.low,  price);
        mic.currentCandle.close  = price;
        mic.currentCandle.volume++;
    }

    md.price = price;
    const macClosed = md.macro.candles.filter(c => c.closed);
    if (macClosed.length >= 5) {
        md.atr = calcATR(macClosed, 14) || md.atr;
    }
}

function getMacroCandles(id) { return marketData[id].macro.candles.filter(c => c.closed); }
function getMicroCandles(id) { return marketData[id].micro.candles.filter(c => c.closed); }

function seedCandles(id, base) {
    const md   = marketData[id];
    const step = id === 'xau' ? 1.2 : 120;

    md.macro.candles = [];
    for (let i = 0; i < 90; i++) {
        const noise = (Math.random() - 0.5) * step * 0.6;
        const open  = base + (i - 45) * step * 0.015 + noise;
        const close = open + (Math.random() - 0.48) * step * 0.12;
        const hi    = Math.max(open, close) + Math.random() * step * 0.06;
        const lo    = Math.min(open, close) - Math.random() * step * 0.06;
        md.macro.candles.push({ open, high: hi, low: lo, close, volume: 80 + Math.floor(Math.random() * 120), closed: true });
    }

    md.micro.candles = [];
    for (let i = 0; i < 40; i++) {
        const noise = (Math.random() - 0.5) * step * 0.15;
        const open  = base + noise;
        const close = open + (Math.random() - 0.48) * step * 0.04;
        const hi    = Math.max(open, close) + Math.random() * step * 0.02;
        const lo    = Math.min(open, close) - Math.random() * step * 0.02;
        md.micro.candles.push({ open, high: hi, low: lo, close, volume: 20 + Math.floor(Math.random() * 40), closed: true });
    }
}

// ================================================================
//  EXECUTE LOCK SIGNAL
// ================================================================
function executeLockSignal(id, direction, livePrice, macroResult, microResult) {
    const s = state[id];
    const entry = livePrice > 0 ? livePrice : (s.lastPrice || 0);
    if (entry <= 0) return;

    const atr   = macroResult.atr || marketData[id].atr || (id === 'xau' ? 3.5 : 350);
    const zone  = macroResult.zone;

    let slD;
    if (zone) {
        if (direction === 'buy') {
            slD = Math.abs(entry - zone.low) + atr * 0.4;
        } else {
            slD = Math.abs(zone.high - entry) + atr * 0.4;
        }
    } else {
        slD = atr * 1.2;
    }

    slD = Math.max(slD, id === 'xau' ? 8 : 145);
    const tpD = slD * RR_RATIO;

    s.l3 = true; s.confirmed = true; s.confirmedAt = Date.now();
    s.warmupUntil = Date.now() + 3000;
    s.type = direction; s.entry = entry; s.originPrice = entry;
    s.tempHigh = entry; s.tempLow = entry;
    s.retracePct = 0;
    s.confluenceScore = Math.round((macroResult.score + (microResult?.score || 0)) / 2);
    s.macroBias = macroResult.bias;
    s.pullbackWaiting = false;
    s.pullbackZone = null;

    if (direction === 'buy') {
        s.sl = entry - slD;
        s.tp = entry + tpD;
    } else {
        s.sl = entry + slD;
        s.tp = entry - tpD;
    }

    throttledSaveState(id);
    pendingSignalData[id] = true;
    throttledUpdateUI(id);
    document.getElementById(`signal-bar-${id}`)?.classList.remove('confirm-wait');
    if (navigator.vibrate) navigator.vibrate([50, 30, 50]);

    const regime = macroResult.factors.adx_class || 'N/A';
    showToast(`${id.toUpperCase()} ${direction.toUpperCase()} @ ${entry.toFixed(2)} | ADX:${regime} | SL:${slD.toFixed(1)}`);
}

// ================================================================
//  SIGNAL ENGINE — CORE (MTF FLOW)
// ================================================================
function processSignal(id, price) {
    const s = state[id];
    if (!s) return;
    if (Date.now() < (s.cooldownUntil || 0)) return;

    buildDualCandle(id, price);

    if (s.confirmed && s.type !== 'none') {
        if (!s.tempHigh || s.tempHigh === 0) { s.tempHigh = s.entry; s.tempLow = s.entry; }
        if (price > s.tempHigh) s.tempHigh = price;
        if (price < s.tempLow)  s.tempLow  = price;
        updateTracker(id, price);

        const hitTP = (s.type === 'buy'  && price >= s.tp) || (s.type === 'sell' && price <= s.tp);
        const hitSL = (s.type === 'buy'  && price <= s.sl) || (s.type === 'sell' && price >= s.sl);

        if (hitTP) { recordSignalResult(id, 'tp'); resetSignal(id); return; }
        if (hitSL) {
            state[id].cooldownUntil = Date.now() + COOLDOWN_AFTER_SL_MS;
            recordSignalResult(id, 'sl');
            resetSignal(id);
            return;
        }

        const buf = id === 'xau' ? 7.5 : 120;
        if (s.type === 'buy'  && price <= (s.entry - buf) && Date.now() > (s.warmupUntil || 0)) { recordSignalResult(id, 'retrace'); resetSignal(id); return; }
        if (s.type === 'sell' && price >= (s.entry + buf) && Date.now() > (s.warmupUntil || 0)) { recordSignalResult(id, 'retrace'); resetSignal(id); return; }
        return;
    }

    if (pendingConfirmation[id]) { s.lastPrice = price; return; }

    const macroCandles = getMacroCandles(id);
    const microCandles = getMicroCandles(id);

    if (macroCandles.length < 30) { s.lastPrice = price; return; }

    const now = Date.now();
    const macroAge = now - (marketData[id].lastMacroAt || 0);
    let macroResult = marketData[id].lastMacroBias;

    if (!macroResult || macroAge > 15000) {
        macroResult = scoreMacroBias(id, price, macroCandles);
        marketData[id].lastMacroBias = macroResult;
        marketData[id].lastMacroAt   = now;
        updateEngineBadges(id, macroResult);
        updateConfluenceBar(id, macroResult.score);
    }

    if (macroResult.bias === 'NEUTRAL' || macroResult.score < MIN_MACRO_SCORE) {
        if (s.l1 && s.macroBias && s.macroBias !== 'NEUTRAL' &&
            macroResult.bias !== 'NEUTRAL' && macroResult.bias !== s.macroBias) {
            resetSignal(id);
        }
        s.lastPrice = price;
        if (s.l1) { s.l1 = false; pendingSignalData[id] = true; throttledUpdateUI(id); }
        return;
    }

    if (s.macroBias && s.macroBias !== 'NEUTRAL' && s.macroBias !== macroResult.bias) {
        resetSignal(id);
        s.lastPrice = price;
        return;
    }

    if (!s.l1) {
        s.l1 = true;
        s.macroBias = macroResult.bias;
        s.pullbackWaiting = true;
        s.pullbackZone = macroResult.zone;
        s.type = macroResult.bias === 'BULL' ? 'buy' : 'sell';
        pendingSignalData[id] = true;
        throttledUpdateUI(id);
        throttledSaveState(id);
    }

    const zone = macroResult.zone || s.pullbackZone;
    if (!zone) { s.lastPrice = price; return; }

    const inZone = price >= zone.low && price <= zone.high;

    if (!inZone) {
        const distFromZone = macroResult.bias === 'BULL'
            ? price - zone.high
            : zone.low - price;

        if (distFromZone > macroResult.atr * 3.5) {
            if (s.l1 || s.l2) { resetSignal(id); }
        }
        s.lastPrice = price;
        return;
    }

    if (s.inZoneSince === 0) s.inZoneSince = now;

    if (s.l1 && !s.l2) {
        s.l2 = true;
        pendingSignalData[id] = true;
        throttledUpdateUI(id);
        throttledSaveState(id);
    }

    if (microCandles.length < 8) { s.lastPrice = price; return; }

    const microResult = scoreMicroPullback(
        id, price, microCandles,
        macroResult.bias, zone, macroResult.atr
    );

    if (s.l2 && !s.l3 && microResult.confirmed) {
        s.l3 = true;
        pendingSignalData[id] = true;
        throttledUpdateUI(id);
        throttledSaveState(id);
        startConfirmationDelay(id, macroResult.bias === 'BULL' ? 'buy' : 'sell', price, macroResult, microResult);
        return;
    }

    s.lastPrice = price;
    throttledSaveState(id);
}

function updateSignal(id, price) {
    if (signalDebounceTimer[id]) clearTimeout(signalDebounceTimer[id]);
    signalDebounceTimer[id] = setTimeout(() => {
        processSignal(id, price);
        signalDebounceTimer[id] = null;
    }, SIGNAL_DEBOUNCE_MS);
}

function startConfirmationDelay(id, direction, entryPrice, macroResult, microResult) {
    if (pendingConfirmation[id]) cancelPendingConfirmation(id);
    pendingConfirmation[id] = { direction, entryPrice, macroResult, microResult };
    const sb = document.getElementById(`signal-bar-${id}`);
    if (sb) sb.classList.add('confirm-wait');
    document.getElementById(`l3-${id}`)?.classList.add('confirm-pending');
    updateSignalUIOnly(id);

    pendingConfirmation[id].timerId = setTimeout(() => {
        if (!pendingConfirmation[id]) return;

        const macroCandles = getMacroCandles(id);
        const microCandles = getMicroCandles(id);
        const lp = id === 'xau' ? xauCurrentPrice : (marketData[id].price || state[id].lastPrice || 0);

        const cf2 = macroCandles.length >= 30 ? scoreMacroBias(id, lp, macroCandles) : { bias: 'NEUTRAL', score: 0 };
        const dirBias = direction === 'buy' ? 'BULL' : 'BEAR';

        const zone = macroResult.zone || state[id].pullbackZone;
        const mc2  = microCandles.length >= 8
            ? scoreMicroPullback(id, lp, microCandles, dirBias, zone, macroResult.atr)
            : { confirmed: false, score: 0 };

        const macroStillValid = cf2.bias === dirBias && cf2.score >= MIN_MACRO_SCORE;
        const microStillValid = mc2.confirmed || mc2.score >= MIN_MICRO_CONF * 0.8;
        const stillInZone     = zone ? (lp >= zone.low && lp <= zone.high) : true;

        if (macroStillValid && (microStillValid || stillInZone)) {
            executeLockSignal(id, direction, lp, cf2, mc2);
        } else {
            resetSignal(id);
            const st = document.getElementById(`signal-text-${id}`);
            if (st) {
                st.innerText = 'REJECT';
                st.style.color = 'var(--danger)';
                setTimeout(() => updateSignalUIOnly(id), 1800);
            }
        }
        pendingConfirmation[id] = null;
    }, CONFIRMATION_WAIT_MS);
}

function cancelPendingConfirmation(id) {
    if (!pendingConfirmation[id]) return;
    if (pendingConfirmation[id].timerId) clearTimeout(pendingConfirmation[id].timerId);
    pendingConfirmation[id] = null;
    document.getElementById(`signal-bar-${id}`)?.classList.remove('confirm-wait');
    updateSignalUIOnly(id);
}

function resetSignal(id) {
    const s = state[id]; if (!s || s.resetInProgress) return;
    s.resetInProgress = true;
    if (pendingConfirmation[id]) cancelPendingConfirmation(id);
    if (signalDebounceTimer[id]) { clearTimeout(signalDebounceTimer[id]); signalDebounceTimer[id] = null; }
    marketData[id].lastMacroBias = null;
    marketData[id].lastMacroAt   = 0;
    const kept = { lastPrice: s.lastPrice, cooldownUntil: s.cooldownUntil || 0 };
    Object.assign(s, createFreshState(), kept);
    pendingSignalData[id] = true;
    updateSignalUIOnly(id);
    const t = document.getElementById(`tracker-${id}`);
    if (t) t.innerText = '0';
    throttledSaveState(id);
    throttledUpdateUI(id);
    requestAnimationFrame(() => { s.resetInProgress = false; });
    setTimeout(() => { s.resetInProgress = false; }, 300);
}

// ================================================================
//  UI FUNCTIONS
// ================================================================
function throttledSaveState(id) {
    const s = state[id]; if (!s) return;
    pendingSaveData[id] = { ...s };
    if (pendingSaveTimer[id]) return;
    pendingSaveTimer[id] = setTimeout(() => {
        if (pendingSaveData[id]) {
            try { localStorage.setItem(`ura_state_${id}`, JSON.stringify(pendingSaveData[id])); } catch(e) {}
            pendingSaveData[id] = null;
        }
        pendingSaveTimer[id] = null;
    }, SAVE_INTERVAL);
}

function throttledUpdateUI(id) {
    if (!rafPending[id]) {
        rafPending[id] = true;
        requestAnimationFrame(() => {
            const p = pendingPriceData[id];
            if (p !== null) { updatePriceDisplayOnly(id, p); pendingPriceData[id] = null; }
            if (pendingSignalData[id]) { updateSignalUIOnly(id); pendingSignalData[id] = false; }
            rafPending[id] = false;
        });
    }
}

function updatePriceDisplayOnly(id, price) {
    const el = document.getElementById(`price-${id}`); if (!el) return;
    const prev = parseFloat(el.dataset.prev || '0');
    el.innerText = price.toFixed(2); el.dataset.prev = price;
    if (prev !== 0 && prev !== price) {
        el.style.color = price > prev ? 'var(--success)' : 'var(--danger)';
        clearTimeout(el._ct);
        el._ct = setTimeout(() => { el.style.color = ''; }, 280);
    }
    if (state[id]) updateTracker(id, price);
}

function updateTracker(id, price) {
    const s = state[id]; const t = document.getElementById(`tracker-${id}`);
    if (!s || !s.confirmed || s.type === 'none' || s.entry <= 0) {
        if (t) { t.innerText = '0'; t.style.color = ''; }
        return;
    }
    const dist = s.type === 'buy' ? price - s.entry : s.entry - price;
    if (t) {
        t.innerText = (Math.round(dist * 100) / 100).toFixed(2);
        t.style.color = dist >= 0 ? 'var(--emerald)' : 'var(--crimson)';
    }
}

function updateSignalUIOnly(id) {
    const s = state[id]; if (!s) return;
    const setDot = (eid, on, type) => {
        const el = document.getElementById(eid); if (!el) return;
        if (!on) el.className = 'dot';
        else if (pendingConfirmation[id] && eid === `l3-${id}` && !s.confirmed) el.className = 'dot confirm-pending';
        else el.className = type === 'sell' ? 'dot active-down' : 'dot active';
    };
    setDot(`l1-${id}`, s.l1, s.type);
    setDot(`l2-${id}`, s.l2, s.type);
    setDot(`l3-${id}`, s.l3, s.type);

    const st = document.getElementById(`signal-text-${id}`);
    if (st) {
        if (!wsStatus[id] && id === 'btc') { st.innerText = 'NO FEED'; st.style.color = 'var(--danger)'; }
        else if (pendingConfirmation[id] && s.l3 && !s.confirmed) { st.innerText = 'CONFIRM...'; st.style.color = 'var(--gold)'; }
        else if (s.confirmed) { st.innerText = s.type.toUpperCase(); st.style.color = s.type === 'buy' ? 'var(--success)' : 'var(--danger)'; }
        else if (s.l3) { st.innerText = 'ENTRY'; st.style.color = 'var(--accent)'; }
        else if (s.l2) { st.innerText = 'ZONE'; st.style.color = 'var(--accent)'; }
        else if (s.l1) { st.innerText = s.macroBias || 'BIAS'; st.style.color = s.macroBias === 'BULL' ? 'var(--emerald)' : s.macroBias === 'BEAR' ? 'var(--crimson)' : 'var(--amber)'; }
        else { st.innerText = 'IDLE'; st.style.color = 'var(--text-dim)'; }
    }

    const eEl = document.getElementById(`entry-${id}`); if (eEl) eEl.innerText = s.confirmed ? s.entry.toFixed(2) : '--';
    const tEl = document.getElementById(`tp-${id}`);    if (tEl) tEl.innerText = s.confirmed ? s.tp.toFixed(2) : '--';
    const sEl = document.getElementById(`sl-${id}`);    if (sEl) sEl.innerText = s.confirmed ? s.sl.toFixed(2) : '--';
}

function updateEngineBadges(id, macro) {
    const f = macro.factors || {};
    const bias = macro.bias;

    const badges = [
        { id: `eb-rsi-${id}`, val: 'MACRO', cls: bias === 'BULL' ? 'bull' : bias === 'BEAR' ? 'bear' : 'off' },
        { id: `eb-macd-${id}`, val: f.macd_sig || 'MACD', cls: (f.macd_sig||'').startsWith('BULL') ? 'bull' : (f.macd_sig||'').startsWith('BEAR') ? 'bear' : 'neutral' },
        { id: `eb-ema-${id}`, val: f.ema_cross || 'EMA', cls: f.ema_cross === 'BULL' ? 'bull' : f.ema_cross === 'BEAR' ? 'bear' : 'off' },
        { id: `eb-vwap-${id}`, val: f.vwap || 'VWAP', cls: f.vwap === 'ABOVE' ? 'bull' : f.vwap === 'BELOW' ? 'bear' : 'neutral' },
        { id: `eb-bb-${id}`, val: f.squeeze_warn ? 'SQZ' : (f.ema50 || 'EMA50'), cls: f.squeeze_warn ? 'active' : f.ema50 === 'ABOVE' ? 'bull' : f.ema50 === 'BELOW' ? 'bear' : 'neutral' },
        { id: `eb-choch-${id}`, val: f.structure || 'STR', cls: f.structure === 'BULLISH' ? 'bull' : f.structure === 'BEARISH' ? 'bear' : 'off' },
        { id: `eb-vol-${id}`, val: f.adx_class ? `ADX:${f.adx_class.slice(0,3)}` : 'ADX', cls: f.adx_class === 'STRONG' || f.adx_class === 'MILD' ? 'bull' : f.adx_class === 'WEAK' ? 'neutral' : f.adx_class === 'DEAD' ? 'bear' : 'off' },
    ];

    for (const b of badges) {
        const el = document.getElementById(b.id);
        if (el) { el.className = `ebadge ${b.cls}`; el.textContent = b.val; }
    }

    const sc = document.getElementById(`eb-score-${id}`);
    if (sc) {
        const s = Math.round(macro.score);
        sc.textContent = `CF:${s}`;
        sc.className   = 'ebadge score';
        sc.style.color = s >= MIN_MACRO_SCORE ? 'var(--emerald)' : s >= MIN_MACRO_SCORE * 0.7 ? 'var(--gold)' : 'var(--text-dim)';
    }
}

function updateConfluenceBar(id, score) {
    const fill = document.getElementById(`cf-fill-${id}`);
    const txt  = document.getElementById(`cf-txt-${id}`);
    if (!fill || !txt) return;
    const pct = Math.min(100, Math.max(0, score));
    fill.style.width      = pct + '%';
    fill.style.background = pct >= MIN_MACRO_SCORE ? 'var(--emerald)' : pct >= MIN_MACRO_SCORE * 0.7 ? 'var(--gold)' : 'var(--crimson)';
    txt.textContent       = Math.round(pct);
    txt.style.color       = pct >= MIN_MACRO_SCORE ? 'var(--emerald)' : pct >= MIN_MACRO_SCORE * 0.7 ? 'var(--gold)' : 'var(--text-dim)';
}

function updatePerformanceUI(id) {
    const s = performanceStats[id]; if (!s) return;
    const tp = document.getElementById(`stats-tp-${id}`);
    const rt = document.getElementById(`stats-retrace-${id}`);
    const sl = document.getElementById(`stats-sl-${id}`);
    const wr = document.getElementById(`stats-winrate-${id}`);
    if (tp) tp.innerText = s.tpHits;
    if (rt) { rt.innerText = s.retraceResets; rt.style.color = 'var(--teal)'; }
    if (sl) sl.innerText = s.slHits;
    if (wr) {
        wr.innerText = `${s.winrate}%`;
        wr.style.color = s.winrate >= 65 ? 'var(--emerald)' : s.winrate >= 50 ? 'var(--gold)' : 'var(--crimson)';
    }
}

function updateFeedBadge(id, status) {
    const el = document.getElementById(`feed-badge-${id}`); if (!el) return;
    el.className = 'feed-badge';
    if (status === 'ok')           { el.textContent = '● WS';   el.classList.add('ok'); }
    else if (status === 'fallback') { el.textContent = '⚡ REST'; el.classList.add('fallback'); }
    else                           { el.textContent = '✕ ERR';  el.classList.add('err'); }
}

function updateGlobalPulse() {
    const el = document.getElementById('globalPulse');
    if (el) el.className = (xauCurrentPrice > 0 || wsStatus.btc) ? 'pulse connected' : 'pulse disconnected';
}

function handleSignalBarTap(id) {
    if (tapTimers[id]) clearTimeout(tapTimers[id]);
    tapCounters[id]++;
    tapTimers[id] = setTimeout(() => { tapCounters[id] = 0; tapTimers[id] = null; }, TAP_TIMEOUT);
    if (tapCounters[id] === 3) {
        if (pendingConfirmation[id]) cancelPendingConfirmation(id);
        resetSignal(id);
        tapCounters[id] = 0;
        if (tapTimers[id]) { clearTimeout(tapTimers[id]); tapTimers[id] = null; }
        if (navigator.vibrate) navigator.vibrate(30);
        showToast('Signal reset ✓');
    }
}

function handleHistoryPanelTap(id) {
    if (historyTapTimers[id]) clearTimeout(historyTapTimers[id]);
    historyTapCounters[id]++;
    historyTapTimers[id] = setTimeout(() => { historyTapCounters[id] = 0; historyTapTimers[id] = null; }, TAP_TIMEOUT);
    if (historyTapCounters[id] === 3) {
        performanceStats[id] = createDefaultStats();
        savePerformanceStats(id);
        updatePerformanceUI(id);
        historyTapCounters[id] = 0;
        if (historyTapTimers[id]) { clearTimeout(historyTapTimers[id]); historyTapTimers[id] = null; }
        if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
        showToast('History reset ✓');
    }
}

let xauWs = null, xauReconnectTimer = null, xauReconnectAttempts = 0;
let xauFetchRetryTimer = null, xauCurrentPrice = 0, xauLastHeartbeat = Date.now();
const XAU_REST = ['https://fapi.binance.com/fapi/v1/ticker/price?symbol=XAUUSDT','https://api.binance.com/api/v3/ticker/price?symbol=XAUUSDT'];
let xauRestIdx = 0;

function updateXAUDisplay(price) {
    if (!price || isNaN(price) || price <= 0) return;
    xauCurrentPrice = price; xauLastHeartbeat = Date.now();
    pendingPriceData.xau = price; pendingSignalData.xau = true;
    throttledUpdateUI('xau'); updateSignal('xau', price);
    wsStatus.xau = true; updateGlobalPulse();
    const el = document.getElementById('ws-status-xau'); if (el) { el.textContent = '● LIVE'; el.className = 'ws-status connected'; }
    updateFeedBadge('xau', 'ok');
}

async function xauFetchRestPrice() {
    for (let i = 0; i < XAU_REST.length; i++) {
        try {
            const ctrl = new AbortController(); const tid = setTimeout(() => ctrl.abort(), 7000);
            const resp = await fetch(XAU_REST[(xauRestIdx + i) % XAU_REST.length], { signal: ctrl.signal }); clearTimeout(tid);
            const data = await resp.json();
            if (data?.price) {
                const p = parseFloat(data.price) + XAU_OFFSET;
                if (p > 0 && p !== xauCurrentPrice) {
                    xauCurrentPrice = p; xauLastHeartbeat = Date.now();
                    pendingPriceData.xau = p; pendingSignalData.xau = true;
                    throttledUpdateUI('xau'); updateSignal('xau', p);
                    wsStatus.xau = true; updateGlobalPulse();
                    const el = document.getElementById('ws-status-xau'); if (el) { el.textContent = '● LIVE'; el.className = 'ws-status connected'; }
                    updateFeedBadge('xau', 'fallback'); xauRestIdx = (xauRestIdx + i) % XAU_REST.length; return true;
                }
            }
        } catch(e) {}
    }
    updateFeedBadge('xau', 'err'); return false;
}

function initXAUWebSocket() {
    if (xauWs) { try { xauWs.close(); } catch(e) {} xauWs = null; }
    if (xauReconnectTimer) clearTimeout(xauReconnectTimer);
    try {
        xauWs = new WebSocket('wss://fstream.binance.com/ws/xauusdt@trade');
        const wst = setTimeout(() => { if (xauWs && xauWs.readyState !== WebSocket.OPEN) { try { xauWs.close(); } catch(e) {} xauWs = null; updateFeedBadge('xau','fallback'); if (!xauFetchRetryTimer) xauFetchRetryTimer = setInterval(async () => { await xauFetchRestPrice(); }, 3000); } }, 5000);
        xauWs.onopen = () => { clearTimeout(wst); xauReconnectAttempts = 0; if (xauFetchRetryTimer) { clearInterval(xauFetchRetryTimer); xauFetchRetryTimer = null; } updateFeedBadge('xau','ok'); updateGlobalPulse(); };
        xauWs.onmessage = (e) => { try { const d = JSON.parse(e.data); if (d.p) { const p = parseFloat(d.p) + XAU_OFFSET; if (!isNaN(p) && p > 0 && p !== xauCurrentPrice) updateXAUDisplay(p); } } catch(err) {} };
        xauWs.onclose = () => { const delay = Math.min(1000 * Math.pow(1.5, xauReconnectAttempts), 15000); xauReconnectAttempts++; xauReconnectTimer = setTimeout(() => initXAUWebSocket(), delay); updateFeedBadge('xau','fallback'); if (!xauFetchRetryTimer) xauFetchRetryTimer = setInterval(async () => { await xauFetchRestPrice(); }, 3000); };
        xauWs.onerror = () => { updateFeedBadge('xau','fallback'); if (!xauFetchRetryTimer) xauFetchRetryTimer = setInterval(async () => { await xauFetchRestPrice(); }, 3000); };
    } catch(err) { updateFeedBadge('xau','fallback'); if (!xauFetchRetryTimer) xauFetchRetryTimer = setInterval(async () => { await xauFetchRestPrice(); }, 3000); }
}

let btcWs = null, btcReconnectTimer = null, btcReconnectAttempts = 0, btcFetchRetryTimer = null;

async function btcFetchRestPrice() {
    try {
        const resp = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
        const data = await resp.json();
        if (data?.price) { const p = parseFloat(data.price); if (p > 0 && !isNaN(p)) { pendingPriceData.btc = p; pendingSignalData.btc = true; throttledUpdateUI('btc'); updateSignal('btc', p); wsStatus.btc = true; updateGlobalPulse(); updateFeedBadge('btc','fallback'); return true; } }
    } catch(e) {}
    updateFeedBadge('btc','err'); return false;
}

function initBTCWebSocket() {
    if (btcWs) { try { btcWs.close(); } catch(e) {} btcWs = null; }
    if (btcReconnectTimer) clearTimeout(btcReconnectTimer);
    try {
        btcWs = new WebSocket(BTC_WS_URL);
        const wst = setTimeout(() => { if (btcWs && btcWs.readyState !== WebSocket.OPEN) { try { btcWs.close(); } catch(e) {} btcWs = null; updateFeedBadge('btc','fallback'); wsStatus.btc = false; if (!btcFetchRetryTimer) btcFetchRetryTimer = setInterval(async () => { await btcFetchRestPrice(); }, 3000); } }, 6000);
        btcWs.onopen = () => { clearTimeout(wst); btcReconnectAttempts = 0; wsStatus.btc = true; if (btcFetchRetryTimer) { clearInterval(btcFetchRetryTimer); btcFetchRetryTimer = null; } const el = document.getElementById('ws-status-btc'); if (el) { el.textContent = '● LIVE'; el.className = 'ws-status connected'; } updateFeedBadge('btc','ok'); updateGlobalPulse(); updateSignalUIOnly('btc'); };
        btcWs.onmessage = (e) => { try { const d = JSON.parse(e.data); const p = parseFloat(d.p); if (p && p > 0 && !isNaN(p)) { pendingPriceData.btc = p; pendingSignalData.btc = true; throttledUpdateUI('btc'); updateSignal('btc', p); } } catch(err) {} };
        btcWs.onclose = () => { wsStatus.btc = false; updateFeedBadge('btc','fallback'); updateGlobalPulse(); updateSignalUIOnly('btc'); const delay = Math.min(1000 * Math.pow(2, btcReconnectAttempts), 30000); btcReconnectAttempts++; btcReconnectTimer = setTimeout(() => initBTCWebSocket(), delay); if (!btcFetchRetryTimer) btcFetchRetryTimer = setInterval(async () => { await btcFetchRestPrice(); }, 3000); };
        btcWs.onerror = () => { wsStatus.btc = false; updateFeedBadge('btc','fallback'); updateGlobalPulse(); if (!btcFetchRetryTimer) btcFetchRetryTimer = setInterval(async () => { await btcFetchRestPrice(); }, 3000); };
    } catch(err) { wsStatus.btc = false; updateFeedBadge('btc','err'); setTimeout(() => initBTCWebSocket(), 5000); }
}

function switchPair() {
    activePairId = activePairId === 'xau' ? 'btc' : 'xau';
    try { localStorage.setItem('ura_active_pair', activePairId); } catch(e) {}
    const lb = document.getElementById('switchLabel'); if (lb) lb.innerText = activePairId === 'xau' ? 'XAUUSD' : 'BTCUSD';
    document.querySelectorAll('.pair-card').forEach(c => c.classList.remove('active'));
    document.getElementById(`card-${activePairId}`)?.classList.add('active');
    if (navigator.vibrate) navigator.vibrate(20);
}

// ================================================================
//  INIT
// ================================================================
function init() {
    checkAndMigrateSchema();
    state.xau = loadState('xau'); state.btc = loadState('btc');
    performanceStats.xau = loadPerformanceStats('xau'); performanceStats.btc = loadPerformanceStats('btc');
    updateWinrateAndDrawrate('xau'); updateWinrateAndDrawrate('btc');

    document.getElementById('terminals').innerHTML = buildCardHTML('xau','XAUUSD') + buildCardHTML('btc','BTCUSD');

    const bindTap = (el, handler) => {
        if (!el) return; let lastTap = 0;
        const h = (e) => { e.preventDefault(); const now = Date.now(); if (now - lastTap < 80) return; lastTap = now; handler(); };
        el.addEventListener('touchstart', h, { passive: false }); el.addEventListener('click', h);
    };
    bindTap(document.getElementById('signal-bar-xau'),    () => handleSignalBarTap('xau'));
    bindTap(document.getElementById('signal-bar-btc'),    () => handleSignalBarTap('btc'));
    bindTap(document.getElementById('history-panel-xau'), () => handleHistoryPanelTap('xau'));
    bindTap(document.getElementById('history-panel-btc'), () => handleHistoryPanelTap('btc'));

    const btn = document.getElementById('switchPairBtn');
    if (btn) {
        const nb = btn.cloneNode(true); btn.parentNode.replaceChild(nb, btn);
        const ds = function(e) { e.preventDefault(); e.stopPropagation(); nb.classList.add('btn-highlight'); setTimeout(() => nb.classList.remove('btn-highlight'), 150); switchPair(); };
        nb.addEventListener('click', ds); nb.addEventListener('touchstart', ds, { passive: false });
    }

    updateSignalUIOnly('xau'); updateSignalUIOnly('btc');
    updatePerformanceUI('xau'); updatePerformanceUI('btc');

    seedCandles('xau', 3300); seedCandles('btc', 105000);

    let seedFixed = { xau: false, btc: false };
    const fixSeed = (id, price) => {
        if (seedFixed[id]) return;
        const first = marketData[id].macro.candles[0]?.close || 0;
        if (first > 0 && Math.abs(first - price) / price > 0.07) seedCandles(id, price);
        seedFixed[id] = true;
    };

    initXAUWebSocket(); xauFetchRestPrice();
    initBTCWebSocket(); btcFetchRestPrice();
    updateGlobalPulse();

    setInterval(() => {
        if (!seedFixed.xau && xauCurrentPrice > 0) fixSeed('xau', xauCurrentPrice);
        if (!seedFixed.btc && marketData.btc.price > 0) fixSeed('btc', marketData.btc.price);
        if (Date.now() - xauLastHeartbeat > 8000) xauFetchRestPrice();
        updateGlobalPulse();
    }, 3000);

    setInterval(() => {
        if (!xauWs || xauWs.readyState !== WebSocket.OPEN) xauFetchRestPrice();
        if (!btcWs || btcWs.readyState !== WebSocket.OPEN) btcFetchRestPrice();
    }, 2000);

    document.addEventListener('visibilitychange', () => {
        if (!document.hidden) { xauFetchRestPrice(); btcFetchRestPrice(); updateSignalUIOnly('xau'); updateSignalUIOnly('btc'); updateGlobalPulse(); }
    });
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();

})();

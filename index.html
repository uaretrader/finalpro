<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" name="viewport"/>
<title>URADVISOR v8.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
    :root {
        --obsidian: #1a1a1a;
        --surface: #1a1a1a;
        --surface2: #1f1f1f;
        --surface3: #0a0a0a;
        --edge: rgba(255,255,255,0.055);
        --edge-bright: rgba(255,255,255,0.12);
        --gold: #ffb830;
        --gold-dim: rgba(201,168,76,0.18);
        --gold-glow: 0 0 20px rgba(201,168,76,0.25), 0 0 40px rgba(201,168,76,0.08);
        --emerald: #00e5a0;
        --emerald-dim: rgba(0,229,160,0.12);
        --emerald-glow: 0 0 16px rgba(0,229,160,0.3);
        --crimson: #FF5773;
        --crimson-dim: rgba(255,61,90,0.12);
        --crimson-glow: 0 0 16px rgba(255,61,90,0.3);
        --amber: #ffb830;
        --sky: #4db8ff;
        --cyan: #ffb830;
        --text-primary: #e8edf2;
        --text-muted: #C4C4C6;
        --text-dim: #C4C4C6;
        --shadow-deep: 0 24px 64px rgba(0,0,0,0.7), 0 8px 24px rgba(0,0,0,0.5);
        --radius: 6px;
        --radius-sm: 3px;
        --success: var(--emerald);
        --danger: var(--crimson);
        --accent: var(--gold);
        --feed-lightning: var(--amber);
        --confirm-pending: var(--gold);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        background: var(--obsidian);
        background-image:
            radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,168,76,0.04) 0%, transparent 60%),
            radial-gradient(ellipse 60% 40% at 80% 100%, rgba(0,229,160,0.025) 0%, transparent 50%);
        color: var(--text-primary);
        font-family: 'Syne', sans-serif;
        padding: 18px 16px;
        display: flex;
        justify-content: center;
        min-height: 100vh;
    }

    .container {
        max-width: 450px;
        width: 100%;
        position: relative;
        z-index: 1;
    }

    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 18px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--edge);
        position: relative;
    }
    header::after {
        content: '';
        position: absolute;
        bottom: -1px; left: 0;
        width: 60px; height: 1px;
        background: linear-gradient(90deg, var(--gold), transparent);
    }

    .brand h1 {
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--text-primary);
        letter-spacing: 3px;
        text-transform: uppercase;
        line-height: 1;
    }
    .brand h1 span { color: var(--gold); }

    .brand-sub {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.4rem;
        color: var(--text-muted);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-top: 4px;
    }

    .sys-status {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.45rem;
        text-align: right;
        color: var(--text-muted);
        letter-spacing: 1px;
    }

    .pulse {
        display: inline-block;
        width: 5px; height: 5px;
        background: var(--amber);
        border-radius: 50%;
        margin-right: 5px;
        vertical-align: middle;
        animation: blink 1.5s infinite;
    }
    .pulse.connected { background: var(--emerald); box-shadow: var(--emerald-glow); }
    .pulse.disconnected { background: var(--crimson); animation: blink 0.5s infinite; }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }

    .header-right { display: flex; align-items: center; gap: 10px; }

    .switch-pair-btn {
        background: transparent;
        border: 1px solid var(--edge-bright);
        color: var(--text-muted);
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.62rem;
        font-weight: 500;
        padding: 6px 14px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all 0.2s ease;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        position: relative;
        overflow: hidden;
    }
    .switch-pair-btn::before {
        content: '';
        position: absolute; inset: 0;
        background: linear-gradient(135deg, rgba(201,168,76,0.08), transparent);
        opacity: 0;
        transition: opacity 0.2s;
    }
    .switch-pair-btn:hover { border-color: var(--gold); color: var(--gold); }
    .switch-pair-btn:hover::before { opacity: 1; }
    .switch-pair-btn:active, .switch-pair-btn.btn-highlight {
        border-color: var(--gold); color: var(--gold);
        transform: scale(0.96);
        box-shadow: var(--gold-glow);
    }

    .pair-card { display: none; }
    .pair-card.active { display: block; }

    .card {
        background: var(--surface);
        border: 1px solid var(--edge);
        border-radius: 1px;
        padding: 0;
        margin-bottom: 10px;
        box-shadow: var(--shadow-deep);
        overflow: hidden;
        position: relative;
        min-height: 230px;
    }
    .card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; height: 1px;
        background: linear-gradient(90deg, transparent, var(--gold), transparent);
        opacity: 0.4;
    }

    .card-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 16px 18px 14px;
        background: linear-gradient(180deg, var(--surface2) 0%, var(--surface) 100%);
        border-bottom: 1px solid var(--edge);
    }
    .pair-info { display: flex; flex-direction: column; gap: 5px; }
    .pair {
        font-weight: 800;
        font-size: 1rem;
        letter-spacing: 2px;
        color: var(--text-primary);
        text-transform: uppercase;
    }
    .status-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

    .ws-status {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.42rem;
        padding: 2px 7px;
        border-radius: 2px;
        display: inline-block;
        letter-spacing: 1px;
        text-transform: uppercase;
        border: 1px solid transparent;
    }
    .ws-status.connected {
        color: var(--emerald);
        border-color: rgba(0,229,160,0.2);
        background: rgba(0,229,160,0.06);
    }
    .ws-status.disconnected {
        color: var(--crimson);
        border-color: rgba(255,61,90,0.2);
        background: rgba(255,61,90,0.06);
        animation: blink 1s infinite;
    }

    .price {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 1.45rem;
        font-weight: 700;
        text-align: right;
        color: var(--text-primary);
        transition: color 0.12s ease;
        letter-spacing: -0.5px;
        line-height: 1;
        padding-top: 2px;
    }

    .tracker-badge {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.7rem;
        font-weight: 700;
        text-align: right;
        letter-spacing: 0.5px;
        margin-top: 4px;
        background: rgba(0,0,0,0.3);
        padding: 2px 8px;
        border-radius: 2px;
        display: inline-block;
        align-self: flex-end;
    }

    .signal-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 18px;
        background: var(--surface2);
        border-bottom: 1px solid var(--edge);
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.72rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        cursor: pointer;
        user-select: none;
        transition: all 0.2s ease;
        position: relative;
        overflow: hidden;
        color: var(--text-muted);
    }
    .signal-bar::after {
        content: '';
        position: absolute; inset: 0;
        background: linear-gradient(90deg, transparent, rgba(201,168,76,0.03), transparent);
        opacity: 0;
        transition: opacity 0.3s;
    }
    .signal-bar:hover::after { opacity: 1; }
    .signal-bar.confirm-wait {
        background: rgba(201,168,76,0.05);
        animation: pulseBorder 1s infinite;
    }
    @keyframes pulseBorder {
        0%, 100% { border-bottom-color: rgba(201,168,76,0.1); }
        50% { border-bottom-color: rgba(201,168,76,0.5); }
    }

    /* RUNNING TEXT MODE */
    .signal-bar.running-mode {
        justify-content: center;
        padding: 10px 18px;
        overflow: hidden;
    }
    .signal-bar.running-mode .signal-dot-group,
    .signal-bar.running-mode > span:first-child {
        display: none;
    }
    .running-text-container {
        width: 100%;
        overflow: hidden;
        position: relative;
    }
    .running-text-scroll {
        display: inline-block;
        white-space: nowrap;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 2px;
        color: var(--gold);
        text-transform: uppercase;
        animation: scrollMarquee 25s linear infinite;
        padding-left: 100%;
    }
    @keyframes scrollMarquee {
        0% { transform: translateX(0); }
        100% { transform: translateX(-100%); }
    }

    .signal-dot-group { display: flex; gap: 8px; align-items: center; }
    .dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: var(--surface3);
        border: 1px solid var(--edge);
        transition: all 0.2s ease;
    }
    .dot.active { background: var(--emerald); border-color: var(--emerald); box-shadow: var(--emerald-glow); }
    .dot.active-down { background: var(--crimson); border-color: var(--crimson); box-shadow: var(--crimson-glow); }
    .dot.confirm-pending {
        background: var(--gold); border-color: var(--gold);
        animation: pulseDot 0.8s infinite;
        box-shadow: 0 0 10px rgba(201,168,76,0.5);
    }
    @keyframes pulseDot { 0%, 100% { opacity: 0.3; transform: scale(0.85); } 50% { opacity: 1; transform: scale(1.1); } }

    /* BARIS 1: Entry | Target | Deep | Draw Rate */
    .card-level-grid {
        display: flex;
        justify-content: space-between;
        align-items: stretch;
        border-bottom: 1px solid var(--edge);
    }
    .level-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 12px 8px;
        cursor: pointer;
        transition: background 0.15s;
        text-align: center;
    }
    .level-item:first-child { align-items: flex-start; padding-left: 18px; border-right: 1px solid var(--edge); }
    .level-item:last-child { align-items: flex-end; padding-right: 18px; border-left: 1px solid var(--edge); }
    .level-item:hover { background: rgba(255,255,255,0.02); }
    .level-item:active { background: rgba(255,255,255,0.04); }

    .level-label {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.42rem;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 5px;
    }
    .level-value {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: -0.3px;
    }

    /* BARIS 2: TP HIT | RETRACE | SL HIT | WINRATE */
    .stats-grid {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        padding: 11px 18px;
    }
    .stats-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        min-width: 0;
    }
    .stats-item + .stats-item { border-left: 1px solid var(--edge); }

    .stats-label {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.4rem;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 4px;
    }
    .stats-value {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.5px;
    }

    .retrace-value { color: var(--gold); }
    .draw-value { color: var(--gold); }
    .winrate-value { color: var(--gold); }

    .htf-badge { display: none; }

    .feed-badge {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.4rem;
        font-weight: 500;
        padding: 2px 6px;
        border-radius: 2px;
        border: 1px solid var(--edge);
        color: var(--text-dim);
        letter-spacing: 1px;
        text-transform: uppercase;
        transition: all 0.3s;
        white-space: nowrap;
    }
    .feed-badge.ok { color: var(--emerald); border-color: rgba(0,229,160,0.25); background: rgba(0,229,160,0.06); }
    .feed-badge.err { color: var(--crimson); border-color: rgba(255,61,90,0.25); background: rgba(255,61,90,0.06); animation: blink 1s infinite; }
    .feed-badge.fallback { color: var(--amber); border-color: rgba(255,184,48,0.25); background: rgba(255,184,48,0.06); }

    footer {
        text-align: center;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.38rem;
        color: var(--text-dim);
        margin-top: 14px;
        letter-spacing: 1.5px;
        opacity: 0.6;
        line-height: 1.8;
        text-transform: uppercase;
    }

    #toast {
        position: fixed;
        bottom: 28px; left: 50%;
        transform: translateX(-50%) translateY(70px);
        background: var(--surface2);
        border: 1px solid var(--edge-bright);
        border-radius: 20px;
        padding: 8px 20px;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.62rem;
        color: var(--gold);
        z-index: 9999;
        transition: transform 0.35s cubic-bezier(.34,1.56,.64,1), opacity 0.35s;
        opacity: 0;
        pointer-events: none;
        letter-spacing: 1px;
        box-shadow: var(--shadow-deep), var(--gold-glow);
        white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    body::before {
        content: '';
        position: fixed; inset: 0;
        background: repeating-linear-gradient(
            0deg,
            transparent, transparent 2px,
            rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
        );
        pointer-events: none;
        z-index: 0;
    }

    .engine-tag {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        background: var(--gold-dim);
        border: 1px solid rgba(201,168,76,0.2);
        border-radius: 2px;
        padding: 3px 8px;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.42rem;
        color: var(--gold);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        margin-bottom: 3px;
    }
</style>
</head>
<body>
<div class="container">

<header>
    <div class="brand">
        <h1>ur<span>advisor</span></h1>
        <div class="brand-sub">URA v8.0</div>
    </div>
    <div class="header-right">
        <div class="sys-status">
            <div><span class="pulse" id="globalPulse"></span>GLOBAL LIVE</div>
        </div>
        <button class="switch-pair-btn" id="switchPairBtn">
            <span id="switchLabel">XAUUSD</span>
        </button>
    </div>
</header>

<div id="terminals"></div>

<footer>
    ENGINE: SWING · BOS · CHOCH · BSL/SSL SWEEP · FVG · PREMIUM/DISCOUNT · HTF BIAS M15/H1/H4 · AI CONFLUENCE
</footer>
</div>

<div id="toast"></div>

<script>
(function () {
    'use strict';

    // ============================================================
    // ========== KONTROL RUNNING TEXT (UBAH DI SINI) ============
    // ============================================================
    const ENABLE_RUNNING_TEXT = false;
    // ============================================================

    const LS_SCHEMA_VERSION = 4; // bumped for v8.0

    function checkAndMigrateSchema() {
        const storedVer = parseInt(localStorage.getItem('ura_schema_ver') || '1', 10);
        if (storedVer < LS_SCHEMA_VERSION) {
            ['xau', 'btc'].forEach(id => {
                const raw = localStorage.getItem(`ura_state_${id}`);
                if (raw) {
                    try {
                        const s = JSON.parse(raw);
                        const migrated = Object.assign({}, createFreshState(), s);
                        migrated.retracePct = 0;
                        localStorage.setItem(`ura_state_${id}`, JSON.stringify(migrated));
                    } catch (e) { localStorage.removeItem(`ura_state_${id}`); }
                }
            });
            localStorage.setItem('ura_schema_ver', String(LS_SCHEMA_VERSION));
        }
    }

    let toastTimer = null;
    function showToast(msg) {
        const el = document.getElementById('toast');
        if (!el) return;
        el.textContent = msg;
        el.classList.add('show');
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { el.classList.remove('show'); }, 1800);
    }

    // ============================================================
    // CONSTANTS
    // ============================================================
    const EMA_PERIOD = 21;
    const VOLUME_LOOKBACK = 12;
    const BTC_WS_URL = 'wss://stream.binance.com:9443/ws/btcusdt@trade';
    const XAU_OFFSET = -2.2;
    const CONFIRMATION_DELAY_CYCLES = 0;
    const RESET_THRESHOLD_XAU = 2;
    const RESET_THRESHOLD_BTC = 50;

    // v8.0 Institutional Engine constants
    const SWING_LOOKBACK = 5;          // bars each side for swing detection
    const FVG_MIN_GAP_XAU = 0.5;       // min gap size for FVG detection (XAU)
    const FVG_MIN_GAP_BTC = 15;        // min gap size for FVG detection (BTC)
    const SWING_HISTORY_MAX = 40;
    const FVG_MAX = 10;
    const HTF_TICK_PER_CANDLE_M15 = 30;  // ~M15 synthetic
    const HTF_TICK_PER_CANDLE_H1  = 120; // ~H1 synthetic
    const HTF_TICK_PER_CANDLE_H4  = 480; // ~H4 synthetic

    // ============================================================
    // STATE & BUFFERS
    // ============================================================
    let pendingSaveData = { xau: null, btc: null };
    let pendingSaveTimer = { xau: null, btc: null };
    const SAVE_INTERVAL = 1000;
    let rafPending = { xau: false, btc: false };
    let pendingPriceData = { xau: null, btc: null };
    let pendingSignalData = { xau: null, btc: null };
    let signalDebounceTimer = { xau: null, btc: null };
    const SIGNAL_DEBOUNCE_MS = 20;

    // Raw market data (tick + candle)
    let marketData = {
        xau: { candles: [], ema: 0, prevEMA: 0, volume: [], lastClose: 0, currentCandle: null, price: 0 },
        btc: { candles: [], ema: 0, prevEMA: 0, volume: [], lastClose: 0, currentCandle: null, price: 0 }
    };

    // ============================================================
    // v8.0 INSTITUTIONAL ENGINE DATA STORE
    // ============================================================

    // --- Swing Engine ---
    let swingEngine = {
        xau: { highs: [], lows: [], lastHH: 0, lastHL: 0, lastLH: 0, lastLL: 0, trend: 'NEUTRAL' },
        btc: { highs: [], lows: [], lastHH: 0, lastHL: 0, lastLH: 0, lastLL: 0, trend: 'NEUTRAL' }
    };

    // --- Structure Engine (BOS / CHoCH) ---
    let structureEngine = {
        xau: { bos: null, choch: null, bosDir: 'NONE', chochDir: 'NONE', lastBOSPrice: 0, lastCHoCHPrice: 0, bosCount: 0, chochCount: 0 },
        btc: { bos: null, choch: null, bosDir: 'NONE', chochDir: 'NONE', lastBOSPrice: 0, lastCHoCHPrice: 0, bosCount: 0, chochCount: 0 }
    };

    // --- Liquidity Engine (BSL / SSL Sweep) ---
    let liquidityEngine = {
        xau: { bslSweep: false, sslSweep: false, sweepLevel: 0, sweepDir: 'NONE', sweepAge: 0, recentSweeps: [] },
        btc: { bslSweep: false, sslSweep: false, sweepLevel: 0, sweepDir: 'NONE', sweepAge: 0, recentSweeps: [] }
    };

    // --- FVG Engine (Fair Value Gap) ---
    let fvgEngine = {
        xau: { bullish: [], bearish: [], lastMitigated: null },
        btc: { bullish: [], bearish: [], lastMitigated: null }
    };

    // --- Premium / Discount Engine ---
    let pdEngine = {
        xau: { zone: 'NEUTRAL', rangeHigh: 0, rangeLow: 0, equilibrium: 0, pct: 50, pdScore: 0 },
        btc: { zone: 'NEUTRAL', rangeHigh: 0, rangeLow: 0, equilibrium: 0, pct: 50, pdScore: 0 }
    };

    // --- HTF Bias Engine (M15 / H1 / H4) ---
    let htfBiasEngine = {
        xau: {
            m15: { candles: [], tickCount: 0, currentCandle: null, bias: 'NEUTRAL', ema: 0, ticksPerCandle: HTF_TICK_PER_CANDLE_M15 },
            h1:  { candles: [], tickCount: 0, currentCandle: null, bias: 'NEUTRAL', ema: 0, ticksPerCandle: HTF_TICK_PER_CANDLE_H1 },
            h4:  { candles: [], tickCount: 0, currentCandle: null, bias: 'NEUTRAL', ema: 0, ticksPerCandle: HTF_TICK_PER_CANDLE_H4 },
            composite: 'NEUTRAL', strength: 0
        },
        btc: {
            m15: { candles: [], tickCount: 0, currentCandle: null, bias: 'NEUTRAL', ema: 0, ticksPerCandle: HTF_TICK_PER_CANDLE_M15 },
            h1:  { candles: [], tickCount: 0, currentCandle: null, bias: 'NEUTRAL', ema: 0, ticksPerCandle: HTF_TICK_PER_CANDLE_H1 },
            h4:  { candles: [], tickCount: 0, currentCandle: null, bias: 'NEUTRAL', ema: 0, ticksPerCandle: HTF_TICK_PER_CANDLE_H4 },
            composite: 'NEUTRAL', strength: 0
        }
    };

    // --- AI Confluence Engine ---
    let confluenceEngine = {
        xau: { score: 0, direction: 'NONE', factors: [], quality: 'LOW' },
        btc: { score: 0, direction: 'NONE', factors: [], quality: 'LOW' }
    };

    // ============================================================
    // LEGACY / SHARED STATE
    // ============================================================
    let state = { xau: null, btc: null };
    let wsStatus = { xau: false, btc: false };
    let activePairId = localStorage.getItem('ura_active_pair') || 'xau';
    let pendingConfirmation = { xau: null, btc: null };
    let tapCounters = { xau: 0, btc: 0 };
    let tapTimers = { xau: null, btc: null };
    let historyTapCounters = { xau: 0, btc: 0 };
    let historyTapTimers = { xau: null, btc: null };
    const TAP_TIMEOUT = 500;
    let performanceStats = {};

    // ============================================================
    // SCHEMA / STATE HELPERS
    // ============================================================
    function createFreshState() {

    // ────────────────────────────────────────
    // 1. TICK ENGINE + CANDLE ENGINE
    // ────────────────────────────────────────
    function buildRealCandle(id, price) {
        const md = marketData[id]; const now = Date.now();
        if (!md.currentCandle) { md.currentCandle = { open: price, high: price, low: price, close: price, volume: 1, timestamp: now }; return; }
        md.currentCandle.high = Math.max(md.currentCandle.high, price);
        md.currentCandle.low = Math.min(md.currentCandle.low, price);
        md.currentCandle.close = price; md.currentCandle.volume++;
        if (now - md.currentCandle.timestamp >= 5000) {
            md.candles.push({ ...md.currentCandle });
            if (md.candles.length > 200) md.candles.shift();
            md.currentCandle = { open: price, high: price, low: price, close: price, volume: 1, timestamp: now };
            recalcEMA(id);
            // Fire all structural engines once new candle is sealed
            runSwingEngine(id);
            runStructureEngine(id);
            runLiquidityEngine(id, price);
            runFVGEngine(id);
            runPDEngine(id);
        }
    }

    // ────────────────────────────────────────
    // 2. EMA (replaces ATR as core metric)
    // ────────────────────────────────────────
    function recalcEMA(id) {
        const md = marketData[id]; const candles = md.candles;
        if (candles.length < 3) return;
        const alpha = 2 / (EMA_PERIOD + 1);
        let ema = candles[0].close;
        for (let i = 1; i < candles.length; i++) ema = candles[i].close * alpha + ema * (1 - alpha);
        md.prevEMA = md.ema || ema; md.ema = ema;
        md.price = candles[candles.length - 1].close;
        md.volume = candles.slice(-VOLUME_LOOKBACK).map(c => c.volume);
    }

    // ────────────────────────────────────────
    // 3. SWING ENGINE (HH / HL / LH / LL)
    // ────────────────────────────────────────
    function runSwingEngine(id) {
        const md = marketData[id]; const sw = swingEngine[id];
        const candles = md.candles;
        if (candles.length < SWING_LOOKBACK * 2 + 1) return;
        const n = candles.length;
        const mid = n - SWING_LOOKBACK - 1;
        const midCandle = candles[mid];
        // Pivot High: mid.high > all left & right neighbours
        let isPivotHigh = true, isPivotLow = true;
        for (let i = mid - SWING_LOOKBACK; i <= mid + SWING_LOOKBACK; i++) {
            if (i === mid) continue;
            if (candles[i].high >= midCandle.high) isPivotHigh = false;
            if (candles[i].low  <= midCandle.low)  isPivotLow  = false;
        }
        if (isPivotHigh) {
            sw.highs.push(midCandle.high);
            if (sw.highs.length > SWING_HISTORY_MAX) sw.highs.shift();
            if (sw.highs.length >= 2) {
                const prevHigh = sw.highs[sw.highs.length - 2];
                if (midCandle.high > prevHigh) sw.lastHH = midCandle.high;
                else sw.lastLH = midCandle.high;
            }
        }
        if (isPivotLow) {
            sw.lows.push(midCandle.low);
            if (sw.lows.length > SWING_HISTORY_MAX) sw.lows.shift();
            if (sw.lows.length >= 2) {
                const prevLow = sw.lows[sw.lows.length - 2];
                if (midCandle.low > prevLow) sw.lastHL = midCandle.low;
                else sw.lastLL = midCandle.low;
            }
        }
        // Determine swing trend
        const hhValid = sw.lastHH > 0 && sw.lastHL > 0;
        const llValid = sw.lastLL > 0 && sw.lastLH > 0;
        if (hhValid) {
            const isUptrend = sw.highs.length >= 2 && sw.lows.length >= 2 &&
                sw.highs[sw.highs.length - 1] > sw.highs[sw.highs.length - 2] &&
                sw.lows[sw.lows.length - 1] > sw.lows[sw.lows.length - 2];
            if (isUptrend) sw.trend = 'BULLISH';
        }
        if (llValid) {
            const isDowntrend = sw.highs.length >= 2 && sw.lows.length >= 2 &&
                sw.highs[sw.highs.length - 1] < sw.highs[sw.highs.length - 2] &&
                sw.lows[sw.lows.length - 1] < sw.lows[sw.lows.length - 2];
            if (isDowntrend) sw.trend = 'BEARISH';
        }
        if (!hhValid && !llValid) sw.trend = 'NEUTRAL';
    }

    // ────────────────────────────────────────
    // 4. STRUCTURE ENGINE (BOS / CHoCH)
    // ────────────────────────────────────────
    function runStructureEngine(id) {
        const md = marketData[id]; const sw = swingEngine[id]; const se = structureEngine[id];
        if (md.candles.length < 3) return;
        const lastCandle = md.candles[md.candles.length - 1];
        const price = lastCandle.close;
        // BOS (Break of Structure): price breaks most recent swing high/low in trending direction
        if (sw.highs.length >= 2 && sw.trend === 'BULLISH') {
            const prevSwingHigh = sw.highs[sw.highs.length - 2];
            if (price > prevSwingHigh && se.lastBOSPrice !== prevSwingHigh) {
                se.bos = true; se.bosDir = 'BULL'; se.lastBOSPrice = prevSwingHigh; se.bosCount++;
            }
        }
        if (sw.lows.length >= 2 && sw.trend === 'BEARISH') {
            const prevSwingLow = sw.lows[sw.lows.length - 2];
            if (price < prevSwingLow && se.lastBOSPrice !== prevSwingLow) {
                se.bos = true; se.bosDir = 'BEAR'; se.lastBOSPrice = prevSwingLow; se.bosCount++;
            }
        }
        // CHoCH (Change of Character): price breaks AGAINST the prevailing swing trend
        if (sw.trend === 'BULLISH' && sw.lows.length >= 2) {
            const lastSwingLow = sw.lows[sw.lows.length - 1];
            if (price < lastSwingLow && se.lastCHoCHPrice !== lastSwingLow) {
                se.choch = true; se.chochDir = 'BEAR'; se.lastCHoCHPrice = lastSwingLow; se.chochCount++;
                sw.trend = 'NEUTRAL'; // trend invalidated
            }
        }
        if (sw.trend === 'BEARISH' && sw.highs.length >= 2) {
            const lastSwingHigh = sw.highs[sw.highs.length - 1];
            if (price > lastSwingHigh && se.lastCHoCHPrice !== lastSwingHigh) {
                se.choch = true; se.chochDir = 'BULL'; se.lastCHoCHPrice = lastSwingHigh; se.chochCount++;
                sw.trend = 'NEUTRAL';
            }
        }
        // Age out after 30 candles
        if (se.bosCount > 0 && md.candles.length % 30 === 0) { se.bos = false; }
        if (se.chochCount > 0 && md.candles.length % 30 === 0) { se.choch = false; }
    }

    // ────────────────────────────────────────
    // 5. LIQUIDITY ENGINE (BSL / SSL SWEEP)
    // ────────────────────────────────────────
    function runLiquidityEngine(id, livePrice) {
        const sw = swingEngine[id]; const le = liquidityEngine[id];
        const md = marketData[id];
        if (md.candles.length < 5) return;
        const lastCandle = md.candles[md.candles.length - 1];
        const sweepTolXau = 0.3; const sweepTolBtc = 8;
        const tol = id === 'xau' ? sweepTolXau : sweepTolBtc;
        // BSL Sweep: price wicks ABOVE a prior swing high then closes below it
        if (sw.highs.length >= 1) {
            const recentHigh = sw.lastHH > 0 ? sw.lastHH : sw.highs[sw.highs.length - 1];
            if (lastCandle.high > recentHigh && lastCandle.close < recentHigh - tol) {
                if (le.sweepLevel !== recentHigh) {
                    le.bslSweep = true; le.sslSweep = false;
                    le.sweepLevel = recentHigh; le.sweepDir = 'BSL'; le.sweepAge = 0;
                    le.recentSweeps.push({ dir: 'BSL', level: recentHigh, age: 0 });
                    if (le.recentSweeps.length > 5) le.recentSweeps.shift();
                }
            }
        }
        // SSL Sweep: price wicks BELOW a prior swing low then closes above it
        if (sw.lows.length >= 1) {
            const recentLow = sw.lastLL > 0 ? sw.lastLL : sw.lows[sw.lows.length - 1];
            if (lastCandle.low < recentLow && lastCandle.close > recentLow + tol) {
                if (le.sweepLevel !== recentLow) {
                    le.sslSweep = true; le.bslSweep = false;
                    le.sweepLevel = recentLow; le.sweepDir = 'SSL'; le.sweepAge = 0;
                    le.recentSweeps.push({ dir: 'SSL', level: recentLow, age: 0 });
                    if (le.recentSweeps.length > 5) le.recentSweeps.shift();
                }
            }
        }
        // Age out sweeps
        le.sweepAge++;
        if (le.sweepAge > 20) { le.bslSweep = false; le.sslSweep = false; le.sweepDir = 'NONE'; }
        le.recentSweeps.forEach(s => s.age++);
        le.recentSweeps = le.recentSweeps.filter(s => s.age < 20);
    }

    // ────────────────────────────────────────
    // 6. FAIR VALUE GAP ENGINE
    // ────────────────────────────────────────
    function runFVGEngine(id) {
        const md = marketData[id]; const fvg = fvgEngine[id];
        const candles = md.candles;
        if (candles.length < 3) return;
        const minGap = id === 'xau' ? FVG_MIN_GAP_XAU : FVG_MIN_GAP_BTC;
        // Check last 3-bar FVG pattern: candle[i-2], candle[i-1], candle[i]
        const a = candles[candles.length - 3];
        const b = candles[candles.length - 2]; // the impulse candle
        const c = candles[candles.length - 1];
        // Bullish FVG: c.low > a.high (gap between candle[i-2] high and candle[i] low)
        const bullishGap = c.low - a.high;
        if (bullishGap >= minGap) {
            const existing = fvg.bullish.find(f => Math.abs(f.top - c.low) < minGap);
            if (!existing) {
                fvg.bullish.push({ top: c.low, bottom: a.high, mid: (c.low + a.high) / 2, mitigated: false, age: 0 });
                if (fvg.bullish.length > FVG_MAX) fvg.bullish.shift();
            }
        }
        // Bearish FVG: c.high < a.low
        const bearishGap = a.low - c.high;
        if (bearishGap >= minGap) {
            const existing = fvg.bearish.find(f => Math.abs(f.bottom - c.high) < minGap);
            if (!existing) {
                fvg.bearish.push({ top: a.low, bottom: c.high, mid: (a.low + c.high) / 2, mitigated: false, age: 0 });
                if (fvg.bearish.length > FVG_MAX) fvg.bearish.shift();
            }
        }
        // Mitigation check on live price
        const livePrice = md.price || 0;
        if (livePrice > 0) {
            fvg.bullish.forEach(f => { if (!f.mitigated && livePrice >= f.bottom && livePrice <= f.top) { f.mitigated = true; fvg.lastMitigated = { dir: 'BULL', level: f.mid }; } });
            fvg.bearish.forEach(f => { if (!f.mitigated && livePrice >= f.bottom && livePrice <= f.top) { f.mitigated = true; fvg.lastMitigated = { dir: 'BEAR', level: f.mid }; } });
        }
        // Age
        fvg.bullish.forEach(f => f.age++); fvg.bearish.forEach(f => f.age++);
        fvg.bullish = fvg.bullish.filter(f => f.age < 60);
        fvg.bearish = fvg.bearish.filter(f => f.age < 60);
    }

    // ────────────────────────────────────────
    // 7. PREMIUM / DISCOUNT ENGINE
    // ────────────────────────────────────────
    function runPDEngine(id) {
        const sw = swingEngine[id]; const pd = pdEngine[id];
        const md = marketData[id];
        if (md.candles.length < 10) return;
        // Range from recent swing highs/lows
        const highs = sw.highs.slice(-10);
        const lows = sw.lows.slice(-10);
        if (highs.length === 0 || lows.length === 0) return;
        pd.rangeHigh = Math.max(...highs);
        pd.rangeLow = Math.min(...lows);
        pd.equilibrium = (pd.rangeHigh + pd.rangeLow) / 2;
        const livePrice = md.price || 0;
        if (livePrice <= 0 || pd.rangeHigh <= pd.rangeLow) return;
        const rangeSize = pd.rangeHigh - pd.rangeLow;
        pd.pct = ((livePrice - pd.rangeLow) / rangeSize) * 100;
        // Premium = above 75%, Discount = below 25%, Equilibrium = 25-75%
        if (pd.pct >= 75) { pd.zone = 'PREMIUM'; pd.pdScore = -1; }   // sell zone
        else if (pd.pct <= 25) { pd.zone = 'DISCOUNT'; pd.pdScore = 1; }  // buy zone
        else { pd.zone = 'EQUILIBRIUM'; pd.pdScore = 0; }
    }

    // ────────────────────────────────────────
    // 8. HTF BIAS ENGINE (M15 / H1 / H4)
    // ────────────────────────────────────────
    function buildHTFCandle(htfFrame, price) {
        htfFrame.tickCount++;
        if (!htfFrame.currentCandle) {
            htfFrame.currentCandle = { open: price, high: price, low: price, close: price };
            return false;
        }
        htfFrame.currentCandle.high = Math.max(htfFrame.currentCandle.high, price);
        htfFrame.currentCandle.low = Math.min(htfFrame.currentCandle.low, price);
        htfFrame.currentCandle.close = price;
        if (htfFrame.tickCount >= htfFrame.ticksPerCandle) {
            htfFrame.candles.push({ ...htfFrame.currentCandle });
            if (htfFrame.candles.length > 60) htfFrame.candles.shift();
            htfFrame.currentCandle = { open: price, high: price, low: price, close: price };
            htfFrame.tickCount = 0;
            return true; // new candle sealed
        }
        return false;
    }

    function calcHTFFrameBias(htfFrame) {
        const candles = htfFrame.candles;
        if (candles.length < 5) return;
        const alpha = 2 / (EMA_PERIOD + 1);
        let ema = candles[0].close;
        for (let i = 1; i < candles.length; i++) ema = candles[i].close * alpha + ema * (1 - alpha);
        htfFrame.ema = ema;
        const window = Math.min(20, candles.length);
        const recent = candles.slice(-window);
        let bull = 0, bear = 0;
        for (const c of recent) { if (c.close > c.open) bull++; else if (c.close < c.open) bear++; }
        const lastClose = candles[candles.length - 1].close;
        if (bull > bear + Math.floor(window * 0.2) && lastClose > ema) htfFrame.bias = 'BULLISH';
        else if (bear > bull + Math.floor(window * 0.2) && lastClose < ema) htfFrame.bias = 'BEARISH';
        else htfFrame.bias = 'NEUTRAL';
    }

    function updateHTFBiasEngine(id, price) {
        const htf = htfBiasEngine[id];
        const m15Sealed = buildHTFCandle(htf.m15, price);
        const h1Sealed  = buildHTFCandle(htf.h1, price);
        const h4Sealed  = buildHTFCandle(htf.h4, price);
        if (m15Sealed) calcHTFFrameBias(htf.m15);
        if (h1Sealed)  calcHTFFrameBias(htf.h1);
        if (h4Sealed)  calcHTFFrameBias(htf.h4);
        // Composite bias: H4 (weight 3) + H1 (weight 2) + M15 (weight 1)
        const score = (
            (htf.h4.bias  === 'BULLISH' ? 3 : htf.h4.bias  === 'BEARISH' ? -3 : 0) +
            (htf.h1.bias  === 'BULLISH' ? 2 : htf.h1.bias  === 'BEARISH' ? -2 : 0) +
            (htf.m15.bias === 'BULLISH' ? 1 : htf.m15.bias === 'BEARISH' ? -1 : 0)
        );
        htf.strength = score;
        if (score >= 3) htf.composite = 'BULLISH';
        else if (score <= -3) htf.composite = 'BEARISH';
        else htf.composite = 'NEUTRAL';
    }

    // Seed HTF from static base price
    function seedHTFBiasEngine(id, basePrice) {
        const htf = htfBiasEngine[id];
        const step = id === 'xau' ? 0.4 : 40;
        ['m15', 'h1', 'h4'].forEach(tf => {
            htf[tf].candles = [];
            for (let i = 0; i < 20; i++) {
                const drift = (i - 10) * step * 0.1;
                const open = basePrice + drift;
                const close = basePrice + drift + (i % 3 === 0 ? step * 0.2 : -step * 0.1);
                htf[tf].candles.push({ open, high: Math.max(open, close) + step * 0.05, low: Math.min(open, close) - step * 0.05, close });
            }
            calcHTFFrameBias(htf[tf]);
        });
        htf.composite = 'NEUTRAL'; htf.strength = 0;
    }

    let htfSeeded = { xau: false, btc: false };
    let htfLiveSeedDone = { xau: false, btc: false };
    function maybeReseedHTF(id, livePrice) {
        if (htfLiveSeedDone[id]) return;
        if (!htfSeeded[id]) { seedHTFBiasEngine(id, livePrice); htfSeeded[id] = true; htfLiveSeedDone[id] = true; return; }
        const firstClose = htfBiasEngine[id].m15.candles[0]?.close || 0;
        if (firstClose > 0 && Math.abs(firstClose - livePrice) / livePrice > 0.10) {
            seedHTFBiasEngine(id, livePrice); htfLiveSeedDone[id] = true;
        }
    }

    // ────────────────────────────────────────
    // 9. AI CONFLUENCE ENGINE
    // ────────────────────────────────────────
    function runAIConfluence(id) {
        const sw   = swingEngine[id];
        const se   = structureEngine[id];
        const le   = liquidityEngine[id];
        const fvg  = fvgEngine[id];
        const pd   = pdEngine[id];
        const htf  = htfBiasEngine[id];
        const ce   = confluenceEngine[id];
        const md   = marketData[id];
        const livePrice = md.price || state[id]?.lastPrice || 0;
        let bullScore = 0, bearScore = 0;
        let factors = [];
        // Factor 1: Swing Trend
        if (sw.trend === 'BULLISH') { bullScore += 2; factors.push('SW↑'); }
        else if (sw.trend === 'BEARISH') { bearScore += 2; factors.push('SW↓'); }
        // Factor 2: BOS
        if (se.bos && se.bosDir === 'BULL') { bullScore += 2; factors.push('BOS↑'); }
        else if (se.bos && se.bosDir === 'BEAR') { bearScore += 2; factors.push('BOS↓'); }
        // Factor 3: CHoCH — strong reversal signal
        if (se.choch && se.chochDir === 'BULL') { bullScore += 3; factors.push('CHoCH↑'); }
        else if (se.choch && se.chochDir === 'BEAR') { bearScore += 3; factors.push('CHoCH↓'); }
        // Factor 4: Liquidity Sweep (inverse — after SSL sweep expect buy, after BSL expect sell)
        if (le.sslSweep) { bullScore += 2; factors.push('SSL↑'); }
        else if (le.bslSweep) { bearScore += 2; factors.push('BSL↓'); }
        // Factor 5: FVG Mitigation
        if (fvg.lastMitigated) {
            if (fvg.lastMitigated.dir === 'BULL' && livePrice <= fvg.lastMitigated.level) { bullScore += 1; factors.push('FVG↑'); }
            else if (fvg.lastMitigated.dir === 'BEAR' && livePrice >= fvg.lastMitigated.level) { bearScore += 1; factors.push('FVG↓'); }
        }
        // Factor 6: Premium / Discount Zone
        if (pd.zone === 'DISCOUNT') { bullScore += 1; factors.push('PD↑'); }
        else if (pd.zone === 'PREMIUM') { bearScore += 1; factors.push('PD↓'); }
        // Factor 7: HTF Composite Bias (weighted by strength)
        const htfStrength = Math.abs(htf.strength);
        const htfWeight = htfStrength >= 5 ? 3 : htfStrength >= 3 ? 2 : 1;
        if (htf.composite === 'BULLISH') { bullScore += htfWeight; factors.push(`HTF↑${htfWeight}`); }
        else if (htf.composite === 'BEARISH') { bearScore += htfWeight; factors.push(`HTF↓${htfWeight}`); }
        // Factor 8: EMA slope confirmation
        const emaSlope = md.ema - md.prevEMA;
        const slopeTh = id === 'xau' ? 0.05 : 2;
        if (emaSlope > slopeTh) { bullScore += 1; factors.push('EMA↑'); }
        else if (emaSlope < -slopeTh) { bearScore += 1; factors.push('EMA↓'); }
        ce.factors = factors;
        const maxScore = bullScore + bearScore;
        if (bullScore > bearScore && bullScore >= 5) {
            ce.direction = 'BUY';
            ce.score = maxScore > 0 ? Math.round((bullScore / maxScore) * 100) : 0;
        } else if (bearScore > bullScore && bearScore >= 5) {
            ce.direction = 'SELL';
            ce.score = maxScore > 0 ? Math.round((bearScore / maxScore) * 100) : 0;
        } else {
            ce.direction = 'NONE';
            ce.score = 0;
        }
        const topScore = Math.max(bullScore, bearScore);
        // Quality tiers
        if (topScore >= 10) ce.quality = 'STRONG';
        else if (topScore >= 7) ce.quality = 'MODERATE';
        else if (topScore >= 5) ce.quality = 'WEAK';
        else ce.quality = 'LOW';
        return ce;
    }

    // ────────────────────────────────────────
    // 10. SIGNAL ENGINE (replaces ATR-based processSignal)
    // ────────────────────────────────────────
    // Stages:
    //   L1 = CHoCH OR (SSL/BSL sweep + BOS in sweep direction)
    //   L2 = FVG mitigation OR PD zone alignment OR EMA confluence
    //   L3 = HTF composite confirms + AI confluence score >= WEAK
    // ────────────────────────────────────────
    function processSignal(id, price) {
        if (!state[id]) return;
        const s = state[id];
        const md = marketData[id];
        const sw = swingEngine[id];
        const se = structureEngine[id];
        const le = liquidityEngine[id];
        const fvg = fvgEngine[id];
        const pd = pdEngine[id];
        const htf = htfBiasEngine[id];
        const ce = confluenceEngine[id];
        const resetThreshold = id === 'xau' ? RESET_THRESHOLD_XAU : RESET_THRESHOLD_BTC;

        // -- Track active signal --
        if (s.confirmed) {
            if (s.type !== 'none') {
                if (s.tempHigh === 0 && s.tempLow === 0) { s.tempHigh = s.entry || price; s.tempLow = s.entry || price; }
                if (price > s.tempHigh) s.tempHigh = price;
                if (price < s.tempLow)  s.tempLow  = price;
                updateTracker(id, price);
                const refPrice = s.entry > 0 ? s.entry : s.originPrice;
                const expansionDistance = s.type === 'buy' ? s.tempHigh - refPrice : refPrice - s.tempLow;
                if (expansionDistance >= resetThreshold) {
                    const entryBuffer = id === 'xau' ? 5.5 : 150;
                    const retraceReset = s.type === 'buy' ? price <= (refPrice - entryBuffer) : price >= (refPrice + entryBuffer);
                    if (retraceReset && Date.now() >= (s.warmupUntil || 0)) { recordSignalResult(id, 'retrace'); resetSignal(id); return; }
                }
            }
            const hitTP = (s.type === 'buy' && price >= s.tp) || (s.type === 'sell' && price <= s.tp);
            const hitSL = (s.type === 'buy' && price <= s.sl) || (s.type === 'sell' && price >= s.sl);
            if (hitTP) { recordSignalResult(id, 'tp'); resetSignal(id); }
            else if (hitSL) { recordSignalResult(id, 'sl'); resetSignal(id); }
            return;
        }
        if (pendingConfirmation[id]) { s.lastPrice = price; return; }

        // Run institutional engines
        buildRealCandle(id, price);
        updateHTFBiasEngine(id, price);
        runAIConfluence(id);

        // -- STAGE 1 TRIGGER: CHoCH or Sweep+BOS --
        if (!s.l1) {
            let l1Dir = null;
            // CHoCH-based trigger (highest quality)
            if (se.choch && se.chochDir === 'BULL') l1Dir = 'buy';
            else if (se.choch && se.chochDir === 'BEAR') l1Dir = 'sell';
            // Sweep + BOS trigger
            if (!l1Dir) {
                if (le.sslSweep && se.bos && se.bosDir === 'BULL') l1Dir = 'buy';
                else if (le.bslSweep && se.bos && se.bosDir === 'BEAR') l1Dir = 'sell';
            }
            // Swing BOS-only trigger (lower quality, needs more confirmation downstream)
            if (!l1Dir && se.bos) {
                if (se.bosDir === 'BULL' && sw.trend === 'BULLISH') l1Dir = 'buy';
                else if (se.bosDir === 'BEAR' && sw.trend === 'BEARISH') l1Dir = 'sell';
            }
            if (l1Dir) {
                s.l1 = true; s.type = l1Dir; s.originPrice = price;
                s.tempHigh = price; s.tempLow = price;
                throttledSaveState(id); pendingSignalData[id] = true; throttledUpdateUI(id);
            }
        }
        // -- STAGE 2: FVG mitigation OR PD zone OR EMA alignment --
        else if (s.l1 && !s.l2) {
            let l2Confirmed = false;
            const inFVG = s.type === 'buy'
                ? fvg.bullish.some(f => !f.mitigated && price >= f.bottom && price <= f.top)
                : fvg.bearish.some(f => !f.mitigated && price >= f.bottom && price <= f.top);
            const pdOK = (s.type === 'buy' && pd.zone === 'DISCOUNT') ||
                         (s.type === 'sell' && pd.zone === 'PREMIUM');
            const emaOK = (s.type === 'buy' && price > md.ema && md.ema > md.prevEMA) ||
                          (s.type === 'sell' && price < md.ema && md.ema < md.prevEMA);
            if (inFVG || pdOK || emaOK) l2Confirmed = true;
            if (l2Confirmed) {
                s.l2 = true;
                throttledSaveState(id); pendingSignalData[id] = true; throttledUpdateUI(id);
            }
        }
        // -- STAGE 3: HTF + AI Confluence gate --
        else if (s.l2 && !s.l3 && !s.confirmed) {
            const htfOK = (s.type === 'buy' && htf.composite !== 'BEARISH') ||
                          (s.type === 'sell' && htf.composite !== 'BULLISH');
            const aiOK = ce.direction === s.type.toUpperCase() && (ce.quality === 'WEAK' || ce.quality === 'MODERATE' || ce.quality === 'STRONG');
            if (htfOK && aiOK) {
                s.l3 = true;
                throttledSaveState(id); pendingSignalData[id] = true; throttledUpdateUI(id);
                startConfirmationDelay(id, s.type, price);
            }
        }
        s.lastPrice = price;
        throttledSaveState(id);
    }

    function updateSignal(id, price) {
        if (signalDebounceTimer[id]) clearTimeout(signalDebounceTimer[id]);
        signalDebounceTimer[id] = setTimeout(() => { processSignal(id, price); signalDebounceTimer[id] = null; }, SIGNAL_DEBOUNCE_MS);
    }

    function resetSignal(id) {
        const s = state[id];
        if (pendingConfirmation[id]) cancelPendingConfirmation(id);
        if (s.resetInProgress) return;
        s.resetInProgress = true;
        if (signalDebounceTimer[id]) { clearTimeout(signalDebounceTimer[id]); signalDebounceTimer[id] = null; }
        const preservedLastPrice = s.lastPrice || (id === 'xau' ? xauCurrentPrice : (marketData[id].price || 0));
        Object.assign(s, { l1: false, l2: false, l3: false, confirmed: false, confirmedAt: 0, warmupUntil: 0, type: 'none', entry: 0, sl: 0, tp: 0, trendScore: 0, tempHigh: 0, tempLow: 0, originPrice: 0, retracePct: 0 });
        s.lastPrice = preservedLastPrice;
        // Also reset structural flags so fresh detection begins
        structureEngine[id].bos = false; structureEngine[id].choch = false;
        liquidityEngine[id].bslSweep = false; liquidityEngine[id].sslSweep = false; liquidityEngine[id].sweepDir = 'NONE';
        pendingSignalData[id] = true;
        updateSignalUIOnly(id);
        const trackerEl = document.getElementById(`tracker-${id}`); if (trackerEl) trackerEl.innerText = '0';
        throttledSaveState(id); throttledUpdateUI(id);
        requestAnimationFrame(() => { s.resetInProgress = false; });
        setTimeout(() => { s.resetInProgress = false; }, 300);
    }

    // ────────────────────────────────────────
    // CONFIRMATION DELAY + LOCK SIGNAL
    // ────────────────────────────────────────
    function startConfirmationDelay(id, direction, entryPrice) {
        if (pendingConfirmation[id]) cancelPendingConfirmation(id);
        pendingConfirmation[id] = { direction, entryPrice, cycleCounter: 0, timerId: null };
        const sb = document.getElementById(`signal-bar-${id}`); if (sb) sb.classList.add('confirm-wait');
        const l3 = document.getElementById(`l3-${id}`); if (l3) l3.classList.add('confirm-pending');
        updateSignalUIOnly(id);
        function checkCycle() {
            if (!pendingConfirmation[id]) return;
            pendingConfirmation[id].cycleCounter++;
            updateSignalUIOnly(id);
            if (pendingConfirmation[id].cycleCounter >= CONFIRMATION_DELAY_CYCLES) {
                // Final check: run confluence one more time
                runAIConfluence(id);
                const ce = confluenceEngine[id];
                const htf = htfBiasEngine[id];
                const htfOK = (direction === 'buy' && htf.composite !== 'BEARISH') ||
                              (direction === 'sell' && htf.composite !== 'BULLISH');
                const aiOK = (ce.direction === direction.toUpperCase()) || ce.quality !== 'LOW';
                if (htfOK && aiOK) executeLockSignal(id, direction);
                else {
                    resetSignal(id);
                    const st = document.getElementById(`signal-text-${id}`);
                    if (st) { st.innerText = 'REJECT'; st.style.color = 'var(--danger)'; setTimeout(() => updateSignalUIOnly(id), 1200); }
                }
                if (pendingConfirmation[id]) pendingConfirmation[id] = null;
            } else {
                pendingConfirmation[id].timerId = setTimeout(() => { if (pendingConfirmation[id]) checkCycle(); }, 3000);
            }
        }
        pendingConfirmation[id].timerId = setTimeout(() => { if (pendingConfirmation[id]) checkCycle(); }, 3000);
    }

    function executeLockSignal(id, direction) {
        const s = state[id];
        const livePrice = id === 'xau' ? xauCurrentPrice : (marketData[id].price || 0);
        const finalEntry = livePrice > 0 ? livePrice : (s.lastPrice || 0);
        if (finalEntry <= 0) return;
        s.l3 = true; s.confirmed = true; s.confirmedAt = Date.now(); s.warmupUntil = Date.now() + 2500;
        s.type = direction; s.entry = finalEntry; s.originPrice = finalEntry;
        s.tempHigh = finalEntry; s.tempLow = finalEntry; s.retracePct = 0;
        // Risk calculation — based on swing range & PD context, not ATR
        const pd = pdEngine[id];
        const swEng = swingEngine[id];
        const swRange = (swEng.lastHH > 0 && swEng.lastLL > 0) ? Math.abs(swEng.lastHH - swEng.lastLL) : 0;
        let risk;
        if (id === 'xau') {
            risk = swRange > 0 ? Math.min(Math.max(swRange * 0.08, 4.0), 12.0) : 6.5;
        } else {
            risk = swRange > 0 ? Math.min(Math.max(swRange * 0.05, finalEntry * 0.002), finalEntry * 0.005) : finalEntry * 0.003;
        }
        if (direction === 'buy') { s.sl = finalEntry - risk; s.tp = finalEntry + risk * 1.5; }
        else { s.sl = finalEntry + risk; s.tp = finalEntry - risk * 1.5; }
        throttledSaveState(id); pendingSignalData[id] = true; throttledUpdateUI(id);
        const sb = document.getElementById(`signal-bar-${id}`); if (sb) sb.classList.remove('confirm-wait');
        if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
        showToast(`${id.toUpperCase()} ${direction.toUpperCase()} @ ${finalEntry.toFixed(2)}`);
    }

        wsStatus.xau = true; updateGlobalPulse();

            xauWs.onopen = () => { clearTimeout(wsTimeout); xauReconnectAttempts = 0; if (xauFetchRetryTimer) { clearInterval(xauFetchRetryTimer); xauFetchRetryTimer = null; } updateFeedBadge('xau', 'ok'); updateGlobalPulse(); };
            xauWs.onmessage = (e) => { try { const data = JSON.parse(e.data); if (data.p) { const price = parseFloat(data.p) + XAU_OFFSET; if (!isNaN(price) && price > 0 && price !== xauCurrentPrice) updateXAUDisplay(price); } } catch (err) {} };

            xauWs.onclose = () => { const delay = Math.min(1000 * Math.pow(1.5, xauReconnectAttempts), 15000); xauReconnectAttempts++; xauReconnectTimer = setTimeout(() => initXAUWebSocket(), delay); updateFeedBadge('xau', 'fallback'); if (!xauFetchRetryTimer) xauFetchRetryTimer = setInterval(async () => { await xauFetchRestPrice(); }, 3000); };

    }

    function initBTCWebSocket() {
        if (btcWs) { try { btcWs.close(); } catch (e) {} btcWs = null; }
        if (btcReconnectTimer) clearTimeout(btcReconnectTimer);
        try {
            btcWs = new WebSocket(BTC_WS_URL);
            const wsTimeout = setTimeout(() => { if (btcWs && btcWs.readyState !== WebSocket.OPEN) { try { btcWs.close(); } catch (e) {} btcWs = null; updateFeedBadge('btc', 'fallback'); wsStatus.btc = false; if (!btcFetchRetryTimer) btcFetchRetryTimer = setInterval(async () => { await btcFetchRestPrice(); }, 3000); } }, 6000);
            btcWs.onopen = () => { clearTimeout(wsTimeout); btcReconnectAttempts = 0; wsStatus.btc = true; if (btcFetchRetryTimer) { clearInterval(btcFetchRetryTimer); btcFetchRetryTimer = null; } const statusEl = document.getElementById('ws-status-btc'); if (statusEl) { statusEl.textContent = '● LIVE'; statusEl.className = 'ws-status connected'; } updateFeedBadge('btc', 'ok'); updateGlobalPulse(); updateSignalUIOnly('btc'); };
            btcWs.onmessage = (e) => { try { const data = JSON.parse(e.data); const price = parseFloat(data.p); if (price && price > 0 && !isNaN(price)) { pendingPriceData.btc = price; pendingSignalData.btc = true; throttledUpdateUI('btc'); maybeReseedHTF('btc', price); updateHTFBiasEngine('btc', price); updateSignal('btc', price); } } catch (err) {} };
            btcWs.onclose = () => { wsStatus.btc = false; updateFeedBadge('btc', 'fallback'); updateGlobalPulse(); updateSignalUIOnly('btc'); const delay = Math.min(1000 * Math.pow(2, btcReconnectAttempts), 30000); btcReconnectAttempts++; btcReconnectTimer = setTimeout(() => initBTCWebSocket(), delay); if (!btcFetchRetryTimer) btcFetchRetryTimer = setInterval(async () => { await btcFetchRestPrice(); }, 3000); };
            btcWs.onerror = () => { wsStatus.btc = false; updateFeedBadge('btc', 'fallback'); updateGlobalPulse(); if (!btcFetchRetryTimer) btcFetchRetryTimer = setInterval(async () => { await btcFetchRestPrice(); }, 3000); };
        } catch (err) { wsStatus.btc = false; updateFeedBadge('btc', 'err'); setTimeout(() => initBTCWebSocket(), 5000); }
    }

    function switchPair() {
        activePairId = activePairId === 'xau' ? 'btc' : 'xau';
        try { localStorage.setItem('ura_active_pair', activePairId); } catch (e) {}
        const switchLabel = document.getElementById('switchLabel');
        if (switchLabel) switchLabel.innerText = activePairId === 'xau' ? 'XAUUSD' : 'BTCUSD';
        document.querySelectorAll('.pair-card').forEach(card => card.classList.remove('active'));
        const activeCard = document.getElementById(`card-${activePairId}`);
        if (activeCard) activeCard.classList.add('active');
        if (navigator.vibrate) navigator.vibrate(20);
    }

    window.copyValue = (id, type) => {
        const val = document.getElementById(`${type}-${id}`)?.innerText;
        if (val && val !== '--') {
            navigator.clipboard?.writeText(val).then(() => showToast(`${type.toUpperCase()} copied: ${val}`)).catch(() => showToast(`${val}`));
            if (navigator.vibrate) navigator.vibrate(50);
        }
    };

    // ============================================================
    // CARD HTML
    // ============================================================
    function buildCardHTML(id, label) {
        const isActive = activePairId === id ? 'active' : '';
        const wsInitClass = id === 'xau' ? 'connected' : 'disconnected';
        const wsInitText = id === 'xau' ? '● CONNECTING...' : '○ RECONNECTING...';
        return `<div class="pair-card ${isActive}" id="card-${id}">
            <div class="card">
                <div class="card-top">
                    <div class="pair-info">
                        <span class="pair">${label}</span>
                        <div class="status-row">
                            <span id="ws-status-${id}" class="ws-status ${wsInitClass}">${wsInitText}</span>
                            <span class="feed-badge" id="feed-badge-${id}">○ INIT</span>
                        </div>
                    </div>
                    <div style="display: flex; flex-direction: column; align-items: flex-end;">
                        <span class="price" id="price-${id}">0.00</span>
                        <span class="tracker-badge" id="tracker-${id}">0</span>
                    </div>
                </div>
                <div class="signal-bar" id="signal-bar-${id}">
                    <span>SIGNAL</span>
                    <div class="signal-dot-group">
                        <div class="dot" id="l1-${id}"></div>
                        <div class="dot" id="l2-${id}"></div>
                        <div class="dot" id="l3-${id}"></div>
                    </div>
                    <span id="signal-text-${id}">IDLE</span>
                </div>
                <div class="card-level-grid">
                    <div class="level-item" onclick="window.copyValue('${id}','entry')">
                        <span class="level-label">Entry</span>
                        <span class="level-value" id="entry-${id}">--</span>
                    </div>
                    <div class="level-item" onclick="window.copyValue('${id}','tp')">
                        <span class="level-label">Target</span>
                        <span class="level-value" id="tp-${id}" style="color:var(--success)">--</span>
                    </div>
                    <div class="level-item" onclick="window.copyValue('${id}','sl')">
                        <span class="level-label">Deep</span>
                        <span class="level-value" id="sl-${id}" style="color:var(--danger)">--</span>
                    </div>
                    <div class="level-item">
                        <span class="level-label" style="color:var(--cyan)">DRAW</span>
                        <span class="level-value draw-value" id="draw-rate-${id}">0%</span>
                    </div>
                </div>
                <div class="stats-grid" id="history-panel-${id}">
                    <div class="stats-item">
                        <span class="stats-label">TP HIT</span>
                        <span class="stats-value" id="stats-tp-${id}" style="color:var(--success)">0</span>
                    </div>
                    <div class="stats-item">
                        <span class="stats-label" style="color:var(--cyan)">RETRACE</span>
                        <span class="stats-value retrace-value" id="stats-retrace-${id}">0</span>
                    </div>
                    <div class="stats-item">
                        <span class="stats-label">SL HIT</span>
                        <span class="stats-value" id="stats-sl-${id}" style="color:var(--danger)">0</span>
                    </div>
                    <div class="stats-item">
                        <span class="stats-label" style="color:var(--gold)">WINRATE</span>
                        <span class="stats-value winrate-value" id="stats-winrate-${id}">0%</span>
                    </div>
                </div>
            </div>
        </div>`;
    }

    // ============================================================
    // INIT
    // ============================================================
    function init() {
        checkAndMigrateSchema();
        state.xau = loadState('xau');
        state.btc = loadState('btc');
        performanceStats.xau = loadPerformanceStats('xau');
        performanceStats.btc = loadPerformanceStats('btc');
        updateWinrateAndDrawrate('xau');
        updateWinrateAndDrawrate('btc');
        htfSeeded.xau = false; htfSeeded.btc = false;
        htfLiveSeedDone.xau = false; htfLiveSeedDone.btc = false;
        seedHTFBiasEngine('xau', 4500);
        seedHTFBiasEngine('btc', 100000);
        htfSeeded.xau = true; htfSeeded.btc = true;
        document.getElementById('terminals').innerHTML = buildCardHTML('xau', 'XAUUSD') + buildCardHTML('btc', 'BTCUSD');
        const bindTap = (el, handler) => {
            if (!el) return;
            let lastTap = 0;
            const tapHandler = (e) => { e.preventDefault(); const now = Date.now(); if (now - lastTap < 80) return; lastTap = now; handler(); };
            el.addEventListener('touchstart', tapHandler, { passive: false });
            el.addEventListener('click', tapHandler);
        };
        bindTap(document.getElementById('signal-bar-xau'), () => handleSignalBarTap('xau'));
        bindTap(document.getElementById('signal-bar-btc'), () => handleSignalBarTap('btc'));
        bindTap(document.getElementById('history-panel-xau'), () => handleHistoryPanelTap('xau'));
        bindTap(document.getElementById('history-panel-btc'), () => handleHistoryPanelTap('btc'));
        const switchBtn = document.getElementById('switchPairBtn');
        if (switchBtn) {
            const cleanBtn = switchBtn.cloneNode(true); switchBtn.parentNode.replaceChild(cleanBtn, switchBtn);
            const doSwitch = function (e) { e.preventDefault(); e.stopPropagation(); this.classList.add('btn-highlight'); setTimeout(() => this.classList.remove('btn-highlight'), 150); switchPair(); };
            cleanBtn.addEventListener('click', doSwitch);
            cleanBtn.addEventListener('touchstart', doSwitch, { passive: false });
        }
        updateSignalUIOnly('xau'); updateSignalUIOnly('btc');
        updatePerformanceUI('xau'); updatePerformanceUI('btc');
        initXAUWebSocket(); xauFetchRestPrice();
        initBTCWebSocket(); btcFetchRestPrice();
        updateGlobalPulse();
        setInterval(() => { const now = Date.now(); if (now - xauLastHeartbeat > 8000) xauFetchRestPrice(); updateGlobalPulse(); }, 3000);
        setInterval(() => { if (!xauWs || xauWs.readyState !== WebSocket.OPEN) xauFetchRestPrice(); if (!btcWs || btcWs.readyState !== WebSocket.OPEN) btcFetchRestPrice(); }, 2000);
        document.addEventListener('visibilitychange', () => { if (!document.hidden) { xauFetchRestPrice(); btcFetchRestPrice(); updateSignalUIOnly('xau'); updateSignalUIOnly('btc'); updateGlobalPulse(); } });
        initRunningTextForAllPairs();
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
})();
</script>
</body>
</html>
